      section and also add the video host to the `backend.csp` section of your `app-config.yaml`
      file.
    query: how do i add vidoes to TechDocs?
    response: "To add videos to TechDocs, you can use the `<iframe>` element to embed\
      \ the video content. First, configure your AWS S3 bucket to store TechDocs sites,\
      \ and then configure the `techdocs.sanitizer.allowedIframeHosts` and `backend.csp`\
      \ settings in your `app-config.yaml` file.\n\nAdd the following configuration\
      \ to the section of the TechDocs file that you want to embed a video into:\n\
      ```yaml\n<iframe\n  width=\"<video_width>\"\n  height=\"<video_height>\"\n \
      \ src=\"<video_url>\"\n  title=\"<video_title>\"\n  frameborder=\"<frame_border>\"\
      \n  allow=\"picture-in-picture\"\n  allowfullscreen>\n</iframe>\n```\nWhere:\n\
      \n* `<video_width>` specifies the width of the video in number of pixels, for\
      \ example, 672.\n* `<video_height>` specifies the height of the video in number\
      \ of pixels, for example, 378.\n* `<video_url>` specifies the url of the video,\
      \ for example, https://www.youtube.com/watch?v=LB1w8hjBt5k.\n* `<video_title>`\
      \ specifies the title of the video, for example, Red Hat Developer Hub Overview\
      \ Video.\n* `<frame_border>` specifies the size of the frame border in number\
      \ of pixels, for example, 0. Use a value of 0 for no border.\n\nMake sure to\
      \ list every permitted video host, such as www.youtube.com, under the `techdocs.sanitizer.allowedIframeHosts`\
      \ section of your `app-config.yaml` file, and also add the video host to the\
      \ `backend.csp` section of your `app-config.yaml` file.\n\nAfter configuring\
      \ your AWS S3 bucket, you can use the `<iframe>` element to add video content\
      \ to enhance your experience with TechDocs.\n\nAlternatively, you can also use\
      \ a TechDocs add-on to report documentation issues, change text size, or view\
      \ images in overlay in either the TechDocs Reader page or an Entity page.\n\n\
      To install and configure a TechDocs add-on, configure the `backstage-plugin-techdocs-module-addons-contrib`\
      \ plugin package in the Red Hat Developer Hub ConfigMap or Helm chart, depending\
      \ on whether you use the Operator or Helm chart for installation.\n\nNote: The\
