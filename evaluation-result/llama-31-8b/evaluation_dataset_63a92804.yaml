      configured under ${JIRA_TOKEN} in your RHDH secrets. Set the token value as
      one of the following values: * For Cloud: Basic YourCreatedCloudToken * For
      Data Center: Bearer YourJiraToken 4. Annotate catalog entities: Add the Jira
      project key to the metadata.annotations section of the catalog-info.yaml file
