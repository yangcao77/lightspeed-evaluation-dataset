- conversation_group_id: plugins-376
  description: plugins
  turns:
  - contexts:
    - 'Troubleshooting ### Plugin not loading after migration If a plugin fails to
      load, perform the following checks: 1. Verify the ghcr.io path is correct and
      the image tag or digest exists. 2. Confirm your cluster has network access to
      ghcr.io. 3. Review Developer Hub logs for OCI pull errors. [TIP] ---- To ensure
      environment stability, use a SHA256 digest instead of a version tag. See Determining
      SHA256 Digests ---- ### Determining tag values The <tag> variable is your RHDH
      application&#39;s version of Backstage and the plugin version, in the format:
      bs_<backstage-version>__<plugin-version> (note the double underscore delimiter).
      This format is only applicable for Community supported plugins. To find the
      correct image tag for <tag>: 1. Look in the RHDH release notes preface for your
      Backstage version. 2. Locate the plugin version for paths starting with oci://ghcr.io
      within one of the tables provided in the Dynamic plugins reference. For example,
      because RHDH 1.9 is based on Backstage 1.45.3, the tag will have the format
      bs_1.45.3__<plugin-version> [TIP] ---- To ensure environment stability, use
      a SHA256 digest instead of a version tag. See Determining SHA256 Digests ----
      ### Determining SHA256 digests You can look up the SHA256 digest using the Skopeo
      CLI or by searching in the RHDH Plugin Export Overlays repository Skopeo CLI
      Ensure you have skopeo and jq installed 1. Locate the plugin path in the Dynamic
      plugins reference 2. Run the following command, replacing the plugin path prefix
      oci:// with docker:// ```bash skopeo inspect docker://<plugin path>:<tag> |
      jq ''.Digest'' ``` RHDH Plugin Export Overlays Repo Go to the plugin packages
      list in the rhdh-plugin-export-overlays repository. Search for your plugin and
      select the tag that is associated with this release. ## Additional resources
      RHDH Plugin Export Overlays GitHub repository #### Deprecated plugins [IMPORTANT]
      ---- Red Hat Developer Hub (RHDH) includes a number of deprecated plugins, which
      are no longer being actively developed. It is recommended that if you depend
      on any of these plugins, you migrate to an alternative solution as soon as possible,
      as these plugins will be removed in a future release. ---- RHDH includes the
      following 2 deprecated plugins: # Other installable plugins The following Technology
      Preview plugins are not preinstalled and must be installed from an external
      source:'
    expected_response: Red Hat Developer Hub (RHDH) includes 2 deprecated plugins
      that are no longer being actively developed. The official recommendation is
      that if you depend on any of these plugins, you should migrate to an alternative
      solution as soon as possible. The justification for this is that these specific
      plugins will be removed in a future release.
    query: As a Platform Engineer managing our internal developer platform, what is
      the official guidance regarding the deprecated plugins included with Red Hat
      Developer Hub, and what is the underlying reason for this recommendation?
    response: 'The official guidance regarding deprecated plugins included with Red
      Hat Developer Hub is that they are no longer being actively developed and will
      be removed in a future release. It is recommended to migrate to an alternative
      solution as soon as possible.


      According to the documentation, RHDH includes a select number of community-supported
      plugins that are available for customers to enable and configure. These community
      plugins are augmented by Red Hat to be dynamic plugin capable and are provided
      with support scoped per Technical Preview terms.


      Red Hat Developer Hub (RHDH) includes a number of deprecated plugins, which
      are no longer being actively developed. It is recommended that if you depend
      on any of these plugins, you migrate to an alternative solution as soon as possible,
      as these plugins will be removed in a future release.


      To view a list of available plugins for your Red Hat Developer Hub application
      on the Extensions page, follow these steps:


      1.  Open your RHDH application and click Administration > Extensions.

      2.  Go to the Catalog tab to view a list of available plugins and related information.


      To view a list of installed plugins and related information, follow these steps:


      1.  Open your Developer Hub application and click Administration > Extensions.

      2.  Go to the Installed tab to view a list of installed plugins and related
      information.


      You can use the search bar in the header to filter the Extensions plugin cards
      by name. For example, if you type “A” into the search bar, Extensions will only
      show the plugins that contain the letter “A” in the Name field.


      If you previously used the Developer Preview of the Adoption Insights plugin
      and enabled the plugin manually, you must remove those earlier plugins as they
      are no longer required, and Adoption Insights is enabled by default.


      These changes provide clearer information about the status of each plugin, support
      level, and other relevant details, allowing you to make informed decisions when
      you select plugins. By understanding these visual cues and descriptive texts,
      you can quickly identify the maturity, support, and origin of each plugin.


      You can use the following badges and tags to provide quick visual cues:


      *   Certified

      *   Generally Available (GA)

      *   Community Plugin

      *   Tech Preview

      *   Dev Preview

      *   Custom Plugin'
