- conversation_group_id: catalog-278
  description: catalog
  turns:
  - contexts:
    - 'Monitoring Bulk Import actions using audit logs The Bulk Import backend plugin
      adds the following events to the Developer Hub audit logs. See Audit logs in
      Red Hat Developer Hub for more information on how to configure and view audit
      logs. Bulk Import Events: BulkImportUnknownEndpoint:: Tracks requests to unknown
      endpoints. BulkImportPing:: Tracks GET requests to the /ping endpoint, which
      allows us to make sure the bulk import backend is up and running. BulkImportFindAllOrganizations::
      Tracks GET requests to the /organizations endpoint, which returns the list of
      organizations accessible from all configured GitHub Integrations. BulkImportFindRepositoriesByOrganization::
      Tracks GET requests to the /organizations/:orgName/repositories endpoint, which
      returns the list of repositories for the specified organization (accessible
      from any of the configured GitHub Integrations). BulkImportFindAllRepositories::
      Tracks GET requests to the /repositories endpoint, which returns the list of
      repositories accessible from all configured GitHub Integrations. BulkImportFindAllImports::
      Tracks GET requests to the /imports endpoint, which returns the list of existing
      import jobs along with their statuses. BulkImportCreateImportJobs:: Tracks POST
      requests to the /imports endpoint, which allows to submit requests to bulk-import
      one or many repositories into the Developer Hub catalog, by eventually creating
      import pull requests in the target repositories. BulkImportFindImportStatusByRepo::
      Tracks GET requests to the /import/by-repo endpoint, which fetches details about
      the import job for the specified repository. BulkImportDeleteImportByRepo::
      Tracks DELETE requests to the /import/by-repo endpoint, which deletes any existing
      import job for the specified repository, by closing any open import pull request
      that could have been created. ```json { "actor": { "actorId": "user:default/myuser",
      "hostname": "localhost", "ip": "::1", "userAgent": "Mozilla/5.0 (X11; Linux
      x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36"
      }, "eventName": "BulkImportFindAllOrganizations", "isAuditLog": true, "level":
      "info", "message": "''get /organizations'' endpoint hit by user:default/myuser",
      "meta": {}, "plugin": "bulk-import", "request": { "body": {}, "method": "GET",
      "params": {}, "query": { "pagePerIntegration": "1", "sizePerIntegration": "5"
      }, "url": "/api/bulk-import/organizations?pagePerIntegration=1&sizePerIntegration=5"
      }, "response": { "status": 200 }, "service": "backstage", "stage": "completion",
      "status": "succeeded", "timestamp": "2024-08-26 16:41:02" } ``` # Centralizing
      your software components in the Red Hat Developer Hub catalog for easier access
      The Red Hat Developer Hub Software Catalog is a centralized system that gives
      you visibility into all the software across your ecosystem, including services,
      websites, libraries, and data pipelines. You can use it to view ownership details
      and metadata for each component in one place. The metadata for the components
      in your Software Catalog is stored as YAML files that live alongside your code
      in your version control system. The version control repositories can include
      one or many metadata files. Software Catalog organizes items as entities, which
      include Components, Resources, and APIs, and other related types. Each entity
      includes associated metadata such as its owner, type, and other relevant details.
      By storing metadata in YAML files alongside the code, you allow Red Hat Developer
      Hub to process and display this information through a clear, visual interface.
      With the Software Catalog, you can manage and maintain your software, stay aware
      of all software available in your ecosystem, and take ownership of your services
      and tools. The Overview page for a component provides key information such as
      links to the source code, documentation, dependencies, and ownership details.
      You can customize this page with plugins to suit specific needs. ##'
    expected_response: The Red Hat Developer Hub Software Catalog is a centralized
