- conversation_group_id: ci_cd-216
  description: ci_cd
  turns:
  - contexts:
    - 'Integrations in Red Hat Developer Hub Authentication in Red Hat Developer Hub
      # System architecture for deployment planning Red Hat Developer Hub (RHDH) uses
      a client-server architecture with a browser-based frontend and a stateless backend
      service layer. Use this architecture to plan for horizontal scaling, high availability,
      and efficient data synchronization across the Software Catalog. By understanding
      the RHDH architecture, you can perform the following planning tasks: Plan scalable
      deployments:: Deploy multiple backend instances behind a load balancer to manage
      increased load. Ensure high availability:: Configure database replication and
      cache clustering to eliminate single points of failure. Optimize resource allocation::
      Assign infrastructure resources based on which components require persistent
      storage or high-performance memory. The following diagram shows the RHDH internal
      architecture (frontend and backend) and its external dependencies, such as authentication
      providers, load balancers, and databases: ![rhdh architecture diagram] The RHDH
      architecture includes three primary layers. While the data layer (PostgreSQL
      and optional Redis cache) stores the indexed Software Catalog, the source of
      truth remains in external systems, such as Git repositories, CI/CD platforms,
      and other integrations. Catalog providers continuously scan these external systems
      and synchronize data to the database for fast querying. The frontend is a browser-based
      single-page application (SPA). Use the frontend interface to browse the Software
      Catalog, interact with plugins, and connect to external integrations. The frontend
      communicates with the backend exclusively using REST API calls. The backend
      provides REST API endpoints for the frontend. It manages the Software Catalog
      (an inventory of your organization&#8217;s software components, APIs, and resources)
      and handles authentication. The stateless design allows you to scale the backend
      horizontally by running multiple instances behind a load balancer. The backend
      externalizes all persistent state to a PostgreSQL database, including: Catalog
      entities Task history Session data (managed through a database backed session
      store) RHDH requires PostgreSQL for persistence. For production environments,
      use a logical cache to improve performance. PostgreSQL database:: Stores indexed
      Software Catalog entities (synchronized from external systems like Git repositories
      and CI/CD platforms), profiles, authentication data, and backend state. You
      must configure PostgreSQL with high availability (HA) for production deployments.
      Redis Cache (Optional):: Configure Redis as a shared logical cache across backend
      instances to improve performance for frequently accessed data, such as rendered
      TechDocs and catalog entities. [TIP] ---- The default in-memory cache is suitable
      only for single-instance deployments. You must use Redis for production deployments
      with multiple backend instances to ensure cache consistency. ---- # Achieve
      high availability with database and cache layers To achieve high availability
      (HA) in Red Hat Developer Hub, you must implement redundancy and failover for
      the backend service and its external data dependencies. This configuration uses
      horizontal scaling, database replication, and a shared logical cache to make
      sure RHDH remains operational during component failures. RHDH backend uses a
      stateless design to support horizontal scaling. PostgreSQL stores persistent
      data and the database manages sessions, allowing multiple backend instances
      to serve any request simultaneously. To improve performance, you can configure
      an optional logical cache using Redis. To maintain backend availability, observe
      the following architectural requirements: Deploy multiple backend instances::
      Run at least two backend instances for basic HA. Configure a load balancer::
      Use platform-provided load balancing, such as OpenShift Routes, Kubernetes Ingress,
      or cloud provider load balancers. Enable health checks:: Configure the load
      balancer to probe backend health and remove failed instances from rotation.
      Disable session affinity (sticky sessions):: Database-backed sessions allow
      any instance to serve any request. RHDH operations rely on PostgreSQL for persistence.
      A database outage renders the deployment non-functional until the database is
      restored. For production deployments, you must configure PostgreSQL with high
      availability (primary-replica replication) to minimize downtime. [IMPORTANT]
      ---- If you use catalog providers exclusively, the database acts as an indexed
      cache. You do not require disaster recovery backups because you can repopulate
      catalog data from external sources of truth, such as Git repositories, CI/CD
      platforms, and monitoring tools. ---- Configuring Redis as a shared logical
      cache improves production performance by sharing cached data across multiple
      backend instances. A shared cache makes sure that all instances access the same
      processed data, such as rendered TechDocs. If the logical cache fails, the platform
      remains functional, but you might experience the following symptoms: Slower
      response times due to cache misses. Increased database load because the backend
      must fetch data from PostgreSQL. No impact on authentication or core functionality.
      For maximum performance stability in production, configure Redis with high availability
      using Redis Sentinel for small deployments or Redis Cluster for larger deployments.
      # Integrations in Red Hat Developer Hub Red Hat Developer Hub integrates seamlessly
      with Red Hat OpenShift Container Platform and other tools, enabling comprehensive
      development and deployment workflows across enterprise. ## Integration with
      Red Hat OpenShift Container Platform Red Hat Developer Hub is fully integrated
      with Red Hat OpenShift Container Platform, offering: Operators to manage application
      lifecycle. Access to advanced OpenShift capabilities such as service mesh, serverless
      functions, GitOps, and distributed tracing. Pipelines and GitOps plugins for
      streamlined cloud native workflows. ## Integration with Red Hat Advanced Developer
      Suite - secure supply chain Red Hat Advanced Developer Suite - secure supply
      chain (RHADS - ssc) enhances Red Hat Developer Hub by providing secure CI/CD
      capabilities that integrate security measures into every stage of the development
      process. While Red Hat Developer Hub focuses on the inner loop (code, build,
      and test), RHADS - ssc manages the outer loop, automating: Code scanning Image
      building Vulnerability detection Deployment RHADS - ssc includes tools like
      Red Hat Trusted Artifact Signer (TAS) for code integrity, Red Hat Trusted Profile
      Analyzer (TPA) for automated Software build of Materials (SBOM) creation, and
      Red Hat Advanced Cluster Security (ACS) for vulnerability scanning. ## Extending
      Backstage with Red Hat Developer Hub Red Hat Developer Hub which is a fully
      supported, enterprise-grade productized version of upstream Backstage extends
      the upstream project by adding: Enhanced search capabilities that aggregate
      data from CI/CD pipelines, cloud providers, source control, and more. A centralized
      software catalog for locating applications, APIs, and resources. Automation
      through open source plugins that expand'
    expected_response: Red Hat Advanced Developer Suite - secure supply chain (RHADS
      - ssc) enhances Red Hat Developer Hub by providing secure CI/CD capabilities
      that integrate security measures into every stage of the development process.
      While Red Hat Developer Hub focuses on the inner loop (code, build, and test),
      RHADS - ssc manages the outer loop, automating code scanning, image building,
      vulnerability detection, and deployment. RHADS - ssc includes tools like Red
      Hat Trusted Artifact Signer (TAS) for code integrity, Red Hat Trusted Profile
      Analyzer (TPA) for automated Software build of Materials (SBOM) creation, and
      Red Hat Advanced Cluster Security (ACS) for vulnerability scanning.
    query: how dose the Red Hat Advanced Developer Suite - secure supply chain integrate
      with RHDH?
    response: 'Based on the search results, the Red Hat Advanced Developer Suite -
      secure supply chain integrates with RHDH through the use of plugins and integrations.
      Specifically, the Orchestrator plugin can be used to integrate with the secure
      supply chain, and the RHDH Operator can be used to manage the integration.


