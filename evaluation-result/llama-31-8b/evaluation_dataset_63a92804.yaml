      the following configuration: ```yaml # Group: Global Header package: ./dynamic
      plugins/dist/red hat developer hub backstage plugin global header mountPoint:
      global.header/component importName: ApplicationLauncherDropdown config: priority:
      82 ``` MenuItemLink entries:: Define sections, titles, icons, and links within
      the Quicklinks matrix. The default configuration includes links to the Developer
      Hub documentation and an RHDH Local, as shown in the following configurations:
      ```yaml mountPoint: global.header/application launcher importName: MenuItemLink
      config: section: Documentation priority: 150 props: title: Developer Hub icon:
      developerHub link: https://docs.redhat.com/en/documentation/red_hat_developer_hub
      mountPoint: global.header/application launcher importName: MenuItemLink config:
      section: Developer Tools priority: 100 props: title: RHDH Local icon: developerHub
      link: https://github.com/redhat developer/rhdh local ``` [NOTE] ---- When upgrading
      from previous versions, the installer does not overwrite your existing dynamic-plugins.yaml
      configuration. If you had not configured Starred Items or Quicklinks previously,
      they remain disabled after the upgrade and must be manually enabled. ---- ##
      Enabling Quicklinks and Starred Items after an upgrade If you upgrade from Red
      Hat Developer Hub 1.6 or earlier, Red Hat Developer Hub does not automatically
      enable the Quicklinks and Starred Items features. You must manually configure
      these features to display them in the global header. 1. You have access to your
      Red Hat Developer Hub configuration files. 2. You have administrative permissions
      to modify ConfigMaps (if using the Operator). 1. Locate your dynamic-plugin
      configuration. * Operator deployment: The configuration is stored in a ConfigMap
      referenced by your Backstage custom resource (CR). * Helm deployment: The configuration
      is in your values.yaml file or separate configuration files. 2. Enable the global
      header plugin. Ensure that the red-hat-developer-hub-backstage-plugin-global-header
      entry exists under the plugins: list and that disabled is set to false. 3. Verify
      that you enabled the global header plugin. Confirm that you listed the red-hat-developer-hub-backstage-plugin-global-header
      plugin under plugins: with disabled: false (or without a disabled property):
      ```yaml package: ./dynamic plugins/dist/red hat developer hub backstage plugin
      global header disabled: false ``` 4. Add the required components. Under the
      mountPoints section of the plugin, add the components as shown in the following
      example: ```yaml mountPoints: mountPoint: application/header importName: GlobalHeader
      config: position: above sidebar mountPoint: global.header/component importName:
      StarredDropdown config: priority: 85 mountPoint: global.header/component importName:
      ApplicationLauncherDropdown config: priority: 82 mountPoint: global.header/component
      importName: MenuItemLink config: section: Documentation priority: 150 props:
      title: Developer Hub icon: developerHub link: https://docs.redhat.com/en/documentation/red_hat_developer_hub
      mountPoint: global.header/application launcher importName: MenuItemLink config:
      section: Developer Tools priority: 100 props: title: RHDH Local icon: developerHub
      link: https://github.com/redhat developer/rhdh local ``` 5. Apply the configuration.
      * Operator deployment: Update the ConfigMap and allow the Operator to reconcile
      the changes. * Helm deployment: Apply your updated configuration using helm
      upgrade. 6. Verify the features are enabled. After the Red Hat Developer Hub
      instance restarts, confirm that the star icon and Quicklinks matrix appear in
      the global header. # Configuring a floating action button in Red Hat Developer
      Hub You can use the floating action button plugin to configure any action as
      a floating button in the Developer Hub instance. The floating action button
      plugin is enabled by default. You can also configure floating action buttons
      to display as submenu options within the main floating action button by assigning
      the floating action buttons to the same slot field of your dynamic-plugins.yaml
      file. ## Configuring a floating action button as a dynamic plugin You can configure
      the floating action button as a dynamic plugin to perform actions or open an
      internal or external link. You must have sufficient permissions as a platform
      engineer. To configure a floating action button as a dynamic plugin, complete
      any of the following tasks: Specify the global.floatingactionbutton/config mount
      point in your app config dynamic.yaml file. For example: ```yaml - package:
      ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import disabled:
      false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-bulk-import:
      # Start of the floating action button configuration mountPoints: - mountPoint:
      global.floatingactionbutton/config importName: BulkImportPage config: slot:
      ''page-end'' icon: <svg xmlns="http://www.w3.org/2000/svg" enable-background="new
      0 0 24 24" height="24px" viewBox="0 0 24 24" width="24px" fill="#e8eaed"><g><rect
      fill="none" height="24" width="24"/></g><g><path d="M11,7L9.6,8.4l2.6,2.6H2v2h10.2l-2.6,2.6L11,17l5-5L11,7z
      M20,19h-8v2h8c1.1,0,2-0.9,2-2V5c0-1.1-0.9-2-2-2h-8v2h8V19z"/></g></svg> label:
      ''Bulk import'' toolTip: ''Register multiple repositories in bulk'' to: /bulk-import/repositories
      # End of the floating action button configuration appIcons: - name: bulkImportIcon
      importName: BulkImportIcon dynamicRoutes: - path: /bulk-import/repositories
      importName: BulkImportPage menuItem: icon: bulkImportIcon text: Bulk import
      ``` frontend:mountPoints:importName:: (Required) The import name with an associated
      component to the mount point. frontend:mountPoints:importName:icon:: Use the
      svg value to display a black BulkImportPage icon. * To configure an action as
      a floating action button that opens an external link, specify the global.floatingactionbutton/config
      mount point in your dynamic-plugins.yaml file within the backstage-plugin-global-floating-action-button
      plugin. For example: ```yaml - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-floating-action-button
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-global-floating-action-button:
      mountPoints: - mountPoint: application/listener importName: DynamicGlobalFloatingActionButton
      - mountPoint: global.floatingactionbutton/config importName: NullComponent config:
      icon: ''<svg viewBox="0 0 250 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid"><path
