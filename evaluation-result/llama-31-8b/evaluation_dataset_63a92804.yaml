- conversation_group_id: configuration-340
  description: configuration
  turns:
  - contexts:
    - '# Telemetry data collection and analysis # Telemetry data collection and analysis
      The telemetry data collection feature helps in collecting and analyzing the
      telemetry data to improve your experience with Red Hat Developer Hub. This feature
      is enabled by default. Red Hat collects and analyzes the following data: Web
      Analytics:: Web Analytics use the Segment tool. It is the tracking of user behavior
      and interactions with Red Hat Developer Hub. Specifically, it tracks the following:
      * Events of page visits and clicks on links or buttons. * System-related information,
      for example, locale, time zone, user agent including browser and operating system
      details. * Page-related information, for example, title, category, extension
      name, URL, path, referrer, and search parameters. * Anonymized IP addresses,
      recorded as 0.0.0.0. * Anonymized username hashes, which are unique identifiers
      used solely to identify the number of unique users of the RHDH application.
      System Observability:: System Observability uses the OpenTelemetry tool. It
      is the tracking of the performance of the RHDH. Specifically, it tracks the
      following metrics: * Key system metrics such as CPU usage, memory usage, and
      other performance indicators. * Information about system components, such as
      the locale, time zone, and user agent (including details of the browser and
      operating system). * Traces and logs monitor system processes, allowing you
      to troubleshoot potential issues impacting the performance of RHDH. With RHDH,
      you can customize the Web Analytics and System Observability configuration based
      on your needs. # Disabling telemetry data collection in RHDH To disable telemetry
      data collection, you must disable the analytics-provider-segment plugin either
      using the Helm Chart or the Red Hat Developer Hub Operator configuration. As
      an administrator, you can disable the telemetry data collection feature based
      on your needs. For example, in an air-gapped environment, you can disable this
      feature to avoid needless outbound requests affecting the responsiveness of
      the RHDH application. ## Disabling telemetry data collection using the Operator
      You can disable the telemetry data collection feature by using the Operator.
      You have logged in as an administrator in the OpenShift Container Platform web
      console. You have installed Red Hat Developer Hub on OpenShift Container Platform
      using the Operator. 1. Perform one of the following steps: * If you have created
      the dynamic-plugins-rhdh ConfigMap file and not configured the analytics-provider-segment
      plugin, add the plugin to the list of plugins and set its plugins.disabled parameter
      to true. * If you have created the dynamic-plugins-rhdh ConfigMap file and configured
      the analytics-provider-segment plugin, search the plugin in the list of plugins
      and set its plugins.disabled parameter to true. * If you have not created the
      ConfigMap file, create it with the following YAML code: ```yaml kind: ConfigMap
      apiVersion: v1 metadata: name: dynamic plugins rhdh data: dynamic plugins.yaml:
      | includes: dynamic plugins.default.yaml plugins: package: ''./dynamic plugins/dist/backstage
      community plugin analytics provider segment'' disabled: true ``` 2. Set the
      value of the dynamicPluginsConfigMapName parameter to the name of your dynamic-plugins-rhdh
      config map in your Backstage custom resource: ```yaml # ... spec: application:
      dynamicPluginsConfigMapName: dynamic plugins rhdh # ... ``` 3. Save the configuration
      changes. ##'
