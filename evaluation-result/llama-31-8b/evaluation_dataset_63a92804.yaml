      tokens, scale with the number of installations by avoiding rate limits, and
      have a more transparent integration by avoiding to request user input. ----
      1. Register a GitHub App with the following configuration: GitHub App name::
      Enter a unique name identifying your GitHub App, such as authenticating-with-rhdh-<GUID>.
      Homepage URL:: Enter your Developer Hub URL: https://<my_developer_hub_domain>.
      Authorization callback URL:: Enter your Developer Hub authentication backend
      URL: https://<my_developer_hub_domain>/api/auth/github/handler/frame. Webhook::
