- conversation_group_id: catalog-168
  description: catalog
  turns:
  - contexts:
    - 'the following: [NOTE] ---- Mount points within catalog such as entity.page.
      are rendered as tabs and become visible only if at least one plugin contributes
      to them, or if they can render static content. ---- Each entity.page. mount
      point contains the following variations: /context type that serves to create
      React contexts /cards type for regular React components The following is an
      example of the overall configuration structure of a mount point: ```yaml # dynamic-plugins-config.yaml
      plugins: - plugin: <plugin_path_or_url> disabled: false pluginConfig: dynamicPlugins:
      frontend: my-plugin: # The plugin package name mountPoints: # (Optional): Uses
      existing mount points - mountPoint: <mountPointName>/[cards|context] module:
      CustomModule importName: FooPluginPage config: # (Optional): Allows you to pass
      additional configuration to the component layout: {} # Used only in `/cards`
      type which renders visible content # Use only in `/cards` type which renders
      visible content. `if` is passed to `<EntitySwitch.Case if={<here>}`. if: allOf|anyOf|oneOf:
      - isMyPluginAvailable - isKind: component - isType: service - hasAnnotation:
      annotationKey props: {} # Useful when you are passing additional data to the
      component ``` The available conditions include: allOf: All conditions must be
      met anyOf: At least one condition must be met oneOf: Only one condition must
      be met Conditions are: isKind: Accepts a string or a list of string with entity
      kinds. For example isKind: component renders the component only for entity of
      kind: Component. isType: Accepts a string or a list of string with entity types.
      For example isType: service renders the component only for entities of spec.type:
      ''service''. hasAnnotation: Accepts a string or a list of string with annotation
      keys. For example hasAnnotation: my annotation renders the component only for
      entities that have defined metadata.annotations[''my annotation'']. Condition
      imported from the module of the plugin: Must be function name exported from
      the same module within the plugin. For example isMyPluginAvailable renders the
      component only if isMyPluginAvailable function returns true. The function must
      have the following signature: (e: Entity) => boolean. The entity page supports
      adding more items to the context menu at the top right of the page. The exported
      component is a form of dialog wrapper component that accepts an open boolean
      property and an onClose event handler property as shown in the following example:
      ```yaml export type SimpleDialogProps = { open: boolean; onClose: () => void;
      }; ``` You can configure the context menu entry using the props configuration
      entry for the mount point. The title and icon properties sets the text and icon
      of the menu item. You can use any system icon or icon added through a dynamic
      plugin. The following is an example configuration: ```yaml # dynamic plugins
      config.yaml plugins: plugin: <plugin_path_or_url> disabled: false pluginConfig:
      dynamicPlugins: frontend: my dynamic plugin package: appIcons: name: dialogIcon
      importName: DialogIcon mountPoints: mountPoint: entity.context.menu importName:
      SimpleDialog config: props: title: Open Simple Dialog icon: dialogIcon ``` ###
      Adding application header You can customize global headers by specifying configurations
      in the app-config.yaml file as shown in the following example: ```yaml # app-config.yaml
      dynamicPlugins: frontend: my-plugin: # The plugin package name mountPoints:
      - mountPoint: application/header # Adds the header as a global header importName:
      <header_component> # Specifies the component exported by the global header plugin
      config: position: above-main-content # Supported values: (`above-main-content`|
      above-sidebar`) ``` [NOTE] ---- To configure multiple global headers at different
      positions, add entries to the mountPoints field. ---- ### Adding application
      listeners You can add application listeners using the application/listener mount
      point as shown in the following example: ```yaml # app-config.yaml dynamicPlugins:
      frontend: my-plugin: # The plugin package name mountPoints: - mountPoint: application/listener
      importName: <exported listener component> ``` [NOTE] ---- You can configure
      multiple application listeners by adding entries to the mountPoints field. ----
      ### Adding application providers You can add application providers using the
      application/provider mount point. You can use a mount point to configure a context
      provider as shown in the following example: ```yaml # app-config.yaml dynamicPlugins:
      frontend: my-plugin: # The plugin package name dynamicRoutes: - path: /<route>
      importName: Component # The component to load on the route mountPoints: - mountPoint:
      application/provider importName: <exported provider component> ``` [NOTE] ----
      1. You can configure multiple application providers by adding entries to the
      mountPoints field. 2. The package_name key under dynamicPlugins.frontend must
      match the scalprum.name value in the package.json file of your plugin. This
      ensures your dynamic plugin loads correctly at runtime. ---- ## Customizing
      and extending entity tabs You can customize and extend the set of tabs using
      the entityTabs configuration as follows: ```yaml # dynamic-plugins-config.yaml
      plugins: - plugin: <plugin_path_or_url> disabled: false pluginConfig: dynamicPlugins:
      frontend: my-plugin: # The plugin package name entityTabs: # Specify a new tab
      - path: /new-path title: My New Tab mountPoint: entity.page.my-new-tab # Change
      an existing tab''s title or mount point - path: / title: General mountPoint:
      entity.page.overview # Specify the sub-path route in the catalog where this
      tab is available - path: "/pr" title: "Changed Pull/Merge Requests" # Specify
      the title you want to display priority: 1 # The base mount point name available
      on the tab. This name expands to create two mount points per tab, with` /context`
      and with `/cards` mountPoint: "entity.page.pull-requests" - path: "/" title:
      "Changed Overview" mountPoint: "entity.page.overview" # Specify the order of
      tabs. The tabs with higher priority values appear first priority: -6 ``` You
      can configure dynamic front-end plugins to target the mount points exposed by
      the entityTabs configuration. The following are the default catalog entity routes
      in the default order: [NOTE] ---- Mount points within Catalog such as `entity.page.*`
      are rendered as tabs and become visible only if at least one plugin contributes
      to them, or if they can render static content. ---- ## Using a custom SignInPage
      component In Red Hat Developer Hub (RHDH), the SignInPage component manages
      the authentication flow of the application. This component connects one or more
