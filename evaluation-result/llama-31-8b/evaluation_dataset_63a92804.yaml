- conversation_group_id: plugins-352
  description: plugins
  turns:
  - contexts:
    - 'Installing and configuring Red Hat Developer Lightspeed for Red Hat Developer
      Hub Developer Lightspeed for RHDH includes several components that work together
      to provide virtual assistant (chat) functionality: Llama stack server (container
      sidecar):: Based on open source Llama Stack, this service is the gateway to
      your LLM inferencing provider for chat services. Its modular architecture supports
      integrating other services, such as Model Context Protocol (MCP). To enable
      chat functionality, you must integrate your LLM provider with the Llama Stack
      server using Bring Your Own Model or BYOM. Lightspeed Core Service (LCS) (container
      sidecar):: Based on the open source Lightspeed Core, this service extends the
      Llama Stack server by maintaining chat history and gathering user feedback.
      Red Hat Developer Lightspeed for Red Hat Developer Hub (dynamic plugins):: These
      plugins enable the Developer Lightspeed for RHDH user interface within your
      RHDH instance. To provide Developer Lightspeed for RHDH to your users, you must
      configure these components to communicate with each other. [NOTE] ---- * If
      you are upgrading from the previous Developer Lightspeed for RHDH Developer
      Preview with Road-Core Service, you must remove all existing Developer Lightspeed
      for RHDH configurations before reinstalling. * To prevent or resolve upgrade
      inconsistencies, drop and recreate the dynamic plugins volume. This reinstallation
      is required due to the following fundamental architectural changes: * The previous
      release used Road-Core Service as a sidecar container for interfacing with LLM
      providers. * The updated architecture replaces {rcs-short} with the new Lightspeed
      Core Service and Llama Stack server, which requires new configurations for the
      plugins, volumes, containers, and secrets. ---- You are logged in to your OpenShift
      Container Platform account. You have an RHDH instance installed using either
      the Operator or the Helm chart. You have created a custom dynamic plugins ConfigMap.
      You have administrative access to the RHDH configuration files. You must manually
      install and configure the Developer Lightspeed for RHDH plugin, the Lightspeed
      Core Service (LCS) sidecar container, and the Llama Stack sidecar container.
      1. Create the Lightspeed Core Service (LCS) ConfigMap to store the service configuration:
      1. In the OpenShift Container Platform web console, navigate to your RHDH instance
      and select the ConfigMaps tab. 2. Click Create ConfigMaps. 3. Select YAML view
      and edit the file using the following structure. This example demonstrates the
      configuration for the LCS ConfigMap, typically named lightspeed-stack, which
      connects to the Llama Stack service locally on port 8321: ```yaml kind: ConfigMap
      apiVersion: v1 metadata: name: lightspeed-stack data: lightspeed-stack.yaml:
      | name: Lightspeed Core Service (LCS) service: host: 0.0.0.0 # Use ${LIGHTSPEED_SERVICE_PORT}
      if you are not running the Service on port `8080` # port: ${LIGHTSPEED_SERVICE_PORT}
      auth_enabled: false workers: 1 color_log: true access_log: true llama_stack:
      use_as_library_client: false url: http://localhost:8321 user_data_collection:
      feedback_enabled: true feedback_storage: "/tmp/data/feedback" transcripts_enabled:
      true transcripts_storage: "/tmp/data/transcripts" authentication: module: "noop"
      conversation_cache: type: "sqlite" sqlite: db_path: "/tmp/data/conversations/lcs_cache.db"
      ``` [IMPORTANT] ---- LCS uses Llama Stack expansion syntax for environment variables.
      To make sure the service correctly parses variables in the lightspeed-stack.yaml
      file, you must use the ${env.VAR} format. Variable names are case-sensitive
      and must be uppercase. The syntax ${env.var} is not supported. For example:
      ```yaml model_config: api_key: ${env.VAR} ``` ---- 4. Click Create. 2. Create
      the Developer Lightspeed for RHDH ConfigMap (lightspeed-app-config) for plugin
      configurations: 1. In the OpenShift Container Platform web console, navigate
      to your RHDH instance and select the ConfigMaps tab. 2. Click Create ConfigMap.
      3. Select the YAML view option and add the following configuration: ```yaml
      kind: ConfigMap apiVersion: v1 metadata: name: lightspeed-app-config namespace:
      <__namespace__> # Enter your RHDH instance namespace data: app-config.yaml:
      |- backend: csp: upgrade-insecure-requests: false img-src: - "''self''" - "data:"
      - https://img.freepik.com - https://cdn.dribbble.com - https://avatars.githubusercontent.com
      # This is to load GitHub avatars in the UI script-src: - "''self''" - "''unsafe-eval''"
      - https://cdn.jsdelivr.net lightspeed: # OPTIONAL: Custom users prompts displayed
      to users # If not provided, the plugin uses built-in default prompts prompts:
      - title: Getting Started with Red Hat Developer Hub message: Can you guide me
      through the first steps to start using {product-short} as a developer, like
      exploring the Software Catalog and adding my service? # OPTIONAL: Port for lightspeed
      service (default: 8080) # servicePort: ${LIGHTSPEED_SERVICE_PORT} # OPTIONAL:
      Override default RHDH system prompt # systemPrompt: "You are a helpful assistant
      focused on Red Hat Developer Hub development." ``` 4. Click Create. 3. Create
      Llama Stack Secret file (llama-stack-secrets) for LLM provider credentials:
      [IMPORTANT] ---- Red Hat Developer Hub 1.9 configures the Llama Stack image
      to use the vLLM provider exclusively. The vLLM provider supports the OpenAI
      API schema but does not support connecting directly to the official OpenAI service
      (api.openai.com). Do not use the official OpenAI API URL or token with vLLM
      in this release. Attempting this might result in errors or improper responses.
      Native OpenAI provider support is planned for future releases. ---- 1. In the
      OpenShift Container Platform web console, navigate to Secrets. 2. Click Create
      -> Key/value secret. 3. Select the YAML view option and add the following structure:
      ```yaml apiVersion: v1 kind: Secret metadata: name: llama stack secrets type:
      Opaque stringData: ENABLE_VLLM: "true" ENABLE_VERTEX_AI: "" ENABLE_OPENAI: ""
      ENABLE_OLLAMA: "" VLLM_URL: "_<api_endpoint>_" VLLM_API_KEY: "_<api_key>_" VLLM_MAX_TOKENS:
      "" VLLM_TLS_VERIFY: "" OPENAI_API_KEY: "" VERTEX_AI_PROJECT: "" VERTEX_AI_LOCATION:
      "" GOOGLE_APPLICATION_CREDENTIALS: "" OLLAMA_URL: "" SAFETY_MODEL: "llama guard3:8b"
      SAFETY_URL: "http://localhost:#####/v1" SAFETY_API_KEY: "" ``` where: ENABLE_VLLM::
      Enables the vLLM provider. Set to true to activate. ENABLE_OPENAI:: Enables
      the OpenAI provider. Set to true to activate. ENABLE_VERTEX_AI:: Enables the
      Vertex AI provider. Set to true to activate. ENABLE_OLLAMA:: Enables the Ollama
      provider. Set to true to activate. To disable a provider, leave the value blank.
      (for example: ENABLE_VLLM="") VLLM_URL:: The API endpoint URL for the LLM provider.
      The provider must comply with the OpenAI API specification. Examples include
      OpenAI, Red Hat OpenShift AI, and vLLM. VLLM_API_KEY:: Required for remote services:
      Set this to the API key or token required for authentication with your remote
      LLM provider, if it is compatible with the OpenAI API specification. VLLM_MAX_TOKENS::
      Optional. The maximum number of tokens the model generates. VLLM_TLS_VERIFY::
      Optional. Specifies whether the system verifies the TLS certificate for the
      vLLM endpoint. OPENAI_API_KEY:: The API key required to'
    expected_response: 'Red Hat Developer Lightspeed for Red Hat Developer Hub includes
      several components that work together to provide virtual assistant (chat) functionality.
      These components are: the Llama stack server (container sidecar), which acts
      as the gateway to your LLM inferencing provider for chat services; the Lightspeed
      Core Service (LCS) (container sidecar), which extends the Llama Stack server
      by maintaining chat history and gathering user feedback; and the Red Hat Developer
      Lightspeed for Red Hat Developer Hub (dynamic plugins), which enable the user
      interface within your RHDH instance.'
    query: What are the main components of Red Hat Developer Lightspeed for Red Hat
      Developer Hub?
    response: "Based on the knowledge_search results, the main components of Red Hat\
      \ Developer Lightspeed for Red Hat Developer Hub are:\n\n1. **Knowledge Retrieval**:\
      \ The ability to provide instant access to internal and external documentation\
      \ on docs.redhat.com.\n2. **Code Assistance**: The ability to generate, debug,\
      \ and optimize code snippets.\n3. **System Navigation**: The ability to offer\
      \ step-by-step instructions for Red Hat Developer Hub features and support integration\
      \ of Backstage plugins for CI/CD, monitoring, and infrastructure.\n4. **Diagnostics\
      \ and Troubleshooting**: The ability to analyze logs and error messages to identify\
      \ root causes and suggest actionable fixes for common development issues.\n\
      5. **Integration Support**: The ability to assist with Backstage plugins and\
      \ integrations, including Kubernetes, CI/CD, and GitOps pipelines.\n6. **Lightspeed\
      \ Core Service**: A service that extends the Llama Stack server by maintaining\
      \ chat history and gathering user feedback.\n7. **Llama Stack Server**: A service\
      \ that is the gateway to your LLM inferencing provider for chat services, supports\
      \ integrating other services, such as Model Context Protocol (MCP).\n8. **Dynamic\
      \ Plugins**: Plugins that enable the Developer Lightspeed for RHDH user interface\
      \ within your RHDH instance.\n9. **Red Hat Developer Support Policy**: A policy\
      \ that defines the support scope for Red Hat Developer Preview features.\n10.\
      \ **Plugins and Integrations**: A collection of community-supported plugins\
      \ that can be enabled and configured by customers to extend the functionality\
      \ of RHDH. \n\nThese components work together to provide a comprehensive virtual\
      \ assistant (chat) functionality for RHDH users. \n\nSource: , , , ."
