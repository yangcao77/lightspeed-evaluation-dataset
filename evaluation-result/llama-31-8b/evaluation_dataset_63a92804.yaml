  description: plugins
  turns:
  - contexts:
    - '# Evaluate project health using Scorecards # Evaluate project health using
      Scorecards You can use the Scorecard plugin in Red Hat Developer Hub (RHDH)
      to quickly assess the health, security, and compliance of your services in one
      place. By bringing key performance indicators together in a single view, you
      can evaluate component quality and identify issues without jumping between multiple
      tools or systems. ## Component health and compliance monitoring using Scorecards
      [IMPORTANT] ---- This section describes Developer Preview features in the Scorecard
      plugin. Developer Preview features are not supported by Red Hat in any way and
      are not functionally complete or production-ready. Do not use Developer Preview
      features for production or business-critical workloads. Developer Preview features
      provide early access to functionality in advance of possible inclusion in a
      Red Hat product offering. Customers can use these features to test functionality
      and provide feedback during the development process. Developer Preview features
      might not have any documentation, are subject to change or removal at any time,
      and have received limited testing. Red Hat might provide ways to submit feedback
      on Developer Preview features without an associated SLA. For more information
      about the support scope of Red Hat Developer Preview features, see Developer
      Preview Support Scope. ---- Use the Scorecard plugin to achieve the following
      goals: Identify and prioritize risks: Use unified health data to make faster
      remediation decisions. Maintain security standards: Automatically surface compliance
      gaps to enforce best practices. Streamline workflows: Access all metrics in
      RHDH to reduce development overhead. Standardize service quality: Define and
      measure consistent health criteria across the organization. ![scorecard sample]
      ## Supported Scorecard metrics providers When you need to understand what service
      metrics are available, the Scorecard plugin gathers data from third-party systems
      through metric providers. The following table helps you identify which metrics
      are available for each supported provider, so you can decide what data to use
      for evaluating your services. The following metric providers are supported:
