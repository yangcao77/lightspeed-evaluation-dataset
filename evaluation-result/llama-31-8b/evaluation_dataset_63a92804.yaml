- conversation_group_id: catalog-490
  description: catalog
  turns:
  - contexts:
    - 'Enable user authentication with Microsoft Azure, with optional steps Authenticate
      users with Microsoft Azure by provisioning the users and groups from Microsoft
      Azure to the Developer Hub software catalog, and configuring the Microsoft Azure
      authentication provider in Red Hat Developer Hub. You have the permission to
      register an application in Azure. [TIP] ---- Alternatively, ask your Azure administrator
      to prepare the required Azure application. ---- * You added a custom Developer
      Hub application configuration, and have enough permissions to change it. * Your
      Developer Hub backend can access the following hosts: login.microsoftonline.com::
      The Microsoft Azure authorization server, which enables the authentication flow.
      graph.microsoft.com:: The server for retrieving organization data, including
      user and group data, to import into the Developer Hub catalog. 1. Register your
      Developer Hub app in Azure, by using the Azure portal. 1. Sign in to the Microsoft
      Entra admin center. 2. Optional: If you have access to multiple tenants, use
      the Settings icon in the top menu to switch to the tenant in which you want
      to register the application from the Directories + subscriptions menu. 3. Browse
      to Applications > App registrations, and create a New registration with the
      configuration: Name:: Enter a name to identify your application in Azure, such
      as {my-product-app-name-in-azure}. Supported account types:: Select Accounts
      in this organizational directory only. Redirect URI:: Select a platform:: Select
      Web. URL:: Enter the backend authentication URI set in Developer Hub: https://<my_developer_hub_domain>/api/auth/microsoft/handler/frame
      4. On the Applications > App registrations > {my-product-app-name-in-azure}
      > Manage > API permissions page, Add a Permission, Microsoft Graph, select the
      following permissions: Application Permissions:: GroupMember.Read.All, User.Read.All::
      Enter permissions that enable provisioning user and groups to the Developer
      Hub software catalog. Optional: Grant admin consent for these permissions. Even
      if your company does not require admin consent, consider doing so as it means
      users do not need to individually consent the first time they access Developer
      Hub. Delegated Permissions:: User.Read, email, offline_access, openid, profile::
      Enter permissions that enable authenticating users. Optional: Enter optional
      custom scopes for the Microsoft Graph API that you define both here and in your
      app-config.yaml Developer Hub configuration file. 5. On the Applications > App
      registrations > {my-product-app-name-in-azure} > Manage > Certificates & secrets
      page, in the Client secrets tab, create a New client secret. 6. Save the following
      values for the next step: * Directory (tenant) ID * Application (client) ID
      * Application (client) Secret ID 2. Add your Azure credentials to Developer
      Hub, by adding the following key/value pairs to your Developer Hub secrets:
      MICROSOFT_TENANT_ID:: Enter your saved Directory (tenant) ID. MICROSOFT_CLIENT_ID::
      Enter your saved Application (client) ID. MICROSOFT_CLIENT_SECRET:: Enter your
      saved Application (client) secret. 3. Enable the Microsoft Graph catalog provider
      plugin in your dynamic-plugins.yaml file. This plugin imports Azure users and
      groups to the Developer Hub software catalog. ```yaml plugins: package: ''./dynamic
      plugins/dist/backstage plugin catalog backend module msgraph dynamic'' disabled:
      false ``` 4. Enable provisioning Azure users and groups to the Developer Hub
      software catalog, by adding the Microsoft Graph catalog provider section in
      your app-config.yaml file: ```yaml catalog: providers: microsoftGraphOrg: providerId:
      target: https://graph.microsoft.com/v1.0 tenantId: ${MICROSOFT_TENANT_ID} clientId:
      ${MICROSOFT_CLIENT_ID} clientSecret: ${MICROSOFT_CLIENT_SECRET} schedule: frequency:
      hours: 1 timeout: minutes: 50 initialDelay: minutes: 50 ``` target:: Enter https://graph.microsoft.com/v1.0
      to define the MSGraph API endpoint the provider is connecting to. You might
      change this parameter to use a different version, such as the beta endpoint.
      tenandId:: Enter the configured secret variable name: ${MICROSOFT_TENANT_ID}.
      clientId:: Enter the configured secret variable name: ${MICROSOFT_CLIENT_ID}.
      clientSecret:: Enter the configured secret variable name: ${MICROSOFT_CLIENT_SECRET}.
      schedule:: frequency:: Enter the schedule frequency in the cron, ISO duration,
      or human duration format. In a large organization, user provisioning might take
      a long time, therefore avoid using a low value. timeout:: Enter the schedule
      timeout in the ISO duration or human duration format. In a large organization,
      user provisioning might take a long time, therefore avoid using a low value.
      initialDelay:: Enter the schedule initial delay in the ISO duration or human
      duration format. :_mod-docs-content-type: SNIPPET 5. Optional: Add optional
      fields to the Microsoft authentication provider section in your app-config.yaml
      file: ```yaml catalog: providers: microsoftGraphOrg: providerId: authority:
      https://login.microsoftonline.com/ queryMode: advanced user: expand: manager
      filter: accountEnabled eq true and userType eq ''member'' loadPhotos: true select:
      [''id'', ''displayName'', ''description''] userGroupMember: filter: "displayName
      eq ''Backstage Users''" search: ''"description:One" AND ("displayName:Video"
      OR "displayName:Drive")'' group: expand: member filter: securityEnabled eq false
      and mailEnabled eq true and groupTypes/any(c:c+eq+''Unified'') search: ''"description:One"
      AND ("displayName:Video" OR "displayName:Drive")'' select: [''id'', ''displayName'',
      ''description''] ``` authority:: Enter your Azure authority URL if it is different
      from the default: https://login.microsoftonline.com. queryMode:: Enter advanced
      when the default basic query mode is insufficient for your queries to the Microsoft
      Graph API. See Microsoft Azure advanced queries. user:: Add this section to
