      \ access to Members.\n*   Where can this GitHub App be installed?: Select Only\
      \ on this account.\n\nNext, generate a new client secret and private key for\
      \ the GitHub App. You can do this by navigating to the General -> Clients secrets\
      \ section and clicking Generate a new client secret, and then navigating to\
      \ the General -> Private keys section and clicking Generate a private key.\n\
      \nFinally, save the values for the App ID, Client ID, Client secret, and Private\
      \ key. You will need these values to configure the GitHub integration in your\
      \ Red Hat Developer Hub instance.\n\nTo configure the GitHub integration, add\
      \ the `catalog.providers.github` and `integrations.github` sections to your\
