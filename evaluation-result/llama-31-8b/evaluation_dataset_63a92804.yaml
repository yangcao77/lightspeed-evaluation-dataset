  description: authentication
  turns:
  - contexts:
    - 'software catalog. [WARNING] ---- In production mode, do not enable the dangerouslyAllowSignInWithoutUserInCatalog
      option. ---- sessionDuration:: Lifespan of the user session. Enter a duration
      in ms library format (such as ''24h'', ''2 days''), ISO duration, or "human
      duration" as used in code. backstageTokenExpiration:: Enter a value to modify
      the Developer Hub token expiration from its default value of one hour. It refers
      to the validity of short-term cryptographic tokens, not to the session duration.
      The expiration value must be set between 10 minutes and 24 hours. [WARNING]
      ---- If multiple valid refresh tokens are issued due to frequent refresh token
      requests, older tokens will remain valid until they expire. Enhance security
      and prevent potential misuse of older tokens by enabling a refresh token rotation
      strategy in your RHBK realm. 1. From the Configure section of the navigation
      menu, click Realm Settings. 2. From the Realm Settings page, click the Tokens
      tab. 3. From the Refresh tokens section of the Tokens tab, toggle the Revoke
      Refresh Token to the Enabled position. ---- 10. To disable the guest login option,
      in the app-config.yaml file, set the authentication environment to production:
      ```yaml auth: environment: production ``` 1. To verify user and group provisioning,
      check the console logs. Successful synchronization example: ``` 2025-06-27T16:02:34.647Z
      catalog info Read 5 Keycloak users and 3 Keycloak groups in 0.4 seconds. Committing...
      class="KeycloakOrgEntityProvider" taskId="KeycloakOrgEntityProvider:default:refresh"
      taskInstanceId="db55c34b-46b3-402b-b12f-2fbc48498e82" trace_id="606f80a9ce00d1c86800718c4522f7c6"
      span_id="7ebc2a254a546e90" trace_flags="01" 2025-06-27T16:02:34.650Z catalog
      info Committed 5 Keycloak users and 3 Keycloak groups in 0.0 seconds. class="KeycloakOrgEntityProvider"
      taskId="KeycloakOrgEntityProvider:default:refresh" taskInstanceId="db55c34b-46b3-402b-b12f-2fbc48498e82"
      trace_id="606f80a9ce00d1c86800718c4522f7c6" span_id="7ebc2a254a546e90" trace_flags="01"
      ``` 2. To verify RHBK user authentication: 1. Go to the Developer Hub login
      page. 2. Your Developer Hub sign-in page displays Sign in using OIDC and the
      Guest user sign-in is disabled. 3. Log in with OIDC by using the saved Username
      and Password values. ## Enable user provisioning with LDAP When Red Hat Build
      of Keycloak (RHBK) depends on Lightweight Directory Access Protocol (LDAP) to
      resolve user and group identities, you can opt to provision users and groups
      from LDAP directly to the Red Hat Developer Hub software catalog, rather than
      using the RHBK provisioning mechanism. You have configured authentication with
      Red Hat Build of Keycloak (RHBK). You have collected the required LDAP credentials:
      LDAP URL:: Your LDAP server URL, such as ldaps://ds.example.net. Bind dn:: Your
      bind distinguished name, such as cn=admin,OU=Users,DC=rhdh,DC=test LDAP secret::
      Your LDAP secret. Recommended: LDAP certificates and keys:: To use a secure
      LDAP connexion (ldaps://): you stored your LDAP certificates and keys respectively
      in the ldap_certs.pem and ldap_keys.pem files. [WARNING] ---- In production
      mode, use a secure LDAP connexion. ---- 1. Enter your LDAP credentials to Developer
      Hub, by adding the LDAP_SECRET environment variable to your Developer Hub secrets.
      ``` $ oc patch secret my-rhdh-secrets --patch ''{"stringData": { "LDAP_SECRET":
      "<ldap_secret>" }}'' ``` <ldap_secret>:: Enter your LDAP secret. 2. Recommended:
      To use a secure LDAP connection (ldaps://), add your LDAP certificates and keys
      files to a {a-platform-generic} secret. ``` $ oc create secret generic my-rhdh-ldap-secrets
      \ --from-file=./ldap_certs.pem \ --from-file=./ldap_keys.pem ``` 3. Enable the
      LDAP catalog provider plugin in your dynamic-plugins.yaml file. ```yaml plugins:
      package: ''./dynamic plugins/dist/backstage plugin catalog backend module ldap
      dynamic'' disabled: false ``` 4. Enable provisioning GitHub users and groups
      to the Developer Hub software catalog, by adding the LDAP catalog provider section
      to your app-config.yaml file: 1. Optional: Remove other catalog providers, by
      removing the other catalog providers section. 2. Enter the mandatory fields:
      ```yaml catalog: providers: ldapOrg: default: target: ldaps://ds.example.net
      bind: dn: cn=admin,ou=Users,dc=rhdh secret: ${LDAP_SECRET} users: dn: OU=Users,OU=RHDH
      Local,DC=rhdh,DC=test options: filter: (uid= ) groups: dn: OU=Groups,OU=RHDH
      Local,DC=rhdh,DC=test schedule: frequency: PT1H timeout: PT15M ``` target::
      Enter your LDAP server URL, such as ldaps://ds.example.net. bind:: Enter your
      service account information: dn:: Enter your service account distinguished name
      (DN), such as cn=admin,OU=Users,DC=rhdh,DC=test secret:: Enter the name of the
      variable containing your LDAP secret: ${LDAP_SECRET}. users:: Enter information
      about how to find your users: dn:: Enter the DN containing the user information.
      options:: filter:: Enter your filter, such as (uid=*) to provision to the RHDH
      software catalog only users with an existing uid. groups:: Enter information
      about how to find your groups: dn:: Enter the DN containing the group information.
      schedule:: Enter your schedule information: frequency:: Enter your schedule
      frequency, in the cron, ISO duration, or "human duration" format. timeout::
      Enter your schedule timeout, in the ISO duration or "human duration" format.
      initialDelay:: Enter your schedule initial delay, in the ISO duration or "human
      duration" format. 3. Optional: To change how Developer Hub maps LDAP user fields
      to the software catalog, enter optional maps and set fields. ```yaml catalog:
      providers: ldapOrg: default: target: ldaps://ds.example.net bind: dn: cn=admin,ou=Users,dc=rhdh
      secret: ${LDAP_SECRET} users: dn: OU=Users,OU=RHDH Local,DC=rhdh,DC=test options:
      filter: (uid= ) map: rdn: uid name: uid description: {} displayName: cn email:
      mail picture: {} memberOf: memberOf set: metadata.customField: ''hello'' groups:
      dn: OU=Groups,OU=RHDH Local,DC=rhdh,DC=test schedule: frequency: PT1H timeout:
      PT15M ``` rdn:: To change the default value: uid, enter the relative distinguished
      name of each entry. name:: To change the default value: uid, enter the LDAP
      field to map to the RHDH metadata.name field. description:: To set a value,
      enter the LDAP field to map to the RHDH metadata.description field. displayName::
      To change the default value: cn, enter the LDAP field to map to the RHDH metadata.displayName
      field. email:: To change the default value: mail, enter the LDAP field to map
      to the RHDH spec.profile.email field. picture:: To set a value, enter the LDAP
      field to map to the RHDH spec.profile.picture field. memberOf:: To change the
      default value: memberOf, enter the LDAP field to map to the RHDH spec.memberOf
      field. set:: To set a value, enter the hard coded JSON to apply to the entities
      after ingestion, such as metadata.customField: ''hello''. 4. Optional: To change
      how Developer Hub maps LDAP group fields to the software catalog, enter optional
      groups.maps fields. ```yaml catalog: providers: ldapOrg: default: target: ldaps://ds.example.net
      bind: dn: cn=admin,ou=Users,dc=rhdh secret: ${LDAP_SECRET} users: dn: OU=Users,OU=RHDH
      Local,DC=rhdh,DC=test options: filter: (uid= ) groups: dn: OU=Groups,OU=RHDH
      Local,DC=rhdh,DC=test map: rdn: uid name: uid description: {} displayName: cn
      email: mail picture: {} memberOf: memberOf members: member type: groupType'
