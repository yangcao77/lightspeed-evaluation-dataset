      ---- You can also create a new Helm release by clicking the Create button and
      edit the configuration to disable telemetry. ---- 3. Use either the Form view
      or YAML view to edit the Helm configuration: * Using Form view 1. Expand Root
      Schema → global → Dynamic plugins configuration. → List of dynamic plugins that
      should be installed in the backstage application. 2. Click the Add list of dynamic
      plugins that should be installed in the backstage application. link. 3. Perform
      one of the following steps: * If you have not configured the plugin, add the
      following value in the Package specification of the dynamic plugin to install.
      It should be usable by the npm pack command. field: ./dynamic-plugins/dist/backstage-community-plugin-analytics-provider-segment
      ![disabling telemetry] * If you have configured the plugin, find the Package
      specification of the dynamic plugin to install. It should be usable by the npm
      pack command. field with the ./dynamic-plugins/dist/backstage-community-plugin-analytics-provider-segment
      value. 4. Select the Disable the plugin checkbox. 5. Click Upgrade. * Using
      YAML view 1. Perform one of the following steps: * If you have not configured
      the plugin, add the following YAML code in your values.yaml Helm configuration
      file: ```yaml # ... global: dynamic: plugins: package: ''./dynamic plugins/dist/backstage
      community plugin analytics provider segment'' disabled: true # ... ``` If you
      have configured the plugin, search it in your Helm configuration and set the
