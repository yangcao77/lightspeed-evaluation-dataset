- conversation_group_id: installation-135
  description: installation
  turns:
  - contexts:
    - '# Installing and viewing plugins in Red Hat Developer Hub # Installing dynamic
      plugins in Red Hat Developer Hub The dynamic plugin support is based on the
      backend plugin manager package, which is a service that scans a configured root
      directory (dynamicPlugins.rootDirectory in the app-config.yaml file) for dynamic
      plugin packages and loads them dynamically. You can use the dynamic plugins
      that come preinstalled with Red Hat Developer Hub or install external dynamic
      plugins from a public NPM registry. ### forceDownload: Set the value to true
      to force a reinstall of the plugin, bypassing the cache. The default value is
      false. pullPolicy: Similar to the forceDownload parameter and is consistent
      with other image container platforms. You can use one of the following values
      for this key: Always: This value compares the image digest in the remote registry
      and downloads the artifact if it has changed, even if the plugin was previously
      downloaded. IfNotPresent: This value downloads the artifact if it is not already
      present in the dynamic plugins root folder, without checking image digests.
      [NOTE] ---- The pullPolicy setting is also applied to the NPM downloading method,
      although Always will download the remote artifact without a digest check. The
      existing forceDownload option remains functional, however, the pullPolicy option
      takes precedence. The forceDownload option may be deprecated in a future Developer
      Hub release. ---- * includes: a list of YAML files utilizing the same syntax.
      [NOTE] ---- The plugins list in the includes file is merged with the plugins
      list in the main Helm values. If a plugin package is mentioned in both plugins
      lists, the plugins fields in the main Helm values override the plugins fields
      in the includes file. The default configuration includes the dynamic-plugins.default.yaml
      file, which contains all of the dynamic plugins preinstalled in Developer Hub,
      whether enabled or disabled by default. ---- #### Example Helm chart configurations
      for dynamic plugin installations The following examples demonstrate how to configure
      the Helm chart for specific types of dynamic plugin installations. ```yaml global:
      dynamic: plugins: - package: <alocal package-spec used by npm pack> - package:
      <external package-spec used by npm pack> integrity: sha512-<some hash> pluginConfig:
      ... ``` ```yaml global: dynamic: includes: - dynamic-plugins.default.yaml plugins:
      - package: <some imported plugins listed in dynamic-plugins.default.yaml> disabled:
      true ``` ```yaml global: dynamic: includes: - dynamic-plugins.default.yaml plugins:
      - package: <some imported plugins listed in dynamic-plugins.custom.yaml> disabled:
      false ``` ```yaml global: dynamic: includes: - dynamic-plugins.default.yaml
      plugins: - package: <some imported plugins listed in dynamic-plugins.custom.yaml>
      disabled: false ``` ### Installing dynamic plugins in an air-gapped environment
      You can install external plugins in an air-gapped environment by setting up
      a custom NPM registry. You can configure the NPM registry URL and authentication
      information for dynamic plugin packages using a Helm chart. For dynamic plugin
      packages obtained through npm pack, you can use a .npmrc file. Using the Helm
      chart, add the .npmrc file to the NPM registry by creating a secret. For example:
      ```yaml apiVersion: v1 kind: Secret metadata: name: <release_name> dynamic plugins
      npmrc 1 type: Opaque stringData: .npmrc: | registry=<registry link> //<registry
      link>:_authToken=<auth token> ... ``` Replace <release_name> with your Helm
      release name. This name is a unique identifier for each chart installation in
      the Kubernetes cluster. ##'
    expected_response: For installing external plugins in an air-gapped environment,
      you can configure the NPM registry URL and authentication information for dynamic
      plugin packages using a Helm chart. For packages obtained through npm pack,
      you can use a .npmrc file. Using the Helm chart, you add the .npmrc file to
      the NPM registry by creating a secret. The secret should have a unique name
      for your Helm release and contain the .npmrc data, including the registry link
      and authentication token, under the `stringData` field.
    query: how i use Helm chart for configure the npm registry? i need for air-gapped
      install.
    response: "To configure the npm registry using a Helm chart for an air-gapped\
      \ install, you can follow these steps:\n\n1.  Create a secret with a `.npmrc`\
      \ file containing the registry URL and authentication details:\n    ```\n  \
      \  apiVersion: v1\n    kind: Secret\n    metadata:\n      name: <release_name>-dynamic-plugins-npmrc\
      \ 1\n    type: Opaque\n    stringData:\n      .npmrc: |\n        registry=<registry-link>\n\
      \        //<registry-link>:_authToken=<auth-token>\n    ```\n2.  Update your\
      \ Helm chart configuration file to include the secret:\n    ```\n    global:\n\
      \  dynamic:\n    include:\n      - dynamic-plugins.default.yaml\n    plugins:\n\
      \      - package: <some imported plugins listed in dynamic-plugins.custom.yaml>\n\
      \        disabled: false\n    upstream:\n      backstage:\n        extraVolumes:\n\
      \          # IMPORTANT: Due to a Helm limitation with arrays, you must also\n\
      \          # include all the volumes defined in the default Helm Chart\n   \
      \       # before adding the new one\n          - name: registry-ca-crt\n   \
      \         configMap:\n              name: registry-ca-crt\n        initContainers:\n\
      \          - name: install-dynamic-plugins\n            # IMPORTANT: Due to\
      \ a Helm limitation with arrays, you must also\n            # include all the\
      \ other fields defined in the default Helm Chart\n            # ...\n      \
      \      volumeMounts:\n              # IMPORTANT: Due to a Helm limitation with\
      \ arrays, you must also\n              # include all the volume mounts defined\
      \ in the default Helm Chart\n              # before adding the new one\n   \
      \           - name: registry-ca-crt\n                # Hostname and port must\
      \ match your target registry\n                mountPath: '/etc/containers/certs.d/reg.example.com:5000'\n\
      \    ```\n3.  Install the Helm chart in the current namespace by running the\
      \ following command:\n    ```bash\n    $ helm install rhdh ./<helm_chart_archive_file_name>\
      \ -f values.yaml\n    ```\n     Replace `<helm_chart_archive_file_name>` with\
      \ the name of your Helm chart archive file, for example, `redhat-developer-hub-1.9.0.tgz`."
    turn_id: e8bc0d71-521d-477b-852e-28271e6106f5
    turn_metrics:
