- conversation_group_id: installation-34
  description: installation
  turns:
  - contexts:
    - 'Installing Red Hat Developer Hub in a fully disconnected environment with the
      Operator In environments without internet access — whether for security, compliance,
      or operational reasons — a fully disconnected installation ensures that Red
      Hat Developer Hub can run reliably without external dependencies. If your network
      has access to the registry through a bastion host, you can use the helper script
      to install Red Hat Developer Hub by mirroring the Operator-related images to
      disk and transferring them to your air-gapped environment without any connection
      to the internet. You have installed Podman 5.3 or later. For more information,
      see Podman Installation Instructions. You have installed Skopeo 1.17 or later.
      You have installed yq 4.44 or later. You have installed the GNU sed command
      line text editor. You have installed umoci CLI tool. You have an active oc registry,
      podman, or skopeo session to the Red Hat Container Registry (registry.redhat.io).
      For more information, see Red Hat Container Registry Authentication. You have
      installed the opm CLI tool. For more information, see Installing the opm CLI.
      Recommended on OpenShift Container Platform: You have installed the oc mirror
      tool, with a version corresponding to the version of your OpenShift Container
      Platform cluster. Make sure that your system meets the minimum sizing requirements.
      See Sizing requirements for Red Hat Developer Hub. 1. Download the mirroring
      script to disk by running the following command: ```terminal $ curl sSLO https://raw.githubusercontent.com/redhat
      developer/rhdh operator/refs/heads/release 1.9/.rhdh/scripts/prepare restricted
      environment.sh ``` 2. Run the mirroring script by using the bash command with
      the appropriate set of options: ```terminal $ bash prepare restricted environment.sh
      filter versions "1.9" to dir <my_pulled_image_location> [- use oc mirror true]
      ``` where: --to-dir <my_pulled_image_location>:: Enter the absolute path to
      a directory where you want to pull all of the necessary images, for example,
      /home/user/rhdh-operator-mirror-dir. --use-oc-mirror true:: (Recommended on
      OpenShift Container Platform) Use the oc-mirror OpenShift Container Platform
      CLI plugin to mirror images. [NOTE] ---- The script can take several minutes
      to complete as it copies multiple images to the mirror registry. ---- 3. Transfer
      the directory specified by the --to-dir option to your disconnected environment.
      4. From a machine in your disconnected environment that has access to both the
      cluster and the target mirror registry, run the mirroring script by using the
      bash command with the appropriate set of options: ```terminal $ bash <my_pulled_image_location>/install.sh
      from dir <my_pulled_image_location> [- to registry <my.registry.example.com>]
      [- use oc mirror true] ``` where: <my_pulled_image_location>/install.sh:: Enter
      the downloaded installation script and the absolute path to the directory where
      it is stored on your system. --from-dir <my_pulled_image_location>:: Enter the
      directory where you want to pull all of the necessary images. --to-registry::
      (Optional) Enter the URL for the target mirror registry where you want to mirror
      the images. --use-oc-mirror true:: Recommended on OpenShift Container Platform:
      Use the oc-mirror OpenShift Container Platform CLI plugin to mirror images.
      [IMPORTANT] ---- If you used oc-mirror to mirror the images to disk, you must
      also use oc-mirror to mirror the images from disk due to the folder layout that
      oc-mirror uses. ---- [NOTE] ---- The script can take several minutes to complete
      as it automatically installs the Red Hat Developer Hub Operator. ---- If you
      are using Red Hat OpenShift Container Platform, the Red Hat Developer Hub Operator
      is in the Installed Operators list in the web console. If you are using a supported
      Kubernetes platform, you can check the list of pods running in the rhdh operator
      namespace by running the following command in your terminal: ```terminal kubectl
      n rhdh operator get pods ``` Use the Operator to create a Red Hat Developer
      Hub instance on a supported platform. For more information, see the following
      documentation for the platform that you want to use: Installing Red Hat Developer
      Hub on OpenShift Container Platform with the Operator Installing Developer Hub
      on EKS with the Operator Installing Developer Hub on AKS with the Operator Installing
      Developer Hub on Google Cloud with the Operator Deploying Developer Hub on GKE
      with the Operator ##'
    expected_response: When installing on OpenShift Container Platform, it is recommended
      to use the oc-mirror CLI plugin. The process involves first running the `prepare_restricted_environment.sh`
      script with the `--use-oc-mirror true` option to pull the necessary images to
