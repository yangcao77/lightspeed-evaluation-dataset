    query: What are the architectural details for planning a scalable and highly available
      deployment of Red Hat Developer Hub, and what support options does Red Hat provide?
    response: 'To achieve a scalable and highly available deployment of Red Hat Developer
      Hub, consider the following architectural details:


      Red Hat Developer Hub uses a client-server architecture with a browser-based
      frontend and a stateless backend service layer. This architecture allows for
      horizontal scaling and high availability. To benefit from over-the-air updates
      and catalogs, install Red Hat Developer Hub using the Red Hat Developer Hub
      Operator distributed in the Red Hat Container Registry. The Operator Lifecycle
      Manager (OLM) framework is not built-in, but it is included in the Red Hat Container
      Registry. The Red Hat Container Registry pull-secret is not managed globally,
      but it can be managed separately. To expose the application, Ingresses replace
      OpenShift Routes.




      As for support options, Red Hat offers various resources, including the Red
      Hat Customer Portal, where you can search or browse through the Knowledgebase
      of technical support articles about Red Hat products or create a support case
      for Red Hat Global Support Services (GSS).'
