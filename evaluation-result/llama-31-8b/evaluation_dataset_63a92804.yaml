- conversation_group_id: catalog-279
  description: catalog
  turns:
  - contexts:
    - 'Adding new components to your Red Hat Developer Hub instance to expand your
      catalog You have installed and configured the Red Hat Developer Hub instance.
      You have the required permissions. See Authorization in Red Hat Developer Hub.
      You can add components to your RHDH instance using the following methods: Register
      components manually using the GUI or by using your app config.yaml with the
      required permissions. Create new components by using Software Templates. Use
      the bulk import plugin with the required permissions. For more information,
      see Bulk importing GitHub repositories. ### Creating new components in your
      Red Hat Developer Hub instance You can create new components in the Software
      Catalog in your RHDH instance. Red Hat Developer Hub automatically registers
      all components that developers or platform engineers create using Templates
      in the Software Catalog. You have installed and configured the Red Hat Developer
      Hub instance. You have the required permissions. See Authorization in Red Hat
      Developer Hub. 1. In your Red Hat Developer Hub navigation menu, click Catalog.
      2. On the Catalog page, click Self-service. ### Registering components manually
      in your RHDH instance To manually register components in your RHDH instance,
      create a catalog-info.yaml file and register it with your Red Hat Developer
      Hub instance. The catalog-info.yaml file contains the metadata you wish to register
      for your software component. You have installed and configured the Red Hat Developer
      Hub instance. You have the required permissions. See Authorization in Red Hat
      Developer Hub. 1. In the root directory of your software project, create a file
      named catalog-info.yaml. ```yaml apiVersion: backstage.io/v1alpha1 kind: Component
      metadata: name: _<your_software_component>_ description: _<software_component_brief_description>_
      tags: example service annotations: github.com/project slug: _<repo_link_of_your_component_to_register>_
      spec: type: _<your_service>_ owner: _<your_team_name>_ lifecycle: _<your_lifecycle>_
      ``` 2. Commit the catalog-info.yaml file to the root of your project source
      code repository. 3. In your Red Hat Developer Hub navigation menu, go to Catalog
      > Self-service. 4. On the Self-service page, click Register Existing Component.
      5. On the Register an existing component page, enter the full URL of the catalog-info.yaml
      file in your repository. For example: Artist lookup component. 6. Complete the
      wizard instructions. Your software component is listed in the Software Catalog.
      You can view its details and ensure all the metadata is accurate. ## Updating
      existing component in your Red Hat Developer Hub catalog You can update components
      in the Software Catalog in your Red Hat Developer Hub instance. You have installed
      and configured the Red Hat Developer Hub instance. You have the required permissions.
      See Authorization in Red Hat Developer Hub. To update components in the Software
      Catalog in your Red Hat Developer Hub instance, complete the following steps:
      1. In your Red Hat Developer Hub navigation menu, click Catalog. 2. Find the
      software component that you want to edit, under Actions, click the Edit icon.
      [NOTE] ---- This action redirects you to the YAML file on GitHub. ---- 3. On
      your remote repository UI, update your YAML file. [NOTE] ---- After you merge
      your changes, the updated metadata in the Software Catalog appears after some
      time. ---- ## Finding components by Kind in the Red Hat Developer Hub catalog
      Use this procedure to filter the Software Catalog to display components by their
      type. You are logged in to the RHDH instance. 1. In your Red Hat Developer Hub
      navigation menu, click Catalog. 2. On the Catalog page, click the Kind drop-down
      list. 3. Select the Kind you want to filter by, such as Component, API, or Template.
      [NOTE] ---- The available filter lists change based on the Kind you select,
      showing options relevant to that entity type. ---- The Catalog updates to list
      only the components matching the selected Kind. ## Filtering components by text
      in the Red Hat Developer Hub Catalog Use this procedure to search and filter
      components by text in the Software Catalog. 1. In your Red Hat Developer Hub
      navigation menu, click Catalog. 2. In the Search field, enter a component name,
      description, or keyword that you are looking for. The Catalog list updates to
      display only components matching your search criteria. ## Reviewing the YAML
      configuration of your Red Hat Developer Hub Software Catalog You can view the
      Software Catalog YAML file in your Red Hat Developer Hub instance. The YAML
      file displays the metadata for the components in your Software Catalog. To view
      the Software Catalog YAML file in your Red Hat Developer Hub instance, complete
      the following steps: 1. In your Red Hat Developer Hub navigation menu, click
      Catalog. 2. Find the software component that you want to view, under Actions,
