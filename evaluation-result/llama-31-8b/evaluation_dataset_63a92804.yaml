      ``` frontend:mountPoints:importName:: Enter the import name with an associated
      component to the mount point. ## Translation support The Global Floating Action
      Button plugin supports internationalization (i18n) through translation keys.
      You can use labelKey and toolTipKey properties to provide translation keys instead
      of static text. Example for using translation keys in dynamic configuration:
      ```yaml - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-floating-action-button
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-global-floating-action-button:
