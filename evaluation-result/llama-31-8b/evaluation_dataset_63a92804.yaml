    query: how to import an existing software template into RHDH
    response: 'To import an existing software template into RHDH, you can follow these
      steps:


      1. Create a directory in your Git repository for the software template.

      2. Create a file named template.yaml in that directory.

      3. In the template.yaml file, define the apiVersion, kind, and metadata to identify
      the starter kit in the software catalog.

      4. Add a spec section to define the parameters that a developer must provide
      when they use the software template.

      5. Define the steps required to generate the project, such as fetch:template
      to retrieve the skeleton and publish:github to create the new repository.

      6. Register the software template in the RHDH catalog by navigating to the Create
      page, selecting Register Component, and entering the full URL to your template.yaml
      file in the Repository URL field.

      7. Click Analyze and then Import to import the software template into the RHDH
      catalog.


      Alternatively, you can use the Catalog Processor to import an existing software
      template into your RHDH instance.


      Remember to configure the plugin in your backend settings and ensure that your
      entities contain the required metadata for automated template updates.


