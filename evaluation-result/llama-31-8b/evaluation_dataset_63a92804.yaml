    query: What is the procedure for installing Red Hat Developer Hub on a Kubernetes
      platform within a fully disconnected environment using a Helm chart?
    response: "To install Red Hat Developer Hub on a Kubernetes platform within a\
      \ fully disconnected environment using a Helm chart, you can follow these steps\
      \ based on the information from the knowledge search:\n\n1.  Obtain a fully\
      \ disconnected installation where a cluster cannot access external registries\
      \ but can access an internal mirror registry. This method requires direct access\
      \ to an internal mirror registry from the cluster.\n2.  Set up your workstation\
      \ and ensure you have necessary tools such as Skopeo, yq, and Helm installed.\n\
      3.  Authenticate to the source registry (for example, registry.redhat.io) and\
      \ the target mirror registry for pulling images. Ensure that you have access\
      \ to the Kubernetes cluster with kubectl configured.\n4.  Install the oc-mirror\
      \ OpenShift CLI plugin v2 to create an intermediary host that can access the\
      \ internal mirror registry.\n5.  Fetch the Helm charts values and pull the Helm\
      \ chart for Red Hat Developer Hub by running the following commands:\n\n   \
      \ ```bash\n    $ helm repo add <helm_chart_repo_name> https://charts.openshift.io/\n\
      \    $ helm repo update\n    $ helm pull <helm_chart_repo_name>/redhat-developer-hub\
      \ --version <rhdh_version>\n    $ helm show values <helm_chart_repo_name>/redhat-developer-hub\
      \ --version <rhdh_version> > values.default.yaml\n    ```\n6.  Create a file\
      \ named values.yaml using the provided template, updating the global.clusterRouterBase\
      \ and global.postgresql.auth.password fields.\n7.  Install Developer Hub by\
      \ using the Helm chart, running the following command:\n\n    ```bash\n    $\
      \ helm install rhdh \\\n      openshift-helm-charts/redhat-developer-hub \\\n\
      \      --values /path/to/values.yaml\n    ```\n8.  Wait for the DNS name to\
      \ become responsive, indicating that your Developer Hub instance is ready for\
      \ use.\n\nCite sources immediately at the end of sentences before punctuation,\
      \ using `` format (e.g., 'This is a fact.')"
