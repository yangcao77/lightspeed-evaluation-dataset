- conversation_group_id: rbac-432
  description: rbac
  turns:
  - contexts:
    - 'Defining authorizations in external files by using the Operator To automate
      Red Hat Developer Hub maintenance, you can define permissions and roles in external
      files, before starting Developer Hub. You need to prepare your files, upload
      them to your OpenShift Container Platform project, and configure Developer Hub
      to use the external files. You enabled the RBAC feature. 1. Define your policies
      in a rbac-policies.csv CSV file by using the following format: 1. Define role
      permissions: ```csv p, <role_entity_reference>, <permission>, <action>, <allow_or_deny>
      ``` <role_entity_reference>:: Role entity reference, such as: role:default/guest.
      <permission>:: Permission, such as: bulk.import, catalog.entity.read, or catalog.entity.refresh,
      or permission resource type, such as: bulk-import or catalog-entity. See: Permission
      policies reference. <action>:: Action type, such as: use, read, create, update,
      delete. <allow_or_deny>:: Access granted: allow or deny. 2. Assign the role
      to a group or a user: ```csv g, <group_or_user>, <role_entity_reference> ```
      <group_or_user>:: Group, such as: user:default/mygroup, or user, such as: user:default/myuser.
      Sample rbac-policies.csv ```csv p, role:default/guests, catalog-entity, read,
      allow p, role:default/guests, catalog.entity.create, create, allow g, user:default/my-user,
      role:default/guests g, group:default/my-group, role:default/guests ``` 2. Define
      your conditional policies in a rbac-conditional-policies.yaml YAML file by using
      the following format: ```yaml result: CONDITIONAL roleEntityRef: <role_entity_reference>
      pluginId: <plugin_id> permissionMapping: read update delete conditions: <conditions>
      ``` See: Conditional policies reference. 3. Upload your rbac-policies.csv and
      rbac-conditional-policies.yaml files to a rbac-policies config map in your OpenShift
      Container Platform project containing Developer Hub. ```terminal $ oc create
      configmap rbac-policies \ --from-file=rbac-policies.csv \ --from-file=rbac-conditional-policies.yaml
      ``` 4. Update your Backstage custom resource to mount in the Developer Hub filesystem
      your files from the rbac-policies config map: Backstage custom resource fragment
      ```yaml apiVersion: rhdh.redhat.com/v1alpha5 kind: Backstage spec: application:
      extraFiles: mountPath: /opt/app root/src configMaps: name: rbac policies ```
      5. Update your Developer Hub app-config.yaml configuration file to use the rbac-policies.csv
      and rbac-conditional-policies.yaml external files: app-config.yaml file fragment
      ```yaml permission: enabled: true rbac: conditionalPoliciesFile: /opt/app root/src/rbac
      conditional policies.yaml policies csv file: /opt/app root/src/rbac policies.csv
      policyFileReload: true ``` ## Defining authorizations in external files by using
      Helm To automate Red Hat Developer Hub maintenance, you can define permissions
      and roles in external files, before starting Developer Hub. You need to prepare
      your files, upload them to your OpenShift Container Platform project, and configure
      Developer Hub to use the external files. You enabled the RBAC feature. 1. Define
      your policies in a rbac-policies.csv CSV file by using the following format:
      1. Define role permissions: ```csv p, <role_entity_reference>, <permission>,
      <action>, <allow_or_deny> ``` <role_entity_reference>:: Role entity reference,
      such as: role:default/guest. <permission>:: Permission, such as: bulk.import,
      catalog.entity.read, or catalog.entity.refresh, or permission resource type,
      such as: bulk-import or catalog-entity. See: Permission policies reference.
      <action>:: Action type, such as: use, read, create, update, delete. <allow_or_deny>::
      Access granted: allow or deny. 2. Assign the role to a group or a user: ```csv
      g, <group_or_user>, <role_entity_reference> ``` <group_or_user>:: Group, such
      as: user:default/mygroup, or user, such as: user:default/myuser. Sample rbac-policies.csv
      ```csv p, role:default/guests, catalog-entity, read, allow p, role:default/guests,
      catalog.entity.create, create, allow g, user:default/my-user, role:default/guests
      g, group:default/my-group, role:default/guests ``` 2. Define your conditional
      policies in a rbac-conditional-policies.yaml YAML file by using the following
      format: ```yaml result: CONDITIONAL roleEntityRef: <role_entity_reference> pluginId:
      <plugin_id> permissionMapping: read update delete conditions: <conditions> ```
      See: Conditional policies reference. 3. Upload your rbac-policies.csv and rbac-conditional-policies.yaml
      files to a rbac-policies config map in your OpenShift Container Platform project
      containing Developer Hub. ```terminal $ oc create configmap rbac-policies \
      --from-file=rbac-policies.csv \ --from-file=rbac-conditional-policies.yaml ```
      4. Update your Developer Hub Backstage Helm chart to mount in the Developer
      Hub filesystem your files from the rbac-policies config map: 1. In the Developer
      Hub Helm Chart, go to Root Schema -> Backstage chart schema -> Backstage parameters
      -> Backstage container additional volume mounts. 2. Select Add Backstage container
      additional volume mounts and add the following values: mountPath:: /opt/app-root/src/rbac
      Name:: rbac-policies 3. Add the RBAC policy to the Backstage container additional
      volumes in the Developer Hub Helm Chart: name:: rbac-policies configMap:: defaultMode::
      420 name:: rbac-policies 5. Update your Developer Hub app-config.yaml configuration
      file to use the rbac-policies.csv and rbac-conditional-policies.yaml external
      files: app-config.yaml file fragment ```yaml permission: enabled: true rbac:
      conditionalPoliciesFile: /opt/app root/src/rbac conditional policies.yaml policies
      csv file: /opt/app root/src/rbac policies.csv policyFileReload: true ``` # Configuring
      guest access with RBAC UI Use guest access with the role-based access control
      (RBAC) front-end plugin to allow a user to test role and policy creation without
      the need to set up and configure an authentication provider. [NOTE] ---- Guest
      access is not recommended for production. ---- ## Configuring the RBAC backend
      plugin You can configure the RBAC backend plugin by updating the app-config.yaml
      file to enable the permission framework. You have installed the @backstage community/plugin
      rbac plugin in Developer Hub. For more information, see Configuring dynamic
      plugins. Update the app config.yaml file to enable the permission framework
      as shown: ```yaml permission enabled: true rbac: admin: users: name: user:default/guest
      pluginsWithPermission: catalog permission scaffolder ``` [NOTE] ---- The pluginsWithPermission
      section of the app-config.yaml file includes only three plugins by default.
      Update the section as needed to include any additional plugins that also incorporate
      permissions. ---- ## Setting up the guest authentication provider You can enable
      guest authentication and use it alongside the RBAC frontend plugin. You have
      installed the @backstage community/plugin rbac plugin in Developer Hub. For
      more information, see Configuring dynamic plugins. In the app config.yaml file,
      add the user entity reference to resolve and enable the dangerouslyAllowOutsideDevelopment
      option, as shown in the following example: ```yaml auth: environment: development
      providers: guest: userEntityRef: user:default/guest dangerouslyAllowOutsideDevelopment:
      true ``` [NOTE] ---- You can use user:default/guest as the user entity reference
      to match the added user under the permission.rbac.admin.users section of the
      app-config.yaml file. ---- # Delegating role-based access controls (RBAC) access
      in Red Hat Developer Hub An enterprise customer requires the ability to delegate
      role-based access control (RBAC) responsibilities to other individuals in the
      organization. In this scenario, you, as the administrator, can provide access
      to the RBAC plugin specifically to designated users, such as team leads. Each
      team lead is then able to manage permissions exclusively for users within their
      respective team or department, without visibility into or control over permissions
      outside their assigned scope.'
