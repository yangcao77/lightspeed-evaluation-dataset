- conversation_group_id: authentication-291
  description: authentication
  turns:
  - contexts:
    - 'Deploying Red Hat Developer Hub on OpenShift Container Platform with the Operator
      As a developer, you can deploy a Red Hat Developer Hub instance on OpenShift
      Container Platform by using the Developer Catalog in the Red Hat OpenShift Container
      Platform web console. This deployment method uses the Red Hat Developer Hub
      Operator. You have set the baseUrl in your app config.yaml to match the external
      URL of your Developer Hub instance. Without it, frontend and backend services
      cannot communicate, and features might not work as expected. An OpenShift Container
      Platform administrator has installed the Red Hat Developer Hub Operator. You
      have provisioned your custom config maps and secrets in your <my rhdh project>
      project. You have authored your Backstage custom resource. 1. In the OpenShift
      Container Platform web console, select your <{my_product_namespace}> project,
      then click Add. 2. From the Developer Catalog panel, click Operator Backed.
      3. In the Filter by keyword box, enter Developer Hub and click the Red Hat Developer
      Hub card. 4. Provision your custom configuration using the following template:
      ```yaml apiVersion: v1 kind: ConfigMap metadata: name: app-config-rhdh data:
      "app-config.yaml": | app: title: Red Hat Developer Hub baseUrl: https://__&lt;my_developer_hub_domain&gt;__
      backend: auth: externalAccess: - type: legacy options: subject: legacy-default-config
      secret: "${BACKEND_SECRET}" baseUrl: https://__&lt;my_developer_hub_domain&gt;__
      cors: origin: https://__&lt;my_developer_hub_domain&gt;__ ``` Use a config map
      named app-config-rhdh to provide your app-config.yaml file, and a Secret for
      service-to-service authentication (such as BACKEND_SECRET). To create and apply
      these configuration resources, follow the steps in Provisioning your custom
      Red Hat Developer Hub configuration for the full procedure. [NOTE] ---- The
      app-config-rhdh config map must include your customized app-config.yaml file.
      This config map is mounted into the Developer Hub container at runtime. ----
      5. Create a secret named my-rhdh-secrets and add a key named BACKEND_SECRET
      with a Base64-encoded string as value, as shown in the following example: ```yaml
      apiVersion: v1 kind: Secret metadata: name: my-rhdh-secrets stringData: # TODO:
      Add the necessary auth secrets for service-to-service auth setup BACKEND_SECRET:
      "xxx" # Replace with your Base64-encoded secret ``` [NOTE] ---- Ensure that
      your secret includes BACKEND_SECRET, used for service-to-service authentication.
      For structure and provisioning steps, see Provisioning your custom Red Hat Developer
      Hub configuration. ---- 6. Click Create. 7. Add your Backstage custom resource
      content. 8. On the Create Backstage page, click Create. After the pods are ready,
      you can access the Red Hat Developer Hub platform by opening the URL. 1. Confirm
      that the pods are ready by clicking the pod in the Topology view and confirming
      the Status in the Details panel. The pod status is Active when the pod is ready.
      2. From the Topology view, click the Open URL icon on the Developer Hub pod.
      ![operator install 1] OpenShift Container Platform Building applications overview
      # Installing Red Hat Developer Hub on OpenShift Container Platform with the
      Helm chart You can install Red Hat Developer Hub on OpenShift Container Platform
      by using the Helm chart with one of the following methods: The OpenShift Container
      Platform console The Helm CLI ##'
    expected_response: "You create a secret named my-rhdh-secrets and add a key named\
      \ BACKEND_SECRET with a Base64-encoded string as its value. This Secret is used\
      \ for service-to-service authentication. The following is an example of the\
      \ required structure: ```yaml\napiVersion: v1\nkind: Secret\nmetadata:\n  name:\
      \ my-rhdh-secrets\nstringData:\n  # TODO: Add the necessary auth secrets for\
      \ service-to-service auth setup\n  BACKEND_SECRET: \"xxx\" # Replace with your\
      \ Base64-encoded secret\n```"
    query: how i make the BACKEND_SECRET Secret?
