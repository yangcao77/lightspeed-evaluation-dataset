  description: authentication
  turns:
  - contexts:
    - 'allow users to sign in to Developer Hub using their GitHub credentials. This
      integration also allows you to provision user and group data from GitHub to
      the Developer Hub software catalog, enabling features that rely on synchronized
      user and group data. ## [TIP] ---- Alternatively, ask your GitHub administrator
      to prepare the required GitHub App. ---- * You have added a custom Developer
      Hub application configuration, and have enough permissions to change it. * You
      have configured a primary authentication provider to provision user and group
      identities to the Red Hat Developer Hub software catalog, and establish Developer
      Hub user sessions. 1. Add the auth.providers.github section to your app-config.yaml
      file: ```yaml auth: providers: github: production: clientId: ${GITHUB_CLIENT_ID}
      clientSecret: ${GITHUB_CLIENT_SECRET} disableIdentityResolution: true ``` where:
      clientId:: Enter the configured secret variable name: ${GITHUB_CLIENT_ID}. clientSecret::
      Enter the configured secret variable name: ${GITHUB_CLIENT_SECRET}. disableIdentityResolution::
      Enter true to skip user identity resolution for this provider to enable sign-in
      from an auxiliary authentication provider. [WARNING] ---- Do not enable this
      setting on the primary authentication provider you plan on using for sign-in
      and identity management. ---- 1. To disable the guest login option, in the app-config.yaml
      file, set the authentication environment to production: ```yaml auth: environment:
      production ``` 1. Go to the Developer Hub login page. 2. Log in with your primary
      authentication provider account. 3. In the top user menu, go to Settings > Authentication
      Providers. 4. In the GitHub line, click the Sign in button and log in. 5. In
      the GitHub line, the button displays Sign out. Integrating Red Hat Developer
      Hub with GitHub # Enable authentication with Microsoft Azure You can enable
      authentication wit Microsoft Azure to allow users to sign in to Developer Hub
      using their Microsoft Azure credentials. This integration also allows you to
      provision user and group data from Microsoft Azure to the Developer Hub software
      catalog, enabling features that rely on synchronized user and group data. ##'
    expected_response: 'To allow users to sign in to Red Hat Developer Hub using GitHub
      credentials, you must add the `auth.providers.github` section to your `app-config.yaml`
      file. The configuration is as follows: `auth: providers: github: production:
      clientId: ${GITHUB_CLIENT_ID} clientSecret: ${GITHUB_CLIENT_SECRET} disableIdentityResolution:
      true`. Here, `clientId` and `clientSecret` are the configured secret variable
      names. The `disableIdentityResolution` setting should be set to `true` to skip
      user identity resolution and enable sign-in from an auxiliary authentication
      provider, but this should not be enabled on the primary authentication provider.
      To disable guest login, set the authentication environment to `production` in
      the `app-config.yaml` file. After configuration, a user can log in with their
      primary provider, go to Settings > Authentication Providers, and click the ''Sign
      in'' button for GitHub.'
    query: how to configure Red Hat Developer Hub to allow users to sign in with GitHub
