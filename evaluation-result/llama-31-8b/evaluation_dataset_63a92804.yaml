      \  providers:\n    github:\n      production:\n        clientId: ${GITHUB_CLIENT_ID}\n\
      \        clientSecret: ${GITHUB_CLIENT_SECRET}\n        disableIdentityResolution:\
      \ true\n```\n\nwhere `clientId` and `clientSecret` are the values you saved\
      \ earlier.\n\nBy following these steps, you should be able to integrate the\
      \ Red Hat Developer Hub with your company's GitHub account.\n\nAll of the above\
      \ information can be found by talking to the knowledge_search tool:\n\n{\"name\"\
      : \"knowledge_search\", \"parameters\": {\"query\": \"Red Hat Developer Hub\
      \ integration with company Github account\"}}"
