      ## Enabling logo in the sidebar You can configure a logo in the sidebar of the
      Red Hat Developer Hub (RHDH). 1. To display the logo exclusively in the sidebar,
      set the value of the app.sidebar.logo parameter to true as shown in the following
      example: ```yaml app: sidebar: logo: true ``` [NOTE] ---- To display the logo
      in only the sidebar, remove the CompanyLogo component from the configuration.
      ---- 2. To display the same logo in the sidebar for all themes, update the configuration
      as shown in the following configuration: ```yaml app: sidebar: logo: true branding:
      fullLogoWidth: 220 fullLogo: ''data:image/svg+xml;base64,...'' ``` 3. For theme-specific
      logos, you can configure the sidebar logo as shown in the following configuration:
      ```yaml app: sidebar: logo: true branding: fullLogoWidth: 220 fullLogo: light:
      ''data:image/svg+xml;base64,...'' dark: ''data:image/svg+xml;base64,...'' ```
      1. The logo appears correctly in the sidebar. 2. Toggle between light and dark
      themes to ensure the correct logo loads in each. ## Displaying the preferred
      username in the profile dropdown You can display the preferred username in the
      global header profile drop-down list by configuring spec.profile.displayName
      in the user entity. When not configured, the application falls back to a metadata.title.
      If neither is configured, it defaults to a user-friendly name generated by the
      useProfileInfo hook. 1. To configure spec.profile.displayName, use the following
      code: ```yaml apiVersion: backstage.io/v1alpha1 kind: User metadata: # Required
      unique username name: <my_display_name> # Optional preferred title title: <display_name_title>
      spec: profile: # Optional preferred display name (highest priority) displayName:
      <my_display_name> memberOf: [janus-authors] ``` 2. To configure metadata.title
      rather than spec.profile.displayname, use the following code: ```yaml apiVersion:
      backstage.io/v1alpha1 kind: User metadata: # Required unique username name:
      <my_display_name> # Optional preferred title title: <display_name_title> spec:
      memberOf: [janus authors] ``` 3. To configure neither spec.profile.displayname
      or metadata.title, use the following code: ```yaml apiVersion: backstage.io/v1alpha1
      kind: User metadata: # Required unique username name: <my_display_name> spec:
      memberOf: [janus authors] ``` [NOTE] ---- The application falls back to metadata.name
      when you do not register the user entity. ---- ## Quicklinks and Starred Items
      in the global header The Quicklinks matrix and Starred Items drop-down list
      are enabled by default and appear in the global header without requiring additional
      configuration. The Quicklinks matrix, organized by sections (for example, Documentation
      or Developer Tools), allows users to quickly access internal or external resources.
      The Starred Items drop-down list contains entities and pages that the user has
      starred. The default configuration includes the following components: StarredDropdown::
      Display the Starred Items menu in the global header by default, as shown in
      the following configuration: ```yaml # Group: Global Header package: ./dynamic
      plugins/dist/red hat developer hub backstage plugin global header mountPoint:
      global.header/component importName: StarredDropdown config: priority: 85 ```
      ApplicationLauncherDropdown:: Provide the Quicklinks matrix (application launcher)
      by default, as shown in the following configuration: ```yaml # Group: Global
      Header package: ./dynamic plugins/dist/red hat developer hub backstage plugin
      global header mountPoint: global.header/component importName: ApplicationLauncherDropdown
      config: priority: 82 ``` MenuItemLink entries:: Define sections, titles, icons,
      and links within the Quicklinks matrix. The default configuration includes links
      to the Developer Hub documentation and an RHDH Local, as shown in the following
      configurations: ```yaml mountPoint: global.header/application launcher importName:
      MenuItemLink config: section: Documentation priority: 150 props: title: Developer
      Hub icon: developerHub link: https://docs.redhat.com/en/documentation/red_hat_developer_hub
      mountPoint: global.header/application launcher importName: MenuItemLink config:
      section: Developer Tools priority: 100 props: title: RHDH Local icon: developerHub
      link: https://github.com/redhat developer/rhdh local ``` [NOTE] ---- When upgrading
      from previous versions, the installer does not overwrite your existing dynamic-plugins.yaml
      configuration. If you had not configured Starred Items or Quicklinks previously,
      they remain disabled after the upgrade and must be manually enabled. ---- ##
      Enabling Quicklinks and Starred Items after an upgrade If you upgrade from Red
      Hat Developer Hub 1.6 or earlier, Red Hat Developer Hub does not automatically
      enable the Quicklinks and Starred Items features. You must manually configure
      these features to display them in the global header. 1. You have access to your
      Red Hat Developer Hub configuration files. 2. You have administrative permissions
      to modify ConfigMaps (if using the Operator). 1. Locate your dynamic-plugin
      configuration. * Operator deployment: The configuration is stored in a ConfigMap
      referenced by your Backstage custom resource (CR). * Helm deployment: The configuration
      is in your values.yaml file or separate configuration files. 2. Enable the global
