      you can deploy multiple backend instances behind a load balancer to manage increased
      load. For high availability, you should configure database replication and cache
      clustering to eliminate single points of failure; specifically, PostgreSQL must
      be configured with high availability (HA) for production. The backend is stateless
      and externalizes all persistent state to a PostgreSQL database. While an in-memory
