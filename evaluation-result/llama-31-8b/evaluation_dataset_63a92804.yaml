    query: how do i enable a backstge plugin?
    response: "Based on the search results, the best answer to the prompt \"how do\
      \ i enable a backstage plugin\" is:\n\nTo enable a Backstage plugin, you need\
      \ to update the `app-config.yaml` file to enable the permission framework and\
      \ configure the guest authentication provider. You also need to add the required\
      \ components to the `plugins:` list and ensure that the plugin is not disabled.\n\
      \nHere is an example of how to do this:\n\n```yaml\npermission:\n  enabled:\
      \ true\n  rbac:\n    admin:\n      users:\n        - name: user:default/guest\n\
      \    pluginsWithPermission:\n      - catalog\n      - permission\n      - scaffolder\n\
      \napp:\n  branding:\n    theme:\n      light:\n        variant: \"backstage\"\
      \n        mode: \"light\"\n        palette:\n          background:\n       \
      \     default: \"#F8F8F8\"\n            paper: \"#FFFFFF\"\n          banner:\n\
      \            closeButtonColor: \"#FFFFFF\"\n            error: \"#E22134\"\n\
      \            info: \"#2E77D0\"\n            link: \"#000000\"\n            text:\
      \ \"#FFFFFF\"\n            warning: \"#FF9800\"\n          border: \"#E6E6E6\"\
      \n          bursts:\n            backgroundColor:\n              default: \"\
      #7C3699\"\n            fontColor: \"#FEFEFE\"\n            gradient:\n     \
      \         linear: \"linear-gradient(-137deg, #4BB8A5 0%, #187656 100%)\"\n \
      \           slackChannelText: \"#ddd\"\n          errorBackground: \"#FFEBEE\"\
      \n          errorText: \"#CA001B\"\n          gold: \"#FFD600\"\n          highlight:\
      \ \"#FFFBCC\"\n          infoBackground:\n```\n\nYou also need to configure\
      \ the guest authentication provider by adding the following configuration to\
      \ the `app-config.yaml` file:\n\n```yaml\nguestAuth:\n  enabled: true\n  authProvider:\n\
      \    externalAccess:\n      - type: static\n        options:\n          token:\
      \ ${BACKEND_SECRET}\n          subject: orchestrator\n```\n\nYou also need to\
      \ create a secret containing the `BACKEND_SECRET` key:\n\n```yaml\napiVersion:\
      \ v1\nkind: Secret\nmetadata:\n  name: backend-auth-secret\nstringData:\n  BACKEND_SECRET:\
      \ \"R2FxRVNrcmwzYzhhN3l0V1VRcnQ3L1pLT09WaVhDNUEK\"\n```\n\nFinally, you need\
      \ to update the Backstage CR to update the secret name in the `extraEnvs` field:\n\
      \n```yaml\napiVersion: rhdh.redhat.com/v1alpha5\nkind: Backstage\nmetadata:\n\
      \  name: orchestrator\nspec:\n  application:\n    appConfig:\n      configMaps:\n\
      \        - name: app-config-rhdh\n    dynamicPluginsConfigMapName: orchestrator-plugin\n\
      \    extraEnvs:\n      secrets:\n        - name: backend-auth-secret\n```\n\n\
      Please note that this is just an example and you need to modify the configuration\
      \ according to your specific use case.\n\nCite source: ``"
