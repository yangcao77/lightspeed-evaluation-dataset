  - contexts:
    - 'custom Kubernetes actions in Scaffolder templates. Action: kubernetes:create-namespace::
      Creates a namespace for the Kubernetes cluster in the Developer Hub. # Configuring
      Red Hat Developer Hub Events Module Use the Events Module together with scheduled
      updates to make sure your GitHub user or catalog entities are updated whenever
      changes occur in the external system. [IMPORTANT] ---- This is a Technology
      Preview feature only. Technology Preview features are not supported with Red
      Hat production service level agreements (SLAs) and might not be functionally
      complete. Red Hat does not recommend using them in production. These features
      provide early access to upcoming product features, enabling customers to test
      functionality and provide feedback during the development process. For more
      information about the support scope of Red Hat Technology Preview features,
      see Technology Preview Features Support Scope. ---- ## Configuring Events Module
      for GitHub Learn how to configure Events Module for use with the RHDH GitHub
      Discovery feature and GitHub organization data. You have added your GitHub integration
      credentials in the app config.yaml file. You have defined the schedule.frequency
      in the app config.yaml file as longer time period, such as 24 hours. For GitHub
      Discovery only: You have enabled GitHub Discovery. For GitHub Organizational
      Data only: You have enabled Github Authentication with user ingestion. 1. Add
      the GitHub Events Module to your dynamic-plugins.yaml configuration file as
      follows: ```yaml data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      plugins: package: oci://registry.access.redhat.com/rhdh/backstage plugin events
      backend module github@sha256:2c1ccc4fb01883dc4da1aa0c417d6e28d944c6ce941454ee41698f2c1812035c
      disabled: false ``` 2. To create HTTP endpoints to receive events for the github,
      add the following to your app-config.yaml file: ```yaml events: http: topics:
      github modules: github: webhookSecret: ${GITHUB_WEBHOOK_SECRET} ``` [IMPORTANT]
      ---- Secure your workflow by adding a webhook secret token to validate webhook
      deliveries. ---- 3. Create a GitHub webhook with the following specifications:
      * For Github Discovery Events: push, repository * For Github Organizational
      Data Events: organization, team and membership * Content Type: application/json
      * Payload URL: https://<my_developer_hub_domain>/api/events/http/github [NOTE]
      ---- Payload URL is the URL exposed after configuring the HTTP endpoint. ----
      Check the log for an entry that confirms that http endpoint was set up successfully
      to receive events from the GitHub webhook. Example of a log of successfully
      set up http endpoint:: ```code {"level":"\u001b[32minfo\u001b[39m","message":"Registered
      /api/events/http/github to receive events","plugin":"events","service":"backstage","timestamp":"2025-11-03
      02:19:12"} ``` For GitHub Discovery only: Trigger a GitHub push event by adding,
      modifying or deleting the catalog info.yaml file in the repository where you
      set up your webhook. A record of this event should appear in the pod logs of
      your RHDH instance. Example of a log with changes to catalog info.yaml file::
      ```code {"level":"\u001b[32minfo\u001b[39m","message":"Processed Github push
      event: added 0 - removed 0 - modified 1","plugin":"catalog","service":"backstage","span_id":"47534b96c4afc654","target":"github-provider:providerId","timestamp":"2025-06-15
      21:33:14","trace_flags":"01","trace_id":"ecc782deb86aed2027da0ae6b1999e5c"}
      ``` For GitHub Organizational Data only: Newly added users and teams appear
      in the RHDH catalog. # Overriding Core Backend Service Configuration The Red
      Hat Developer Hub (RHDH) backend platform consists of a number of core services
      that are well encapsulated. The RHDH backend installs these default core services
      statically during initialization. Customize a core service by installing it
      as a BackendFeature by using the dynamic plugin functionality. 1. Configure
      Developer Hub to allow a core service override, by setting the corresponding
      core service ID environment variable to true in the Developer Hub app-config.yaml
      configuration file. Environment variables and core service IDs 2. Install your
      custom core service as a BackendFeature as shown in the following example: ```javascript
      // Create the BackendFeature $ export const customRootHttpServerFactory: BackendFeature
      = rootHttpRouterServiceFactory({ configure: ({ app, routes, middleware, logger
      }) => { logger.info( ''Using custom root HttpRouterServiceFactory configure
      function'', ); app.use(middleware.helmet()); app.use(middleware.cors()); app.use(middleware.compression());
      app.use(middleware.logging()); // Add a the custom middleware function before
      all // of the route handlers app.use(addTestHeaderMiddleware({ logger })); app.use(routes);
      app.use(middleware.notFound()); app.use(middleware.error()); }, }); // Export
      the BackendFeature as the default entrypoint $ export default customRootHttpServerFactory;
      ``` + In the previous example, as the BackendFeature overrides the default implementation
      of the HTTP router service, you must set the ENABLE_CORE_ROOTHTTPROUTER_OVERRIDE
      environment variable to true so that the Developer Hub does not install the
      default implementation automatically.'
