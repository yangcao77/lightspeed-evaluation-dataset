  - contexts:
    - 'Export the translation resources src/alpha.ts file fragment ```json // Export
      your plugin export { myPlugin } from "./plugin"; // Export translation resources
      for RHDH export { myPluginTranslations, myPluginTranslationRef } from "./translations";
      ``` 7. Update your dynamic plugins.default.yaml file, as follows: dynamic plugins.default.yaml
      file fragment ```json backstage community.plugin my plugin: translationResources:
      importName: myPluginTranslations ref: myPluginTranslationRef module: Alpha ```
      8. Update your package.json file as follows: package.json file fragment ```json
      "exports": { ".": "./src/index.ts", "./alpha": "./src/alpha.ts", "./package.json":
      "./package.json" }, "main": "src/index.ts", "types": "src/index.ts", "typesVersions":
      { " ": { "alpha": [ "src/alpha.ts" ], "package.json": [ "package.json" ] } }
      ``` To verify your translations, create a test mock file. For example: ```json
      import { myPluginMessages } from "../translations/ref"; function flattenMessages(obj:
      any, prefix = ""): Record<string, string> { const flattened: Record<string,
      string> = {}; for (const key in obj) { if (obj.hasOwnProperty(key)) { const
      value = obj[key]; const newKey = prefix ? `${prefix}.${key}` : key; if (typeof
      value === "object" && value !== null) { Object.assign(flattened, flattenMessages(value,
      newKey)); } else { flattened[newKey] = value; } } } return flattened; } const
      flattenedMessages = flattenMessages(myPluginMessages); export const mockT =
      (key: string, params?: any) => { let message = flattenedMessages[key] || key;
      if (params) { for (const [paramKey, paramValue] of Object.entries(params)) {
      message = message.replace( new RegExp(`{{${paramKey}}}`, "g"), String(paramValue),
      ); } } return message; }; export const mockUseTranslation = () => ({ t: mockT
      }); ``` ```json import { mockUseTranslation } from "../test-utils/mockTranslations";
      jest.mock("../hooks/useTranslation", () => ({ useTranslation: mockUseTranslation,
      })); // Your test code... ```'
