      <helm_chart_repo_name> https://charts.openshift.io/ $ helm repo update $ helm
      pull <helm_chart_repo_name>/redhat-developer-hub --version <rhdh_version> $
      helm show values <helm_chart_repo_name>/redhat-developer-hub --version <rhdh_version>
      > values.default.yaml ``` where: <helm_chart_repo_name>:: Enter the name of
      the Helm chart repository, for example, openshift-helm-charts. <rhdh_version>::
      Enter the Red Hat Developer Hub version that you want to use, for example, 1.9.0.
      2. Use yq to extract the image digests by running the following commands:'
    expected_response: 'To install Red Hat Developer Hub in a fully disconnected environment,
      you must have Skopeo 1.17 or later, yq 4.4 or later, Helm 3.13 or later, and
