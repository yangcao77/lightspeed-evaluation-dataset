    query: What are the steps to install Red Hat Developer Hub in a fully disconnected
      environment using the Helm chart?
    response: "To install Red Hat Developer Hub in a fully disconnected environment\
      \ using the Helm chart, you need to mirror the necessary resources to the disconnected\
      \ environment and then install the Helm chart. \n\nFirst, mirror the resources\
      \ to the disconnected environment using the `skopeo` command. Then, create a\
      \ `values.yaml` file with the necessary configuration for the Helm chart. Finally,\
      \ install the Helm chart using the `helm` command.\n\nHere is the full process:\n\
      \n```bash\n# Mirror the necessary resources to the disconnected environment\n\
      skopeo mirror registry.redhat.io/openshift4/ose-helm-server:embedded --dest-url\
      \ https://mirror.example.com/registry.redhat.io/\n\n# Create a values.yaml file\
      \ with the necessary configuration for the Helm chart\nhelm show values openshift-helm-charts/redhat-developer-hub\
      \ --version 1.9.0 > values.yaml\n\n# Install the Helm chart\nhelm install <rhdh_instance>\
      \ <workspace_directory>/<results_directory>/charts/<archive_file> --namespace\
      \ <your_namespace> --create-namespace \\\n  --set global.clusterRouterBase=$CLUSTER_ROUTER_BASE\n\
      ```\n\nNote: Replace `<rhdh_instance>` with the name of your Red Hat Developer\
      \ Hub instance, `<workspace_directory>` with the name of your workspace directory,\
      \ `<results_directory>` with the name of your results directory, `<archive_file>`\
      \ with the name of the archive file containing the resources that you want to\
      \ mirror, and `<your_namespace>` with the namespace that you want to deploy\
      \ the Helm chart to.\n\nAfter installation, you can access your Red Hat Developer\
      \ Hub instance by opening the running instance URL in your browser. To upgrade\
      \ the deployment, use the following command:\n\n```bash\nhelm upgrade <rhdh_instance>\
      \ -i https://github.com/openshift-helm-charts/charts/releases/download/redhat-redhat-developer-hub-1.9.0/redhat-developer-hub-1.9.0.tgz\n\
      ```\n\nReplace `<rhdh_instance>` with the name of your Red Hat Developer Hub\
      \ instance.\n\nTo delete the deployment, use the following command:\n\n```bash\n\
      helm -n <your_namespace> delete <rhdh_instance>\n```\n\nReplace `<your_namespace>`\
      \ with the namespace that you want to deploy the Helm chart to and `<rhdh_instance>`\
      \ with the name of your Red Hat Developer Hub instance.\n\nCite sources immediately\
      \ at the end of sentences before punctuation, using `` format (e.g., 'This is\
      \ a fact.')"
