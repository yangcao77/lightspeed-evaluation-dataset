    query: What are the specific features that Helm provides as a package manager
      on OpenShift Container Platform for deploying applications like Developer Hub?
    response: 'Helm provides the following features as a package manager on OpenShift
      Container Platform for deploying applications like Developer Hub:


      * Applies regular application updates using custom hooks

      * Manages the installation of complex applications

      * Provides charts that can be hosted on public and private servers

      * Supports rolling back to previous application versions

      * Allows for custom configuration settings such as the public baseUrl for the
      instance


      It''s recommended to use the Red Hat Developer Hub Helm chart to install Developer
      Hub on OpenShift Container Platform, as it provides a simplified and automated
      way to install and configure the application. The chart can be hosted on public
      or private servers and can be used to install complex applications. Additionally,
      Helm supports rolling back to previous application versions, which can be useful
      for troubleshooting or testing different versions of the application.'
