  - contexts:
    - '“include personal or sensitive information” in their chat messages. ### About
      feedback collection Developer Lightspeed for RHDH collects feedback from users
      who engage with the feedback feature in the virtual assistant interface. If
      a user submits feedback, the feedback score (thumbs up or down), text feedback
      (if entered), the user query, and the LLM provider response are stored locally
      in the file system of the Pod. Red Hat does not have access to the collected
      feedback data. ### About Bring Your Own Model Developer Lightspeed for RHDH
      does not provide its own inference services, but uses a Bring Your Own Model
      approach. This means that you can configure the Lightspeed Core Service to talk
      to the inference server or service of your choice. This also means that you
      are responsible for ensuring that the configured service meets your particular
      company policies and legal requirements, including any applicable terms with
      the third-party model provider. The only technical requirements for inference
      services are: The service must conform to the OpenAI API specification. The
      service must be configured correctly following the installation and configuration
      instructions. There are many commercial and open source inference services that
      support the OpenAI API specification for chat completions. The cost, performance,
      and security of these services can differ and it is up to you to choose, through
      evaluation and testing, the inference service that best meets your company''s
      needs. OpenAI API specification ### Your responsibility All of the information
      your users share in their questions and responses with Developer Lightspeed
      for RHDH are shared with the LLM inference service you configured. You are responsible
      for ensuring compliance with your company&#8217;s policies regarding the sharing
      of data with your chosen inference service.'
    expected_response: With the "Bring Your Own Model" approach, you are responsible
