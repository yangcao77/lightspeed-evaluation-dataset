- conversation_group_id: kubernetes-123
  description: kubernetes
  turns:
  - contexts:
    - 'Localization in Red Hat Developer Hub ## Enabling the localization framework
      in Developer Hub Enabling localization enhances accessibility, improves the
      user experience for a global audience, and assists organizations in meeting
      language requirements in specific regions. Learn how to enable the localization
      framework to add a localization feature to RHDH. The following languages are
      supported: English (en) French (fr) Italian (it) Japanese (ja) [NOTE] ---- The
      default language for RHDH is English. ---- 1. Add the i18n section to your custom
      Developer Hub app-config.yaml configuration file: app-config.yaml fragment with
      localization i18n fields ```yaml ... i18n: locales: # List of supported locales.
      Must include en, otherwise the translation framework will fail to load. - en
      - fr - it - ja defaultLocale: en # Optional. Defaults to en if not specified.
      ... ``` ## Selecting the language for your Developer Hub instance Use the Appearance
      panel to select a language for RHDH. English (default) French Italian Japanese
      You are logged in to the Developer Hub web console. You have enabled the localization
      framework in your RHDH instance. 1. From the Developer Hub web console, click
      the down arrow next to your profile name, then click Settings. 2. From the Appearance
      panel, click the language dropdown to select your language of choice. ![customize
      language dropdown] ### Language persistence The RHDH UI persists your language
      selection to storage, restoring it on your next login or refresh. Guest users
      cannot persist language preferences. The system determines the default language
      using the following priority order: 1. Browser language priority: The system
      first checks the user''s browser language preferences to provide a personalized
      experience. 2. Configuration priority: If no browser language matches the supported
      locales, the defaultLocale from the i18n configuration is used as a fallback.
      3. Fallback priority: If neither browser preferences nor configuration provide
      a match, defaults to en. By default, Red Hat Developer Hub saves language settings
      to the database (database) and restores user language settings across browser
      sessions. You can alternatively configure the system to use browser local storage
      (browser) instead. ```yaml # Example configuration for browser storage userSettings:
      persistence: browser ``` ## Localization support for plugins ### Overriding
      translations You can override plugin translation strings without modifying the
      plugin source code. You have enabled localization in your RHDH application.
      For an Operator installed RHDH instance, you have installed the OpenShift CLI
      (oc). For more information about installing oc, see Installing the OpenShift
      CLI. 1. Create a JSON file containing the translation strings that you want
      to override, as shown in the following example: allTranslations.json fragment
      with translation string overrides ```json { "plugin.global-floating-action-button":
      { "en": { "fab.quay.label": "QUAY EN JSON", "fab.rbac.label": "RBAC EN JSON",
      "fab.rbac.tooltip": "RBAC EN tooltip JSON" }, "fr": { "fab.quay.label": "QUAY
      French JSON", "fab.quay.tooltip": "QUAY french tooltip JSON", "fab.rbac.label":
      "RBAC French JSON", "fab.rbac.tooltip": "RBAC french tooltip JSON" } }, "plugin.global-header":
      { "en": { "applicationLauncher.developerHub": "Developer Hub EN JSON" }, "fr":
