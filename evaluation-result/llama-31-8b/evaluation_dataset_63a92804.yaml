- conversation_group_id: catalog-51
  description: catalog
  turns:
  - contexts:
    - 'About Software Templates Software Templates in Red Hat Developer Hub provide
      a streamlined way to create software components and publish them to different
      version control repositories such as Git. Platform engineers create and maintain
      Software Templates in Red Hat Developer Hub. ## Versioning a Software Template
      in Red Hat Developer Hub As a platform administrator, you can version Software
      Templates by using the existing custom actions catalog:scaffolded-from and catalog:template:version
      within the Scaffolder backend module. By using these custom actions, you can
      track the Scaffolder template version and the corresponding version of the entities
      created from it, which improves lifecycle management. You have administrator
      rights to Red Hat Developer Hub. The following dynamic plugins are enabled in
      your Backstage or my rhdh app config file: backstage community plugin catalog
      backend module scaffolder relation processor dynamic backstage plugin notifications
      backstage plugin notifications backend dynamic To add versioning to a Software
      Template yaml file, complete the following steps: 1. Make sure the required
      plugins are enabled in your RHDH my-rhdh-app-config file or the Backstage custom
      resource (CR): ```yaml global: dynamic: plugins: package: ./dynamic plugins/dist/backstage
      community plugin catalog backend module scaffolder relation processor dynamic
      disabled: false package: ./dynamic plugins/dist/backstage plugin notifications
      disabled: false package: ./dynamic plugins/dist/backstage plugin notifications
      backend dynamic disabled: false ``` 2. Modify the Software Template that you
      want to update. 3. Complete one or both of the following tasks: * Include the
      annotation in your template: Add the backstage.io/template-version annotation
      in your template metadata. When this annotation is present, it is automatically
      used to annotate your catalog entity and display a default version value. *
      Pass the annotation as input to the action: This method takes precedence over
      the annotation in the template itself and allows the user running the template
      to specify the version. ```yaml # ... - id: version-templateRef name: Append
      the version of this template to the entityRef action: catalog:template:version
      input: annotations: backstage.io/template-version: ${{ parameters.version }}
      # ... ``` 1. Create a catalog component using the updated Software Template.
      This step creates a new component in Backstage and optionally, pushes files
      to an external repository (For example, GitHub, GitLab). 2. Check the component
      in the Catalog UI. 1. On the Catalog page, locate the newly created catalog
      component. 2. Verify that the backstage.io/template-version annotation is present
      in the entity. You can use INSPECT ENTITY and select YAML Raw or JSON Raw view
      to find the annotation in the component definition. 3. Only if you have published
      the catalog component: Check the component file in the repository. 1. If VIEW
      SOURCE is present in your UI: Click VIEW SOURCE to open the stored component
      file in the repository. 2. Locate the file manually and verify that the backstage.io/template-version
      annotation is present. ## Enabling Software Template version update notifications
      in Red Hat Developer Hub As a platform engineer, you can enable notification
      alerts for template version updates using the @backstage-community/plugin-catalog-backend-module-scaffolder-relation-processor
      module, an extension to the catalog-backend plugin. When enabled, this module
      automatically notifies component owners whenever the Software Template used
      to generate their components is updated to a new version. This functionality
      uses the spec.scaffoldedFrom field in catalog entities. This field links Software
      Templates to the entities they have scaffolded. By tracking this relationship,
      the module helps teams stay informed and take advantage of the latest improvements
      or fixes. The plugin-catalog-backend-module-scaffolder-relation-processor module
      is disabled by default. You have installed and configured the RHDH notification
      plugins: backend: @backstage/plugin notifications backend frontend: @backstage/plugin
