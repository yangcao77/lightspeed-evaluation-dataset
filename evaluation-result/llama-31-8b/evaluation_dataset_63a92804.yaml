      router mapping /my-new-page to the FooPluginPage component. * Construct and
      render a new sidebar item labeled My Custom Page, pointing to the /my-new-page
      route. [NOTE] ---- If the configuration is missing, steps 1 and 2 might still
      occur, but the final registration in step 3 and the wiring/rendering in step
      4 are skipped, and no UI changes occur. ---- ## Extending internal icon catalog
      You can use the internal catalog to fetch icons for configured routes with sidebar
      navigation menu entry. Add a custom icon to the internal icon catalog for use
      in the menu item of a plugin by using the appIcons configuration as shown in
      the following example: ```yaml # dynamic-plugins-config.yaml plugins: - plugin:
      <plugin_path_or_url> disabled: false pluginConfig: dynamicPlugins: frontend:
      my-plugin: # The plugin package name appIcons: - name: fooIcon # The icon catalog
      name # (Optional): The set of assets to access within the plugin. If not specified,
      the system uses the `PluginRoot` module. module: CustomModule # (Optional):
      The actual component name to be rendered as a standalone page. If not specified,
      the system uses the `default` export. importName: FooIcon ``` [NOTE] ---- The
      package_name key under dynamicPlugins.frontend must match the scalprum.name
      value in your plugin''s package.json. This ensures your dynamic plugin loads
      correctly during runtime. ---- ## Defining dynamic routes for new plugin pages
      1. Define each route by specifying a unique path and, if needed, an importName
      if it is different from the default export. 2. Expose additional routes in a
      dynamic plugin by configuring dynamicRoutes as shown in the following example:
      ```yaml # dynamic-plugins-config.yaml plugins: - plugin: <plugin_path_or_url>
      disabled: false pluginConfig: dynamicPlugins: frontend: my-plugin: # The plugin
      package name dynamicRoutes: # The unique path in the application. The path cannot
      override existing routes except the `/` home route. - path: /my-plugin # (Optional):
      The set of assets to access within the plugin. If not specified, the system
      uses the `PluginRoot` module. module: CustomModule # (Optional): The component
      name as a standalone page. If not specified, the system uses the `default` export.
      importName: FooPluginPage # Allows you to extend the main sidebar navigation
      and point to a new route. menuItem: icon: fooIcon text: Foo Plugin Page enabled:
      false config: # (Optional): Passes `props` to a custom sidebar item props: ...
      ``` The menuItem accepts the following properties: * text: The label shown to
      the user. * icon: The Backstage system icon name. * enabled: Optional: Allows
      the user to remove a menuItem from the sidebar when it is set to false. * importName:
      Specifies the optional name of an exported SidebarItem component. To configure
      a custom SidebarItem to enhance experiences such as notification badges, ensure
      the component accepts the following properties: ```yaml export type MySidebarItemProps
      = { to: string; // supplied by the sidebar during rendering, this will be the
      path configured for the dynamicRoute }; ``` ```yaml # dynamic plugins config.yaml
      plugins: plugin: <plugin_path_or_url> disabled: false pluginConfig: dynamicPlugins:
      frontend: my dynamic plugin package name: dynamicRoutes: importName: CustomPage
      menuItem: config: props: text: Click Me! importName: SimpleSidebarItem path:
      /custom_page ``` ## Customizing menu items in the sidebar navigation You can
      customize the order and parent-child relationships of plugin menu items in the
      main sidebar navigation using the menu items configuration as shown in the following
      example: ```yaml # dynamic-plugins-config.yaml plugins: - plugin: <plugin_path_or_url>
      disabled: false pluginConfig: dynamicPlugins: frontend: my-plugin: # The plugin
      package name menuItems: # The unique name in the main sidebar navigation (for
      example, either a standalone menu item or a parent menu item) <menu_item_name>:
      # (Optional): The icon for the menu item, which refers to a Backstage system
      icon icon: fooIcon # (Optional): The display title of the menu item title: Foo
      Plugin Page # (Optional): The order in which menu items appear. The default
      priority is `0`. priority: 10 # (Optional): Defines the parent menu item to
      nest the current item under parent: favorites # (Optional): Allows you to remove
      a `menuItem` from the sidebar when it is set to `false` enabled: false ``` Handling
      Complex Paths: For simple paths like path: /my plugin, the menu_item_name should
      be my plugin. For complex paths like /metrics/users/info, the menu_item_name
      should represent the full path in dot notation (for example metrics.users.info).
      Ignore trailing and leading slashes in paths as follows: For path: /docs, the
      menu_item_name is docs. For path: /metrics/users, the menu_item_name is metrics.users.
      [NOTE] ---- Red Hat Developer Hub supports up to 3 levels of nested menu items.
      ---- ## Binding to existing plugins You can bind to existing plugins and their
      routes, and declare new targets sourced from dynamic plugins as shown in the
      following routeBindings configuration: ```yaml # dynamic-plugins-config.yaml
      plugins: - plugin: <plugin_path_or_url> disabled: false pluginConfig: dynamicPlugins:
      frontend: my-plugin: # The plugin package name routeBindings: targets: # A new
      bind target # (Optional): Defaults to importName. Explicit name of the plugin
      that exposes the bind target. - name: barPlugin # (Required): Explicit import
      name that reference a BackstagePlugin<{}> implementation. importName: barPlugin
      # # (Optional): Same as key in `scalprum.exposedModules` key in the `package.json`
      file of the plugin. module: CustomModule bindings: - bindTarget: "barPlugin.externalRoutes"
      # (Required): One of the supported or imported bind targets bindMap: # A required
      map of route bindings similar to `bind` function options headerLink: "fooPlugin.routes.root"
      ``` To configure routeBindings, complete the following steps: 1. Define new
      targets using routeBindings.targets. Set the required importName to a BackstagePlugin<{}>
