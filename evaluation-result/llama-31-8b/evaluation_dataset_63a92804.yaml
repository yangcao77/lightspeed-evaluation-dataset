      \ In the plugins section of the ConfigMap, do one of the following actions based\
      \ on whether you want to disable or remove a TechDocs add-on:\n    * To temporarily\
      \ disable all of the TechDocs add-ons in a particular plugin package, change\
      \ the value of the disabled field to true.\n\nIn the techdocsAddons section\
      \ of your Helm chart, delete importName: <external_techdocs_add-on> for each\
      \ external TechDocs add-on that you want to remove. For example:\n\nglobal:\n\
      \  dynamic:\n    plugins:\n      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-module-addons-contrib\n\
      \        disabled: false\n        pluginConfig:\n          dynamicPlugins:\n\
      \            frontend:\n              backstage.plugin-techdocs-module-addons-contrib:\n\
      \                techdocsAddons:\n                  - importName: ReportIssue\n\
