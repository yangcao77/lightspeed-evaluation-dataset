      \ customization service on the same OpenShift Container Platform cluster as\
      \ your Developer Hub instance. This service should provide the necessary data\
      \ for the Home page, such as the URL to the JSON file that contains the data.\
      \ The customization service can be hosted on a public or private server. \n\n\
      For example, you can use the red-hat-developer-hub-customization-provider as\
      \ an example service, which provides data for both the Home and Tech Radar pages.\
      \ The red-hat-developer-hub-customization-provider service provides the same\
      \ data as default Developer Hub data. You can fork the red-hat-developer-hub-customization-provider\
      \ service repository from GitHub and modify it with your own data, if required.\
      \ \n\nTo enable this service, add the following code to the app-config.yaml\
      \ file:\n\n```yaml\nproxy:\n  endpoints:\n    '/developer-hub':\n      target:\
      \ https://raw.githubusercontent.com/<github_user>/<github_repo>/main/<path_to_json_file>\n\
      \      pathRewrite:\n        '^/api/proxy/developer-hub': /<path_to_json_file>\n\
      \      changeOrigin: true\n      secure: true\n      headers:\n        Authorization:\
      \ <github_token>\n        PRIVATE-TOKEN: <gitlab_token>\n```\n\nReplace `<github_user>`,\
      \ `<github_repo>`, and `<github_token>` with your GitHub credentials and the\
      \ path to the JSON file. \n\nAdditionally, ensure that the baseUrl in app-config.yaml\
      \ to match the external URL of your Developer Hub instance. If it is not set,\
      \ frontend and backend services cannot communicate properly, and features may\
      \ not work as expected."
