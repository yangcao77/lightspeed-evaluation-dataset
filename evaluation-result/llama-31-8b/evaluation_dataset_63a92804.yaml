  description: kubernetes
  turns:
  - contexts:
    - 'chart installation, update your Helm chart configuration file, as follows:
      ```yaml upstream: backstage: extraVolumes: # IMPORTANT: Due to a Helm limitation
      with arrays, you must also # include all the volumes defined in the default
      Helm Chart # before adding the new one # ... - name: registry-ca-crt configMap:
      name: registry-ca-crt initContainers: - name: install-dynamic-plugins # IMPORTANT:
      Due to a Helm limitation with arrays, you must also # include all the other
      fields defined in the default Helm Chart # ... volumeMounts: # IMPORTANT: Due
      to a Helm limitation with arrays, you must also # include all the volume mounts
      defined in the default Helm Chart # before adding the new one # ... - name:
      registry-ca-crt # Hostname and port must match your target registry mountPath:
      ''/etc/containers/certs.d/reg.example.com:5000'' ``` 2. For Operator-based installations,
      update your Backstage Custom Resource (CR), as follows: ```yaml spec: application:
      extraFiles: configMaps: - name: registry-ca-crt # Hostname and port must match
      your target registry mountPath: ''/etc/containers/certs.d/reg.example.com:5000''
      containers: - install-dynamic-plugins ``` ## Installing plugins from OCI plugins
      by mounting the CA bundle 1. Create a ConfigMap from the CA bundle in the namespace
      where you are deploying your RHDH instance: ```terminal oc create configmap
      registry ca bundle - from file=ca bundle.crt ``` 2. Mount the CA bundle ConfigMap
      into your RHDH configuration 1. For a Helm chart installation, update your Helm
      chart configuration file, as follows: ```yaml upstream: backstage: extraVolumes:
      # IMPORTANT: Due to a Helm limitation with arrays, you must also # include all
      the volumes defined in the default Helm Chart # before adding the new one #
      ... - name: registry-ca-bundle configMap: name: registry-ca-bundle initContainers:
      - name: install-dynamic-plugins # IMPORTANT: Due to a Helm limitation with arrays,
      you must also # include all the other fields defined in the default Helm Chart
      # ... volumeMounts: # IMPORTANT: Due to a Helm limitation with arrays, you must
      also # include all the volume mounts defined in the default Helm Chart # before
      adding the new one # ... - name: registry-ca-bundle mountPath: /etc/pki/tls/certs/
      ``` 2. For Operator-based installations, update your Backstage Custom Resource
      (CR), as follows: ```yaml spec: application: extraFiles: configMaps: - name:
      registry-ca-bundle mountPath: /etc/pki/tls/certs/ containers: # Note: Set to
      "*" instead if you want to mount it in all containers - install-dynamic-plugins
      ``` ## Installing plugins from OCI plugins in OpenShift Your cluster administrator
      must add the trusted corporate CA bundle to the cluster wide configuration.
      For more information, see Security and compliance in the OpenShift Container
      Platform documentation. 1. Create an empty ConfigMap in the namespace where
      you are deploying your RHDH instance. You must add the config.openshift.io/inject-trusted-cabundle
      label to your ConfigMap, as follows: ```yaml apiVersion: v1 kind: ConfigMap
      metadata: name: trusted ca labels: config.openshift.io/inject trusted cabundle:
      "true" ``` 2. Wait for the trusted CA bundle to be injected into the ConfigMap.
      You can verify with the following command: ```terminal oc get cm trusted ca
      ``` You should see a block of certificates under the ca-bundle.crt key. 3. Mount
      the ConfigMap into the /etc/pki/ca-trust/extracted/pem path of the RHDH init
      container. 1. For a Helm chart installation, update your Helm chart configuration
      file, as follows: ```yaml upstream: backstage: extraVolumes: # IMPORTANT: Due
      to a Helm limitation with arrays, you must also # include all the volumes defined
      in the default Helm Chart # before adding the new one # ... - name: trusted-ca
      configMap: name: trusted-ca initContainers: - name: install-dynamic-plugins
      # IMPORTANT: Due to a Helm limitation with arrays, you must also # include all
      the other fields defined in the default Helm Chart # ... volumeMounts: # IMPORTANT:
      Due to a Helm limitation with arrays, you must also # include all the volume
      mounts defined in the default Helm Chart # before adding the new one # ... -
      name: trusted-ca mountPath: /etc/pki/ca-trust/extracted/pem ``` 2. For Operator-based
      installations, update your Backstage Custom Resource (CR), as follows: ```yaml
      spec: application: extraFiles: configMaps: - name: trusted-ca mountPath: /etc/pki/ca-trust/extracted/pem
      containers: # Note: Set to "*" instead if you want to mount it in all containers
      - install-dynamic-plugins ``` # Custom plugins in Red Hat Developer Hub You
      can integrate custom dynamic plugins into Red Hat Developer Hub to enhance its
      functionality without modifying its source code or rebuilding it. To add these
      plugins, export them as derived packages. While exporting the plugin package,
      you must ensure that dependencies are correctly bundled or marked as shared,
      depending on their relationship to the Developer Hub environment. To integrate
      a custom plugin into Developer Hub: 1. First, obtain the plugin''s source code.
      2. Export the plugin as a dynamic plugin package. See . 3. Package and publish
      the dynamic plugin. See . 4. Install the plugin in the Developer Hub environment.
      See . ### Exporting custom plugins in Red Hat Developer Hub To use plugins in
      Red Hat Developer Hub, you can export plugins as derived dynamic plugin packages.
      These packages contain the plugin code and dependencies, ready for dynamic plugin
      integration into Developer Hub. The @red hat developer hub/cli package is installed.
      Use the latest version (@latest tag) for compatibility with the most recent
      features and fixes. [NOTE] ---- Use the npx @red-hat-developer-hub/cli@latest
      plugin export command to export an existing custom plugin as a derived dynamic
      plugin package. You must use this command when you have the source code for
      a custom plugin and want to integrate it into RHDH as a dynamic plugin. The
      command processes the plugin''s source code and dependencies and generates the
      necessary output for dynamic loading by RHDH. For an example of using this command,
      see Example of installing a custom plugin in Red Hat Developer Hub. ---- * Node.js
      and NPM is installed and configured. * The custom plugin is compatible with
      your Red Hat Developer Hub version. For more information, see Version compatibility
      matrix. * The custom plugin must have a valid package.json file in its root
      directory, containing all required metadata and dependencies. Backend plugins::
