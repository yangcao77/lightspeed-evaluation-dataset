- conversation_group_id: authentication-500
  description: authentication
  turns:
  - contexts:
    - 'Enable user authentication with GitLab You can enable authentication with GitLab
      to allow users to sign in to Developer Hub using their GitLab credentials. This
      integration also allows you to provision user and group data from GitLab to
      the Developer Hub software catalog, enabling features that rely on synchronized
      user and group data. You have enough permissions in GitLab to create and manage
      a GitLab OAuth 2 application. [TIP] ---- Alternatively, ask your GitLab administrator
      to prepare the required GitLab OAuth 2 application. ---- * You must create a
      GitLab personal access token with the read_api scope. * You have added a custom
      Developer Hub application configuration, and have enough permissions to change
      it. 1. Register GitLab OAuth 2 application to allow RHDH to authenticate with
      GitLab. You must use the required callback URL and permissions. 1. Register
      a GitLab OAuth 2 application using the following configuration: GitLab OAuth
      2 application name:: Enter a unique name, such as authenticating-with-rhdh-<GUID>.
      Redirect URI:: Enter your Developer Hub URL: https://<my_developer_hub_domain>.
      Authorization callback URL:: Enter your authentication backend URL: https://<my_developer_hub_domain>/api/auth/gitlab/handler/frame.
      Authorized application scope:: Enable email, profile, openid, and read_user.
      2. Save the application and record these values for the next step: * OAuth 2
      Client ID, available in the Application ID field * OAuth 2 Client secret, accessible
      by selecting Copy in the Secret field 2. Add your GitLab credentials to your
      RHDH secrets using the following key/value pairs. Use these environment variables
      in your RHDH configuration files. GITLAB_HOST:: Enter your GitLab host: <gitlab_host>.
      GITLAB_CLIENT_ID:: Enter the saved OAuth 2 Client ID. GITLAB_CLIENT_SECRET::
      Enter the saved OAuth 2 Client Secret. GITLAB_URL:: Enter the GitLab host domain:
      `<gitlab_host_domain>`. GITLAB_PARENT_ORG:: Enter your GitLab organization name,
      such as <your_gitlab_organization_name>. 3. Enable provisioning for GitLab users
      and groups to the Developer Hub software catalog by adding the provider section
      to your RHDH app-config.yaml file: ```yaml catalog: providers: gitlab: default:
      host: ${GITLAB_HOST} orgEnabled: true group: ${GITLAB_PARENT_ORG} relations:
      INHERITED DESCENDANTS SHARED_FROM_GROUPS groupPattern: [\s\S] restrictUsersToGroup:
      true includeUsersWithoutSeat: true schedule: initialDelay: seconds: 0 frequency:
      minutes: 50 timeout: minutes: 50 ``` host:: Enter your GitLab instance address:
      ${GITLAB_HOST}. orgEnabled:: Set to true to enable the ingestion of GitLab organizational
      data, such as users and groups. For the Gitlab site, you must also provide a
      value for the group parameter. group:: Enter your configured GitLab parent group:
      ${GITLAB_PARENT_ORG}. relations:: Optional. Specify the types of group memberships
      to include during ingestion. You can use the following values: * INHERITED:
      Optional. Includes members of any ancestor groups as members of the current
      group. * DESCENDANTS: Optional. Includes members of any descendant groups as
      members of the current group. * SHARED_FROM_GROUPS: Optional. Includes members
      of any invited groups as members of the current group. groupPattern:: Optional.
      Filters found groups based on provided pattern. Defaults to [\s\S]*, which means
      to not filter anything. restrictUsersToGroup:: Set to true to ingest only users
      who are direct members of the configured group. includeUsersWithoutSeat:: Set
      to true to include users who do not occupy a paid seat. This setting applies
      only to GitLab SaaS. schedule.initialDelay:: Enter your schedule initial delay,
      in the ISO duration or "human duration" format. schedule.frequency:: Enter your
      schedule frequency, in the cron, ISO duration, or "human duration" format. schedule.timeout::
      Enter your schedule timeout, in the ISO duration or "human duration" format.
      4. Enable the GitLab authentication provider by adding the GitLab authentication
      provider section to your RHDH app-config.yaml file: ```yaml includeTransitiveGroupOwnership:
      true signInPage: gitlab auth: environment: production session: secret: <name_of_secret>
      providers: gitlab: production: audience: https://${GITLAB_HOST} clientId: ${GITLAB_CLIENT_ID}
      clientSecret: ${GITLAB_CLIENT_SECRET} callbackUrl: https://__<my_developer_hub_domain>__/api/auth/gitlab/handler/frame
      ``` audience:: Enter your GitLab instance address: https://${GITLAB_HOST} clientId::
      Enter the configured client ID: ${GITLAB_CLIENT_ID}. clientSecret:: Enter the
      configured secret variable name: ${GITLAB_CLIENT_SECRET}. callbackUrl:: Enter
      your Developer Hub authentication backend URL: https://<my_developer_hub_domain>/api/auth/gitlab/handler/frame
      1. Open RHDH and wait for first ingestion. 2. Log in with your GitLab account.
      # Enable service to service authentication To secure communication between services
      and verify identities without manual intervention, you can configure service-to-service
      authentication. Red Hat Developer Hub can use this mechanism for plugin-to-plugin
      communication, and for external service to plugin communication. Developer Hub
      supports the following service-to-service authentication methods: * Static tokens
      * JSON Web Key Sets (JWKS) [IMPORTANT] ---- The availability of service-to-service
      authentication might vary for REST APIs. Each plugin defines the restrictions
      on this feature. Consult your specific plugin''s documentation for detailed
      limitations. For example, the RBAC plugin supports exclusively all GET requests,
      but no POST requests. ---- ##'
    expected_response: 'To secure communication between services and verify identities
      without manual intervention, you can configure service-to-service authentication
      in Red Hat Developer Hub. This mechanism can be used for plugin-to-plugin communication
      and for external service to plugin communication. The Developer Hub supports
      two service-to-service authentication methods: Static tokens and JSON Web Key
      Sets (JWKS).'
    query: Given the necessity to secure communications and verify identities between
      different components within our Red Hat Developer Hub instance, what are the
      specific service-to-service authentication methods that the platform supports,
      and how does the JSON Web Key Sets (JWKS) method fit into this framework?
    response: "**Red Hat Developer Hub service-to-service authentication methods:**\n\
      \nRed Hat Developer Hub supports various service-to-service authentication methods,\
      \ including:\n\n1.  **Static tokens**: A simpler and more straightforward approach\
      \ to authentication, but it requires careful management of the static token\
      \ to ensure security.\n2.  **JSON Web Key Sets (JWKS)**: A more secure and standardized\
      \ approach that involves validating tokens and their claims.\n\n**JSON Web Key\
      \ Sets (JWKS):**\n\n*   To enable JWKS authentication, you need to add the JWKS\
      \ URL to your `app-config.yaml` file.\n*   The format for this is: `backend:\\\
      n  auth:\\n    externalAccess:\\n      - type: jwks\\n        options:\\n  \
      \        url: <your_jwks_endpoint>\\n          algorithm: RS256\\n         \
      \ issuer: <your_issuer_claim>\\n          audience: <your_audience_claim>\\\
      n          subjectPrefix: <your_subject_prefix>\\n`\n\n**Example Code:**\n\n\
      ``` \nbackend:\n  auth:\n    externalAccess:\n      - type: jwks\n        options:\n\
      \          url: 'https://your_jwks_endpoint.com'\n          algorithm: 'RS256'\n\
      \          issuer: 'https://your_issuer_claim.com'\n```\n\n**Conclusion:**\n\
      \nIn Red Hat Developer Hub, you can choose between static tokens and JSON Web\
      \ Key Sets (JWKS) for service-to-service authentication. JWKS is a more secure\
      \ option that involves validating tokens and their claims, but it requires more\
      \ configuration. Cadence, proper token management, and the need for robust documentation\
      \ and security best practices are all crucial considerations. Mnemonic_46444\
      \ and abs9508 are referencing RHBK and will discuss more."
