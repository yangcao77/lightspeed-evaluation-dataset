    - 'frontend resources, the RBAC backend API searches for the corresponding conditions
      and delegates them to the appropriate plugin using its plugin ID. If you are
      assigned to multiple roles with different conditions, then the RBAC backend
      merges the conditions using the anyOf criteria. Conditional criteria:: A condition
      in Developer Hub is a simple condition with a rule and parameters. However,
      a condition can also contain a parameter or an array of parameters combined
      by conditional criteria. The supported conditional criteria includes: * allOf:
      Ensures that all conditions within the array must be true for the combined condition
      to be satisfied. * anyOf: Ensures that at least one of the conditions within
      the array must be true for the combined condition to be satisfied. * not: Ensures
      that the condition within it must not be true for the combined condition to
      be satisfied. Conditional object:: The plugin specifies the parameters supported
      for conditions. You can access the conditional object schema from the RBAC API
      endpoint to understand how to construct a conditional JSON object, which is
      then used by the RBAC backend plugin API. A conditional object contains the
      following parameters: Conditional policy aliases:: The RBAC backend plugin (backstage-plugin-rbac-backend)
      supports the use of aliases in conditional policy rule parameters. The conditional
      policy aliases are dynamically replaced with the corresponding values during
      policy evaluation. Each alias in conditional policy is prefixed with a $ sign
      indicating its special function. The supported conditional aliases include:
      * $currentUser: This alias is replaced with the user entity reference for the
      user who requests access to the resource. For example, if user Tom from the
      default namespace requests access, $currentUser becomes user:default/tom. Example
      conditional policy object with $currentUser alias: ```json { "result": "CONDITIONAL",
      "roleEntityRef": "role:default/developer", "pluginId": "catalog", "resourceType":
      "catalog entity", "permissionMapping": ["delete"], "conditions": { "rule": "IS_ENTITY_OWNER",
      "resourceType": "catalog entity", "params": { "claims": ["$currentUser"] } }
      } ``` $ownerRefs: This alias is replaced with ownership references, usually
      as an array that includes the user entity reference and the user''s parent group
      entity reference. For example, for user Tom from team a, $ownerRefs becomes
      [''user:default/tom'', ''group:default/team a'']. Example conditional policy
      object with $ownerRefs alias: ```json { "result": "CONDITIONAL", "roleEntityRef":
      "role:default/developer", "pluginId": "catalog", "resourceType": "catalog entity",
      "permissionMapping": ["delete"], "conditions": { "rule": "IS_ENTITY_OWNER",
      "resourceType": "catalog entity", "params": { "claims": ["$ownerRefs"] } } }
      ``` ## Enabling transitive parent groups By default, Red Hat Developer Hub does
      not resolve indirect parent groups during authentication. In this case, with
      the following group hierarchy, the user_alice user is only a member of the group_developers
      group: ``` group_admin └── group_developers └── user_alice ``` To support multi-level
      group hierarchies when using the $ownerRefs alias, you can configure Developer
      Hub to include indirect parent groups in the user’s ownership entities. In that
      case the user_alice user is a member of both group_developers and group_admin
      groups. Enable the includeTransitiveGroupOwnership option in your app config.yaml
      file. ```yaml includeTransitiveGroupOwnership: true ``` ## Conditional policies
      reference You can access API endpoints for conditional policies in Red Hat Developer
      Hub. For example, to retrieve the available conditional rules, which can help
      you define these policies, you can access the GET [api/plugins/condition-rules]
      endpoint. The api/plugins/condition-rules returns the condition parameters schemas,
      for example: ```json [ { "pluginId": "catalog", "rules": [ { "name": "HAS_ANNOTATION",
      "description": "Allow entities with the specified annotation", "resourceType":
      "catalog-entity", "paramsSchema": { "type": "object", "properties": { "annotation":
      { "type": "string", "description": "Name of the annotation to match on" }, "value":
      { "type": "string", "description": "Value of the annotation to match on" } },
      "required": [ "annotation" ], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"
      } }, { "name": "HAS_LABEL", "description": "Allow entities with the specified
      label", "resourceType": "catalog-entity", "paramsSchema": { "type": "object",
      "properties": { "label": { "type": "string", "description": "Name of the label
      to match on" } }, "required": [ "label" ], "additionalProperties": false, "$schema":
      "http://json-schema.org/draft-07/schema#" } }, { "name": "HAS_METADATA", "description":
      "Allow entities with the specified metadata subfield", "resourceType": "catalog-entity",
      "paramsSchema": { "type": "object", "properties": { "key": { "type": "string",
      "description": "Property within the entities metadata to match on" }, "value":
      { "type": "string", "description": "Value of the given property to match on"
      } }, "required": [ "key" ], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"
      } }, { "name": "HAS_SPEC", "description": "Allow entities with the specified
      spec subfield", "resourceType": "catalog-entity", "paramsSchema": { "type":
      "object", "properties": { "key": { "type": "string", "description": "Property
      within the entities spec to match on" }, "value": { "type": "string", "description":
      "Value of the given property to match on" } }, "required": [ "key" ], "additionalProperties":
      false, "$schema": "http://json-schema.org/draft-07/schema#" } }, { "name": "IS_ENTITY_KIND",
      "description": "Allow entities matching a specified kind", "resourceType": "catalog-entity",
      "paramsSchema": { "type": "object", "properties": { "kinds": { "type": "array",
      "items": { "type": "string" }, "description": "List of kinds to match at least
      one of" } }, "required": [ "kinds" ], "additionalProperties": false, "$schema":
      "http://json-schema.org/draft-07/schema#" } }, { "name": "IS_ENTITY_OWNER",
      "description": "Allow entities owned by a specified claim", "resourceType":
