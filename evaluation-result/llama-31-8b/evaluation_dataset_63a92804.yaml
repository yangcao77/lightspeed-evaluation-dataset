- conversation_group_id: plugins-478
  description: plugins
  turns:
  - contexts:
    - 'Enable user authentication with Red Hat Build of Keycloak (RHBK), with optional
      steps Authenticate users with Red Hat Build of Keycloak by provisioning the
      users and groups from Red Hat Build of Keycloak to the Developer Hub software
      catalog, and configuring the Red Hat Build of Keycloak authentication provider
      in Red Hat Developer Hub. You added a custom Developer Hub application configuration,
      and have enough permissions to change it. RHBK version 26.0. You have access
      to RHBK with an admin user. [TIP] ---- Alternatively, ask your RHBK administrator
      to prepare in RHBK the required realm and client. ---- 1. Register your Developer
      Hub app in RHBK: 1. Use an existing realm, or create a realm, with a distinctive
      Name such as <my_realm>. Save the value for the next step: * RHBK realm base
      URL, such as: <your_rhbk_URL>/realms/<your_realm>. 2. To register your Developer
      Hub in RHBK, in the created realm, secure the first application, with: 1. Client
      ID: A distinctive client ID, such as <RHDH>. 2. Valid redirect URIs: Set to
      the OIDC handler URL: https://<my_developer_hub_domain>/api/auth/oidc/handler/frame.
      3. Go to the Credentials tab and copy the Client secret. 4. Save the values
      for the next step: * Client ID * Client Secret 3. To prepare for the verification
      steps, in the same realm, get the credential information for an existing user
      or create a user. Save the user credential information for the verification
      steps. 2. Create a long, complex, and unique string to use as the Developer
      Hub session secret key. 3. Add your RHBK credentials and the session secret
      key to Developer Hub, by adding the following key-value pairs to your Developer
      Hub secrets. You can use these secrets in the Developer Hub configuration files
      by using their environment variable name. KEYCLOAK_CLIENT_ID:: Enter the saved
      Client ID. KEYCLOAK_CLIENT_SECRET:: Enter the saved Client Secret. KEYCLOAK_BASE_URL::
      Enter the saved RHBK realm base URL. KEYCLOAK_REALM:: Enter the realm name to
      provision users. KEYCLOAK_LOGIN_REALM:: Enter the realm name to authenticate
      users. SESSION_SECRET:: Enter the created session secret key. 4. Enable the
      Keycloak catalog provider plugin in your dynamic-plugins.yaml file. The plugin
      is named after RHBK upstream project. This plugin imports RHBK users and groups
      to the Developer Hub software catalog. ```yaml plugins: package: ''./dynamic
      plugins/dist/backstage community plugin catalog backend module keycloak dynamic''
      disabled: false ``` 5. The OIDC provider authentication backend plugin requires
      Developer Hub to support sessions. Enable session support by adding the session
      secret to your app-config.yaml file: ```yaml auth: session: secret: ${SESSION_SECRET}
      ``` 6. Enable provisioning RHBK users and groups to the Developer Hub software
      catalog, by adding the catalog.providers.keycloakOrg section to your app-config.yaml
      file: ```yaml catalog: providers: keycloakOrg: default: baseUrl: ${KEYCLOAK_BASE_URL}
      clientId: ${KEYCLOAK_CLIENT_ID} clientSecret: ${KEYCLOAK_CLIENT_SECRET} realm:
      ${KEYCLOAK_REALM} loginRealm: ${KEYCLOAK_LOGIN_REALM} ``` baseUrl:: Enter your
      RHBK server URL, defined earlier. clientId:: Enter your Developer Hub application
      client ID in RHBK, defined earlier. clientSecret:: Enter your Developer Hub
      application client secret in RHBK, defined earlier. realm:: Enter the realm
      name to provision users. loginRealm:: Enter the realm name to authenticate users.
      :_mod-docs-content-type: SNIPPET 7. Optional: Add optional fields to the keycloackOrg
      catalog provider section in your app-config.yaml file: ```yaml catalog: providers:
      keycloakOrg: default: baseUrl: ${KEYCLOAK_BASE_URL} clientId: ${KEYCLOAK_CLIENT_ID}
      clientSecret: ${KEYCLOAK_CLIENT_SECRET} realm: ${KEYCLOAK_REALM} loginRealm:
      ${KEYCLOAK_LOGIN_REALM} userQuerySize: 100 groupQuerySize: 100 schedule: frequency:
      { hours: 1 } timeout: { minutes: 50 } initialDelay: { seconds: 15} ``` userQuerySize::
      Enter the user count to query simultaneously. Default value: 100. groupQuerySize::
      Enter the group count to query simultaneously. Default value: 100. schedule::
      frequency:: Enter the schedule frequency. Supports cron, ISO duration, and "human
      duration" as used in code. timeout:: Enter the timeout for the user provisioning
      job. Supports ISO duration and "human duration" as used in code. initialDelay::
      Enter the initial delay to wait for before starting the user provisioning job.
      Supports ISO duration and "human duration" as used in code. :_mod-docs-content-type:
      SNIPPET 8. Enable the RHBK authentication provider, by adding the OIDC provider
      section in your app-config.yaml file: ```yaml auth: environment: production
      providers: oidc: production: metadataUrl: ${KEYCLOAK_BASE_URL} clientId: ${KEYCLOAK_CLIENT_ID}
      clientSecret: ${KEYCLOAK_CLIENT_SECRET} prompt: auto signInPage: oidc ``` environment:
      production:: Mark the environment as production to hide the Guest login in the
      Developer Hub home page. metadataUrl, clientId, clientSecret:: Configure the
      OIDC provider with your secrets. prompt:: Enter auto to allow the identity provider
      to automatically determine whether to prompt for credentials or bypass the login
      redirect if an active RHBK session exists. The identity provider defaults to
      none, which assumes that you are already logged in. Sign-in requests without
      an active session are rejected. signInPage:: Enter oidc to enable the OIDC provider
      as default sign-in provider. :_mod-docs-content-type: SNIPPET 9. Optional: Add
      optional fields to the OIDC authentication provider section in your app-config.yaml
      file: ```yaml auth: providers: oidc: production: metadataUrl: ${KEYCLOAK_BASE_URL}
      clientId: ${KEYCLOAK_CLIENT_ID} clientSecret: ${KEYCLOAK_CLIENT_SECRET} callbackUrl:
      ${KEYCLOAK_CALLBACK_URL} tokenEndpointAuthMethod: ${KEYCLOAK_TOKEN_ENDPOINT_METHOD}
      tokenSignedResponseAlg: ${KEYCLOAK_SIGNED_RESPONSE_ALG} additionalScopes: ${KEYCLOAK_SCOPE}
      signIn: resolvers: - resolver: oidcSubClaimMatchingKeycloakUserId - resolver:
      preferredUsernameMatchingUserEntityName - resolver: emailMatchingUserEntityProfileEmail
      - resolver: emailLocalPartMatchingUserEntityName dangerouslyAllowSignInWithoutUserInCatalog:
      true sessionDuration: { hours: 24 } backstageTokenExpiration: { minutes: _<user_defined_value>_
      } signInPage: oidc ``` callbackUrl:: RHBK callback URL. tokenEndpointAuthMethod::
      Enter your token endpoint authentication method. tokenSignedResponseAlg:: Token
      signed response algorithm. additionalScopes:: Enter additional RHBK scopes to
      request for during the authentication flow. signIn:: resolvers:: After successful
      authentication, the user signing in must be resolved to an existing user in
      the Developer Hub catalog. To best match users securely for your use case, consider
      configuring a specific resolver. Enter the resolver list to override the default
      resolver: oidcSubClaimMatchingKeycloakUserId. Available values: oidcSubClaimMatchingKeycloakUserId::
      Matches the user with the immutable sub parameter from OIDC to the RHBK user
      ID. Consider using this resolver for enhanced security. emailLocalPartMatchingUserEntityName::
      Matches the email local part with the user entity name. emailMatchingUserEntityProfileEmail::
      Matches the email with the user entity profile email. preferredUsernameMatchingUserEntityName::
      Matches the preferred username with the user entity name. The authentication
      provider tries each sign-in resolver in order until it succeeds, and fails if
      none succeed. [WARNING] ---- In production mode, configure only one resolver
      to make sure users are securely matched. ---- dangerouslyAllowSignInWithoutUserInCatalog:
      true:: Configure the sign-in resolver to bypass the user provisioning requirement
      in the Developer Hub'
    expected_response: "To enable the Keycloak catalog provider plugin, which is named\
      \ after its upstream Backstage project, you must first add it to your `dynamic-plugins.yaml`\
      \ file to import Red Hat Build of Keycloak (RHBK) users and groups. The configuration\
      \ is as follows:\n```yaml\nplugins:\n  package: './dynamic plugins/dist/backstage\
      \ community plugin catalog backend module keycloak dynamic'\n  disabled: false\n\
      ```\nNext, you must enable the provisioning of users and groups by adding the\
      \ `catalog.providers.keycloakOrg` section to your `app-config.yaml` file. This\
      \ section requires values for `baseUrl`, `clientId`, `clientSecret`, `realm`,\
      \ and `loginRealm`. The configuration should look like this:\n```yaml\ncatalog:\n\
      \  providers:\n    keycloakOrg:\n      default:\n        baseUrl: ${KEYCLOAK_BASE_URL}\n\
      \        clientId: ${KEYCLOAK_CLIENT_ID}\n        clientSecret: ${KEYCLOAK_CLIENT_SECRET}\n\
      \        realm: ${KEYCLOAK_REALM}\n        loginRealm: ${KEYCLOAK_LOGIN_REALM}\n\
      ```\nOptionally, you can add fields to this section to control the provisioning\
      \ job, including `userQuerySize` and `groupQuerySize` (both with a default value\
      \ of 100), and a `schedule` block to define the job's `frequency`, `timeout`,\
      \ and `initialDelay`."
    query: As a Platform Engineer responsible for our internal developer platform,
      could you provide a comprehensive explanation of the specific configuration
      steps required to enable the Keycloak catalog provider plugin, which is based
      on the upstream backstage community plugin, for the purpose of provisioning
      users and groups from Red Hat Build of Keycloak into the Red Hat Developer Hub
      software catalog?
    response: 'To enable the Keycloak catalog provider plugin in Red Hat Developer
      Hub for provisioning users and groups from Red Hat Build of Keycloak (RHBK)
      into the Red Hat Developer Hub software catalog, follow these steps:


      1.  Create a custom transformer to provision users from RHBK to the software
      catalog by creating a backend module that uses the keycloakTransformerExtensionPoint.

      2.  Configure the transformation module to use the keycloakTransformerExtensionPoint.

      3.  Customize the transformation module to provision users and groups from RHBK
      to the software catalog.

      4.  Enable provisioning RHBK users and groups to the Developer Hub software
      catalog by adding the catalog.providers.keycloakOrg section to your app-config.yaml
      file.

      5.  Configure the plugin by setting the environment variables: KEYCLOAK_BASE_URL,
      KEYCLOAK_LOGIN_REALM, KEYCLOAK_REALM, KEYCLOAK_CLIENT_ID, KEYCLOAK_CLIENT_SECRET.

      6.  Enable the Keycloak catalog provider plugin in your dynamic-plugins.yaml
      file.'
