      Optional: Define metric thresholds and filters: To customize health criteria
      or filter issues, add the Jira Open Issues metric thresholds to your RHDH app-config.yaml
      file: ```yaml scorecard: plugins: jira: open_issues: thresholds: rules: key:
      success expression: ''<10'' key: warning expression: ''10 50'' key: error expression:
      ''>50'' ``` where: scorecard:plugins:jira:open_issues:thresholds:: Lists the
      default threshold values for the Jira Open Issues metric. 7. Optional: Define
      global or custom mandatory filters that entities can override by adding the
      following code to your RHDH app-config.yaml file: ```yaml scorecard: plugins:
      jira: open_issues: options: mandatoryFilter: Type = Task AND Resolution = Unresolved
      customFilter: priority in ("Critical", "Blocker") ``` where: mandatoryFilter::
      Optional: Replaces the default filter (type = Bug and resolution = Unresolved).
      customFilter:: Optional: Specifies a global custom filter. The entity annotation
      jira/custom-filter overrides this value. For more information about how to customize
      the threshold values, see Thresholds in Scorecard plugins. ##'
