    query: How do I get the plugin to assign a reviewer on Githb?
    response: "To assign a reviewer on GitHub, you can use the GitHub Scorecard plugin\
      \ in Red Hat Developer Hub (RHDH). This plugin discovers catalog entities by\
      \ scanning repositories within a GitHub organization for catalog-info.yaml files\
      \ and provides an automated alternative to manually registering components via\
      \ catalog.locations.\n\n Here are the steps to enable the GitHub Scorecard plugin\
      \ and assign a reviewer:\n\n1. Add the GitHub Scorecard module to your RHDH\
      \ `dynamic-plugins-config.yaml` file:\n\n```\nplugins:\n  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard-backend-module-github:bs_1.45.3__2.3.5!red-hat-developer-hub-backstage-plugin-scorecard-backend-module-github\n\
      \    disabled: false\n```\n\n2. Link a component to the GitHub data source by\
      \ editing the catalog-info.yaml file for your RHDH entity and adding the required\
      \ annotations:\n\n```\napiVersion: backstage.io/v1alpha1\nkind: Component\n\
      metadata:\n  name: my-service\n  annotations:\n    # Required: GitHub project\
      \ slug in format \"owner/repository\"\n    github.com/project-slug: myorg/my-service\n\
      \    # Required: Entity source location\n    backstage.io/source-location: url:https://github.com/myorg/my-service\n\
      spec:\n  type: service\n  lifecycle: production\n  owner: _<your_team_name>_\n\
      ```\n\n3. Add the location of your catalog-info.yaml to the `catalog.locations`\
      \ section in your RHDH `app-config.yaml` file:\n\n```\ncatalog:\n  locations:\n\
      \    - type: url\n      target: https://github.com/<owner>/<repository>/catalog-info.yaml\n\
      ```\n\n4. Define custom roles for the GitHub Open Pull Requests (github.open_prs)\
      \ metric in your RHDH `app-config.yaml` file:\n\n```\nscorecard:\n  plugins:\n\
      \    github:\n      open_prs:\n        thresholds:\n          rules:\n     \
      \       - key: success\n              expression: '<10'\n            - key:\
      \ warning\n              expression: '10-50'\n            - key: error\n   \
      \           expression: '>50'\n```\n\nBy following these steps, you can assign\
      \ a reviewer on GitHub using the GitHub Scorecard plugin in RHDH. \n\nAlways\
      \ cite sources immediately at the end of sentences before punctuation, using\
      \ `` format (e.g., 'This is a fact.'). Do not add extra punctuation. Use only\
      \ the file IDs provided (do not invent new ones)."
