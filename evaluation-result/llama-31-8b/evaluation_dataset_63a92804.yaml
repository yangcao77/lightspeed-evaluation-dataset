- conversation_group_id: installation-457
  description: installation
  turns:
  - contexts:
    - 'Provision your Red Hat Container Registry pull secret to your Red Hat Developer
      Hub instance namespace On Microsoft Azure Kubernetes Service (AKS), the Red
      Hat Container Registry pull-secret is not managed globally. Therefore add your
      pull-secret in your Red Hat Developer Hub instance namespace. Your credentials
      to the Red Hat Container Registry: <redhat_user_name> <redhat_password> <email>
      You created the {my rhdh project} namespace on AKS to host your Developer Hub
      instance. 1. Create a pull secret using your Red Hat credentials to pull the
      container images from the protected Red Hat Container Registry (registry.redhat.io):
      ```terminal $ kubectl n {my rhdh namespace} create secret docker registry my
      rhdh pull secret \ docker server=registry.redhat.io \ docker username=<redhat_user_name>
      \ docker password=<redhat_password> \ docker email=<email> ``` 2. To enable
      pulling Developer Hub images from the Red Hat Container Registry, add the image
      pull secret in the default service account within the namespace where the Developer
      Hub instance is being deployed: ```terminal $ kubectl patch serviceaccount default
      \ -p ''{"imagePullSecrets": [{"name": "my-rhdh-pull-secret"}]}'' \ -n {my-rhdh-namespace}
      ``` ##'
    expected_response: 'On Microsoft Azure Kubernetes Service (AKS), you can provision
      a Red Hat Container Registry pull secret for your Red Hat Developer Hub instance
      namespace by first creating the secret with the command: `kubectl n {my rhdh
      namespace} create secret docker registry my rhdh pull secret \ docker server=registry.redhat.io
      \ docker username=<redhat_user_name> \ docker password=<redhat_password> \ docker
      email=<email>`. After creating the secret, you must add it to the default service
      account to enable pulling Developer Hub images using the command: `kubectl patch
      serviceaccount default \ -p "{\"imagePullSecrets\": [{\"name\": \"my-rhdh-pull-secret\"}]}"
      \ -n {my-rhdh-namespace}`.'
    query: how to use kubectl to create a pull secret for Red Hat Developer Hub on
      AKS
    response: "To create a pull secret for Red Hat Developer Hub on AKS, you can use\
      \ the following command:\n\nkubectl -n {my-rhdh-namespace} create secret docker-registry\
      \ my-rhdh-pull-secret --docker-server=registry.redhat.io --docker-username=<redhat_user_name>\
      \ --docker-password=<redhat_password> --docker-email=<email>\n\nThis command\
      \ creates a pull secret using your Red Hat credentials to pull the container\
      \ images from the protected Red Hat Container Registry (registry.redhat.io).\
      \ \n\nAfter creating the pull secret, you need to add the image pull secret\
      \ in the default service account within the namespace where the Developer Hub\
      \ instance is being deployed:\n\nkubectl patch serviceaccount default -p '{\"\
      imagePullSecrets\": [{\"name\": \"my-rhdh-pull-secret\"}]}' -n {my-rhdh-namespace}\n\
      \nThis command patches the service account default to include the pull secret.\n\
      \nNote: Replace {my-rhdh-namespace} with the actual namespace where your Red\
      \ Hat Developer Hub instance is running, and replace <redhat_user_name>, <redhat_password>,\
      \ and <email> with your actual Red Hat credentials."
