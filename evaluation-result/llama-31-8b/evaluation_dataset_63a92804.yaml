  description: plugins
  turns:
  - contexts:
    - 'to false and add the package name as follows: ```yaml plugins: disabled: false
      package: ./dynamic plugins/dist/backstage plugin catalog backend module github
      dynamic ``` For more information about how to configure dynamic plugins in Developer
      Hub, see Configuring dynamic plugins. 1. Restart the RHDH application and verify
      that the plugin is successfully activated and configured. 2. Verify the application
      logs for confirmation and ensure the plugin is functioning as expected. # Extensions
      in Red Hat Developer Hub [IMPORTANT] ---- These features are for Technology
      Preview only. Technology Preview features are not supported with Red Hat production
      service level agreements (SLAs), might not be functionally complete, and Red
      Hat does not recommend using them for production. These features provide early
      access to upcoming product features, enabling customers to test functionality
      and provide feedback during the development process. For more information on
      Red Hat Technology Preview features, see Technology Preview Features Scope.
      ---- Red Hat Developer Hub (RHDH) includes the Extensions feature which is preinstalled
      and enabled by default. Extensions provides users with a centralized interface
      to browse and manage available plugins You can use Extensions to discover plugins
      that extend RHDH functionality, streamline development workflows, and improve
      the developer experience. ## Viewing available plugins You can view available
      plugins for your Red Hat Developer Hub application on the Extensions page. 1.
      Open your RHDH application and click Administration > Extensions. 2. Go to the
      Catalog tab to view a list of available plugins and related information. ![Extensions
      Catalog] ## Viewing installed plugins Using the Dynamic Plugins Info front-end
      plugin, you can view plugins that are currently installed in your Red Hat Developer
      Hub application. This plugin is enabled by default. 1. Open your Developer Hub
      application and click Administration > Extensions. 2. Go to the Installed tab
      to view a list of installed plugins and related information. ## Searching for
      plugins by name You can use the search bar in the header to filter the Extensions
      plugin cards by name. For example, if you type “A” into the search bar, Extensions
      shows only the plugins that contain the letter “A” in the Name field. 1. In
      the header search bar, enter a plugin name, such as "Dynatrace". ![Extensions
      catalog with a Dynatrace search] 2. Optional: Refine your search by selecting
      one of the following filters: * Category * Author * Support type The Extensions
      list updates to display only the plugins that match your search text and selected
      filters. ## Disabling the Extensions interface The Extensions feature is enabled
      by default. To remove the Extensions interface (Marketplace) from your instance,
      you must disable the relevant plugins. 1. Edit your dynamic-plugins.yaml with
      the following content. ```yaml plugins: package: ./dynamic plugins/dist/red
      hat developer hub backstage plugin extensions disabled: true package: ./dynamic
      plugins/dist/red hat developer hub backstage plugin catalog backend module extensions
      dynamic disabled: true package: ./dynamic plugins/dist/red hat developer hub
      backstage plugin extensions backend dynamic disabled: true ``` [NOTE] ---- Disabling
      these plugins removes the Catalog and Installed tabs. You can still view a basic
      list of installed plugins by selecting Administration > Extensions. ---- ##'
