  turns:
  - contexts:
    - 'Setting up Scorecards to monitor your project health You can set up and configure
      Scorecards so you can track key metrics and quickly understand the health of
      your projects in Red Hat Developer Hub. ### Enabling Scorecards To monitor component
      health and quality in RHDH, you must enable the Scorecard plugin in your configuration.
      You have installed your RHDH instance. You have provisioned your custom dynamic
      plugins config map. Add the following configuration in your RHDH dynamic plugin
      config.yaml file: ```yaml plugins: package: oci://ghcr.io/redhat developer/rhdh
      plugin export overlays/red hat developer hub backstage plugin scorecard:bs_1.45.3__2.3.5!red
      hat developer hub backstage plugin scorecard disabled: false pluginConfig: dynamicPlugins:
      frontend: red hat developer hub.backstage plugin scorecard: entityTabs: path:
      ''/scorecard'' title: Scorecard mountPoint: entity.page.scorecard mountPoints:
      mountPoint: entity.page.scorecard/cards importName: EntityScorecardContent config:
      layout: gridColumn: 1 / 1 if: allOf: isKind: component package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/red hat developer hub backstage plugin
      scorecard backend:bs_1.45.3__2.3.5!red hat developer hub backstage plugin scorecard
      backend disabled: false ``` ### Configure RBAC for Scorecards To view Scorecard
      metrics in RHDH, you must grant read access using Role-Based Access Control
      (RBAC). Configure these permissions using the RBAC CSV file or the RBAC Web
      UI, depending on how you manage access in your environment. You have enabled
      RBAC and assigned a policy administrator role. You have added scorecard to the
      list of authorized plugins under your permission.rbac.pluginsWithPermission
      configuration. 1. Grant the required permissions by using one of the following
      methods: * To use the RBAC CSV file, add the following policy to your CSV file
      to allow users to view metrics: ```yaml g, user:default/<YOUR_USERNAME>, role:default/scorecard
      viewer p, role:default/scorecard viewer, scorecard.metric.read, read, allow
      p, role:default/scorecard viewer, catalog.entity.read, read, allow ``` See Permission
      policies reference. * To use the RBAC Web UI, complete the following steps:
      1. In the Red Hat Developer Hub navigation menu, go to Administration > RBAC.
      2. Select or create the Role for Scorecard access. 3. In the Add permission
      policies section, select Scorecard from the plugins list. 4. Expand the Scorecard
      entry, select policy with the following details, and click Next: * Name: scorecard.metric.read
      * Permission: read ![The RBAC UI showing the scorecard.metric.read permission
      selected for a role.] 2. Optional: Restrict access to specific metrics. You
      must use only one of the following methods to apply a conditional policy: *
      Web UI: 1. In your RHDH navigation menu, go to Administration > RBAC. 2. In
      the Add permission policies step, select the following: * Name: scorecard.metrics.read
      * Permission: Read 3. Click Use advanced customized permissions to allow access
      to specific parts of the selected resource type under Actions . 4. Select the
      HAS_METRIC_ID rule and specify the plugin IDs, using commas to separate multiple
      IDs. * External configuration file: 1. Define the conditional policy in the
      rbac-conditional-policies.yaml file as described in Defining conditional policies:
      ```yaml result: CONDITIONAL roleEntityRef: "role:default/scorecard viewer" pluginId:
      scorecard resourceType: scorecard metric permissionMapping: read conditions:
      rule: HAS_METRIC_ID resourceType: scorecard metric params: metricIds: [<your_metric_id>]
      ``` where: metricIds:: Enter the metric ID for user access, such as github.open_prs.
      This policy allows users to read only the specified metrics and restricts access
      to all other metrics. ##'
    expected_response: 'To configure Role-Based Access Control (RBAC) for Scorecards
      in Red Hat Developer Hub (RHDH), you must grant read access to view Scorecard
      metrics. This requires that you have already enabled RBAC, assigned a policy
      administrator role, and added scorecard to the list of authorized plugins. You
      can grant permissions using one of two methods. The first method is to use the
      RBAC CSV file by adding the following policies: `g, user:default/<YOUR_USERNAME>,
      role:default/scorecard viewer`, `p, role:default/scorecard viewer, scorecard.metric.read,
      read, allow`, and `p, role:default/scorecard viewer, catalog.entity.read, read,
      allow`. The second method is to use the RBAC Web UI by navigating to Administration
      > RBAC, selecting or creating a role, and adding a permission policy from the
      Scorecard plugin with the name `scorecard.metric.read` and permission `read`.
      Optionally, you can restrict access to specific metrics by applying a conditional
      policy using the `HAS_METRIC_ID` rule in the Web UI or by defining it in the
      `rbac-conditional-policies.yaml` file.'
    query: how to configure RBAC for Scorecards in RHDH
    response: "To configure RBAC for Scorecards in RHDH, you can follow these steps:\n\
      \n1.  Enable RBAC and assign a policy administrator role.\n2.  Add scorecard\
      \ to the list of authorized plugins under your permission.rbac.pluginsWithPermission\
      \ configuration.\n3.  Grant the required permissions by using the RBAC CSV file\
      \ or the RBAC Web UI. You can use the following policy to allow users to view\
      \ metrics:\n\n```\ng, user:default/<YOUR_USERNAME>, role:default/scorecard-viewer\n\
      p, role:default/scorecard-viewer, scorecard.metric.read, read, allow\np, role:default/scorecard-viewer,\
      \ catalog.entity.read, read, allow\n```\n\nOr you can use the RBAC Web UI to\
      \ select the Scorecard plugin and click Next to apply the policy.\n\n4.  Optional:\
      \ Restrict access to specific metrics by selecting the HAS\\_METRIC\\_ID rule\
      \ and specifying the plugin IDs, using commas to separate multiple IDs.\n\n\
      You can use one of the following methods to configure the conditional policy:\n\
      \n*   Web UI: Select the Scorecard plugin and click Use advanced customized\
      \ permissions to allow access to specific parts of the selected resource type\
      \ under Actions.\n*   External configuration file: Define the conditional policy\
      \ in the rbac-conditional-policies.yaml file as described in Defining conditional\
      \ policies.\n\nPlease note that you must have API access using curl or another\
      \ tool to delegate the RBAC access in Red Hat Developer Hub by using the RBAC\
      \ backend API. You can create a new role designated for team leads using the\
      \ RBAC backend API and allow team leads to read catalog entities and create\
      \ permissions in the RBAC plugin using the following API request:\n\n```\n$\
      \ curl -X POST 'http://localhost:7007/api/permission/policies' \\\n--header\
      \ \"Authorization: Bearer $ADMIN_TOKEN\" \\\n--header \"Content-Type: application/json\"\
      \ \\\n--data '[\n  {\n    \"entityReference\": \"role:default/team_lead\",\n\
      \    \"permission\": \"policy.entity.create\",\n    \"policy\": \"create\",\n\
      \    \"effect\": \"allow\"\n  },\n  {\n    \"entityReference\": \"role:default/team_lead\"\
      ,\n    \"permission\": \"catalog-entity\",\n    \"policy\": \"read\",\n    \"\
      effect\": \"allow\"\n  }\n]'\n```\n\nThese are the general steps to configure\
      \ RBAC for Scorecards in RHDH."
