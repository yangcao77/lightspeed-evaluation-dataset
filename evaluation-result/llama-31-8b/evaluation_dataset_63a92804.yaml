      \ { w: 10, h: 1, x: 1 }\n              sm: { w: 10, h: 1, x: 1 }\n         \
      \     xs: { w: 12, h: 1 }\n              xxs: { w: 12, h: 1 }\n        - mountPoint:\
      \ home.page/cards\n          importName: QuickAccessCard\n          config:\n\
      \            layouts:\n              xl: { w: 7, h: 8 }\n              lg: {\
      \ w: 7, h: 8 }\n              md: { w: 7, h: 8 }\n              sm: { w: 12,\
      \ h: 8 }\n              xs: { w: 12, h: 8 }\n              xxs: { w: 12, h:\
      \ 8 }\n        - mountPoint: home.page/cards\n          importName: CatalogStarredEntitiesCard\n\
      \          config:\n            layouts:\n              xl: { w: 5, h: 4, x:\
      \ 7 }\n              lg: { w: 5, h: 4,\n```\n    This code will display three\
      \ cards on the homepage: SearchBar, QuickAccessCard, and CatalogStarredEntitiesCard.\n\
      \n    You can customize the layout, width, and height of each card as per your\
      \ requirements.\n\n    Remember to update the `dynamicPlugins` section of your\
      \ `app-config.yaml` file to include the `red-hat-developer-hub.backstage-plugin-dynamic-home-page`\
      \ plugin and configure it to display the desired cards on the homepage.\n\n\
      \    By following these steps, you can create a customized onboarding experience\
