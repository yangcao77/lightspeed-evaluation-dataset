  description: catalog
  turns:
  - contexts:
    - 'Viewing the Adoption Insights card ### Viewing the active users The Active
      users card displays the total number of active users over a specified date and
      time period. You can export the user data in a .csv format. Returning users:
      Existing users who have logged into Developer Hub previously New users: New
      users who have registered and logged into Developer Hub for the first time ![active
      users] To view the list of active users in your Red Hat Developer Hub instance,
      go to Administration > Adoption Insights, see the Active users card. To view
      the exact number of users for a particular day, hover over the corresponding
      date in the Active users card. To export the user data in a .csv format, click
      the Export CSV link. ### Viewing the total number of users This card displays
      the total number of users that have license to use Red Hat Developer Hub. It
      also provides a comparison of the number of Logged-in users and Licensed users
      in numeric and percentage form. Logged in users: Total number of users, including
      licensed and unlicensed users, currently logged in to Developer Hub. Licensed
      users: Total number of licensed users logged in to Developer Hub. You can set
      the target for the number of licensed users in your Developer Hub app config.yaml
      file. To view the total number of users in your Developer Hub instance in numeric
      and percentage forms, go to Administration > Adoption Insights and see the Total
      number of users card. To view a percentage representation of the total number
      of logged in users among the total number of licensed users, hover over the
      tooltip in the Total number of users card. ### Viewing the top catalog entities
      This card lists the most viewed catalog entities (like components, APIs, and
      so on) and documentation entries, including usage statistics, in a table. Each
      item displays the following details: Name: Name of the catalog Kind: Type of
      the catalog Last used: The last time the catalog was used Views: The number
      of times the catalog was viewed To view the most commonly used catalog entities
      in your Developer Hub instance, go to Administration > Adoption Insights and
      see the Top catalog entities card. To know more about the displayed catalog
      entity, hover over the catalog entity name. ### Viewing the top 3 templates
      This card lists the three most commonly used templates in a table. You can click
      the down arrow next to 3 rows to view the full list of the commonly used templates.
      Name: Name of the template Mostly in use by: Type of user using this template
      most frequently Executions: Number of times this template was used To view the
      most commonly used templates in your Developer Hub instance, go to Administration
      > Adoption Insights and see the Top 3 templates card. To know more about the
      displayed template, hover over the template name. ### Viewing the top 3 TechDocs
      documents This card lists the most viewed documentation entries, including the
      total views, in a table. Name: Title of the document Entity: Type of document
      Last used: The last time the document was viewed Views: Number of times the
      document was visited To view the most commonly used templates in your Developer
      Hub instance, go to Administration > Adoption Insights and see the Top 3 techdocs
      card. To learn more about the documents, hover over each name. ### Viewing the
      top 3 plugins This card lists the three most commonly used plugins in a table.
      You can click the down arrow next to 3 rows to view the full list of the commonly
      used plugins. Name: Name of the plugin Trend: Popularity of the plugin as a
      graph Views: Number of times this plugin was seen To view the most commonly
      used plugins and the plugin page visit trends in your Developer Hub instance,
      go to Administration > Adoption Insights and see the Top 3 plugins card. To
      know more about the displayed plugin, hover over the plugin name. ##'
