  description: plugins
  turns:
  - contexts:
    - '# Streamline software development and management in Red Hat Developer Hub #
      Importing your team''s codebase from Git [IMPORTANT] ---- These features are
      for Technology Preview only. Technology Preview features are not supported with
      Red Hat production service level agreements (SLAs), might not be functionally
      complete, and Red Hat does not recommend using them for production. These features
      provide early access to upcoming product features, enabling customers to test
      functionality and provide feedback during the development process. For more
      information on Red Hat Technology Preview features, see Technology Preview Features
      Scope. ---- Red Hat Developer Hub can automate GitHub repositories onboarding
      and track their import status. ## Enabling and authorizing Bulk Import capabilities
      in Red Hat Developer Hub You can enable the Bulk Import feature for users and
      give them the necessary permissions to access it. This feature is available
      for GitHub repositories and GitLab projects. For GitHub only: You have enabled
      GitHub repository discovery. 1. The Bulk Import plugins are installed but disabled
      by default. To enable the ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic
      and ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import
      plugins, edit your dynamic-plugins.yaml with the following content: ```yaml
      plugins: package: ./dynamic plugins/dist/red hat developer hub backstage plugin
      bulk import backend dynamic disabled: false package: ./dynamic plugins/dist/red
      hat developer hub backstage plugin bulk import disabled: false ``` See Installing
      and viewing plugins in Red Hat Developer Hub. 2. Configure the required bulk.import
      RBAC permission for the users who are not administrators as shown in the following
      code: rbac-policy.csv fragment ```csv p, role:default/bulk import, bulk.import,
      use, allow g, user:default/<your_user>, role:default/bulk import ``` Note that
      only Developer Hub administrators or users with the bulk.import permission can
      use the Bulk Import feature. See Permission policies in Red Hat Developer Hub.
      The sidebar displays a Bulk Import option. The Bulk Import page shows a list
      of added GitHub repositories and GitLab projects. ## Importing multiple GitHub
      repositories In Red Hat Developer Hub, you can select your GitHub repositories
      and automate their onboarding to the Developer Hub catalog. You have enabled
      the Bulk Import feature and gave access to it. 1. Click Bulk Import in Developer
      Hub left sidebar. 2. If your RHDH instance has multiple source control tools
      configured, select GitHub from the Source control tool list. 3. Select the repositories
      to import, and validate. Developer Hub creates a pull request in each selected
      repository to add the required catalog-info.yaml file. 4. For each repository
      to import, click on the PR link to review and merge the changes in GitHub. 1.
      Click Bulk Import in Developer Hub left sidebar. 2. Verify that each imported
      GitHub repository in the Selected repositories list has the status Waiting for
      approval or Imported. 3. For each Waiting for approval repository, click the
      pull request link to review and merge the catalog-info.yaml file in the corresponding
      repository. ## Managing the added Git repositories You can oversee and manage
      the Git repositories that are imported to the Developer Hub. You have imported
      GitHub repositories. Click Bulk Import in the left sidebar to display all the
      current GitHub repositories and GitLab projects that are being tracked as Import
      jobs, along with their status. Added:: The Git repository is added to the Developer
      Hub catalog after the import pull request is merged or if the Git repository
      already contained a catalog info.yaml file during the bulk import. It can take
      a few minutes for the entities to be available in the catalog. Waiting for approval::
      There is an open pull request or merge request adding a catalog info.yaml file
      to the GitHub repository or GitLab project. You can: Click pencil icon on the
      right to see details about the pull request or merge request. You can use the
      detailed view to edit the request content right from Developer Hub. Delete the
      Import job, this action closes the import pull request or merge request as well.
      To transition the Import job to the Added state, merge the import pull request
      or merge request from the Git repository. Empty:: Developer Hub is unable to
      determine the import job status because the Git repository is imported from
      other sources but does not have a catalog info.yaml file and lacks any import
      pull or merge request adding it. [NOTE] ---- * After an import pull request
      or merge request is merged, the import status is marked as Added in the list
      of Added entities, but it might take a few seconds for the corresponding entities
      to appear in the Developer Hub Catalog. * A location added through other sources
      (for example, statically in an app-config.yaml file, dynamically when enabling
      GitHub discovery, or registered manually using the "Register an existing component"
      page) might show up in the Bulk Import list of Added Repositories if the following
      conditions are met: * The location URL points to a catalog-info.yaml file at
      the root of the Git repository default branch. * For GitHub only: The target
      repository is accessible from the configured GitHub integrations. ---- ##'
    expected_response: 'To enable the Bulk Import feature, you must enable the `./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic`
