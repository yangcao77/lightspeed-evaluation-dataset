- conversation_group_id: plugins-146
  description: plugins
  turns:
  - contexts:
    - 'plugins, existing backend plugins must be compatible with the new Backstage
      backend system. Additionally, these plugins must be rebuilt using a dedicated
      CLI command. The new Backstage backend system entry point (created using createBackendPlugin()
      or createBackendModule()) must be exported as the default export from either
      the main package or an alpha package (if the plugin instance support is still
      provided using alpha APIs). This doesn''t add any additional requirement on
      top of the standard plugin development guidelines of the plugin instance. The
      dynamic export mechanism identifies private dependencies and sets the bundleDependencies
      field in the package.json file. This export mechanism ensures that the dynamic
      plugin package is published as a self-contained package, with its private dependencies
      bundled in a private node_modules folder. Certain plugin dependencies require
      specific handling in the derived packages, such as: * Shared dependencies are
      provided by the RHDH application and listed as peerDependencies in package.json
      file, not bundled in the dynamic plugin package. For example, by default, all
      @backstage scoped packages are shared. You can use the --shared-package flag
      to specify shared dependencies, that are expected to be provided by Red Hat
      Developer Hub application and not bundled in the dynamic plugin package. To
      treat a @backstage package as private, use the negation prefix (!). For example,
      when a plugin depends on the package in @backstage that is not provided by the
      Red Hat Developer Hub application. * Embedded dependencies are bundled into
      the dynamic plugin package with their dependencies hoisted to the top level.
      By default, packages with -node or -common suffixes are embedded. You can use
      the --embed-package flag to specify additional embedded packages. For example,
      packages from the same workspace that do not follow the default naming convention.
      The following is an example of exporting a dynamic plugin with shared and embedded
      packages: Example dynamic plugin export with shared and embedded packages ```terminal
      $ npx @red hat developer hub/cli@latest plugin export - shared package ''!/@backstage/plugin
      notifications/'' - embed package @backstage/plugin notifications backend ```
      In the previous example: * @backstage/plugin-notifications package is treated
      as a private dependency and is bundled in the dynamic plugin package, despite
      being in the @backstage scope. * @backstage/plugin-notifications-backend package
      is marked as an embedded dependency and is bundled in the dynamic plugin package.
      Front-end plugins:: Front-end plugins can use scalprum for configuration, which
      the CLI can generate automatically during the export process. The generated
      default configuration is logged when running the following command: Example
      command to log the default configuration ```terminal $ npx @red hat developer
      hub/cli@latest plugin export ``` The following is an example of default scalprum
      configuration: Default scalprum configuration ```json "scalprum": { "name":
      "<package_name>", // The Webpack container name matches the NPM package name,
      with "@" replaced by "." and "/" removed. "exposedModules": { "PluginRoot":
      "./src/index.ts" // The default module name is "PluginRoot" and doesn''t need
      explicit specification in the app-config.yaml file. } } ``` You can add a scalprum
      section to the package.json file. For example: Example scalprum customization
      ```json "scalprum": { "name": "custom-package-name", "exposedModules": { "FooModuleName":
      "./src/foo.ts", "BarModuleName": "./src/bar.ts" // Define multiple modules here,
      with each exposed as a separate entry point in the Webpack container. } } ```
      Dynamic plugins might need adjustments for Developer Hub needs, such as static
      JSX for mountpoints or dynamic routes. These changes are optional but might
      be incompatible with static plugins. To include static JSX, define an additional
      export and use it as the dynamic plugin''s importName. For example: Example
      static and dynamic plugin export ```tsx // For a static plugin $ export const
      EntityTechdocsContent = () => {...} // For a dynamic plugin $ export const DynamicEntityTechdocsContent
      = { element: EntityTechdocsContent, staticJSXContent: ( <TechDocsAddons> <ReportIssue
      /> </TechDocsAddons> ), }; ``` Use the plugin export command from the @red hat
      developer hub/cli package to export the plugin: ```terminal $ npx @red hat developer
      hub/cli@latest plugin export ``` Ensure that you execute the previous command
      in the root directory of the plugin''s JavaScript package (containing package.json
      file). The resulting derived package will be located in the dist-dynamic subfolder.
      The exported package name consists of the original plugin name with -dynamic
      appended. [WARNING] ---- The derived dynamic plugin JavaScript packages must
      not be published to the public NPM registry. For more appropriate packaging
      options, see . If you must publish to the NPM registry, use a private registry.
      ---- ##'
    expected_response: The derived dynamic plugin JavaScript packages must not be
      published to the public NPM registry. If you must publish to the NPM registry,
      you should use a private registry.
    query: what about publish to NPM registry?
    response: "Based on the search results, here is a step-by-step guide to publish\
      \ a dynamic plugin package to a private NPM registry:\n\n1.  Navigate to the\
      \ `dist-dynamic` directory.\n2.  Run the following command to publish the package\
      \ to your private NPM registry:\n\n    ```\n$ npm publish --registry <npm_registry_url>\n\
      ```\n\n    Replace `<npm_registry_url>` with the URL of your private NPM registry.\n\
      \n3.  Before running the previous command, edit your `package.json` file and\
      \ add a `publishConfig` section with the registry URL:\n\n    ```\n{\n  \"publishConfig\"\
      : {\n    \"registry\": \"<npm_registry_url>\"\n  }\n}\n```\n\n    This ensures\
      \ that the correct registry URL is used when publishing the package.\n\n4. \
      \ If you need to use a shared or embedded dependency, you can specify it using\
      \ the `--shared-package` or `--embed-package` flags when exporting the dynamic\
      \ plugin.\n\n5.  To include static JSX, define an additional export in your\
      \ TypeScript file and use it as the dynamic plugin's importName.\n\n6.  Make\
      \ sure to execute the `plugin export` command from the `@red-hat-developer-hub/cli`\
      \ package in the root directory of the plugin's JavaScript package.\n\nBy following\
      \ these steps, you can successfully publish your dynamic plugin package to a\
      \ private NPM registry."
