      developer/rhdh plugin export overlays/red hat developer hub backstage plugin
      scorecard backend:bs_1.45.3__2.3.5!red hat developer hub backstage plugin scorecard
      backend disabled: false ``` ### Configure RBAC for Scorecards To view Scorecard
      metrics in RHDH, you must grant read access using Role-Based Access Control
      (RBAC). Configure these permissions using the RBAC CSV file or the RBAC Web
      UI, depending on how you manage access in your environment. You have enabled
      RBAC and assigned a policy administrator role. You have added scorecard to the
      list of authorized plugins under your permission.rbac.pluginsWithPermission
      configuration. 1. Grant the required permissions by using one of the following
      methods: * To use the RBAC CSV file, add the following policy to your CSV file
      to allow users to view metrics: ```yaml g, user:default/<YOUR_USERNAME>, role:default/scorecard
      viewer p, role:default/scorecard viewer, scorecard.metric.read, read, allow
      p, role:default/scorecard viewer, catalog.entity.read, read, allow ``` See Permission
      policies reference. * To use the RBAC Web UI, complete the following steps:
      1. In the Red Hat Developer Hub navigation menu, go to Administration > RBAC.
      2. Select or create the Role for Scorecard access. 3. In the Add permission
      policies section, select Scorecard from the plugins list. 4. Expand the Scorecard
      entry, select policy with the following details, and click Next: * Name: scorecard.metric.read
      * Permission: read ![The RBAC UI showing the scorecard.metric.read permission
      selected for a role.] 2. Optional: Restrict access to specific metrics. You
      must use only one of the following methods to apply a conditional policy: *
