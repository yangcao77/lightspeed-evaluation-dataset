      * Total number of users: Displays the total number of users that have license
      to use Red Hat Developer Hub.

      * Top catalog entities: Lists the most viewed catalog entities (like components,
      APIs, and so on) and documentation entries, including usage statistics, in a
      table.

      * Top 3 templates: Lists the three most commonly used templates in a table.

      * Top 3 techdocs: Lists the most viewed documentation entries, including the
      total views, in a table.

      * Top 3 plugins: Lists the three most commonly used plugins in a table.


      You can modify the number of displayed records in Adoption Insights for the
      above cards by selecting any of the following number of records for display:


      * Top 3

      * Top 5

      * Top 10

      * Top 20


      By default, the top three most viewed catalog entities are displayed.


      To view aggregated metrics for your owned entities, navigate to your RHDH home
      page, locate the Scorecard dashboard, and view the aggregated metrics for your
      owned entities. You must have established owner group relationships in the Software
      Catalog and have administrative access to the RHDH configuration.


