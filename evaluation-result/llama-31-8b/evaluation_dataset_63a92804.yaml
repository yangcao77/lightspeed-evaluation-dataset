    response: "To configure the logo in Red Hat Developer Hub, you can customize the\
      \ branding logo by configuring the branding section in the `app-config.yaml`\
      \ file. \n\nFirst, collect all your secrets in the `secrets.txt` file, with\
      \ one secret per line in KEY=value form. \n\nThen, author your custom `app-config.yaml`\
      \ file. This is the main Developer Hub configuration file. You need a custom\
      \ `app-config.yaml` file to avoid the Developer Hub installer to revert user\
      \ edits during upgrades. When your custom `app-config.yaml` file is empty, Developer\
      \ Hub is using default values.\n\nFor a production environment, start with the\
      \ following setup:\n\n```yaml\napp:\n  title: <Red Hat Developer Hub>\n  branding:\n\
      \    fullLogo: ${BASE64_EMBEDDED_FULL_LOGO}\n    fullLogoWidth: 110px\n    iconLogo:\
      \ ${BASE64_EMBEDDED_ICON_LOGO}\nbackend:\n  cache:\n    store: redis\n    connection:\
      \ ${REDIS_CONNECTION}\ntechdocs:\n  cache:\n    ttl: 3600000\ncatalog:\n  providers:\n\
      \    <enter_your_provider_configuration>\nintegrations:\n  <enter_your_integrations_configuration>\n\
      permission:\n  enabled: true\n  rbac:\n    admin:\n      users:\n        - name:\
      \ user:default/<your_policy_administrator_name>\n    pluginsWithPermission:\n\
      \      - catalog\n      - scaffolder\n      - permission\n```\n\nMost fields\
      \ use environment variables that you defined in secrets in the previous step.\n\
      \nWith regards to configuring the branding logo, you can update the configuration\
      \ with a mount point for CompanyLogo. \n\n```yaml\n# ...rest of the global header\
      \ configuration\nred-hat-developer-hub.backstage-plugin-global-header:\n  mountPoints:\n\
      \    - mountPoint: application/header\n      importName: GlobalHeader\n    \
      \  config:\n        # Supported values: above-main-content | above-sidebar\n\
      \        position: above-main-content\n\n    - mountPoint: global.header/component\n\
      \      importName: CompanyLogo\n      config:\n        priority: 200\n     \
      \   props:\n          # Path to navigate when users click the logo:\n      \
      \    to: '/catalog'\n          width: 300\n          height: 200\n         \
      \ logo: <string> or <object> # Logo can be a base64 string or theme-specific\
      \ object\n            # Example 1: Single logo for all themes\n            #\
      \ logo: \"<base64_encoded_images>\"\n\n            # Example 2: Theme-specific\
      \ logos\n            # logo:\n                dark: 'data:image/png;base64,...'\
      \ # Used in dark theme\n                light: 'data:image/png;base64,...' #\
      \ Used in light theme\n```\n\nYou can also modify the `app-config.yaml` file\
      \ to customize or disable particular parameters.\n\nPlease note that most fields\
      \ use environment variables that you defined in secrets in the previous step."
