    response: "The required YAML format for defining conditional policies in Red Hat\
      \ Developer Hub is:\n\n```yaml\nresult: CONDITIONAL\nroleEntityRef: <role_entity_reference>\n\
      pluginId: <plugin_id>\nresourceType: catalog-entity\npermissionMapping:\n  -\
      \ read\n  - update\n  - delete\nconditions:\n  not:\n    rule: HAS_SPEC\n  \
      \  resourceType: catalog-entity\n    params:\n      key: type\n      value:\
      \ kubernetes-cluster\n```\n\nThis YAML format defines a conditional policy with\
      \ a `result` of `CONDITIONAL`, a `roleEntityRef` referencing a specific role,\
      \ a `pluginId` identifying the plugin, and a `resourceType` of `catalog-entity`.\
      \ The policy grants the `read`, `update`, and `delete` permissions to the allowed\
      \ resources. The `conditions` section specifies a `not` clause with a `rule`\
      \ of `HAS_SPEC`, a `resourceType` of `catalog-entity`, and `params` specifying\
      \ the `key` and `value`."
