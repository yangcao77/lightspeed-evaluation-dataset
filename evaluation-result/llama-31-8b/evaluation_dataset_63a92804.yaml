- conversation_group_id: plugins-320
  description: plugins
  turns:
  - contexts:
    - 'Bulk importing in Red Hat Developer Hub [IMPORTANT] ---- These features are
      for Technology Preview only. Technology Preview features are not supported with
      Red Hat production service level agreements (SLAs), might not be functionally
      complete, and Red Hat does not recommend using them for production. These features
      provide early access to upcoming product features, enabling customers to test
      functionality and provide feedback during the development process. For more
      information on Red Hat Technology Preview features, see Technology Preview Features
      Scope. ---- Red Hat Developer Hub can automate the onboarding of GitHub repositories
      and GitLab projects, and track their import status. ## Enabling and authorizing
      Bulk Import capabilities in Red Hat Developer Hub You can enable the Bulk Import
      feature for users and give them the necessary permissions to access it. This
      feature is available for GitHub repositories and GitLab projects. For GitHub
      only: You have enabled GitHub repository discovery. 1. The Bulk Import plugins
      are installed but disabled by default. To enable the ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic
      and ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import
      plugins, edit your dynamic-plugins.yaml with the following content: ```yaml
      plugins: package: ./dynamic plugins/dist/red hat developer hub backstage plugin
      bulk import backend dynamic disabled: false package: ./dynamic plugins/dist/red
      hat developer hub backstage plugin bulk import disabled: false ``` See Installing
      and viewing plugins in Red Hat Developer Hub. 2. Configure the required bulk.import
      RBAC permission for the users who are not administrators as shown in the following
      code: rbac-policy.csv fragment ```csv p, role:default/bulk import, bulk.import,
      use, allow g, user:default/<your_user>, role:default/bulk import ``` Note that
      only Developer Hub administrators or users with the bulk.import permission can
      use the Bulk Import feature. See Permission policies in Red Hat Developer Hub.
      The sidebar displays a Bulk Import option. The Bulk Import page shows a list
      of added GitHub repositories and GitLab projects. ## Importing multiple GitHub
      repositories In Red Hat Developer Hub, you can select your GitHub repositories
      and automate their onboarding to the Developer Hub catalog. You have enabled
      the Bulk Import feature and gave access to it. 1. Click Bulk Import in Developer
      Hub left sidebar. 2. If your RHDH instance has multiple source control tools
      configured, select GitHub from the Source control tool list. 3. Select the repositories
      to import, and validate. Developer Hub creates a pull request in each selected
      repository to add the required catalog-info.yaml file. 4. For each repository
      to import, click on the PR link to review and merge the changes in GitHub. 1.
      Click Bulk Import in Developer Hub left sidebar. 2. Verify that each imported
      GitHub repository in the Selected repositories list has the status Waiting for
      approval or Imported. 3. For each Waiting for approval repository, click the
      pull request link to review and merge the catalog-info.yaml file in the corresponding
      repository. ##'
    expected_response: To enable the Bulk Import feature in Red Hat Developer Hub,
      you must first edit your dynamic-plugins.yaml file to enable the Bulk Import
      plugins, which are installed but disabled by default. After the plugins are
      enabled, you need to configure the required bulk.import RBAC permission for
      users who are not administrators. Only Developer Hub administrators or users
      with the bulk.import permission are able to use the Bulk Import feature.
    query: According to the documentation for Red Hat Developer Hub, what are the
      necessary steps to enable the Bulk Import feature for users?
    response: "Here are the steps to enable the Bulk Import feature for users in Red\
      \ Hat Developer Hub according to the documentation:\n\n1. Install and enable\
      \ the Bulk Import plugins in your `dynamic-plugins.yaml` file:\n```yaml\nplugins:\n\
      \  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic\n\
      \    disabled: false\n  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import\n\
      \    disabled: false\n```\n2. Configure the required `bulk.import` RBAC permission\
      \ for users who are not administrators:\n```csv\np, role:default/bulk-import,\
      \ bulk.import, use, allow\ng, user:default/<your_user>, role:default/bulk-import\n\
      ```\n3. Verify that each imported GitHub repository in the Selected repositories\
      \ list has the status Waiting for approval or Imported.\n4. For each Waiting\
      \ for approval repository, click the pull request link to review and merge the\
      \ catalog-info.yaml file in the corresponding repository.\n\nNote that only\
      \ Developer Hub administrators or users with the `bulk.import` permission can\
      \ use the Bulk Import feature. See Permission policies in Red Hat Developer\
      \ Hub."
