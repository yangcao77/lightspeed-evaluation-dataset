      \     \"rule\": \"IS_ENTITY_OWNER\",\n        \"resourceType\": \"catalog entity\"\
      ,\n        \"params\": {\n          \"claims\": [\"$currentUser\"]\n       \
      \ }\n      }\n    }\n    ```\n\n*   **$ownerRefs**: This alias is replaced with\
      \ an array of ownership references, which usually includes the user entity reference\
      \ and the user's parent group entity reference. For example, for a user named\
      \ Tom who is part of `team a`, `$ownerRefs` becomes `['user:default/tom', 'group:default/team\
      \ a']`. An example of a conditional policy object using this alias is:\n   \
      \ ```json\n    {\n      \"result\": \"CONDITIONAL\",\n      \"roleEntityRef\"\
      : \"role:default/developer\",\n      \"pluginId\": \"catalog\",\n      \"resourceType\"\
      : \"catalog entity\",\n      \"permissionMapping\": [\"delete\"],\n      \"\
