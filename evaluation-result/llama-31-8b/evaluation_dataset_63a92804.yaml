  - contexts:
    - 'button parameters Use the parameters as shown in the following table to configure
      your floating action button plugin. [NOTE] ---- If multiple floating button
      actions are assigned to the same slot value, the floating buttons are displayed
      as submenu options within the main floating action button. ---- # Customizing
      the Quickstart plugin ## About Quickstarts The Quickstart plugin provides guided
      onboarding for users of Red Hat Developer Hub. It displays a customizable drawer
      interface with interactive quickstart steps that help users get familiar with
      the platform. [NOTE] ---- If RBAC is not enabled, Quickstart is only accessible
      to users with administrator permissions. ---- The Quickstart plugin is enabled
      by default and includes the following components: Set up authentication:: Set
      up secure login credentials to protect your account from unauthorized access.
      Configure RBAC:: Assign roles and permissions to control who can view, create,
      or edit resources, ensuring secure and efficient collaboration. Configure Git::
      Connect your Git providers, such as GitHub to manage code, automate workflows,
      and integrate with platform features. Manage plugins:: Browse and install extensions
      to add features, connect with external tools, and customize your experience.
      ## Manage user access to Quickstarts by using Role-Based Access Control (RBAC)
      You can manage user access to Quickstarts by using RBAC to define user roles
      that use the following logic in your RBAC configuration: If RBAC is enabled
      (permission.enabled: true), the system determines user roles based on permissions,
      as follows: Users with policy.entity.create permission are assigned the admin
      role. Users without this permission are assigned the developer role. [NOTE]
      ---- If RBAC is disabled (permission.enabled: false) or not configured, users
      are assumed to be platform engineers setting up Red Hat Developer Hub (RHDH)
      and are assigned the admin role. ---- The following two roles are supported
      for defining access to Quickstarts: admin:: Platform engineers, administrators,
      and users with elevated permissions developer:: Regular developers and users
      with standard permissions The following behavior applies when you use RBAC to
      assign roles for your Quickstarts: Quickstart items without a roles property
      default to the admin role. Items can specify multiple roles, for example, admin
      and developer. Users see Quickstart items that match their assigned role. ```yaml
      permission: enabled: true app: quickstart: - title: ''Platform Configuration''
      titleKey: steps.platformConfiguration.title roles: [''admin''] # Only admins
      see this - title: ''Getting Started as Developer'' titleKey: steps.gettingStarted.title
      roles: [''developer''] # Only developers see this - title: ''Universal Welcome
      Guide'' titleKey: steps.universalWelcome.title roles: [''admin'', ''developer'']
      # Both user roles see this ``` ## Customizing your Red Hat Developer Hub Quickstart
      As an administrator, you can configure the Red Hat Developer Hub Quickstart
      plugin to create customized onboarding for your Developer Hub users. You must
      have administrator permissions. 1. Update your app-config.yaml with the following
      code: ```yaml app: quickstart: - title: ''Welcome to Developer Hub'' description:
      ''Learn the basics of navigating the Developer Hub interface'' icon: ''home''
      roles: [''admin'', ''developer''] # Show to both roles cta: text: ''Get Started''
      link: ''/catalog'' - title: ''Create Your First Component'' description: ''Follow
      our guide to register your first software component'' icon: ''code'' roles:
      [''admin'', ''developer''] # Show to both roles cta: text: ''Create Component''
      link: ''/catalog-import'' - title: ''Explore Templates'' description: ''Discover
      available software templates to bootstrap new projects'' icon: ''template''
      roles: [''admin'', ''developer''] # Show to both roles cta: text: ''Browse Templates''
      link: ''/create'' ``` where: title:: Enter the display title for the quickstart
      step. description:: Enter the brief description of what the step covers. icon::
      (Optional) Enter the icon identifier. You can use a full image URL, a valid
      SVG path, or one of the following common keys: * home * group * category * extension
      * school * add * list * layers * star * favorite * bookmarks * queryStats *
      chart * business * storefront * folder * cloud * monitor * feedback * validate
      * security * help * support * quickstart * notifications * manageAccounts *
      logout * developerHub * account * admin * roles: Optional: Enter an array of
      user roles that must see this quickstart item. Supported values: [''admin'',
      ''developer'']. If not specified, defaults to [''admin'']. * cta * text: Optional:
      Enter the CTA button text. * link: Optional: Enter the CTA target URL or route.
      ### Disabling the Quickstart plugin The Quickstart plugin is pre-loaded in Developer
      Hub with basic configuration properties, and enabled by default. To disable
      the Quickstart plugin, set the disabled property to true as shown in the following
      code: ```yaml global: dynamic: includes: dynamic plugins.default.yaml plugins:
      package: ./dynamic plugins/dist/red hat developer hub backstage plugin quickstart
      disabled: true ``` ## Using Quickstart onboarding steps You can use the Quickstart
      onboarding steps to learn more about the administrator features of RHDH. (Optional)
      If RBAC is enabled, you must have administrator permissions to access to the
      Quickstart feature. To start a Quickstart step in Red Hat Developer Hub, complete
      the following steps: 1. In your RHDH navigation menu, click the Help (?) icon.
      2. In the dropdown menu, click Quick start. 3. Select the Quickstart step that
      you would like to begin. 4. To close the Quickstart drawer, click Hide. ![About
      Quickstarts] [NOTE] ---- Your overall progress is tracked and displayed as a
      progress bar and a progress percentage in the Quickstart footer. ---- ## Enabling
      Quickstart localization in RHDH You can enable translation key support for Quickstart
      titles, descriptions, and CTAs, so that users can onboard in their preferred
      language. In Developer Hub, all existing and newly created Quickstart steps
      support localization using dedicated translation keys (titleKey, descriptionKey,
      cta.textKey). [NOTE] ---- If a translation key is present but the corresponding
      localized string is missing, the system defaults to the original text defined
      in the Quickstart configuration (title, description, text). If no translation
      key is defined at all, the original text is displayed. ---- You have enabled
      localization in your RHDH application. 1. For all Quickstart steps (both existing
      and new) in your configuration file, you must define both the original text
      and the new localization keys. For example, in the quickstart section of your'
    expected_response: The Quickstart plugin includes a component called 'Configure
