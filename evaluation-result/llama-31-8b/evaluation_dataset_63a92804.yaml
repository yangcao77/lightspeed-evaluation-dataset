      \ deployment configuration for a Helm-installed RHDH instance are:\n\n1. Create\
      \ a ConfigMap from the CA bundle in the namespace where you are deploying your\
      \ RHDH instance:\n\n```terminal\noc create configmap registry-ca-bundle --from-file=ca-bundle.crt\n\
      ```\n\n2. Mount the CA bundle ConfigMap into your RHDH configuration:\n\nFor\
