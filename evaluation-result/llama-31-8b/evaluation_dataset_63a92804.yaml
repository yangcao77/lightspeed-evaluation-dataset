      \ registry that you want to push the images to, for example, registry.example.com.\n\
      * `<rhdh_repo_name>` is the name of the repository where your Red Hat Developer\
      \ Hub image is stored, for example, rhdh/rhdh-hub-rhel9. This value must match\
      \ the name of the Red Hat Developer Hub image that you loaded onto the air-gapped\
      \ host.\n* `<postgresql_repo_name>` is the name of the repository where your\
      \ PostgreSQL image is stored, for example, rhdh/postgresql-15.\n* `${RHDH_DIGEST}`\
      \ is the digest of the Red Hat Developer Hub image.\n* `${PG_DIGEST}` is the\
      \ digest of the PostgreSQL image.\n\nOnce you have copied the images to the\
      \ target mirror registry, you can create a values.yaml file for the Kubernetes\
      \ platform that you want to use and add the following image references to the\
      \ file to reflect local use:\n\n```yaml\nupstream:\n  backstage:\n    image:\n\
