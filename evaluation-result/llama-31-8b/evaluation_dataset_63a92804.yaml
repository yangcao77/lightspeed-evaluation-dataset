  description: configuration
  turns:
  - contexts:
    - 'Mirroring Red Hat Developer Hub dynamic plugins in disconnected environments
      Red Hat Developer Hub (RHDH) uses dynamic plugins that are distributed as Open
      Container Initiative (OCI) artifacts. In disconnected or restricted environments,
      these plugin artifacts must be mirrored to a registry accessible by your cluster.
      To mirror dynamic plugin OCI artifacts for deployments in restricted environments,
      use the mirror-plugins.sh script. You have installed Skopeo 1.20 or later. Use
      Skopeo for multi arch image operations and manifest conversion. You have installed
      tar 1.35 or later. Use GNU tar for extracting image layers. You have installed
      jq 1.7 or later. Use jq for JSON parsing and manipulation. See Download jq.
      You have installed Podman 5.6 or later. Use Podman for building catalog index
      images. For more information, see Podman Installation Instructions. You have
      authenticated to the source registry, for example, quay.io or registry.redhat.io
      for pulling plugin artifacts. See Red Hat Container Registry Authentication.
      If mirroring directly to a registry using --to registry, you have authenticated
      to the target registry. [NOTE] ---- After mirroring completes, the script generates
      a rhdh-plugin-mirroring-summary.txt file containing mappings of all mirrored
      plugins. Use this file to reference the correct mirrored plugin URLs when configuring
      your RHDH deployment. For Operator deployments, you must configure the Backstage
      Custom Resource with the mirrored plugin references. For Helm deployments, you
      must update your values file with the mirrored plugin references. ---- ### Mirror
      plugins from a catalog index to a partially disconnected environment 1. Download
      the mirroring script: ```terminal $ curl sSLO https://raw.githubusercontent.com/redhat
      developer/rhdh operator/refs/heads/release 1.9/.rhdh/scripts/mirror plugins.sh
      ``` 2. Run the mirroring script by using the bash command with the appropriate
      set of options: Example ```terminal bash mirror plugins.sh \ plugin index oci://quay.io/rhdh/plugin
      catalog index:1.9 \ to registry <my.registry.example.com> ``` where: --to-registry
      <my.registry.example.com>:: Enter the URL for the target mirror registry where
      you want to mirror the catalog index. ### Mirror plugins from a catalog index
      to a fully disconnected environment This two-phase process exports plugins to
      disk from a connected host, transfers them to a restricted network, then imports
      them to your internal registry. 1. Download the mirroring script: ```terminal
      $ curl sSLO https://raw.githubusercontent.com/redhat developer/rhdh operator/refs/heads/release
      1.9/.rhdh/scripts/mirror plugins.sh ``` 2. Export all plugins to a local directory:
      Example ```terminal bash mirror plugins.sh \ plugin index oci://registry.access.redhat.com/rhdh/plugin
      catalog index:1.9 \ to dir </tmp/rhdh plugins> ``` where: --to-dir </tmp/rhdh-plugins>::
      Enter the local directory path. 3. Import and push the plugins from the local
      directory to your internal registry: Example ```terminal bash mirror plugins.sh
      \ from dir /tmp/rhdh plugins \ to registry <my.registry.example.com> ``` where:
      --from-dir </tmp/rhdh-plugins>:: Enter the local directory path. --to-registry
      <my.registry.example.com>:: Enter the URL for the target mirror registry where
      you want to mirror the catalog index. ### Mirror specific plugins by direct
      reference 1. Download the mirroring script: ```terminal $ curl sSLO https://raw.githubusercontent.com/redhat
      developer/rhdh operator/refs/heads/release 1.9/.rhdh/scripts/mirror plugins.sh
      ``` 2. To mirror individual plugins by specifying their OCI URLs directly, run
      the mirroring script by using the bash command with the appropriate set of options:
      Example ```terminal bash mirror plugins.sh \ plugins ''oci://quay.io/rhdh plugin
      catalog/backstage community plugin quay:1.8.0- 1.22.1!backstage community plugin
      quay'' \ ''oci://quay.io/rhdh plugin catalog/backstage community plugin github
      actions:1.8.0- 0.11.1!backstage community plugin github actions'' \ to registry
      <my.registry.example.com> ``` where: --to-registry <my.registry.example.com>::
      Enter the URL for the target mirror registry where you want to mirror the catalog
      index. [NOTE] ---- Plugin URLs that contain an OCI subpath (!) must be quoted
      to prevent shell interpretation. ---- ### Mirror plugins from a file 1. Create
      a text file listing the plugins to mirror (one per line), as follows: Example
      plugins.txt ```text # RHDH Community Plugins oci://quay.io/rhdh plugin catalog/backstage
      community plugin quay:1.8.0- 1.22.1!backstage community plugin quay oci://quay.io/rhdh
      plugin catalog/backstage community plugin github actions:1.8.0- 0.11.1!backstage
      community plugin github actions oci://quay.io/rhdh plugin catalog/backstage
      community plugin azure devops:1.8.0- 0.8.2!backstage community plugin azure
      devops ``` 2. Download the mirroring script: ```terminal $ curl sSLO https://raw.githubusercontent.com/redhat
      developer/rhdh operator/refs/heads/release 1.9/.rhdh/scripts/mirror plugins.sh
      ``` 3. Run the mirroring script by using the bash command with the appropriate
      set of options: Example ```terminal bash mirror plugins.sh \ plugin list plugins.txt
      \ to registry <my.registry.example.com> ``` where: --plugin-list plugins.txt::
      A text file listing the plugins to mirror. --to-registry <my.registry.example.com>::
      Enter the URL for the target mirror registry where you want to mirror the catalog
      index. ### Combine multiple plugin sources You can combine any of the plugin
      sources (for example, catalog index, plugin list file, and direct URLs) in a
      single mirroring operation. The script automatically deduplicates plugins if
      the same plugin appears in multiple sources. 1. Download the mirroring script:
      ```terminal $ curl sSLO https://raw.githubusercontent.com/redhat developer/rhdh
      operator/refs/heads/release 1.9/.rhdh/scripts/mirror plugins.sh ``` 2. To combine
      multiple plugin sources, run the mirroring script by using the bash command
      with the appropriate set of options: Example ```terminal bash mirror plugins.sh
      \ plugin index oci://registry.access.redhat.com/rhdh/plugin catalog index:1.9
      \ plugin list custom plugins.txt \ plugins ''oci://registry.internal.example.com/custom/my
      plugin:1.0'' \ to registry registry.example.com ``` where: --plugin-list custom-plugins.txt::
      A text file listing the plugins to mirror. --to-registry <my.registry.example.com>::
      Enter the URL for the target mirror registry where you want to mirror the catalog
      index. # Install plugins from OCI registries by using custom certificates In
      RHDH, you can install OCI plugins stored in an internal OCI artifact registry
      served over HTTPS with customer CA certificates, for example: ```terminal includes:
      dynamic plugins.default.yaml plugins: disabled: false package: oci://reg.example.com:5000/myplugin:v0.0.1!backstage
      plugin myplugin ``` You have a corporate CA bundle or a set of custom container
      registry TLS certificates that the system should trust. [NOTE] ---- You can
      create a CA bundle from a set of CA certificates manually, by concatenating
      them into a single file, as follows: ```terminal # Concatenate CA certificates
