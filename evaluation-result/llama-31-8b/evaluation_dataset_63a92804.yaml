      Catalog in your RHDH instance. Red Hat Developer Hub automatically registers
      all components that developers or platform engineers create using Templates
      in the Software Catalog. You have installed and configured the Red Hat Developer
      Hub instance. You have the required permissions. See Authorization in Red Hat
      Developer Hub. 1. In your Red Hat Developer Hub navigation menu, click Catalog.
      2. On the Catalog page, click Self-service. ### Registering components manually
      in your RHDH instance To manually register components in your RHDH instance,
      create a catalog-info.yaml file and register it with your Red Hat Developer
      Hub instance. The catalog-info.yaml file contains the metadata you wish to register
      for your software component. You have installed and configured the Red Hat Developer
      Hub instance. You have the required permissions. See Authorization in Red Hat
      Developer Hub. 1. In the root directory of your software project, create a file
      named catalog-info.yaml. ```yaml apiVersion: backstage.io/v1alpha1 kind: Component
      metadata: name: _<your_software_component>_ description: _<software_component_brief_description>_
      tags: example service annotations: github.com/project slug: _<repo_link_of_your_component_to_register>_
      spec: type: _<your_service>_ owner: _<your_team_name>_ lifecycle: _<your_lifecycle>_
