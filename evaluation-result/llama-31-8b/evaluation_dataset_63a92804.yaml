      configuration To use the Developer Hub Operator to run Red Hat Developer Hub
      with your custom configuration, create your Backstage custom resource (CR) that:
      Mounts files provisioned in your custom config maps. Injects environment variables
      provisioned in your custom secrets. By using the Kubernetes CLI (''kubectl''),
      you have access, with developer permissions, to the AKS cluster aimed at containing
      your Developer Hub instance. Your administrator has installed the Red Hat Developer
      Hub Operator in the cluster. You have provisioned your custom config maps and
      secrets in your <my rhdh project> project. You have a working default storage
      class, such as the EBS storage add on, configured in your EKS cluster. 1. Author
      your Backstage CR in a my-rhdh-custom-resource.yaml file to use your custom
      config maps and secrets. Minimal my rhdh custom resource.yaml custom resource
      example: ```yaml apiVersion: rhdh.redhat.com/v1alpha5 kind: Backstage metadata:
      name: my rhdh custom resource spec: application: appConfig: mountPath: /opt/app
      root/src configMaps: name: my rhdh app config extraEnvs: secrets: name: <my_product_secrets>
      extraFiles: mountPath: /opt/app root/src route: enabled: true database: enableLocalDb:
      true ``` my-rhdh-custom-resource.yaml custom resource example with dynamic plugins
      and RBAC policies config maps, and external PostgreSQL database secrets: ```yaml
      apiVersion: rhdh.redhat.com/v1alpha5 kind: Backstage metadata: name: <my rhdh
      custom resource> spec: application: appConfig: mountPath: /opt/app root/src
      configMaps: name: my rhdh app config name: rbac policies dynamicPluginsConfigMapName:
      dynamic plugins rhdh extraEnvs: secrets: name: <my_product_secrets> name: my
      rhdh database secrets extraFiles: mountPath: /opt/app root/src secrets: name:
      my rhdh database certificates secrets key: postgres crt.pem, postgres ca.pem,
      postgres key.key route: enabled: true database: enableLocalDb: false ``` Mandatory
      fields:: No fields are mandatory. You can create an empty Backstage CR and run
      Developer Hub with the default configuration. Optional fields:: spec.application.appConfig.configMaps::
      Enter your config map name list. Mount files in the my-rhdh-app-config config
      map: ```yaml spec: application: appConfig: mountPath: /opt/app root/src configMaps:
      name: my rhdh app config ``` Mount files in the my-rhdh-app-config and rbac-policies
      config maps: ```yaml spec: application: appConfig: mountPath: /opt/app root/src
      configMaps: name: my rhdh app config name: rbac policies ``` spec.application.extraEnvs.envs::
      Optionally, enter your additional environment variables that are not secrets,
      such as your proxy environment variables. Inject your HTTP_PROXY, HTTPS_PROXY
      and NO_PROXY environment variables: ```yaml spec: application: extraEnvs: envs:
      name: HTTP_PROXY value: ''http://10.10.10.105:3128'' name: HTTPS_PROXY value:
      ''http://10.10.10.106:3128'' name: NO_PROXY value: ''localhost,example.org''
      ``` spec.application.extraEnvs.secrets:: Enter your environment variables secret
      name list. Inject the environment variables in your Red Hat Developer Hub secret:
      ```yaml spec: application: extraEnvs: secrets: name: <my_product_secrets> ```
      Inject the environment variables in the Red Hat Developer Hub and my-rhdh-database-secrets
      secrets: ```yaml spec: application: extraEnvs: secrets: name: <my_product_secrets>
      name: my rhdh database secrets ``` [NOTE] ---- <my_product_secrets> is your
      preferred Developer Hub secret name, specifying the identifier for your secret
      configuration within Developer Hub. ---- spec.application.extraFiles.secrets::
      Enter your certificates files secret name and files list. Mount the postgres-crt.pem,
      postgres-ca.pem, and postgres-key.key files contained in the my-rhdh-database-certificates-secrets
      secret: ```yaml spec: application: extraFiles: mountPath: /opt/app root/src
      secrets: name: my rhdh database certificates secrets key: postgres crt.pem,
      postgres ca.pem, postgres key.key ``` spec.database.enableLocalDb:: Enable or
      disable the local PostgreSQL database. Disable the local PostgreSQL database
      generation to use an external postgreSQL database: ```yaml spec: database: enableLocalDb:
      false ``` On a development environment, use the local PostgreSQL database: ```yaml
      spec: database: enableLocalDb: true ``` spec.deployment:: Optionally, enter
      your deployment configuration. 2. Apply your Backstage CR to start or update
      your Developer Hub instance: ```terminal $ oc apply - filename=my rhdh custom
      resource.yaml - namespace=my rhdh project ``` ## Exposing your operator-based
      Red Hat Developer Hub instance on Microsoft Azure Kubernetes Service (AKS) On
      Microsoft Azure Kubernetes Service (AKS), to expose your Red Hat Developer Hub
      instance, Kubernetes ingresses replace OpenShift Container Platform routes.
      The Red Hat Developer Hub operator does not create ingresses. Therefore, to
      access your Developer Hub instance via a domain name, create the required ingresses
      on AKS and point your domain name to it. You have installed Red Hat Developer
      Hub by using the Red Hat Developer Hub Operator. 1. Create an Ingress manifest
      file, named rhdh-ingress.yaml, specifying your Developer Hub service name as
      follows: ```yaml apiVersion: networking.k8s.io/v1 kind: Ingress metadata: name:
      my rhdh ingress namespace: my rhdh project spec: ingressClassName: webapprouting.kubernetes.azure.com
      rules: http: paths: path: / pathType: Prefix backend: service: name: my rhdh
      custom resource port: name: http backend ``` 2. To deploy the created Ingress,
      run the following command: ```terminal $ kubectl n my rhdh project apply f rhdh
      ingress.yaml ``` 1. Access the deployed Developer Hub using the URL: https://<app_address>,
      where <app_address> is the Ingress address obtained earlier (for example, https://108.141.70.228).
      #'
