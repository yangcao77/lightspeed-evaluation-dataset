- conversation_group_id: plugins-154
  description: plugins
  turns:
  - contexts:
    - 'file, which Red Hat Developer Hub uses to load the plugin, is located in the
      dist-dynamic/dist-scalprum folder: ```json { "name": "backstage community.plugin
      entity feedback", "version": "0.6.0", "extensions": [], "registrationMethod":
      "callback", "baseURL": "auto", "loadScripts": [ "backstage community.plugin
      entity feedback.fd691533c03cb52c30ac.js" ], "buildHash": "fd691533c03cb52c30acbb5a80197c9d"
      } ``` 5. Package the plugin into a container image and publish it to Quay.io
      or your preferred container registry: ```terminal $ export QUAY_USER=replace-with-your-username
      $ export PLUGIN_NAME=entity-feedback-plugin $ export VERSION=$(cat package.json
      | jq .version -r) $ npx @red hat developer hub/cli@latest plugin package \ tag
      quay.io/$QUAY_USER/$PLUGIN_NAME:$VERSION $ podman login quay.io $ podman push
      quay.io/$QUAY_USER/$PLUGIN_NAME:$VERSION ``` 6. Repeat the same steps for the
      backend plugin. Scalprum is not required for backend plugins, and a dist-dynamic
      folder is generated instead of a dist-scalprum folder: ```terminal $ cd ../entity
      feedback backend/ $ npx @red hat developer hub/cli@latest plugin export $ export
      QUAY_USER=replace-with-your-username $ export PLUGIN_NAME=entity-feedback-plugin-backend
      $ export VERSION=$(cat package.json | jq .version -r) $ npx @red hat developer
      hub/cli@latest plugin package \ tag quay.io/$QUAY_USER/$PLUGIN_NAME:$VERSION
      $ podman push quay.io/$QUAY_USER/$PLUGIN_NAME:$VERSION ``` Those commands result
      in two container images being published to your container registry. Container
      images published to Quay.io ![custom container images] ### Adding a custom dynamic
      plugin to Red Hat Developer Hub 1. To add your custom dynamic plugins to Red
      Hat Developer Hub. you must update the dynamic-plugins.yaml file by using the
      following configuration that is generated from the npx @red-hat-developer-hub/cli@latest
      plugin package command: ```yaml plugins: package: oci://quay.io/_<user_name>_/entity
      feedback plugin:0.5.0!backstage community plugin entity feedback disabled: false
      package: oci://quay.io/_<user_name>_/entity feedback plugin backend:0.6.0!backstage
      community plugin entity feedback backend disabled: false ``` [NOTE] ---- Ensure
      that your container images are publicly accessible, or that you have configured
      a pull secret in your environment. A pull secret provides Red Hat Developer
      Hub with credentials to authenticate pulling your plugin container images from
      a container registry. ---- ### Displaying the frontend plugin 1. You need to
      update the pluginConfig section of your dynamic-plugins.yaml file to specify
      how the Entity Feedback should be added to the Red Hat Developer Hub UI. dynamic-plugins.yaml
      file fragment ```yaml package: oci://quay.io/_<user_name>_/entity feedback plugin:0.5.0!backstage
      community plugin entity feedback disabled: false pluginConfig: dynamicPlugins:
      frontend: backstage community.plugin entity feedback: entityTabs: mountPoint:
      entity.page.feedback path: /feedback title: Feedback mountPoints: config: layout:
      gridColumn: 1 / 1 importName: StarredRatingButtons mountPoint: entity.page.feedback/cards
      config: layout: gridColumn: 1 / 1 importName: EntityFeedbackResponseContent
      mountPoint: entity.page.feedback/cards config: layout: gridColumnEnd: lg: span
      6 md: span 6 xs: span 6 importName: StarredRatingButtons mountPoint: entity.page.overview/cards
      ``` where: backstage-community.plugin-entity-feedback:entityTabs:: Enter the
      entityTabs array to define a new tab, named “Feedback” on the Entity Overview
      screen in Red Hat Developer Hub. frontend:mountPoints:: This array defines the
      following configurations to mount React components exposed by the plugin: *
      The StarredRatingButtons component is added to the new Feedback tab defined
      in entityTabs. * Similar to the StarredRatingButtons, the EntityFeedbackResponseContent
      is mounted on the Feedback tab. * The StarredRatingButtons is added to the default
      Overview tab for each entity. 2. To complete installing the Entity Feedback
      plugins, you must redeploy your Red Hat Developer Hub instance. When your new
      instance of Red Hat Developer Hub has started, you can check that your plugins
      are installed and enabled by visiting the Administration > Extensions screen
      and searching for “entity” on the Installed tab. ![custom extensions] When you
      click Catalog, you should see the new Feedback tab, and the StarredRatingButtons
      displayed, as follows: ![custom entity view] Selecting a low star rating prompts
      the user to provide feedback, as follows: ![custom feedback overlay] [NOTE]
      ---- The user provided feedback is not saved if you are logged in as the Guest
      user. ---- # Using the Dynamic Plugin Factory to convert plugins into dynamic
      plugins You can automate the conversion and packaging of standard Backstage
      plugins into RHDH dynamic plugins by using the RHDH Dynamic Plugin Factory tool.
      [IMPORTANT] ---- The Dynamic Plugin Factory is maintained as an open-source
      project by Red Hat, but is not supported or subject to any service level agreement
      (SLA). ---- The core function of the Dynamic Plugin Factory tool is to streamline
      the dynamic plugin build process, offering the following capabilities: Source
      Code Handling:: Manages cloning, checking out, and applying custom patches to
      the plugin source. Dependency Management:: Handles yarn installation and TypeScript
      compilation. Packaging:: Uses the RHDH CLI to build, export, and package the
      final dynamic plugin. Deployment:: Offers an option to push the resulting container
      image to registries like Quay or OpenShift. The Dynamic Plugin Factory tool
      provides a simplified, reproducible method for developers and platform engineers
      to create and test dynamic plugins using a pre-configured dynamic plugin factory
      container and documentation, significantly easing migration and testing. For
      more information, see RHDH Dynamic Plugin Factory. # Enabling plugins added
      in the RHDH container image In the RHDH container image, a set of dynamic plugins
      is preloaded to enhance functionality. However, due to mandatory configuration
      requirements, most of the plugins are disabled. You can enable and configure
      the plugins in the RHDH container image, including how to manage the default
      configuration, set necessary environment variables, and ensure the proper functionality
      of the plugins within your application. You have access to the dynamic plugins.default.yaml
      file, which lists all preloaded plugins and their default configuration. You
      have deployed the RHDH application, and have access to the logs of the install
      dynamic plugins init container. You have the necessary permissions to modify
      plugin configurations and access the application environment. You have identified
      and set the required environment variables referenced by the plugin''s default
      configuration. These environment variables must be defined in the Helm Chart
      or Operator configuration. 1. Start your RHDH application and access the logs
      of the install-dynamic-plugins init container within the RHDH pod. 2. Identify
      the Red Hat supported plugins that are disabled by default. 3. Copy the package
      configuration from the dynamic-plugins.default.yaml file. 4. Open the plugin
      configuration file and locate the plugin entry you want to enable. The location
      of the plugin configuration file varies based on the deployment method. For
      more details, see Installing and viewing plugins in Red Hat Developer Hub. 5.
      Modify the disabled field'
