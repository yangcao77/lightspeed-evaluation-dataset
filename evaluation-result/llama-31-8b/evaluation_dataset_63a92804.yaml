- conversation_group_id: configuration-362
  description: configuration
  turns:
  - contexts:
    - 'Customizing Developer Lightspeed for RHDH You can customize Developer Lightspeed
      for RHDH functionalities such as gathering feedback, storing chat history in
      PostgreSQL, and configuring Model Context Protocol (MCP) tools. ### Gathering
      feedback in Developer Lightspeed for RHDH Feedback collection is an optional
      feature configured on the LCS. This feature gathers user feedback by providing
      thumbs-up/down ratings and text comments directly from the chat window. LCS
      collects the feedback, the user&#8217;s query, and the response of the model,
      storing the data as a JSON file on the local file system of the Pod. A platform
      administrator must later collect and analyze this data to assess model performance
      and improve the user experience. The collected data resides in the cluster where
      RHDH and LCS are deployed, making it accessible only to platform administrators
      for that cluster. For data removal, users must request this action from their
      platform administrator, as Red Hat neither collects nor accesses this data.
      To enable feedback collection, in the LCS configuration file (lightspeed stack.yaml),
      add the following settings: ```yaml user_data_collection: feedback_enabled:
      true feedback_storage: "/tmp/data/feedback" transcripts_enabled: true transcripts_storage:
      "/tmp/data/transcripts" ``` To disable feedback collection, in the LCS configuration
      file (lightspeed stack.yaml), add the following settings: ```yaml user_data_collection:
      feedback_enabled: false feedback_storage: "/tmp/data/feedback" transcripts_enabled:
      true transcripts_storage: "/tmp/data/transcripts" ``` ### Updating the system
      prompt in Developer Lightspeed for RHDH You can override the default system
      prompt that Developer Lightspeed for RHDH uses to better frame queries to your
      LLM. Customizing the system prompt allows you to refine the context, personality,
      and instructions that the LLM receives, improving the relevance and accuracy
      of the responses it creates for your specific environment. To set a custom system
      prompt, in your Developer Lightspeed for RHDH app config file, add or modify
      the lightspeed.systemPrompt key and set its value to your preferred prompt string
      as shown in the following example: ```yaml lightspeed: # ... other lightspeed
      configurations systemPrompt: "You are a helpful assistant focused on Red Hat
      Developer Hub development." ``` Set systemPrompt to prefix all queries sent
      by Developer Lightspeed for RHDH to the LLM with this instruction, guiding the
      model to generate more tailored responses. ### Customizing the chat history
      storage in Developer Lightspeed for RHDH By default, the Developer Lightspeed
      for RHDH service stores chat history in a non-persistent local SQL database
      within the LCS container. This means that chat history is lost if you create
      and use a new LCS sidecar. You can manually configure Developer Lightspeed for
      RHDH to store the chat history persistently as a long-term backup with PostgreSQL
      by updating your LCS service configuration. [WARNING] ---- Configuring Developer
      Lightspeed for RHDH to use PostgreSQL records prompts and responses, which platform
      administrators can review. You must assess any data privacy and security implications
      if user chat history contains private, sensitive, or confidential information.
      For users that wish to have their chat data removed, they must request their
