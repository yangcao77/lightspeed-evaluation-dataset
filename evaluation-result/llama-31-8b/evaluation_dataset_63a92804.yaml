      the layout properties. ```yaml global: dynamic: plugins: package: <package_location>
      disabled: false pluginConfig: dynamicPlugins: frontend: <plugin_name>: mountPoints:
      mountPoint: <mount_point> importName: <import_name> config: layout: gridColumn:
