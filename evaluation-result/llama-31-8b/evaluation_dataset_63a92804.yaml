    query: how to update Backstage custom resource to mount rbac files
    response: "To update your Backstage custom resource to mount rbac files, you can\
      \ use the following YAML configuration:\n\n```\napiVersion: rhdh.redhat.com/v1alpha5\n\
      kind: Backstage\nmetadata:\n  name: my-rhdh-custom-resource\nspec:\n  application:\n\
