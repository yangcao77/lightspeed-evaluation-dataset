- conversation_group_id: configuration-82
  description: configuration
  turns:
  - contexts:
    - 'Customizing the Home page in Red Hat Developer Hub ## Customizing the Learning
      Paths by using a customization service For advanced scenarios, you can host
      your Red Hat Developer Hub customization service to provide data to all configurable
      Developer Hub pages, such as the Learning Paths. You can even use a different
      service for each page. 1. Deploy your Developer Hub customization service on
      the same OpenShift Container Platform cluster as your Developer Hub instance.
      You can find an example at red-hat-developer-hub-customization-provider, that
      provides the same data as default Developer Hub data. The customization service
      provides a Learning Paths data URL such as: http://<rhdh-customization-provider>/learning-paths.
      2. Configure the Developer Hub proxy to use your dedicated service to provide
      the Learning Path data, add the following to the app-config.yaml file: ```yaml
      proxy: endpoints: ''/developer hub/learning paths'': target: <learning_path_data_url>
      changeOrigin: true qsecure: true 1 ``` Change to "false" in case of using self
      hosted cluster with a self-signed certificate ## Starting and completing lessons
      in Learning Paths As a developer, you can start a course and complete the lessons
      at your own pace. 1. You can log in to developers.redhat.com 2. Your platform
      engineer has granted you access to the Learning Paths plugin. To start a course
      in Learning Paths, complete the following steps: 1. In your Red Hat Developer
      Hub navigation menu, click Learning Paths. 2. Select the tile for the course
      you would like to begin. [NOTE] ---- This action redirects you to the main page
      of the course in the Red Hat Developers site. ---- # Configuring the global
      header in Red Hat Developer Hub As an administrator, you can configure the Red
      Hat Developer Hub global header to create a consistent and flexible navigation
      bar across your Developer Hub instance. By default, the Developer Hub global
      header includes the following components: Self service button provides quick
      access to a variety of templates, enabling users to efficiently set up services,
      backend and front end plugins within Developer Hub Support button that can link
      an internal or external support page Notifications button displays alerts and
      updates from plugins and external services Search input field allows users to
      find services, components, documentation, and other resources within Developer
      Hub Plugin extension capabilities provide a preinstalled and enabled catalog
      of available plugins in Developer Hub User profile drop down menu provides access
      to profile settings, appearance customization, Developer Hub metadata, and a
      logout button ## Customizing your Red Hat Developer Hub global header You can
      use the red-hat-developer-hub.backstage-plugin-global-header dynamic plugin
      to extend the global header with additional buttons and customize the order
      and position of icons and features. Additionally, you can create and integrate
      your custom dynamic header plugins using the mount points provided by this new
      header feature, allowing you to further tailor to suit your needs. For more
      information about enabling dynamic plugins, see Installing and viewing plugins
      in Red Hat Developer Hub. ```yaml - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-header
      disabled: false pluginConfig: app: sidebar: search: false settings: false dynamicPlugins:
      frontend: default.main-menu-items: menuItems: default.create: title: '''' red-hat-developer-hub.backstage-plugin-global-header:
      # the default enabled dynamic header plugin mountPoints: - mountPoint: application/header
      importName: GlobalHeader config: position: above-main-content 4 - mountPoint:
      global.header/component importName: SearchComponent config: priority: 100 -
      mountPoint: global.header/component importName: Spacer config: priority: 99
      props: growFactor: 0 - mountPoint: global.header/component importName: HeaderIconButton
      config: priority: 90 props: title: Self-service icon: add to: create - mountPoint:
      global.header/component importName: SupportButton config: priority: 80 - mountPoint:
      global.header/component importName: NotificationButton config: priority: 70
      - mountPoint: global.header/component importName: Divider config: priority:
      50 - mountPoint: global.header/component importName: ProfileDropdown config:
      priority: 10 - mountPoint: global.header/profile importName: MenuItemLink config:
      priority: 100 props: title: Settings link: /settings icon: manageAccounts -
      mountPoint: global.header/profile importName: LogoutButton config: priority:
      10 ``` where: search:: Enter false to hide the Search modal in the sidebar menu.
      Enter true to display the Search modal in the sidebar menu. settings:: Enter
      false to hides the Settings button in the sidebar menu. Enter true to display
      the Settings button in the sidebar menu. default.main-menu-items:: Enter this
      field to hide the Self-service button from the sidebar menu. Remove this field
      to display the Self-service button in the sidebar menu. position:: Enter above-main-content
      to position the header above the main content. Enter above-sidebar to position
      the header above the sidebar. To extend the functionality of the default global
      header, include any of the following attributes in your global header entry:
      mountPoint:: Specifies the location of the header. Use application/header to
      specify it as a global header. You can configure several global headers at different
      positions by adding entries to the mountPoints field. importName:: Specifies
      the component exported by the global header plugin. The red-hat-developer-hub.backstage-plugin-global-header
      package (enabled by default) offers the following header components as possible
      mount point values: * SearchComponent: Adds a search bar (enabled by default).
      * Spacer: Adds spacing in the header to position buttons at the end. Useful
      when you disable SearchComponent. * HeaderIconButton: Adds an icon button. By
      default, the Self-service icon button remains enabled. * SupportButton: Adds
      a Support icon button, allowing users to configure a link to an internal or
      external page. Enabled by default but requires additional configuration to display.
      * NotificationButton: Adds a Notifications icon button to display unread notifications
      in real time and navigate to the Notifications page. Enabled by default (requires
      the notifications plugin). * Divider: Adds a vertical divider. By default, a
      divider appears between the profile dropdown and other header components. *
      ProfileDropdown: Adds a profile dropdown showing the logged-in user''s name.
      By default, it contains two menu items. * MenuItemLink: Adds a link item in
      a dropdown menu. By default, the profile dropdown includes a link to the Settings
      page. * LogoutButton: Adds a logout button in the profile dropdown (enabled
      by default). * CreateDropdown: Adds a Self-service dropdown button (disabled
      by default). The menu items are configurable. * SoftwareTemplatesSection: Adds
      a list of software template links to the Self-service dropdown menu (disabled
      by default). You must enable CreateDropdown. * RegisterAComponentSection: Adds
      a link to the Register a Component page in the Self-service dropdown menu (disabled'
    expected_response: 'The red-hat-developer-hub.backstage-plugin-global-header package
      provides several header components that can be used as mount point values. These
      components include: SearchComponent (adds a search bar), Spacer (adds spacing),
      HeaderIconButton (adds an icon button), SupportButton (adds a Support icon button),
      NotificationButton (adds a Notifications icon button), Divider (adds a vertical
      divider), and ProfileDropdown (adds a profile dropdown). Within the dropdown,
      you can use MenuItemLink (adds a link) and LogoutButton. Other components are
      CreateDropdown (adds a Self-service dropdown button), SoftwareTemplatesSection
      (adds software template links to the Self-service dropdown), and RegisterAComponentSection
      (adds a link to the Register a Component page in the Self-service dropdown).'
    query: I'm a platform engineer and I'm having trouble, how can I use the app-config.yaml
