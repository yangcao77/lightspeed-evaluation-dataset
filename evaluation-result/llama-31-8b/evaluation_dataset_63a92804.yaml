    query: How do I use skopeo to copy the doker images to my internal mirror registry?
    response: "Based on the knowledge_search tool results, the best method to use\
      \ skopeo to copy docker images to an internal mirror registry is to use the\
      \ Skopeo command to copy the images from the directory where they are stored\
      \ to the target mirror registry.\n\nHere is an example of how to do this:\n\n\
      ```\n$ skopeo copy --all dir:./rhdh-hub docker://<mirror_registry_name>/<rhdh_repo_name>:${RHDH_DIGEST}\n\
      \n$ skopeo copy --all dir:./postgresql docker://<mirror_registry_name>/<postgresql_repo_name>:${PG_DIGEST}\n\
