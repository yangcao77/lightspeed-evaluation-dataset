- conversation_group_id: kubernetes-206
  description: kubernetes
  turns:
  - contexts:
    - 'Monitoring with Amazon Prometheus You can configure Red Hat Developer Hub to
      use Amazon Prometheus for comprehensive logging. Amazon Prometheus extracts
      data from pods that have specific pod annotations. ### Prerequisites You configured
      Prometheus for your Elastic Kubernetes Service (EKS) clusters. You created an
      Amazon managed service for the Prometheus workspace. You configured Prometheus
      to import the Developer Hub metrics. You ingested Prometheus metrics into the
      created workspace. ### Configuring annotations for monitoring with Amazon Prometheus
      by using the Red Hat Developer Hub Operator To enable logging to Amazon Prometheus,
      you can configure the required pod annotations by using the Red Hat Developer
      Hub Operator. 1. As an administrator of the Red Hat Developer Hub Operator,
      edit the default configuration to add Prometheus annotations as follows: ```
      # Update OPERATOR_NS accordingly $ OPERATOR_NS=rhdh-operator $ kubectl edit
      configmap backstage-default-config -n "${OPERATOR_NS}" ``` 2. Find the deployment.yaml
      key in the config map and add the annotations to the spec.template.metadata.annotations
      field as follows: ```yaml deployment.yaml: |- apiVersion: apps/v1 kind: Deployment
      # --- truncated --- spec: template: # --- truncated --- metadata: labels: rhdh.redhat.com/app:
      # placeholder for ''backstage-<cr-name>'' # --- truncated --- annotations: prometheus.io/scrape:
      ''true'' prometheus.io/path: ''/metrics'' prometheus.io/port: ''9464'' prometheus.io/scheme:
      ''http'' # --- truncated --- ``` 3. Save your changes. To verify if the scraping
      works: 1. Use kubectl to port-forward the Prometheus console to your local machine
      as follows: ``` $ kubectl - namespace=prometheus port forward deploy/prometheus
      server 9090 ``` 2. Open your web browser and navigate to http://localhost:9090
      to access the Prometheus console. 3. Monitor relevant metrics, such as process_cpu_user_seconds_total.
      ### Configuring annotations for monitoring with Amazon Prometheus by using the
      Red Hat Developer Hub Helm chart To enable logging to Amazon Prometheus, you
      can configure the required pod annotations by using the Red Hat Developer Hub
      Helm chart. To annotate the backstage pod for monitoring, update your values.yaml
      file as follows: ```yaml upstream: backstage: # -- TRUNCATED -- podAnnotations:
      prometheus.io/scrape: ''true'' prometheus.io/path: ''/metrics'' prometheus.io/port:
      ''9464'' prometheus.io/scheme: ''http'' ``` To verify if the scraping works:
      1. Use kubectl to port-forward the Prometheus console to your local machine
      as follows: ```bash $ kubectl - namespace=prometheus port forward deploy/prometheus
      server 9090 ``` 2. Open your web browser and navigate to http://localhost:9090
      to access the Prometheus console. 3. Monitor relevant metrics, such as process_cpu_user_seconds_total.
      ## Logging with Amazon CloudWatch Logging within the Red Hat Developer Hub relies
      on the GitHub WinstonJS library. ### Retrieving logs from Amazon CloudWatch
      CloudWatch Container Insights is used to capture logs and metrics for Amazon
      Elastic Kubernetes Service. For more information, see Logging for Amazon Elastic
      Kubernetes Service documentation. To capture the logs and metrics, install the
      Amazon CloudWatch Observability EKS add on in your cluster. Following the setup
      of Container Insights, you can access container logs using Logs Insights or
      Live Tail views. CloudWatch names the log group where all container logs are
      consolidated in the following manner: ``` /aws/containerinsights/<cluster_name>/application
      ``` To retrieve logs from the Developer Hub instance, run a query such as: ```sql
      fields @timestamp, @message, kubernetes.container_name | filter kubernetes.container_name
      in ["install-dynamic-plugins", "backstage-backend"] ``` # Monitoring and logging
      with Azure Kubernetes Services (AKS) in Red Hat Developer Hub Monitoring and
      logging are integral aspects of managing and maintaining Azure Kubernetes Services
      (AKS) in Red Hat Developer Hub. With features like Managed Prometheus Monitoring
      and Azure Monitor integration, administrators can efficiently monitor resource
      utilization, diagnose issues, and ensure the reliability of their containerized
      workloads. ##'
    expected_response: 'To enable logging to Amazon Prometheus, you must configure
      the required pod annotations, which are: `prometheus.io/scrape: ''true''`, `prometheus.io/path:
      ''/metrics''`, `prometheus.io/port: ''9464''`, and `prometheus.io/scheme: ''http''`.'
    query: What pod annotations are required to enable monitoring with Amazon Prometheus?
    response: "The pod annotations required to enable monitoring with Amazon Prometheus\
      \ are:\n\n```yaml\npodAnnotations:\n    prometheus.io/scrape: 'true'\n    prometheus.io/path:\
      \ '/metrics'\n    prometheus.io/port: '9464'\n    prometheus.io/scheme: 'http'\n\
      ```\n\nThese annotations can be added to the pod's metadata, and it will be\
      \ scraped by Prometheus. The `prometheus.io/scrape` annotation is used to enable\
      \ scraping, and the `prometheus.io/path` and `prometheus.io/port` annotations\
      \ are used to specify the path and port where the metrics are exposed. The `prometheus.io/scheme`\
      \ annotation is used to specify the scheme (http or https) used to access the\
      \ metrics."
