  description: plugins
  turns:
  - contexts:
    - '# Interacting with Model Context Protocol tools for Red Hat Developer Hub #
      Interacting with Model Context Protocol tools for Red Hat Developer Hub ## Understanding
      Model Context Protocol [IMPORTANT] ---- This section describes Developer Preview
      features in the Model Context Protocol plugin. Developer Preview features are
      not supported by Red Hat in any way and are not functionally complete or production-ready.
      Do not use Developer Preview features for production or business-critical workloads.
      Developer Preview features provide early access to functionality in advance
      of possible inclusion in a Red Hat product offering. Customers can use these
      features to test functionality and provide feedback during the development process.
      Developer Preview features might not have any documentation, are subject to
      change or removal at any time, and have received limited testing. Red Hat might
      provide ways to submit feedback on Developer Preview features without an associated
      SLA. For more information about the support scope of Red Hat Developer Preview
      features, see Developer Preview Support Scope. ---- Model Context Protocol (MCP)
      connects AI models and applications (MCP clients) to external systems (MCP servers)
      to access information and workflows. MCP servers define the tools that MCP clients
      can interact with. Red Hat Developer Hub (RHDH) supports MCP tools through the
      mcp-actions-backend plugin available in Backstage 1.40 or later. [IMPORTANT]
      ---- You must verify that your model supports tool calling before you enable
      Model Context Protocol (MCP) features. Using an incompatible model results in
      error messages. ---- ## Installing the MCP server and tool plugins in Red Hat
      Developer Hub To enable MCP support in Red Hat Developer Hub, you must install
      the following components: Backend MCP server plugin:: Responsible for running
      MCP tools. MCP tool plugins:: Individual MCP plugins that expose capabilities
      relating to the Software Catalog and TechDocs features in RHDH. Your RHDH instance
      is installed and running. 1. Install the backend MCP server plugin: In your
      dynamic plugins ConfigMap (for example, dynamic-plugins-rhdh.yaml), add the
      MCP server plugin as shown in the following example: ```yaml plugins: package:
      oci://ghcr.io/redhat developer/rhdh plugin export overlays/backstage plugin
      mcp actions backend:bs_1.45.3__0.1.5 disabled: false ``` 2. Install any of the
      following MCP tools that you would like to use: * Software Catalog MCP tool:
      ```yaml package: oci://ghcr.io/redhat developer/rhdh plugin export overlays/red
      hat developer hub backstage plugin software catalog mcp tool:bs_1.45.3__0.4.1
      disabled: false ``` TechDocs MCP ```yaml package: oci://ghcr.io/redhat developer/rhdh
      plugin export overlays/red hat developer hub backstage plugin techdocs mcp tool:bs_1.45.3__0.3.2
      disabled: false ``` ##'
    expected_response: 'To install the TechDocs MCP tool in Red Hat Developer Hub,
      you must add it to your dynamic plugins ConfigMap. The package to add is: ```yaml

      package: oci://ghcr.io/redhat developer/rhdh plugin export overlays/red hat
      developer hub backstage plugin techdocs mcp tool:bs_1.45.3__0.3.2

      disabled: false

      ```'
