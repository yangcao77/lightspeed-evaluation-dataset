      ``` # Front end plugin wiring You can configure front-end plugins to customize
      icons, integrate components at mount points, and provide or replace utility
      APIs. ## Front end plugin wiring Front-end plugin wiring integrates dynamic
      front-end plugin components, such as new pages, UI extensions, icons, and APIs,
      into Red Hat Developer Hub. Because the dynamic plugins load at runtime, the
      core application must discover and connect the exported assets of the plugin
      to the appropriate user interface systems and locations. ### Understand why
      front end wiring is required Because dynamic front-end plugins load their code
      at runtime, the Developer Hub application requires explicit instructions to
      integrate the plugin components in the user interface (UI). Front-end wiring
      provides the metadata and instructions necessary to bridge this gap, informing
      the applications on how to: Add new pages and routes to the main application.
      (using dynamicRoutes) Inject custom components into existing UI pages. (using
      mountPoints) Configure application wide customizations, such as new icons or
      themes. (using appIcons) Add new menu items. (using menuItems) Bind to existing
      plugins. (using routeBindings) The wiring configuration, typically located in
      app-config.yaml or dynamic-plugins-config.yaml, gives the application the necessary
      metadata (including the component names, paths, and integration points) to render
      and use the plugin features. ### Consequences of skipping front-end wiring If
      you skip front-end wiring, the plugin is discovered but not loaded into the
      application front-end. As a result, the plugin features do not appear or function.
      This behavior is expected because while back-end plugins are discovered and
      loaded automatically, the core application loads front-end plugins only based
      on the list defined in the dynamicPlugins.frontend configuration. You can expect
      the following behavior when you skip front-end wiring: Disabled functionality::
      The Backstage application cannot integrate or use the plugin exports. Invisible
      components:: New pages, sidebar links, or custom cards do not render in the
      application UI. Unregistered APIs:: Custom utility APIs or API overrides provided
      by the plugin are not registered in the application API system, which can cause
      plugins or components to fail. Unused assets:: Icons, translations, and themes
      are not registered or available for use. [TIP] ---- If a plugin is not visible
      even with front-end wiring, the plugin is likely misconfigured. Troubleshoot
      the issue by checking the Console tab in the Developer Tools of your browser
      for specific error messages or warnings. ---- ### Dynamic front-end plugins
      for application use A dynamic front-end plugin requires front-end wiring when
      it exports a feature for integration into the main Backstage application UI.
      Wiring is required for the following scenarios: Front-end wiring is configured
      in the app-config.yaml or a dedicated dynamic-plugins-config.yaml file. The
      dynamic plugin exposes components, routes, or APIs. For example, a plugin component
      (FooPluginPage) is exported from a module (for example, PluginRoot). The application
      administrator defines the wiring in the configuration file, using the plugin
      package name to register the exports, such as adding a new page with a sidebar
      link. ```yaml # dynamic-plugins-config.yaml plugins: - plugin: <plugin_path_or_url>
      disabled: false pluginConfig: dynamicPlugins: frontend: my-plugin-package-name:
      # The plugin''s unique package name dynamicRoutes: # Wiring for a new page/route
      - path: /my-new-page # The desired URL path importName: FooPluginPage # The
      exported component name menuItem: # Wiring for the sidebar entry icon: favorite
      # A registered icon name text: My Custom Page ``` When the application loads,
      it performs the following steps: 1. It parses the dynamic-plugins-config.yaml.
      2. It uses the <plugin_path_or_url> to download the plugin bundle using the
      dynamic loading mechanism. 3. If the package exports the plugin object, the
      application adds it to the list provided to the Backstage createApp API, registering
      the plugin properly with the front-end application. 4. It uses the'
