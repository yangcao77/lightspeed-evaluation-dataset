      for version inheritance, you can also use the plugin path auto-detection feature
      by omitting the plugin path entirely. Use this approach when the base configuration
      in included files already has an explicit path or uses auto-detection itself.
      For example, if the plugin in the included file uses auto-detection that resolves
      to oci://quay.io/example/image:v0.0.2!example-path, and you use {{inherit}}
      without a path, it will inherit both the version v0.0.2 and the plugin path
      example-path. Example configuration in dynamic-plugins.default.yaml file ```
      plugins: disabled: false package: oci://quay.io/example/image:v0.0.2 ``` Example
      configuration in dynamic plugins.yaml file ```yaml includes: dynamic plugins.default.yaml
      plugins: disabled: false package: oci://quay.io/example/image:{{inherit}} ```
      [NOTE] ---- You must define exactly one plugin from that OCI image in the configuration
      files. The system returns an error if the configuration files contain multiple
      plugins or no matching plugins. ---- 3. To apply the changes, restart the RHDH
      application. #### Loading a plugin packaged as a TGZ file The custom plugin
      is packaged as a dynamic plugin in a TGZ file. For more information about packaging
      a custom plugin, see . 1. Specify the archive URL and its integrity hash in
