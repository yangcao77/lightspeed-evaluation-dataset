- conversation_group_id: installation-121
  description: installation
  turns:
  - contexts:
    - 'dedicated service, you can do the following tasks: Use the same service to
      provide the data to all configurable Developer Hub pages or use a different
      service for each page. Use the red hat developer hub customization provider
      as an example service, which provides data for both the Home and Tech Radar
      pages. The red hat developer hub customization provider service provides the
      same data as default Developer Hub data. You can fork the red hat developer
      hub customization provider service repository from GitHub and modify it with
      your own data, if required. Deploy the red hat developer hub customization provider
      service and the Developer Hub Helm chart on the same cluster. You have installed
      the Red Hat Developer Hub using Helm chart. For more information, see Installing
      Red Hat Developer Hub on OpenShift Container Platform with the Helm chart. To
      use a separate service to provide the Home page data, complete the following
      steps: 1. In the Red Hat OpenShift Container Platform web console, click +Add
      > Import from Git. 2. Enter the URL of your Git repository into the Git Repo
      URL field. To use the red-hat-developer-hub-customization-provider service,
      add the URL for the red-hat-developer-hub-customization-provider repository
      or your fork of the repository containing your customizations. 3. On the General
      tab, enter red-hat-developer-hub-customization-provider in the Name field and
      click Create. 4. On the Advanced Options tab, copy the value from Target Port.
      [NOTE] ---- Target Port automatically generates a Kubernetes or OpenShift Container
      Platform service to communicate with. ---- 5. Add the following code to the
      app-config.yaml file: ```yaml proxy: endpoints: # Other Proxies # customize
      developer hub instance ''/developer-hub'': target: ${HOMEPAGE_DATA_URL} 1 changeOrigin:
      true # Change to "false" in case of using self-hosted cluster with a self-signed
      certificate secure: true ``` http://<SERVICE_NAME>:8080, for example, http://rhdh
      customization provider:8080. [NOTE] ---- The red-hat-developer-hub-customization-provider
      service contains the 8080 port by default. If you are using a custom port, you
      can specify it with the ''PORT'' environmental variable in the app-config.yaml
      file. ---- 6. Replace the HOMEPAGE_DATA_URL by adding the URL to rhdh-secrets
      or by directly replacing it in your custom ConfigMap. 7. Delete the Developer
      Hub pod to ensure that the new configurations are loaded correctly. To view
      the service, go to the OpenShift Container Platform web console and click Networking
      > Service. [NOTE] ---- You can also view Service Resources in the Topology view.
      ---- * Ensure that the provided API URL for the Home page returns the data in
      JSON format as shown in the following example: ```json [ { "title": "Dropdown
      1", "isExpanded": false, "links": [ { "iconUrl": "https://imagehost.com/image.png",
      "label": "Dropdown 1 Item 1", "url": "https://example.com/" }, { "iconUrl":
      "https://imagehost2.org/icon.png", "label": "Dropdown 1 Item 2", "url": "" }
      ] }, { "title": "Dropdown 2", "isExpanded": true, "links": [ { "iconUrl": "http://imagehost3.edu/img.jpg",
      "label": "Dropdown 2 Item 1", "url": "http://example.com" } ] } ] ``` [NOTE]
      ---- If the request call fails or is not configured, the Developer Hub instance
      falls back to the default local data. ---- * If the images or icons do not load,
      then allowlist them by adding your image or icon host URLs to the Content Security
      Policy (CSP) img-src in your custom ConfigMap as shown in the following example:
      ```yaml kind: ConfigMap apiVersion: v1 metadata: name: app-config.yaml data:
      app-config.yaml: | app: title: Red Hat Developer Hub backend: csp: connect-src:
      - "''self''" - ''http:'' - ''https:'' img-src: - "''self''" - ''data:'' - <image
      host url 1> - <image host url 2> - <image host url 3> # Other Configurations
      ``` # Customizing the RHDH Metadata card on the Settings page The Settings page
      in Red Hat Developer Hub contains a RHDH Metadata card. By default, the RHDH
      Metadata card shows the RHDH Version and Backstage Version of your Red Hat Developer
      Hub instance. When you click the Show more icon, the card expands to also show
      Upstream, Midstream, and Build Time information. You can override the default
      to show custom build information about your Red Hat Developer Hub instance in
      the card. You can customize the card title as well as the card contents. To
      customize the RHDH Metadata card, complete the following step: In your app config.yaml
      file, configure the buildinfo field. For example: ```yaml buildInfo: title:
      _<metadata_card_title>_ card: TechDocs builder: ''_<techdocs_builder>_'' Authentication
      provider: ''_<authentication_provider>_'' RBAC: disabled full: true ``` where
      <metadata_card_title>:: Specifies the title that you want to display on the
      customized card. <techdocs_builder>:: Specifies whether to generate and publish
      the docs or to only fetch the docs when using the default build strategy. Possible
      values are local or external. If you want to generate and publish the docs,
      set the techdocs.builder field to local in your app-config.yaml file. If you
      only want to fetch the docs without generating and publishing them, set the
      techdocs.builder field to external. <authentication_provider>:: Specifies the
      authentication provider that you want to use. Example values are GitHub or GitLab.
      full:: Specifies what information is shown on the customized card. Possible
      values are true or false. If set to true, only the information specified in
      this configuration is shown on the card. If set to false, the specified information
      is shown on the card along with the build versions. The default value is true.
      The Settings page displays a card with a custom title and custom build information
      about your Red Hat Developer Hub instance. #'
