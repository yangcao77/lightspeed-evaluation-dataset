- conversation_group_id: plugins-172
  description: plugins
  turns:
  - contexts:
    - 'provider factories. Only one signInPage is specified for the application at
      a time. ```yaml dynamicPlugins: frontend: my-plugin: # The plugin package name
      signInPage: importName: CustomSignInPage ``` [NOTE] ---- The package_name specified
      under dynamicPlugins.frontend must match the scalprum.name value in the package.json
      file of your plugin to ensure the dynamic plugin loads correctly at runtime.
      The module field is optional and allows specifying which set of assets must
      be accessed within the dynamic plugin. By default, the system uses the PluginRoot
      module. ---- ## Providing custom Scaffolder field extensions The Scaffolder
      component in Red Hat Developer Hub (RHDH) enables users to create software components
      using templates through a guided wizard. You can extend the functionality of
      the Scaffolder by providing custom form fields as dynamic plugins using the
      scaffolderFieldExtensions configuration. Custom field extensions allow you to
      add specialized form fields that capture domain-specific data during the scaffolding
      process, such as environment selectors, input validations, or repository checks.
      When you configure custom Scaffolder field extensions: The dynamic plugin exposes
      the field extension component using createScaffolderFieldExtension. Each field
      extension requires a unique importName for registration. You register multiple
      field extensions by listing each in the configuration. ```yaml dynamicPlugins:
      frontend: my-plugin: # The plugin package name scaffolderFieldExtensions: -
      importName: MyNewFieldExtension # References the exported Scaffolder field extension
      component from your plugin ``` [NOTE] ---- The module field is optional and
      specifies which set of assets to access within the plugin. By default, the system
      uses the PluginRoot module, consistent with the scalprum.exposedModules key
      in the package.json file of your package. ---- ## Providing additional utility
      APIs If a dynamic plugin exports the plugin object returned by createPlugin,
      it is supplied to the createApp API. All API factories exported by the plugin
      are automatically registered and available in the front-end application. You
      can add an entry to the dynamicPlugins.frontend configuration when a dynamic
      plugin contains only API factories as shown in the following example: ```yaml
      # app config.yaml dynamicPlugins: frontend: my dynamic plugin package with api
      factories: {} ``` However, when the dynamic plugin is not exporting the plugin
      object, explicitly configure each API factory that must be registered with the
      createApp API using the apiFactories configuration as shown in the following
      example: ```yaml # app-config.yaml dynamicPlugins: frontend: my-plugin: # The
      plugin package name apiFactories: # (Optional): Specify the import name that
      references a `AnyApiFactory<{}>` implementation. (Defaults to `default` export)
      - importName: BarApi # (Optional): An argument which specifies the assets you
      want to access within the plugin. If not provided, the default module named
      `PluginRoot` is used module: CustomModule ``` The API factories initialized
      by the Developer Hub application shell are overridden by an API factory provided
      by a dynamic plugin by specifying the same API ref ID. A dynamic plugin can
      export AnyApiFactory<{}> to cater for some specific use case as shown in the
      following example: ```yaml export const customScmAuthApiFactory = createApiFactory({
      api: scmAuthApiRef, deps: { githubAuthApi: githubAuthApiRef }, factory: ({ githubAuthApi
      }) => ScmAuth.merge( ScmAuth.forGithub(githubAuthApi, { host: "github.someinstance.com"
      }), ScmAuth.forGithub(githubAuthApi, { host: "github.someotherinstance.com",
      }), ), }); ``` The corresponding configuration which overrides the default ScmAuth
      API factory that Developer Hub defaults to is as shown in the following example:
      ```yaml dynamicPlugins: frontend: my-plugin: # The plugin package name apiFactories:
      - importName: customScmAuthApiFactory ``` ## Adding custom authentication provider
      settings You can install new authentication providers from a dynamic plugin
      that either adds additional configuration support for an existing provider or
      adds a new authentication provider. These providers are listed in the user settings
      section under the Authentication Providers tab. You can use the providerSettings
      configuration to add entries for an authentication provider from a dynamic plugin,
      as shown in the following example: ```yaml dynamicPlugins: frontend: my-plugin:
      # The plugin package name providerSettings: # The title for the authentication
      provider shown above the user''s profile image if available - title: My Custom
      Auth Provider # The description of the authentication provider description:
      Sign in using My Custom Auth Provider # The ID of the authentication provider
      as provided to the `createApiRef` API call. provider: core.auth.my-custom-auth-provider
      ``` [NOTE] ---- provider looks up the corresponding API factory for the authentication
      provider to connect the provider''s Sign In/Sign Out button. ---- ## Providing
      custom TechDocs add-ons If a plugin provides multiple add-ons, each techdocsAddon
      entry specifies a unique importName corresponding to the add-on. Front-end plugins
      expose the TechDocs add-on component using the techdocsAddons configuration
      as shown in the following example: ```yaml dynamicPlugins: frontend: my-plugin:
      # The plugin package name techdocsAddons: - importName: ExampleAddon # The exported
      add-on component config: props: ... # (Optional): React props to pass to the
      add-on ``` ## Customizing Red Hat Developer Hub theme You can customize Developer
      Hub themes from a dynamic plugin with various configurations as shown in the
      following example: ```yaml import { lightTheme } from ''./lightTheme''; import
      { darkTheme } from ''./darkTheme''; import { UnifiedThemeProvider } from ''@backstage/theme'';
      export const lightThemeProvider = ({ children }: { children: ReactNode }) =>
      ( <UnifiedThemeProvider theme={lightTheme} children={children} /> ); export
      const darkThemeProvider = ({ children }: { children: ReactNode }) => ( <UnifiedThemeProvider
      theme={darkTheme} children={children} /> ); ``` For more information about creating
      a custom theme, see creating a custom theme. You can declare the theme using
      the themes configuration as shown in the following example: ```yaml dynamicPlugins:
      frontend: my-plugin: # The plugin package name themes: # are `light` or `dark`.
      Using ''light'' overrides the app-provided light theme - id: light title: Light
      variant: light icon: someIconReference importName: lightThemeProvider # The
      theme name displayed to the user on the *Settings* page. Using ''dark'' overrides
      the app-provided dark theme - id: dark title: Dark variant: dark icon: someIconReference
      # A string reference to a system or app icon # The name of the exported theme
      provider function, the function signature should match `({ children }: { children:
      ReactNode }): React.JSX.Element` importName: darkThemeProvider ``` # Utilizing
      plugin indicators and support types in the Red Hat Developer Hub Understanding
      plugin indicators and support types is crucial for effectively utilizing the
      Red Hat Developer Hub.'
    expected_response: "You can customize Developer Hub themes from a dynamic plugin.\
      \ You declare the theme using the `themes` configuration within the `dynamicPlugins.frontend`\
      \ section of your configuration file. For example, you can override the light\
      \ and dark themes by specifying an `id`, `title`, `variant`, `icon`, and an\
      \ `importName` that points to your exported theme provider function. An example\
      \ configuration is: ```yaml\ndynamicPlugins:\n  frontend:\n    my-plugin: #\
      \ The plugin package name\n      themes:\n        # are `light` or `dark`. Using\
      \ 'light' overrides the app-provided light theme\n        - id: light\n    \
      \      title: Light\n          variant: light\n          icon: someIconReference\n\
      \          importName: lightThemeProvider\n        # The theme name displayed\
      \ to the user on the *Settings* page. Using 'dark' overrides the app-provided\
      \ dark theme\n        - id: dark\n          title: Dark\n          variant:\
      \ dark\n          icon: someIconReference # A string reference to a system or\
      \ app icon\n          # The name of the exported theme provider function, the\
      \ function signature should match `({ children }: { children: ReactNode }):\
      \ React.JSX.Element`\n          importName: darkThemeProvider\n```"
