    query: How can I automate Red Hat Developer Hub maintanance by configuring permisions
      and roles in external files?
    response: "To automate Red Hat Developer Hub maintenance by configuring permissions\
      \ and roles in external files using Helm, you can follow the steps outlined\
      \ in the knowledge base search results:\n\n1. Define your policies in a rbac-policies.csv\
      \ CSV file by using the following format:\n\n1.\n\n2. Upload your rbac-policies.csv\
      \ and rbac-conditional-policies.yaml files to a rbac-policies config map in\
      \ your OpenShift Container Platform project containing Developer Hub.\n\n```terminal\n\
      $ oc create configmap rbac-policies \\\n     --from-file=rbac-policies.csv \\\
      \n     --from-file=rbac-conditional-policies.yaml\n```\n\n3. Update your Backstage\
      \ custom resource to mount in the Developer Hub filesystem your files from the\
      \ rbac-policies config map:\n\nBackstage custom resource fragment\n\n```yaml\n\
      apiVersion: rhdh.redhat.com/v1alpha5\nkind: Backstage\nspec:\n  application:\n\
      \    extraFiles:\n      mountPath: /opt/app-root/src\n      configMaps:\n  \
      \      - name: rbac-policies\n```\n\n4. Update your Developer Hub app-config.yaml\
      \ configuration file to use the rbac-policies.csv and rbac-conditional-policies.yaml\
      \ external files:\n\napp-config.yaml file fragment\n\n```yaml\npermission:\n\
      \  enabled: true\n  rbac:\n    conditionalPoliciesFile: /opt/app-root/src/rbac-conditional-policies.yaml\n\
      \    policies-csv-file: /opt/app-root/src/rbac-policies.csv\n    policyFileReload:\
      \ true\n```\n\nThis will allow you to automate Red Hat Developer Hub maintenance\
      \ by configuring permissions and roles in external files using Helm."
