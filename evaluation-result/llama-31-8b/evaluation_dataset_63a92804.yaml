- conversation_group_id: catalog-282
  description: catalog
  turns:
  - contexts:
    - 'instance. 1. On the Red Hat Developer Hub navigation menu, click Catalog >
      Self-service or in the Global Header, click Create (+). 2. On the Self-service
      page, locate the Templates you want to use and click Choose to start the scaffolding
      process. 3. Follow the wizard instructions to enter the required project details.
      4. In the Review step, verify your parameters and click Create. The scaffolding
      process begins. You can monitor the progress in the logs or click Cancel to
      stop the operation. If the component is created successfully, a success page
      appears. ![template creation successful] If the creation process fails, you
      must review the logs on the error page for specific failure details. To retry,
      click Start Over; the system retains your previously entered values on the Self
      service page. ![template creation not successful] ## Searching and filtering
      Software Templates in your Red Hat Developer Hub instance To quickly locate
      the correct configuration for your project and reduce time spent browsing the
      catalog, search and filter the available Software Templates. Narrowing your
      search ensures you select the specific template that meets your development
      requirements. 1. In the Red Hat Developer Hub navigation menu, click Catalog
      > Self-service. 2. In the Search field, enter the name for the Software Template.
      3. Optional: To refine the results, select a category from the Category list.
      ## Importing an existing Software Template You can use the Catalog Processor
      to import an existing Software Template into your Red Hat Developer Hub instance.
      You have created a directory or repository that contains at least one template
      YAML file. Optional: To use a template stored in GitHub, you have configured
      Developer Hub integration with GitHub. 1. Open your RHDH app-config.yaml configuration
      file. 2. In the catalog.rules section, add a rule to allow Templates kinds,
      as shown in the following example: ```yaml # ... catalog: rules: allow: [Template]
      locations: type: url target: https://<repository_url/template name>.yaml # ...
      ``` where: catalog.rules.allow:: Specify the Template rule to allow new Software
      Templates in the catalog. catalog.locations.type:: Specify the url type when
      importing templates from a repository (for example, GitHub or GitLab). catalog.locations.target::
      Specify the full URL to the template file. 1. In the Red Hat Developer Hub navigation
      menu, click Catalog. 2. From the Kind list, select Template. 3. Verify that
      your template appears in the Template list. About Red Hat Developer Hub Customizing
      Red Hat Developer Hub'
    expected_response: You can import an existing Software Template into your Red
      Hat Developer Hub instance using the Catalog Processor. First, open your RHDH
      app-config.yaml configuration file. In the `catalog.rules` section, add a rule
      to allow `Template` kinds. For the `catalog.locations`, specify the `type` as
      `url` when importing from a repository and set the `target` to the full URL
