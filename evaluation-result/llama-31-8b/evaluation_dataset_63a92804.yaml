    query: i was looking at the docs for Scaffolder templates and saw something about
      custom Kubernetes actions, specifically the one called kubernetes:create-namespace,
      what does that action do for the Kubernetes cluster in the Developer Hub and
      is there more steps for it?
    response: "Based on the knowledge_search output, I recommend the following response:\n\
      \nThe \"kubernetes:create-namespace\" custom action in Red Hat Developer Hub\
      \ creates a namespace for the Kubernetes cluster in the Developer Hub. To use\
      \ this action in a custom template, add the following configuration:\n\n```\n\
      apiVersion: scaffolder.backstage.io/v1beta3\nkind: Template\nmetadata:\n  name:\
      \ create-kubernetes-namespace\n  title: Create a kubernetes namespace\n  description:\
      \ Create a kubernetes namespace\nspec:\n  type: service\n  parameters:\n   \
      \ - title: Information\n      required: [namespace, token]\n      properties:\n\
      \        namespace:\n          title: Namespace name\n          type: string\n\
      \          description: Name of the namespace to be created\n        clusterRef:\n\
      \          title: Cluster reference\n          type: string\n          description:\
      \ Cluster resource entity reference from the catalog\n          ui:field: EntityPicker\n\
      \          ui:options:\n            catalogFilter:\n              kind: Resource\n\
      \        url:\n          title: Url\n          type: string\n          description:\
      \ Url of the kubernetes API, will be used if clusterRef is not provided\n  \
      \      token:\n          title: Token\n          type: string\n          ui:field:\
      \ Secret\n          description: Bearer token to authenticate with\n       \
      \ skipTLSVerify:\n          title: Skip TLS verification\n          type: boolean\n\
      \          description: Skip TLS certificate verification, not recommended to\
      \ use in production environment, default to false\n        caData:\n       \
      \   title: CA data\n          type: string\n          ui:field: Secret\n   \
      \       description: Certificate Authority base64 encoded certificate\n    \
      \    labels:\n          title: Labels\n          type: string\n          description:\
      \ Labels to be applied to the namespace\n          ui:widget: textarea\n   \
      \       ui:options:\n            rows: 3\n          ui:help: 'Hint: Separate\
      \ multiple labels with a semicolon!'\n```\n\nAlso, ensure that the backstage.io/kubernetes-id\
      \ annotation is present in the catalog-info.yaml file of the entity:\n\n```\n\
      annotations:\n  ...\n  backstage.io/kubernetes-id: <BACKSTAGE_ENTITY_NAME>\n\
      ```\n\nIf you are using a custom namespace, add the backstage.io/kubernetes-namespace\
      \ annotation:\n\n```\nannotations:\n  ...\n  backstage.io/kubernetes-namespace:\
      \ <RESOURCE_NS>\n```\n\nAdditionally, you can use a custom label selector by\
      \ adding an annotation to the catalog-info.yaml file:\n\n```\nannotations:\n\
      \  ...\n  backstage.io/kubernetes-label-selector: 'app=my-app,component=front-end'\n\
      ```\n\nPlease note that you need to update the disabled key value in your Helm\
      \ chart to enable the Kubernetes custom actions plugin:\n\n```\nglobal:\n  dynamic:\n\
      \    includes:\n      - dynamic-plugins.default.yaml\n    plugins:\n      -\
      \ package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-kubernetes-dynamic\n\
      \        disabled: false\n```\n\nCite sources immediately at the end of sentences\
      \ before punctuation, using `` format."
