      node To display a runtime icon in the topology nodes, add the following label
      to workload resources, such as Deployments: ```yaml labels: app.openshift.io/runtime:
      <RUNTIME_NAME> ``` Alternatively, you can include the following label to display
      the runtime icon: ```yaml labels: app.kubernetes.io/name: <RUNTIME_NAME> ```
      Supported values of <RUNTIME_NAME> include: django dotnet drupal go gopher golang
      grails jboss jruby js nginx nodejs openjdk perl phalcon php python quarkus rails
      redis rh spring boot rust java rh openjdk ruby spring spring boot [NOTE] ----
      Other values result in icons not being rendered for the node. ---- ### App grouping
      To display workload resources such as deployments or pods in a visual group,
      add the following label: ```yaml labels: app.kubernetes.io/part of: <GROUP_NAME>
      ``` ### Node connector To display the workload resources such as deployments
      or pods with a visual connector, add the following annotation: ```yaml annotations:
      app.openshift.io/connects-to: ''[{"apiVersion": <RESOURCE_APIVERSION>,"kind":
      <RESOURCE_KIND>,"name": <RESOURCE_NAME>}]'' ``` For more information about the
      labels and annotations, see Guidelines for labels and annotations for OpenShift
      applications. #'
