      resources.
    query: What kind of portal experience and resources are delivered by installing
      the Ansible dynamic plug-ins for Red Hat Developer Hub?
    response: 'The dynamic plugin support is based on the backend plugin manager package,
      which is a service that scans a configured root directory (dynamicPlugins.rootDirectory
      in the app-config.yaml file) for dynamic plugin packages and loads them dynamically.
      You can use the dynamic plugins that come preinstalled with Red Hat Developer
      Hub or install external dynamic plugins from a public NPM registry.


      To store the configuration for dynamic plugins, you can create a ConfigMap object
      that your Backstage custom resource (CR) can reference. Dynamic plugins might
      require certain Kubernetes resources to be configured, which are referred to
      as plugin dependencies. In Red Hat Developer Hub (RHDH), you can automatically
      create these resources when the Backstage CR is applied to the cluster.


      To integrate a custom plugin into Developer Hub, obtain the plugin''s source
      code, export the plugin as a dynamic plugin package, package and publish the
      dynamic plugin, and install the plugin in the Developer Hub environment.


      Note that if the pluginConfig field references environment variables, you must
      define the variables in your <my_product_secrets> secret.


