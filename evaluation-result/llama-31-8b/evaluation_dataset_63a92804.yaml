- conversation_group_id: configuration-257
  description: configuration
  turns:
  - contexts:
    - 'Enabling user authentication with Red Hat Build of Keycloak (RHBK) Authenticate
      users with Red Hat Build of Keycloak (RHBK) by provisioning the users and groups
      from Red Hat Build of Keycloak to the Developer Hub software catalog, and configuring
      the Red Hat Build of Keycloak authentication provider in Red Hat Developer Hub.
      .Prerequisites :_mod-docs-content-type: SNIPPET You added a custom Developer
      Hub application configuration, and have enough permissions to change it. RHBK
      version 26.0. You have access to RHBK with an admin user. [TIP] ---- Alternatively,
      ask your RHBK administrator to prepare in RHBK the required realm and client.
      ---- 1. Register your Developer Hub app in RHBK: 1. Use an existing realm, or
      create a realm, with a distinctive Name such as <my_realm>. Save the value for
      the next step: * RHBK realm base URL, such as: <your_rhbk_URL>/realms/<your_realm>.
      2. To register your Developer Hub in RHBK, in the created realm, secure the
      first application, with: 1. Client ID: A distinctive client ID, such as <RHDH>.
      2. Valid redirect URIs: Set to the OIDC handler URL: https://<my_developer_hub_domain>/api/auth/oidc/handler/frame.
      3. Go to the Credentials tab and copy the Client secret. 4. Save the values
      for the next step: * Client ID * Client Secret 3. To prepare for the verification
      steps, in the same realm, get the credential information for an existing user
      or create a user. Save the user credential information for the verification
      steps. 2. Create a long, complex, and unique string to use as the Developer
      Hub session secret key. 3. Add your RHBK credentials and the session secret
      key to Developer Hub, by adding the following key-value pairs to your Developer
      Hub secrets. You can use these secrets in the Developer Hub configuration files
      by using their environment variable name. KEYCLOAK_CLIENT_ID:: Enter the saved
      Client ID. KEYCLOAK_CLIENT_SECRET:: Enter the saved Client Secret. KEYCLOAK_BASE_URL::
      Enter the saved RHBK realm base URL. KEYCLOAK_REALM:: Enter the realm name to
      provision users. KEYCLOAK_LOGIN_REALM:: Enter the realm name to authenticate
      users. SESSION_SECRET:: Enter the created session secret key. 4. Enable the
      Keycloak catalog provider plugin in your dynamic-plugins.yaml file. The plugin
      is named after RHBK upstream project. This plugin imports RHBK users and groups
      to the Developer Hub software catalog. ```yaml plugins: package: ''./dynamic
      plugins/dist/backstage community plugin catalog backend module keycloak dynamic''
      disabled: false ``` 5. The OIDC provider authentication backend plugin requires
      Developer Hub to support sessions. Enable session support by adding the session
      secret to your app-config.yaml file: ```yaml auth: session: secret: ${SESSION_SECRET}
      ``` 6. Enable provisioning RHBK users and groups to the Developer Hub software
      catalog, by adding the catalog.providers.keycloakOrg section to your app-config.yaml
      file: ```yaml catalog: providers: keycloakOrg: default: baseUrl: ${KEYCLOAK_BASE_URL}
      clientId: ${KEYCLOAK_CLIENT_ID} clientSecret: ${KEYCLOAK_CLIENT_SECRET} realm:
      ${KEYCLOAK_REALM} loginRealm: ${KEYCLOAK_LOGIN_REALM} ``` baseUrl:: Enter your
      RHBK server URL, defined earlier. clientId:: Enter your Developer Hub application
      client ID in RHBK, defined earlier. clientSecret:: Enter your Developer Hub
      application client secret in RHBK, defined earlier. realm:: Enter the realm
      name to provision users. loginRealm:: Enter the realm name to authenticate users.
      Optional: To configure optional fields, see Configuring Red Hat Developer Hub.
      :_mod-docs-content-type: SNIPPET 7. Enable the RHBK authentication provider,
      by adding the OIDC provider section in your app-config.yaml file: ```yaml auth:
      environment: production providers: oidc: production: metadataUrl: ${KEYCLOAK_BASE_URL}
      clientId: ${KEYCLOAK_CLIENT_ID} clientSecret: ${KEYCLOAK_CLIENT_SECRET} prompt:
      auto signInPage: oidc ``` environment: production:: Mark the environment as
      production to hide the Guest login in the Developer Hub home page. metadataUrl,
      clientId, clientSecret:: Configure the OIDC provider with your secrets. prompt::
      Enter auto to allow the identity provider to automatically determine whether
      to prompt for credentials or bypass the login redirect if an active RHBK session
      exists. The identity provider defaults to none, which assumes that you are already
      logged in. Sign-in requests without an active session are rejected. signInPage::
      Enter oidc to enable the OIDC provider as default sign-in provider. Optional:
      To configure optional fields, see Configuring Red Hat Developer Hub. :_mod-docs-content-type:
      SNIPPET 8. To disable the guest login option, in the app-config.yaml file, set
      the authentication environment to production: ```yaml auth: environment: production
      ``` 1. To verify user and group provisioning, check the console logs. Successful
      synchronization example: ``` 2025-06-27T16:02:34.647Z catalog info Read 5 Keycloak
      users and 3 Keycloak groups in 0.4 seconds. Committing... class="KeycloakOrgEntityProvider"
      taskId="KeycloakOrgEntityProvider:default:refresh" taskInstanceId="db55c34b-46b3-402b-b12f-2fbc48498e82"
      trace_id="606f80a9ce00d1c86800718c4522f7c6" span_id="7ebc2a254a546e90" trace_flags="01"
      2025-06-27T16:02:34.650Z catalog info Committed 5 Keycloak users and 3 Keycloak
      groups in 0.0 seconds. class="KeycloakOrgEntityProvider" taskId="KeycloakOrgEntityProvider:default:refresh"
      taskInstanceId="db55c34b-46b3-402b-b12f-2fbc48498e82" trace_id="606f80a9ce00d1c86800718c4522f7c6"
      span_id="7ebc2a254a546e90" trace_flags="01" ``` 2. To verify RHBK user authentication:
      1. Go to the Developer Hub login page. 2. Your Developer Hub sign-in page displays
      Sign in using OIDC and the Guest user sign-in is disabled. 3. Log in with OIDC
      by using the saved Username and Password values. ##'
    expected_response: 'To configure the Developer Hub, you must first add the following
      key-value pairs to your secrets: KEYCLOAK_CLIENT_ID, KEYCLOAK_CLIENT_SECRET,
      KEYCLOAK_BASE_URL, KEYCLOAK_REALM, KEYCLOAK_LOGIN_REALM, and SESSION_SECRET.
      Next, you need to enable the Keycloak catalog provider plugin in your dynamic-plugins.yaml
      file. Then, in your app-config.yaml file, you must enable session support by
      adding `auth: session: secret: ${SESSION_SECRET}`. To provision users and groups,
      add the `catalog.providers.keycloakOrg` section: `catalog: providers: keycloakOrg:
      default: baseUrl: ${KEYCLOAK_BASE_URL} clientId: ${KEYCLOAK_CLIENT_ID} clientSecret:
      ${KEYCLOAK_CLIENT_SECRET} realm: ${KEYCLOAK_REALM} loginRealm: ${KEYCLOAK_LOGIN_REALM}`.
      Finally, to enable the RHBK authentication provider, add the OIDC provider section:
      `auth: environment: production providers: oidc: production: metadataUrl: ${KEYCLOAK_BASE_URL}
      clientId: ${KEYCLOAK_CLIENT_ID} clientSecret: ${KEYCLOAK_CLIENT_SECRET} prompt:
      auto signInPage: oidc`.'
    query: ok so i am trying to get the users and groups from keycloak into the Developer
      Hub software catalog and also make them login with oidc but i am confused what
      all the things i need to add to my secrets and then what all the different sections
      i need to add to the app-config.yaml file to make the Developer Hub work right?
    response: "To answer the user's prompt, you would need to retrieve more search\
      \ results to add the rest of the required information for them. \n\nHowever,\
      \ based on the search results, it can be concluded that to configure OIDC login\
      \ for Keycloak in Developer Hub, you need to add the following key-value pairs\
      \ to your secrets:\n\n* Client ID\n* Client Secret\n* RHBK realm base URL\n\
      * RHBK realm name to provision users\n* RHBK realm name to authenticate users\n\
      * Session secret key\n\nYou also need to enable the Keycloak catalog provider\
      \ plugin in your dynamic-plugins.yaml file. \n\nHere is an example of how to\
      \ configure the Keycloak plugin in your app-config.yaml file:\n\n```yaml\ncatalog:\n\
      \  providers:\n    keycloakOrg:\n      default:\n        schedule:\n       \
      \   frequency: { minutes: 1 }\n          timeout: { minutes: 1 }\n         \
      \ initialDelay: { seconds: 15 }\n        userQuerySize: 100\n        groupQuerySize:\
      \ 100\n```\n\nYou also need to enable session support by adding the session\
      \ secret to your app-config.yaml file:\n\n```yaml\nauth:\n  session:\n    secret:\
      \ ${SESSION_SECRET}\n```\n\nAdditionally, you need to configure the authentication\
      \ method, communication between Developer Hub and Keycloak is enabled by using\
      \ the Keycloak API. Username and password, or client credentials are supported\
      \ authentication methods.\n\nThe final answer is:\n\n{\"name\": \"knowledge_search\"\
      , \"parameters\": {\"query\": \"configuring developer hub with users and groups\
      \ from keycloak and make it login with oidc\"}}"
