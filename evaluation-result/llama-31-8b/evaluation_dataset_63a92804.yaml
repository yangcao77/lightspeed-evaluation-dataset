      dynamicRoutes: - path: / importName: DynamicHomePage # or DynamicCustomizableHomePage
      config: props: title: Our custom RHDH instance subtitle: ''Hello {{displayName}}''
      ``` ## Customizing QuickAccessCard card icons on the Red Hat Developer Hub homepage
      As an administrator, you can customize the QuickAccessCard card icons on the
      Red Hat Developer Hub homepage to enhance its visual appeal and user experience.
      You can integrate custom branding or standard icons by leveraging a remote JSON
      configuration file. 1. Add the JSON Data source. The QuickAccessCard card on
      the homepage supports loading data from a JSON file. This JSON file can be hosted
      in your GitHub repository or any accessible endpoint. 2. Configure the Proxy
      in your RHDH app-config.yaml file. To allow the homepage to fetch data from
      the hosted JSON file, add the following proxy configuration to your RHDH app-config.yaml
      file: ```yaml proxy: endpoints: # customize your backstage instance ''/developer-hub'':
      target: https://raw.githubusercontent.com/ # For example, https://raw.githubusercontent.com/
      pathRewrite: ''^/api/proxy/developer-hub$'': <path-to-your>.json # For example,
      /redhat-developer/rhdh/main/packages/app/public/homepage/data.json changeOrigin:
      true secure: true ``` The following table lists the supported icon types: [NOTE]
