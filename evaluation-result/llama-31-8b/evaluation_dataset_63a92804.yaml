- conversation_group_id: configuration-105
  description: configuration
  turns:
  - contexts:
    - 'The plugin that contributes the tab content allows a configuration, such as
      Developer Hub plugins defining a default configuration in a config section.
      Copy the plugin default configuration in your app config.yaml file, and change
      the layout properties. ```yaml global: dynamic: plugins: package: <package_location>
      disabled: false pluginConfig: dynamicPlugins: frontend: <plugin_name>: mountPoints:
      mountPoint: <mount_point> importName: <import_name> config: layout: gridColumn:
      lg: span 6 xs: span 12 ``` package:: Enter your package location, such as ./dynamic-plugins/dist/backstage-community-plugin-tekton.
      <plugin_name>:: Enter your plugin name, such as: backstage-community.plugin-tekton.
      mountPoint:: Copy the mount point defined in the plugin default configuration,
      such as: entity.page.ci/cards. importName:: Copy the import name defined in
      the plugin default configuration, such as: TektonCI. layout:: Enter your layout
      configuration. The tab content is displayed in a responsive grid that uses a
      12 column-grid and supports different breakpoints (xs, sm, md, lg, xl) that
      can be specified for a CSS property, such as gridColumn. The example uses 6
      of the 12 columns to show two Tekton CI cards side-by-side on large (lg) screens
      (span 6 columns) and shows them among themselves (xs and above span 12 columns).
      ## Customizing the theme mode color palettes for your Developer Hub instance
      You can customize the color palettes of the light and dark theme modes in your
      Developer Hub instance by configuring the light.palette and dark.palette parameters
      in the branding.theme section of the app-config.yaml file, as shown in the following
      example: ```yaml app: branding: theme: light: palette: primary: main: <light_primary_color>
      navigation: indicator: <light_indicator_color> pageTheme: default: backgroundColor:
      [<light_background_color_1>, <light_background_color_2>] dark: palette: primary:
      main: <dark_primary_color> navigation: indicator: <dark_indicator_color> pageTheme:
      default: backgroundColor: [<dark_background_color_1>, <dark_background_color_2>]
      # ... ``` light|dark:: Enter the theme name: light or dark. palette.primary:main::
      Enter the palette main primary color, such as #ffffff or white. palette.navigation:indicator::
      Enter the palette navigation indicator color, which is a vertical bar that indicates
      the selected tab in the navigation panel, such as #FF0000 or red. pageTheme:default:backgroundColor::
      Enter the default page theme background color, such as #ffffff or white. ##
      Customizing the page theme header for your Developer Hub instance You can customize
      the header color for the light and dark theme modes in your Developer Hub instance
      by modifying the branding.theme section of the app-config.yaml file. You can
      also customize the page headers for additional Developer Hub pages, such as
      the Home, Catalog, and APIs pages. ```yaml app: branding: theme: light: palette:
      {} pageTheme: default: backgroundColor: "<default_light_background_color>" fontColor:
      "<default_light_font_color>" shape: none apis: backgroundColor: "<apis_light_background_color>"
      fontColor: "<apis_light_font_color>" shape: none dark: palette: {} pageTheme:
      default: backgroundColor: "<default_dark_background_color>" fontColor: "<default_dark_font_color>"
      shape: none # ... ``` light:: Enter the theme mode, such as light or dark. default::
      Enter the default page theme configuration backgroundColor:: Enter the page
      header background color, such as #ffffff or white. fontColor:: Enter the page
      header text color, such as #000000 or black. shape:: Enter the page header pattern,
      such as wave, round, or none. apis:: Enter the page id to configure, such as
      apis or home. ## Customizing the font for your Developer Hub instance You can
      configure the typography section of the app-config.yaml file to change the default
      font family and size of the page text, as well as the font family and size of
      each heading level, as shown in the following example: ```yaml app: branding:
      theme: light: typography: fontFamily: "Times New Roman" htmlFontSize: 11 # smaller
      is bigger h1: fontFamily: "Times New Roman" fontSize: 40 h2: fontFamily: "Times
      New Roman" fontSize: 30 h3: fontFamily: "Times New Roman" fontSize: 30 h4: fontFamily:
      "Times New Roman" fontSize: 30 h5: fontFamily: "Times New Roman" fontSize: 30
      h6: fontFamily: "Times New Roman" fontSize: 30 dark: typography: fontFamily:
      "Times New Roman" htmlFontSize: 11 # smaller is bigger h1: fontFamily: "Times
      New Roman" fontSize: 40 h2: fontFamily: "Times New Roman" fontSize: 30 h3: fontFamily:
      "Times New Roman" fontSize: 30 h4: fontFamily: "Times New Roman" fontSize: 30
      h5: fontFamily: "Times New Roman" fontSize: 30 h6: fontFamily: "Times New Roman"
      fontSize: 30 # ... ``` ## Default Red Hat Developer Hub theme You can use the
      default Red Hat Developer Hub theme configurations to make your Developer Hub
