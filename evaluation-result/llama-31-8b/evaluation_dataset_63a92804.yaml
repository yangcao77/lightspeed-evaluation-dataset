      \ \"Operator recommended Namespace\" to create and use the `rhdh-operator` namespace.\n\
      \   * Select \"Select a Namespace\" to use an alternative namespace.\n   * From\
      \ the Select Project drop-down menu, select an existing project.\n9. Click on\
      \ the \"Create\" button to create the Red Hat Developer Hub instance.\n10. Wait\
      \ for the upgrade to complete.\n11. After the upgrade, log in to the Developer\
      \ Hub instance to verify that the upgrade was successful.\n\nCite source: ``\
      \ for more information on upgrading Developer Hub in OpenShift Container Platform."
