- conversation_group_id: plugins-349
  description: plugins
  turns:
  - contexts:
    - '# Interacting with Red Hat Developer Lightspeed for Red Hat Developer Hub #
      Interacting with Red Hat Developer Lightspeed for Red Hat Developer Hub Red
      Hat Developer Lightspeed for Red Hat Developer Hub (Developer Lightspeed for
      RHDH) is a virtual assistant powered by generative Artificial Intelligence (AI)
      designed for Red Hat Developer Hub(RHDH). The assistant offers in-depth insights
      into RHDH, including its wide range of capabilities. You can interact with this
      assistant to explore and learn more about RHDH in greater detail. ## About Developer
      Lightspeed for RHDH [IMPORTANT] ---- This section describes Developer Preview
      features in the Red Hat Developer Lightspeed for Red Hat Developer Hub plugin.
      Developer Preview features are not supported by Red Hat in any way and are not
      functionally complete or production-ready. Do not use Developer Preview features
      for production or business-critical workloads. Developer Preview features provide
      early access to functionality in advance of possible inclusion in a Red Hat
      product offering. Customers can use these features to test functionality and
      provide feedback during the development process. Developer Preview features
      might not have any documentation, are subject to change or removal at any time,
      and have received limited testing. Red Hat might provide ways to submit feedback
      on Developer Preview features without an associated SLA. For more information
      about the support scope of Red Hat Developer Preview features, see Developer
      Preview Support Scope. ---- This early access program enables customers to share
      feedback on the user experience, features, capabilities, and any issues encountered.
      Your input helps ensure that Developer Lightspeed for RHDH better meets your
      needs when it is officially released and made generally available. Developer
      Lightspeed for RHDH provides a natural language interface within the RHDH console,
      helping you easily find information about the product, understand its features,
      and get answers to your questions. You can experience Developer Lightspeed for
      RHDH Developer Preview by installing the Developer Lightspeed for RHDH plugin
      within an existing RHDH instance. Alternatively, if you prefer to test it locally
      first, you can try Developer Lightspeed for RHDH using RHDH Local. [IMPORTANT]
      ---- Developer Lightspeed for RHDH uses a FAB instead of a sidebar navigation
      item. If your environment uses another global FAB, you must move the existing
      button or disable it to prevent interface elements from overlapping. In your
      dynamic plugin configuration file, make the following update: ```yaml - package:
      ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import disabled:
      true pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-bulk-import:
      mountPoints: - mountPoint: global.floatingactionbutton/config importName: BulkImportPage
      # Example config: slot: ''bottom-left'' icon: BulkImportIcon label: ''Bulk import''
      toolTip: ''Register multiple repositories in bulk'' to: /bulk-import translationResources:
      - importName: bulkImportTranslations module: Alpha ref: bulkImportTranslationRef
      appIcons: - name: bulkImportIcon importName: BulkImportIcon dynamicRoutes: -
      path: /bulk-import importName: BulkImportPage menuItem: icon: bulkImportIcon
      text: Bulk import textKey: menuItem.bulkImport ``` ---- ![homepage lightspeed
      fab] RHDH Local ## Supported architecture for Red Hat Developer Lightspeed for
      Red Hat Developer Hub Developer Lightspeed for RHDH is available as a plugin
      on all platforms that host RHDH. It requires two sidecar containers: the Lightspeed
      Core Service (LCS) and the Llama Stack service. The LCS container acts as the
      intermediary layer, which interfaces with and manages the Llama Stack service.
      ![developer lightspeed architecture 1 8 0] Red Hat Developer Hub Life Cycle
      and supported platforms ### About Lightspeed Core Service and Llama Stack The
      Lightspeed Core Service and Llama Stack deploy together as sidecar containers
      to augment RHDH functionality. The Llama Stack delivers the augmented functionality
      by integrating and managing core components, which include: Large language model
      (LLM) inference providers Model Context Protocol (MCP) or Retrieval Augmented
      Generation (RAG) tool runtime providers [IMPORTANT] ---- You must verify that
      your model supports tool calling before you enable Model Context Protocol (MCP)
      features. Using an incompatible model results in error messages. ---- * Safety
      providers * Vector database settings The Lightspeed Core Service serves as the
      Llama Stack service intermediary. It manages the operational configuration and
      key data, specifically: User feedback collection MCP server configuration Conversation
      history Llama Stack provides the inference functionality that LCS uses to process
      requests. For more information, see What is Llama Stack. The Red Hat Developer
      Lightspeed for Red Hat Developer Hub plugin in RHDH sends prompts and receives
      LLM responses through the LCS sidecar. LCS then uses the Llama Stack sidecar
      service to perform inference and MCP or RAG tool calling. [NOTE] ---- Red Hat
      Developer Lightspeed for Red Hat Developer Hub is a Developer Preview release.
      You must manually deploy the Lightspeed Core Service and Llama Stack sidecar
      containers, and install the Red Hat Developer Lightspeed for Red Hat Developer
      Hub plugin on your RHDH instance. ---- ## Retrieval augmented generation (RAG)
      embeddings The Red Hat Developer Hub documentation serves as the Retrieval-Augmented
      Generation (RAG) data source. RAG initialization occurs through an initialization
      container, which copies the RAG data to a shared volume. The Llama Stack sidecar
      then mounts this shared volume to access the RAG data. The Llama Stack service
      uses the resulting RAG embeddings in the vector database as a reference. This
      allows the service to provide citations to production documentation during the
      inference process. ##'
    expected_response: The Red Hat Developer Hub documentation is the data source
      for Retrieval-Augmented Generation (RAG). The RAG data is copied to a shared
      volume by an initialization container, which is then mounted by the Llama Stack
      sidecar to access it. The Llama Stack service uses the RAG embeddings in the
      vector database as a reference, allowing it to provide citations to production
      documentation during the inference process.
