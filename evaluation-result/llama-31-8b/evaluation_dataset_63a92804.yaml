    response: "To install TechDocs MCP in RHDH, follow these steps:\n\n1. Install\
      \ the backend MCP server plugin by adding the following configuration to your\
      \ dynamic plugins ConfigMap (e.g., dynamic-plugins-rhdh.yaml):\n\n```\nplugins:\n\
      \  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:bs_1.45.3__0.1.5\n\
      \    disabled: false\n```\n\n2. Install any of the following MCP tools that\
      \ you'd like to use:\n   * Software Catalog MCP tool:\n\n```\n  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.45.3__0.4.1\n\
      \    disabled: false\n```\n\n   * TechDocs MCP\n\n```\n- package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-techdocs-mcp-tool:bs_1.45.3__0.3.2\n\
      \  disabled: false\n```\n\n3. Configure a static token for authentication against\
      \ the MCP server endpoint in your Red Hat Developer Hub app-config.yaml file:\n\
      \n```\nbackend:\n  auth:\n    externalAccess:\n      - type: static\n      \
      \  options:\n          token: ${MCP_TOKEN}\n          subject: mcp-clients\n\
      ```\n\n4. Register the MCP tools that you install as a plugin source:\n\n```\n\
      backend:\n  actions:\n    pluginSources:\n      - software-catalog-mcp-tool\n\
      \      - techdocs-mcp-tool\n```\n\nAfter completing these steps, you should\
      \ be able to install and configure TechDocs MCP in RHDH."
