- conversation_group_id: catalog-238
  description: catalog
  turns:
  - contexts:
    - 'Monitor collective health across components As an administrator, you can use
      the Scorecard plugin to view the collective technical health across multiple
      owned applications or components. This consolidated view helps you identify
      high-level health trends and risks across complex projects. ### Monitor portfolio
      health with aggregated KPIs When you oversee a large portfolio of applications,
      use aggregated Key Performance Indicators (KPIs) to identify high-level health
      trends and technical risks. By consolidating metrics, such as open PRs with
      a status of Error, Warning or Success, from multiple entities in the Software
      Catalog, you can assess the health of your entire team from a single dashboard.
      To maintain RHDH performance, the Scorecard plugin fetches data from external
      sources on schedule and saves them to a database. Although the backend calculates
      KPIs in real time using this stored data, the synchronization of metrics for
      each entity occurs hourly by default. You have the option to customize the refresh
      schedule to balance your requirement for current data with the system processing
      load. The aggregation endpoint (/metrics/:metricId/catalog/aggregations) summarizes
      metrics based on entity ownership. By default, the plugin only considers direct
      ownership, which includes the following entities: Entities you own directly.
      Entities owned by groups where you are a direct member. The plug-in does not
      traverse nested group hierarchies unless you enable transitive parent group
      ownership. ### Configure portfolio health on the home page You can monitor the
      collective technical health of your portfolio by adding the aggregated Scorecard
      widget to the RHDH home page. This widget consolidates key performance indicators
      (KPIs) across all entities that you own. You established owner group relationships
      in the Software Catalog. You have installed the Scorecard plugin. You have the
      scorecard.metric.read permission. You have administrative access to the RHDH
      configuration. You can configure the home page widgets for the interactive home
      page that allows users to customize cards or for read-only home page that displays
      configured cards in a predefined layout. To configure the widgets for customizable
      home page: 1. Update your RHDH app-config.yaml with the following code: ```yaml
      plugins: - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard:bs_1.45.3__2.3.5!red-hat-developer-hub-backstage-plugin-scorecard
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-scorecard:
      entityTabs: - path: "/scorecard" title: Scorecard mountPoint: entity.page.scorecard
      mountPoints: - mountPoint: entity.page.scorecard/cards importName: EntityScorecardContent
      config: layout: gridColumn: 1 / -1 - mountPoint: home.page/cards importName:
      ScorecardHomepageCard config: id: "scorecard-jira.open_issues" title: "Jira
      open blocking tickets" props: metricId: "jira.open_issues" - mountPoint: home.page/cards
      importName: ScorecardHomepageCard config: id: "scorecard-github.open_prs" title:
      "GitHub open PRs" props: metricId: "github.open_prs" - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-dynamic-home-page:
      dynamicRoutes: - path: / importName: DynamicCustomizableHomePage ``` For more
      information, see Customizing Red Hat Developer Hub. 2. Log in to the RHDH application.
      3. Enter the Edit mode on the home page. 4. Click Add widget and select the
      metric to include. [NOTE] ---- You can add only metric at a time. ---- 5. Drag
      the widget to your preferred layout position. 6. Click Save. To configure the
      widgets for read-only home page: 1. Open your RHDH app-config.yaml file. For
      more information, see Configuring Red Hat Developer Hub. 2. Add the aggregated
      Scorecard mount points to the dynamic plugin configuration file: ```yaml plugins:
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scorecard:bs_1.45.3__2.3.5!red-hat-developer-hub-backstage-plugin-scorecard
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-scorecard:
      entityTabs: - path: "/scorecard" title: Scorecard mountPoint: entity.page.scorecard
      mountPoints: - mountPoint: entity.page.scorecard/cards importName: EntityScorecardContent
      config: layout: gridColumn: 1 / -1 - mountPoint: home.page/cards importName:
      ScorecardHomepageCard config: props: metricId: "jira.open_issues" layouts: xl:
      { w: 3, h: 6 } lg: { w: 4, h: 6 } md: { w: 6, h: 6 } sm: { w: 12, h: 6 } xs:
      { w: 12, h: 6 } xxs: { w: 12, h: 6 } - mountPoint: home.page/cards importName:
      ScorecardHomepageCard config: props: metricId: "github.open_prs" layouts: xl:
      { w: 3, h: 6, x: 3 } lg: { w: 4, h: 6, x: 4 } md: { w: 6, h: 6, x: 6 } sm: {
      w: 12, h: 6 } xs: { w: 12, h: 6 } xxs: { w: 12, h: 6 } - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page
      disabled: false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-dynamic-home-page:
      dynamicRoutes: - path: / importName: DynamicHomePage ``` [NOTE] ---- The widget
      automatically calculates and displays aggregations for the entities you own.
      You do not have to manually configure filters or specify target owner groups
      in the widget settings. ---- 1. Log in to RHDH. 2. On the Home page, verify
      that the aggregated Scorecard widget appears with the name you provided. 3.
      Confirm that the displayed KPIs reflect the status of your owned components,
      systems, and resources. ### Schedule metrics to avoid API limits To balance
      data freshness with system performance and API rate limits, you can customize
      the collection frequency for Scorecard metrics. Scorecard uses the Backstage
      built-in scheduler service. The default refresh frequency is hourly, but you
      can adjust it for each metric. You have administrative access to the RHDH configuration.
      You have identified the datasourceId and metricName for the provider you want
      to configure. 1. Open your RHDH app-config.yaml file. 2. Navigate to the scorecard.plugins
      section. 3. Add a schedule configuration for your specific data source and metric
      using the following structure: ```yaml scorecard: plugins: my_datasource: example_metric:
      schedule: frequency: cron: ''0 6 '' timeout: minutes: 5 initialDelay: minutes:
      1 ``` 4. Define the schedule parameters based on the Backstage SchedulerServiceTaskScheduleDefinitionConfig
      schema. 5. Save the file. 6. Restart the RHDH backend to apply the changes.
      [IMPORTANT] ---- Constraints: You must make sure the configured frequency does
      not exceed the API rate limits of your metric provider. ---- Review the backend
      logs to make sure the task is scheduled without errors. Verify that new metric
      data appears in the database according to the defined interval. ### Adjust metric
      retention to manage storage To manage storage capacity and comply with data
      retention policies, adjust the number of days the Scorecard plugin retains metric
      data to align with your organization&#8217;s policies. By default, the system
      retains metrics for 365 days. You have administrative access to the RHDH configuration.
      1. Open your RHDH app-config.yaml file. 2. In the scorecard section, add or
      update the dataRetentionDays parameter with the desired number of days:'
    expected_response: By consolidating metrics, such as open PRs with a status of
      Error, Warning or Success, from multiple entities in the Software Catalog, you
      can assess the health of your entire team from a single dashboard. Owner group
      relationships are also established in the Software Catalog.
    query: how scorecard use software catalog?
    response: "The Scorecard plugin in Red Hat Developer Hub (RHDH) can be used to\
      \ quickly assess the health, security, and compliance of your services in one\
      \ place. By bringing key performance indicators together in a single view, you\
      \ can evaluate component quality and identify issues without jumping between\
      \ multiple tools or systems.\n\nTo use the Scorecard plugin, you must have the\
      \ following permissions:\n\n* scorecard.metric.read\n* catalog.entity.read (for\
      \ the specific entities you intend to query)\n\nYou can configure these permissions\
      \ using the RBAC CSV file or the RBAC Web UI, depending on how you manage access\
      \ in your environment.\n\nTo monitor the collective technical health of your\
      \ portfolio, you can add the aggregated Scorecard widget to the RHDH home page.\
      \ This widget consolidates key performance indicators (KPIs) across all entities\
      \ that you own.\n\nTo configure the widgets for customizable home page:\n\n\
      1. Log in to RHDH.\n2. On the Home page, verify that the aggregated Scorecard\
      \ widget appears with the name you provided.\n3. Confirm that the displayed\
      \ KPIs reflect the status of your owned components, systems, and resources.\n\
      \nYou can also schedule metrics to avoid API limits by customizing the collection\
      \ frequency for Scorecard metrics. Scorecard uses the Backstage built-in scheduler\
      \ service. The default refresh frequency is hourly, but you can adjust it for\
      \ each metric.\n\nTo integrate Jira health metrics using Scorecards, you can\
      \ configure the Jira Scorecard plugin to display project tracking and delivery\
      \ velocity data in your RHDH instance. This integration centralizes development\
      \ status and facilitates the evaluation of component readiness.\n\nThe plugin\
      \ supports Jira Cloud (API v3) and Jira Data Center (API v2).\n\nTo install\
      \ and configure Jira Scorecards in your RHDH instance, complete the following\
      \ steps:\n\n1. Generate a Jira configuration token using one of the following\
      \ methods, depending on your Jira product:\n\t* Jira Cloud: Create a personal\
      \ token. You must create a Base64-encoded string using the following plain text\
      \ format: your-atlassian-email:your-jira-api-token.\n\n```bash\n$ echo -n 'your-atlassian-email:your-jira-api-token'\
      \ | base64\n```\n\n\t* Jira datacenter: Create a Personal Access Token (PAT)\
      \ in your Jira datacenter account.\n2."
