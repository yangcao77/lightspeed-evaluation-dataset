      mode. ```yaml bulkImport: orchestratorWorkflow: your_workflow_id importAPI:
      ''orchestrator'' ``` where: orchestratorWorkflow:: The ID of the workflow to
      run for each repository. importAPI:: The execution mode for the workflow. Enter
      orchestrator to enable workflow execution. 2. Verify that the Orchestrator workflow
      receives the following input: ```yaml { "inputData": { "owner": "redhat developer",
      "repo": "rhdh plugins", "baseBranch": "main", "targetBranch": "bulk import orchestrator"
      }, "authTokens": [ { "token": "<github_token>", "provider": "github" } ] } ```
      where: owner:: Specifies the repository owner (organization or user name). repo::
