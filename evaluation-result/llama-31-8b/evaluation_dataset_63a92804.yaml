      by entering the following commands: ```terminal $ skopeo login registry.redhat.io
      $ skopeo login _<mirror_registry_name>_ $ skopeo copy - remove signatures \
      docker://${PG_IMAGE}@${PG_DIGEST} \ docker://_<mirror_registry_name>_/_<postgresql_repo_name>_:${PG_DIGEST}
      $ skopeo copy - remove signatures \ docker://${RHDH_IMAGE}@${RHDH_DIGEST} \
      docker://_<mirror_registry_name>_/_<rhdh_repo_name>_${RHDH_DIGEST} ``` where
      <mirror_registry_name>:: Specifies the name of the internal mirror registry,
      for example, registry.internal.example.com. <postgresql_repo_name>:: Specifies
      the name of the PostgreSQL repository, for example, rhdh/postgresql-15. <rhdh_repo_name>::
      Specifies the name of the Red Hat Developer Hub repository, for example, rhdh/rhdh-hub-rhel9.
      4. Create a values.yaml file for the Kubernetes platform that you want to use
