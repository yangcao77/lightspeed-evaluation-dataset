- conversation_group_id: plugins-126
  description: plugins
  turns:
  - contexts:
    - 'correct keys are passed and rendered without relying on a full environment
      setup or external translation files during unit testing. Add all languages to
      your application configuration:: This ensures that the RHDH application initializes
      and loads all necessary language resources at startup, making the locales immediately
      available for users to select in the UI. ### Implementing localization support
      for your custom plugins You can implement localization support in your custom
      RHDH plugins so that your plugins are accessible to a diverse, international
      user base and follow recommended best practices. 1. Create the following translation
      files in your plugin''s src/translations/ directory: src/translations/ref.ts
      English reference ```json import { createTranslationRef } from "@backstage/core-plugin-api/alpha";
      export const myPluginMessages = { page: { title: "My Plugin", subtitle: "Plugin
      description", }, common: { exportCSV: "Export CSV", noResults: "No results found",
      }, table: { headers: { name: "Name", count: "Count", }, }, }; export const myPluginTranslationRef
      = createTranslationRef({ id: "plugin.my-plugin", messages: myPluginMessages,
      }); ``` src/translations/de.ts German translation ```json import { createTranslationMessages
      } from "@backstage/core-plugin-api/alpha"; import { myPluginTranslationRef }
      from "./ref"; const myPluginTranslationDe = createTranslationMessages({ ref:
      myPluginTranslationRef, messages: { "page.title": "Mein Plugin", "page.subtitle":
      "Plugin Beschreibung", "common.exportCSV": "CSV exportieren", "common.noResults":
      "Keine Ergebnisse gefunden", "table.headers.name": "Name", "table.headers.count":
      "Anzahl", }, }); export default myPluginTranslationDe; ``` src/translations/fr.ts
      French translation ```json import { createTranslationMessages } from "@backstage/core-plugin-api/alpha";
      import { myPluginTranslationRef } from "./ref"; const myPluginTranslationFr
      = createTranslationMessages({ ref: myPluginTranslationRef, messages: { "page.title":
      "Mon Plugin", "page.subtitle": "Description du plugin", "common.exportCSV":
      "Exporter CSV", "common.noResults": "Aucun résultat trouvé", "table.headers.name":
      "Nom", "table.headers.count": "Nombre", }, }); export default myPluginTranslationFr;
      ``` src/translations/index.ts Translation resource ```json import { createTranslationResource
      } from "@backstage/core-plugin-api/alpha"; import { myPluginTranslationRef }
      from "./ref"; export const myPluginTranslations = createTranslationResource({
      ref: myPluginTranslationRef, translations: { de: () => import("./de"), fr: ()
      => import("./fr"), }, }); export { myPluginTranslationRef }; ``` 2. Create translation
      hooks file, as follows: src/hooks/useTranslation.ts Translation hooks ```json
      import { useTranslationRef } from "@backstage/core-plugin-api/alpha"; import
      { myPluginTranslationRef } from "../translations"; export const useTranslation
      = () => useTranslationRef(myPluginTranslationRef); ``` 3. Update your plugin
      components to replace hard-coded strings with translation calls as shown in
      the following example: Before (hardcoded): ```json const MyComponent = () =>
      { return ( <div> <h1>My Plugin</h1> <button>Export CSV</button> </div> ); };
      ``` After (translated): ```json import { useTranslation } from ''../hooks/useTranslation'';
      const MyComponent = () => { const { t } = useTranslation(); return ( <div> <h1>{t(''page.title'')}</h1>
      <button>{t(''common.exportCSV'')}</button> </div> ); }; ``` 4. (Optional) If
      your content contains variables, use interpolation: ```json // In your translation
      files ''table.pagination.topN'': ''Top {{count}} items'' // In your component
      const { t } = useTranslation(); const message = t(''table.pagination.topN'',
      { count: ''10'' }); ``` 5. (Optional) If your content contains dynamic translation
      keys (for example, from your plugin configuration): ```json // Configuration
      object with translation keys const CARD_CONFIGS = [ { id: ''overview'', titleKey:
      ''cards.overview.title'' }, { id: ''details'', titleKey: ''cards.details.title''
      }, { id: ''settings'', titleKey: ''cards.settings.title'' }, ]; // In your component
      const { t } = useTranslation(); const CardComponent = ({ config }) => { return
      ( <div> <h2>{t(config.titleKey as any)}</h2> {/* Use ''as any'' for dynamic
      keys */} </div> ); }; ``` 6.'
    expected_response: 'To implement localization support for a custom Red Hat Developer
      Hub (RHDH) plugin with a German translation, you must first create a `de.ts`
      file in your plugin''s `src/translations/` directory. This file should use the
      `createTranslationMessages` function from `@backstage/core-plugin-api/alpha`
      and provide German translations for the keys defined in your reference file
      (`ref.ts`). For example, `"page.title": "Mein Plugin"` and `"common.exportCSV":
      "CSV exportieren"`. Next, you need to create a translation resource file, `src/translations/index.ts`,
      which uses `createTranslationResource` to map the German translation file using
      `de: () => import("./de")`. After setting up the translation files, you create
      a translation hooks file (`src/hooks/useTranslation.ts`) and update your plugin
      components to replace hard-coded strings with translation calls, such as `t(''page.title'')`.
      Finally, you must add all languages to your application configuration to ensure
      the RHDH application initializes and loads the language resources at startup,
      making them available in the UI.'
