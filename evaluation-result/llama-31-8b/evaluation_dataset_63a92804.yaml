- conversation_group_id: installation-37
  description: installation
  turns:
  - contexts:
    - 'Installing Red Hat Developer Hub in a partially disconnected environment with
      the Operator On an OpenShift Container Platform cluster operating on a restricted
      network, public resources are not available. However, deploying the Red Hat
      Developer Hub Operator and running Developer Hub requires the following public
      resources: Operator images (bundle, operator, catalog) Operands images (RHDH,
      PostgreSQL) To make these resources available, replace them with their equivalent
      resources in a mirror registry accessible to your cluster. You can use a helper
      script that mirrors the necessary images and provides the necessary configuration
      to ensure those images are used when installing the Red Hat Developer Hub Operator
      and creating Developer Hub instances. This script requires a target mirror registry.
      You likely have a target mirror registry if your cluster is already operating
      on a disconnected network. If you do not already have a target registry, and
      if you have an OpenShift Container Platform cluster, you might want to expose
      and leverage the internal cluster registry. When connected to a OpenShift Container
      Platform cluster, the helper script detects it and automatically exposes the
      cluster registry. If connected to a Kubernetes cluster, you can manually specify
      the target registry to mirror the images. You have installed Podman 5.3 or later.
      For more information, see Podman Installation Instructions. You have installed
      Skopeo 1.17 or later. You have installed yq 4.44 or later. You have installed
      the GNU sed command line text editor. You have installed umoci CLI tool. You
      have an active oc registry, podman, or Skopeo session to the Red Hat Container
      Registry (registry.redhat.io). For more information, see link:Red Hat Container
      Registry Authentication. You have an active Skopeo session with administrative
      access to the target mirror registry. For more information, see Authenticating
      to a registry. You have installed the opm CLI tool. For more information, see
      Installing the opm CLI. If you are using an OpenShift Container Platform cluster,
      you have the following prerequisites: Recommended: You have installed the oc
      mirror tool, with a version corresponding to the version of your OpenShift Container
      Platform cluster. If you are using a supported Kubernetes cluster, you have
      the following prerequisites: You have installed the Operator Lifecycle Manager
      (OLM) on the disconnected cluster. You have a mirror registry that is reachable
      from the disconnected cluster. Make sure that your system meets the minimum
      sizing requirements. See Sizing requirements for Red Hat Developer Hub. 1. In
      your terminal, navigate to the directory where you want to save the mirroring
      script. 2. Download the mirroring script by running the following command: ```terminal
      $ curl sSLO https://raw.githubusercontent.com/redhat developer/rhdh operator/refs/heads/release
      1.9/.rhdh/scripts/prepare restricted environment.sh ``` 3. Run the mirroring
      script by using the bash command with the appropriate set of options: ```terminal
      $ bash prepare restricted environment.sh \ filter versions "1.9" \ [- to registry
      <my.registry.example.com>] \ [- use oc mirror true] ``` where: --to-registry
      _<my.registry.example.com>:: Enter the URL for the target mirror registry where
      you want to mirror the images. --use-oc-mirror true:: Optional: Use the oc-mirror
      OpenShift Container Platform CLI plugin to mirror images. [NOTE] ---- The script
      can take several minutes to complete as it copies multiple images to the mirror
      registry. ---- If you are using Red Hat OpenShift Container Platform, the Red
      Hat Developer Hub Operator is in the Installed Operators list in the web console.
      If you are using a supported Kubernetes platform, you can check the list of
      pods running in the rhdh operator namespace by running the following command
      in your terminal: ```terminal $ kubectl n rhdh operator get pods ``` Use the
      Operator to create a Red Hat Developer Hub instance on a supported platform.
      For more information, see the following documentation for the platform that
      you want to use: Installing Red Hat Developer Hub on OpenShift Container Platform
      with the Operator Installing Developer Hub on EKS with the Operator Installing
      Developer Hub on AKS with the Operator Installing Developer Hub on Google Cloud
      with the Operator Deploying Developer Hub on GKE with the Operator # Installing
      Red Hat Developer Hub on OpenShift Container Platform in an air-gapped environment
      with the Helm chart You can install Red Hat Developer Hub in a fully disconnected
      or partially disconnected environment using the Red Hat Developer Hub Helm chart.
      ##'
    expected_response: 'To install Red Hat Developer Hub in a partially disconnected
      environment on an OpenShift Container Platform cluster, you must make certain
      public resources available by mirroring them to a registry accessible to your
      cluster. The required public resources are Operator images (bundle, operator,
      catalog) and Operands images (RHDH, PostgreSQL). You can use a helper script
      to perform this mirroring. The steps are as follows: 1. In your terminal, navigate
      to the directory where you want to save the script. 2. Download the mirroring
      script by running the command: `$ curl sSLO https://raw.githubusercontent.com/redhat
      developer/rhdh operator/refs/heads/release 1.9/.rhdh/scripts/prepare restricted
      environment.sh`. 3. Run the script using the bash command with the necessary
      options, for example: `$ bash prepare restricted environment.sh \ filter versions
      "1.9" \ [- to registry <my.registry.example.com>]`. After the script completes,
      the Red Hat Developer Hub Operator will be in the Installed Operators list in
      the web console, and you can then use it to create a Red Hat Developer Hub instance.'
    query: What are the specific steps and required public Red Hat resources for installing
      the Red Hat Developer Hub Operator in a partially disconnected OpenShift environment?
    response: "To install the Red Hat Developer Hub Operator in a partially disconnected\
      \ OpenShift environment, you can use the following steps and required public\
      \ Red Hat resources:\n\n1. Create an ImageSetConfiguration file for oc-mirror,\
      \ which includes the images and operators required by the Serverless Logic Operator.\
      \ You can use the following example:\n\n```yaml\napiVersion: mirror.openshift.io/v2alpha1\n\
      kind: ImageSetConfiguration\nmirror:\n  additionalimages:\n  - name: registry.redhat.io/openshift-serverless-1/logic-jobs-service-postgresql-rhel9:1.37\n\
      ```\n\n2. Mirror the Red Hat Developer Hub Operator images to the local registry\
      \ using the RHDH mirroring script.\n\n3. Set up your disconnected environment\
      \ using a local registry.\n\n4. Push the OCI images to your internal container\
      \ registry.\n\n5. Install the oc-mirror tool, with a version corresponding to\
      \ the version of your OpenShift Container Platform cluster.\n\n6. Create an\
      \ ImageSetConfiguration file for oc-mirror, which includes the images and operators\
      \ required by the Serverless Logic Operator.\n\n7. Use the helper script that\
      \ mirrors the necessary images and provides the necessary configuration to ensure\
      \ those images are used when installing the Red Hat Developer Hub Operator and\
      \ creating Developer Hub instances.\n\n8. You have installed Podman 5.3 or later.\n\
      \n9. Expose the registry by doing one of the following actions:\n* If connected\
      \ to a OpenShift Container Platform cluster, the helper script detects it and\
      \ automatically exposes the cluster registry.\n* If connected to a Kubernetes\
      \ cluster, you can manually specify the target registry to mirror the images.\n\
      \n10. Install the Red Hat Developer Hub Operator by following the steps in the\
      \ documentation for installing Red Hat Developer Hub on OpenShift Container\
      \ Platform with the Operator. \n\nRequired public Red Hat resources:\n\n* Red\
      \ Hat Developer Hub Operator images (bundle, operator, catalog)\n* Operands\
      \ images (RHDH, PostgreSQL)\n\nNote: You must cite sources immediately at the\
      \ end of sentences before punctuation, using format (e.g., 'This is a fact.').\
