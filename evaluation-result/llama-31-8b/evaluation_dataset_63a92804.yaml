- conversation_group_id: catalog-192
  description: catalog
  turns:
  - contexts:
    - 'Accessing RHDH data using the Software Catalog MCP tools Use Software Catalog
      MCP tools to manage and retrieve RHDH entities such as Components, Systems,
      Resources, APIs, Locations, Users, and Groups. The software-catalog-mcp-tool
      plugin provides tools to interact with the software catalog. By default, these
      tools return data in a JSON array format. ### Fetching entities using fetch-catalog-entities
      The fetch-catalog-entities tool lists RHDH entities, including components, APIs,
      and resources. "Fetch all ai model resources in the Backstage catalog" "Fetch
      the API definition for the beneficiary management api API" "Construct a curl
      command based on the API definition for the “insert beneficiary” endpoint in
      the beneficiary management api" ### Registering entities using catalog-register-tool
      Use the catalog-register-tool to add new entities to your Software Catalog.
      #### Unregistering entities using catalog-unregister-tool Use the catalog-unregister-tool
      to remove an existing entity from the Software Catalog. ### Retrieving Software
      Template metadata Use the software-template-metadata-tool to retrieve metadata
      for a specific Software Template. ## Accessing and analyzing documentation using
      the TechDocs MCP tools The TechDocs MCP tool enables MCP clients to search and
      retrieve documentation from RHDH for use as context in AI applications. ###
      Retrieving TechDocs URLs and metadata using fetch-techdocs The fetch-techdocs
      TechDocs MCP tool lists all Backstage entities with TechDocs. By default, the
      tool returns results in a JSON array format. Each entry includes entity details
      and TechDocs metadata, like last update timestamp and build information. By
      default, each entry in the JSON array is an entity with the following fields:
      name, title, tags, description, owner, lifecycle, namespace, kind, techDocsUrl,
      matadataUrl and metadata. The following examples show common queries: “Fetch
      all techdocs from the Backstage server” “Fetch all techdocs of the default namespace”
      “Fetch all techdocs created by user:john.doe” ### Measuring documentation gaps
      using analyze-techdocs-coverage The analyze-techdocs-coverage TechDocs MCP tool
      calculates the percentage of entities that have TechDocs configured. Use this
      tool to identify documentation gaps and improve overall documentation coverage.
      You can filter results by the following entity attributes: * type * namespace
      * owner * lifecycle * tags By default, analyze-techdocs-coverage returns a JSON
      entity that includes the totalEntities, entitiesWithDocs, and coveragePercentage
      fields. The following examples show common queries: “What is the coverage of
      techdocs in the backstage server” “What is the coverage of techdocs in the default
      namespace” ### Finding a specific TechDoc using retrieve-techdocs-content The
      retrieve-techdocs-content TechDocs MCP tool retrieves the content of a TechDocs
      resource, enabling AI clients to access documentation content for specific Software
      Catalog entities. By default, the tool returns a JSON entity with the following
      fields: entityRef, name, title, kind, namespace, content, path, contentType,
      lastModified, and metadata. The following examples show common queries: “Fetch
      techdoc with reference component:default/my service” “Fetch page about.html
      from techdoc with reference component:default/my service” Use the parameters
      as shown in the following table to configure your retrieve techdocs content
      TechDocs MCP tool. ##'
    expected_response: 'The TechDocs MCP tool enables clients to search and retrieve
      documentation from RHDH for use as context in AI applications. It includes several
      specific tools: the "fetch-techdocs" tool lists all Backstage entities with
      TechDocs and their metadata; the "analyze-techdocs-coverage" tool calculates
      the percentage of entities that have TechDocs configured to identify documentation
      gaps; and the "retrieve-techdocs-content" tool retrieves the content of a specific
      TechDocs resource, allowing access to documentation for specific Software Catalog
      entities.'
