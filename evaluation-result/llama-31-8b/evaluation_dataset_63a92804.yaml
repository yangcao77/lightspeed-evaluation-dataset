      \ 'developer'] # Show to both roles\n      cta:\n        text: 'Browse Templates'\n\
      \        link: '/create'\n```\n    This code will create a customized onboarding\
      \ experience for both admin and developer roles, with three quickstart steps:\
      \ \"Welcome to Developer Hub\", \"Create Your First Component\", and \"Explore\
      \ Templates\".\n\n    You can customize the title, description, icon, roles,\
      \ and CTA (call-to-action) for each step as per your requirements.\n\n2.  You\
