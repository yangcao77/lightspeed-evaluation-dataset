    query: How do I mount a Kubernetes secret for an RHDH plugin if it's deployed
      using the Operator versus a Helm chart?
    response: "To mount a Kubernetes secret for an RHDH plugin if it's deployed using\
      \ the Operator versus a Helm chart, you can follow these steps:\n\n1.  **Using\
      \ the Red Hat Operator**:\n\n    *   For a Helm chart installation, update your\
      \ Helm chart configuration file.\n    *   Add the annotation `rhdh.redhat.com/containers`\
      \ to your Secret resource with the specific containers to mount to, such as\
      \ `*` to mount to all containers in the deployment, or comma-separated container\
      \ names to mount to specific containers.\n\n        Example:\n\n        *  \
      \ To mount to all containers:\n\n            ```yaml\napiVersion: v1\nkind:\
      \ Secret\nmetadata:\n  name: <my_secret>\n  annotations:\n    rhdh.redhat.com/containers:\
      \ *\n```\n\n        *   To mount to specific containers:\n\n            ```yaml\n\
      apiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: <my_claim>\n\
      \  annotations:\n    rhdh.redhat.com/containers: \"init-dynamic-plugins,backstage-backend\"\
      \n```\n\n    *   You can also specify a different mount path by adding the `rhdh.redhat.com/mount-path`\
      \ annotation to your resource.\n\n        Example:\n\n            ```yaml\n\
      apiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: <my_claim> #\
      \ Specifies the PVC to mount\n  annotations:\n    # Specifies which mount path\
      \ the PVC mounts to (in this case, /mount/path/from/annotation directory)\n\
      \    rhdh.redhat.com/mount-path: /mount/path/from/annotation\n```\n\n    * \
      \  Similarly, you can set the `rhdh.redhat.com/mount-path` annotation to `/mount/path/from/annotation`\
      \ for Secrets.\n\n2.  **Using the Helm Chart**:\n\n    *   In a partially disconnected\
      \ environment, the cluster cannot access external registries but can access\
      \ an internal mirror registry. This method requires direct access to an internal\
      \ mirror registry from the cluster.\n\n        *   You have set up your workstation.\n\
      \        *   You have installed Skopeo 1.17 or later.\n        *   You have\
      \ installed yq 4.4 or later.\n        *   You have installed Helm 3.13 or later.\n\
      \        *   You have an active Skopeo session against registry.redhat.io.\n\
      \        *   You have an active Skopeo session against your target mirror registry,\
      \ for example, registry.internal.example.com.\n        *   You have access to\
      \ the Kubernetes cluster with kubectl configured.\n\n        *   In a terminal,\
      \ download and extract the Helm chart by running the following commands:\n\n\
      \            ```bash\n$ helm repo add <helm_chart_repo_name> https://charts.openshift.io/\n\
      $ helm repo update\n$ helm pull <helm_chart_repo_name>/redhat-developer-hub\
      \ --version <rhdh_version>\n$ helm show values <helm_chart_repo_name>/redhat-developer-hub\
      \ --version <rhdh_version> > values.default.yaml\n```\n\n            *   Make\
      \ sure to add the correct `<helm_chart_repo_name>` and `<rhdh_version>` in the\
      \ above commands.\n\n    *   To mirror dynamic plugin OCI artifacts for deployments\
      \ in restricted environments, use the mirror-plugins.sh script.\n\n        \
      \    *   You have installed Skopeo 1.20 or later.\n            *   You have\
      \ installed tar 1.35 or later.\n            *   You have installed jq 1.7 or\
      \ later.\n            *   You have installed Podman 5.6 or later.\n        \
      \    *   You have authenticated to the source registry, for example, quay.io\
      \ or registry.redhat.io for pulling plugin artifacts.\n            *   If mirroring\
      \ directly to a registry using --to-registry, you have authenticated to the\
      \ target registry.\n\n        *   You can mirror the dynamic plugin OCI artifacts\
      \ using the following command:\n\n            ```bash\n$ mirror-plugins.sh <operator_version>\
      \ --source <source_registry> --destination <destination_registry>\n```\n\n \
      \               *   Replace `<operator_version>` with the version of your Operator.\n\
      \                *   Replace `<source_registry>` with the source registry where\
      \ the plugin artifacts are located.\n                *   Replace `<destination_registry>`\
      \ with the destination registry where you want to mirror the plugin artifacts.\n\
      \n    *   After mirroring the plugin artifacts, you can install the Helm chart\
      \ using the `helm install` command:\n\n            ```bash\n$ helm install rhdh\
      \ redhat-developer-hub -f values.default.yaml --version <rhdh_version>\n```\n\
      \n                *   Replace `<rhdh_version>` with the version of Red Hat Developer\
      \ Hub that you want to install.\n\n3.  **Mounting Secrets and PVCs to Specific\
      \ Containers**:\n\n    *   You can use the annotations `rhdh.redhat.com/containers`\
      \ and `rhdh.redhat.com/mount-path` to specify the containers to mount to for\
      \ both the Operator and Helm chart installations.\n\n    *   Using the `rhdh.redhat.com/containers`\
      \ annotation, you can specify the containers to mount to by comma-separating\
      \ the container names.\n\n    *   Using the `rhdh.redhat.com/mount-path` annotation,\
      \ you can specify a different mount path for Secrets and Persistent Volume Claims\
      \ (PVCs).\n\nFor more information about mounting Secrets and PVCs to specific\
      \ containers, see the [RHDH Documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9/html-single/configuring_red_hat_developer_hub/index)."
