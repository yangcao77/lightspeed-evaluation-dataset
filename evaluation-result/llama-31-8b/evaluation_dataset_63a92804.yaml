      true # Change to "false" in case of using self-hosted cluster with a self-signed
      certificate secure: true ``` http://<SERVICE_NAME>:8080, for example, http://rhdh
      customization provider:8080. [NOTE] ---- The red-hat-developer-hub-customization-provider
      service contains the 8080 port by default. If you are using a custom port, you
      can specify it with the ''PORT'' environmental variable in the app-config.yaml
