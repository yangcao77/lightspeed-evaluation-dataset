- conversation_group_id: plugins-382
  description: plugins
  turns:
  - contexts:
    - 'Provisioning your custom Red Hat Developer Hub configuration To configure Red
      Hat Developer Hub, provision your custom Red Hat Developer Hub config maps and
      secrets to Google Kubernetes Engine (GKE) before running Red Hat Developer Hub.
      [TIP] ---- On Red Hat OpenShift Container Platform, you can skip this step to
      run Developer Hub with the default config map and secret. Your changes on this
      configuration might get reverted on Developer Hub restart. ---- By using the
      Kubernetes CLI (''kubectl''), you have access, with developer permissions, to
      the Kubernetes cluster aimed at containing your Developer Hub instance. 1. For
      security, store your secrets as environment variables values in an OpenShift
      Container Platform secret, rather than in clear text in your configuration files.
      Collect all your secrets in the secrets.txt file, with one secret per line in
      KEY=value form. * Enter your authentication secrets. 2. Author your custom app-config.yaml
      file. This is the main Developer Hub configuration file. You need a custom app-config.yaml
      file to avoid the Developer Hub installer to revert user edits during upgrades.
      When your custom app-config.yaml file is empty, Developer Hub is using default
      values. 1. For a production environment, start with the following setup: app-config.yaml
      ```yaml app: title: <Red Hat Developer Hub> branding: fullLogo: ${BASE64_EMBEDDED_FULL_LOGO}
      fullLogoWidth: 110px iconLogo: ${BASE64_EMBEDDED_ICON_LOGO} backend: cache:
      store: redis connection: ${REDIS_CONNECTION} techdocs: cache: ttl: 3600000 catalog:
      providers: <enter_your_provider_configuration> integrations: <enter_your_integrations_configuration>
      permission: enabled: true rbac: admin: users: - name: user:default/<your_policy_administrator_name>
      pluginsWithPermission: - catalog - scaffolder - permission ``` Most fields use
      environment variables that you defined in secrets in the previous step. app::
      title:: Enter your Developer Hub instance display name, such as <Red Hat Developer
      Hub>. branding:: Set your custom logo. Optionally, customize the width of the
      branding logo by changing value for the fullLogoWidth field. The following units
      are supported: integer, px, em, rem, percentage. backend:: cache:: Enable the
      plugins assets cache. techdocs:: cache:: Enable the TechDocs cache. catalog::
      provider:: Enter your catalog provider configuration. integrations:: Enter your
      repository discovery configuration. permissions:: Enable Role-based access control.
      Enter your policy administrator name. 2. Additionally, provision users and enable
      authentication with your external identity provider. 3. Author your custom dynamic-plugins.yaml
      file to enable plugins. By default, Developer Hub enables a minimal plugin set,
      and disables plugins that require configuration or secrets, such as the GitHub
      repository discovery plugin and the Role-based access control (RBAC) plugin.
      Enable the GitHub repository discovery and the RBAC features: dynamic.plugins.yaml
      ```yaml includes: dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/backstage
      plugin catalog backend module github disabled: false package: ./dynamic plugins/dist/backstage
      community plugin rbac disabled: false ``` 4. Provision your custom configuration
      files to your GKE cluster. 1. Create the <my-rhdh-project> {namespace} aimed
      at containing your Developer Hub instance. ```terminal $ oc create namespace
      my-rhdh-project ``` 2. Provision your app-config.yaml and dynamic-plugins.yaml
      files respectively to the my-rhdh-app-config, and dynamic-plugins-rhdh config
      maps in the <my-rhdh-project> project. ```terminal $ oc create configmap my-rhdh-app-config
      --from-file=app-config.yaml --namespace=my-rhdh-project $ oc create configmap
      dynamic-plugins-rhdh --from-file=dynamic-plugins.yaml --namespace=my-rhdh-project
      ``` Alternatively, create the config maps by using the web console. 3. Provision
      your secrets.txt file to the my-rhdh-secrets secret in the <my-rhdh-project>
      project. ```terminal $ oc create secret generic my-rhdh-secrets --from-file=secrets.txt
      --namespace=my-rhdh-project ``` Alternatively, create the secret by using the
      web console. Provision your PostgreSQL database secrets Provision your dynamic
      plugins config map Provision your RBAC policies config map ## Provision your
      Red Hat Container Registry pull secret to your Red Hat Developer Hub instance
      namespace On Google Kubernetes Engine (GKE), the Red Hat Container Registry
      pull-secret is not managed globally. Therefore add your pull-secret in your
      Red Hat Developer Hub instance namespace. Your credentials to the Red Hat Container
      Registry: <redhat_user_name> <redhat_password> <email> You created the {my rhdh
      project} namespace on GKE to host your Developer Hub instance. 1. Create a pull
      secret using your Red Hat credentials to pull the container images from the
      protected Red Hat Container Registry (registry.redhat.io): ```terminal $ kubectl
      n {my rhdh namespace} create secret docker registry my rhdh pull secret \ docker
      server=registry.redhat.io \ docker username=<redhat_user_name> \ docker password=<redhat_password>
      \ docker email=<email> ``` 2. To enable pulling Developer Hub images from the
      Red Hat Container Registry, add the image pull secret in the default service
      account within the namespace where the Developer Hub instance is being deployed:
      ```terminal $ kubectl patch serviceaccount default \ -p ''{"imagePullSecrets":
      [{"name": "my-rhdh-pull-secret"}]}'' \ -n {my-rhdh-namespace} ``` ##'
    expected_response: 'By default, the GitHub repository discovery plugin is disabled.
      To enable it, you must author a custom dynamic-plugins.yaml file and, within
      the plugins configuration, set "disabled: false" for the package named "./dynamic
      plugins/dist/backstage plugin catalog backend module github".'
    query: How is the GitHub repository discovery plugin enabled in Red Hat Developer
      Hub?
    response: "To enable the GitHub repository discovery plugin in Red Hat Developer\
      \ Hub, you should first create a GitHub App with the following configuration:\n\
      \n* GitHub App name:  `authenticating-with-rhdh-<GUID>`\n* Homepage URL: `https://<my_developer_hub_domain>`\n\
      * Authorization callback URL: `https://<my_developer_hub_domain>/api/auth/github/handler/frame`\n\
      \nThen, register the app and create a client secret. You should also enable\
      \ Role-based access control and configure the required bulk.import RBAC permission\
      \ for the users who are not administrators.\n\nNext, enable the Bulk Import\
      \ feature for users and give them the necessary permissions to access it. You\
      \ should also enable the Bulk Import plugins by editing your dynamic-plugins.yaml\
      \ file with the following content:\n\n```\nplugins:\n  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import-backend-dynamic\n\
      \    disabled: false\n  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import\n\
      \    disabled: false\n```\n\nFinally, provision your custom configuration files\
      \ to your {platform} cluster, create the <my-rhdh-project> {namespace}, and\
      \ enable the GitHub repository discovery and the RBAC features.\n\nIn summary,\
      \ the GitHub repository discovery plugin in Red Hat Developer Hub requires you\
      \ to create a GitHub App with specific configuration, enable Role-based access\
      \ control, configure the required bulk.import RBAC permission, and enable the\
      \ Bulk Import plugins. \n\nClick Bulk Import in Developer Hub left sidebar,\
      \ select the repositories to import, and validate. Developer Hub creates a pull\
      \ request in each selected repository to add the required catalog-info.yaml\
      \ file. Review and merge the changes in GitHub."
    turn_id: b299e366-3e98-4f72-9336-e8467845f601
    turn_metrics:
    - ragas:faithfulness
    - ragas:context_recall
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
