- conversation_group_id: authentication-474
  description: authentication
  turns:
  - contexts:
    - '# Authentication in Red Hat Developer Hub You can enable authentication in
      Red Hat Developer Hub to allow users to sign in to Red Hat Developer Hub using
      credentials from an external identity provider, such as RHBK, GitHub, or Microsoft
      Azure. This integration also allows you to provision user and group data from
      the identity provider to the Developer Hub software catalog, enabling features
      that rely on synchronized user and group data. # Understand authentication and
      user provisioning Learn about the authentication process from creating user
      and group entities in the software catalog to user sign-in, and how authentication
      and catalog plugins enable each step. Understanding this process is essential
      for successfully configuring your Developer Hub instance, securing access through
      authorization, and enabling features that rely on synchronized user and group
      data. To fully enable catalog features, provision user and group data from the
      Identity Provider to the Developer Hub software catalog. Catalog provider plugins
      handle this task asynchronously. These plugins query the Identity Provider (IdP)
      for relevant user and group information, and create or update corresponding
      entities in the Developer Hub catalog. Scheduled provisioning ensures that the
      catalog accurately reflects the users and groups in your organization. When
      a user attempts to access Developer Hub, Developer Hub redirects them to a configured
      authentication provider, such as Red Hat Build of Keycloak (RHBK), GitHub, or
      Microsoft Azure. This external IdP is responsible for authenticating the user.
      On successful authentication, the Developer Hub authentication plugin, configured
      in your app-config.yaml file, processes the response from the IdP, resolves
      the identity in the Developer Hub software catalog, and establishes a user session
      within Developer Hub. Configuring authentication and user provisioning is critical
      for several reasons. Securing your Developer Hub instance by ensuring only authenticated
      users can gain access. Enabling authorization by allowing you to define access
      controls based on user and group memberships synchronized from your IdP. Provisioning
      user and group data to the catalog is necessary for various catalog features
      that rely on understanding entity ownership and relationships between users,
      groups, and software components. [IMPORTANT] ---- Without this provisioning
      step, features such as displaying who owns a catalog entity might not function
      correctly. ---- [TIP] ---- To explore Developer Hub features in a non-production
      environment, you can: * To use Developer Hub without external IdP, enable the
      guest user to skip configuring authentication and authorization, log in as the
      guest user, and access all Developer Hub features. * To use Developer Hub without
      authorization policies and features relying on the software catalog, you can
      enable the dangerouslyAllowSignInWithoutUserInCatalog resolver option. This
      setting bypasses the check requiring a user to be in the catalog but still enforces
      authentication. ---- [IMPORTANT] ---- Developer Hub uses a one-way synchronization
      model, where user and group data flow from your Identity Provider to the Developer
      Hub software catalog. As a result, deleting users or groups manually through
      the Developer Hub Web UI or REST API might be ineffective or cause inconsistencies,
      since Developer Hub will create those entities again during the next import.
      ---- # Enable or disable authentication with the Guest user For trial or non-production
      environments, you can enable guest access to skip configuring authentication
      and authorization and explore Developer Hub features. For production environments,
      disable guest access to ensure secure authentication and authorization. ## Enable
      the Guest login To allow users to log in as a guest on the login page, enable
      the guest login option. 1. In the app-config.yaml file, set the authentication
      environment to development: ```yaml auth: environment: development ``` 2. Restart
      the Developer Hub application to apply the changes. 1. Go to the login page
      of your Developer Hub instance. 2. Verify that the option to log in as a guest
      is available. ## Disable the Guest login To prevent users from logging in as
      a guest on the login page, disable the guest login option. 1. In the app-config.yaml
      file, set the authentication environment to production: ```yaml auth: environment:
      production ``` 2. Restart the Developer Hub application to apply the changes.
      1. Go to the login page of your Developer Hub instance. 2. Verify that the option
      to log in as a guest is no longer available. # Enable authentication with Red
      Hat Build of Keycloak (RHBK) You can enable authentication with RHBK to allow
      users to sign in to Developer Hub using their RHBK credentials. This integration
      also allows you to provision user and group data from RHBK or from an LDAP directory
      to the Developer Hub software catalog, enabling features that rely on synchronized
      user and group data. If the default provisioning options do not meet your needs,
      you can also create a custom transformer to provision user and group data from
      RHBK to the software catalog. ##'
    expected_response: You can enable authentication with Red Hat Build of Keycloak
      (RHBK) to allow users to sign in to Developer Hub using their RHBK credentials.
      When a user attempts to access Developer Hub, they are redirected to the configured
      authentication provider, such as RHBK, which handles the authentication. On
      successful authentication, the Developer Hub authentication plugin processes
      the response from the Identity Provider (IdP), resolves the identity in the
      Developer Hub software catalog, and establishes a user session. This integration
      also allows you to provision user and group data from RHBK to the Developer
      Hub software catalog. This is handled asynchronously by catalog provider plugins,
      which query the IdP for user and group information and then create or update
      corresponding entities in the catalog. This provisioning is critical because
      it is necessary for various catalog features that rely on understanding entity
      ownership and relationships between users, groups, and software components.
      Without this provisioning step, features such as displaying who owns a catalog
      entity might not function correctly.
    query: I'm trying to setup our Red Hat Develper Hub and need to understand the
      whole process for enabling autentication with Red Hat Build of Keycloak (RHBK).
      Can you explain how this integration works, from a user trying to sign in with
      their credentails to how their data gets into the software catalog, and why
      is this user and group data provisoning so critical for the catalog features
      to work correctly?
    response: "To enable user authentication with Red Hat Build of Keycloak (RHBK)\
      \ in Red Hat Developer Hub, you can follow these steps:\n\n1. First, you need\
      \ to register your Developer Hub app in RHBK. This involves creating a realm,\
      \ securing the first application, and copying the Client secret.\n\n2. Next,\
      \ you need to configure the OIDC provider in your `app-config.yaml` file. This\
      \ involves setting the authentication environment to production, configuring\
      \ the OIDC provider with your secrets, and setting the prompt to auto.\n\n3.\
      \ To provision RHBK users and groups to the Developer Hub software catalog,\
      \ you need to enable session support and add the catalog.providers.keycloakOrg\
      \ section to your `app-config.yaml` file.\n\n4. Finally, you need to verify\
      \ user and group provisioning by checking the console logs.\n\nHere is the code\
      \ for the `app-config.yaml` file:\n\n```yaml\nauth:\n  environment: production\n\
      \  providers:\n    oidc:\n      production:\n        metadataUrl: ${KEYCLOAK_BASE_URL}\n\
      \        clientId: ${KEYCLOAK_CLIENT_ID}\n        clientSecret: ${KEYCLOAK_CLIENT_SECRET}\n\
      \        prompt: auto\nsignInPage: oidc\n```\n\n```yaml\ncatalog:\n  providers:\n\
      \    keycloakOrg:\n      default:\n        baseUrl: ${KEYCLOAK_BASE_URL}\n \
      \       clientId: ${KEYCLOAK_CLIENT_ID}\n        clientSecret: ${KEYCLOAK_CLIENT_SECRET}\n\
      \        realm: ${KEYCLOAK_REALM}\n        loginRealm: ${KEYCLOAK_LOGIN_REALM}\n\
      ```\n\nAlso, you can use the following code in your `app-config.yaml` file to\
      \ enable provisioning RHBK users and groups to the Developer Hub software catalog:\n\
      \n```yaml\nsession:\n  secret: ${SESSION_SECRET}\n```"
