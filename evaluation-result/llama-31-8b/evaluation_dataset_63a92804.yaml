- conversation_group_id: installation-469
  description: installation
  turns:
  - contexts:
    - 'OpenShift Container Platform web console to upgrade the Operator to a later
      version. OpenShift Container Platform is currently supported from version 4.16
      to 4.20. See also the Red Hat Developer Hub Life Cycle. You are logged in as
      an administrator on the OpenShift Container Platform web console. You have installed
      the Red Hat Developer Hub Operator. You have configured the appropriate roles
      and permissions within your project to create or access an application. For
      more information, see the Red Hat OpenShift Container Platform documentation
      on Building applications. 1. In the Administrator perspective of the OpenShift
      Container Platform web console, click Operators > Installed Operators. 2. On
      the Installed Operators page, click Red Hat Developer Hub Operator. 3. On the
      Red Hat Developer Hub Operator page, click the Subscription tab. 4. From the
      Upgrade status field on the Subscription details page, click Upgrade available.
      [NOTE] ---- If there is no upgrade available, the Upgrade status field value
      is Up to date. ---- 5. On the InstallPlan details page, click Preview InstallPlan
      > Approve. [IMPORTANT] ---- If you are on the Orchestrator plugin 1.7, you must
      manually update the plugin configuration after approval to avoid a failed deployment.
      For more information, see Upgrading the Orchestrator plugin from 1.7 to 1.9.
      ---- The Upgrade status field value on the Subscription details page is Up to
      date. Installing Red Hat Developer Hub on OpenShift Container Platform with
      the Operator Installing from OperatorHub by using the web console # Upgrading
      the Red Hat Developer Hub Helm Chart You can upgrade to a later version of Red
      Hat Developer Hub in OpenShift Container Platform by using either the web console
      or the CLI. OpenShift Container Platform web console [WARNING] ---- If you have
      installed Developer Hub manually using the Helm CLI, the Helm chart release
      upgrade in the OpenShift Developer Console is going to fail. The failure is
      due to the limitations when using the OpenShift Container Platform console to
      upgrade a Helm release that was initially deployed using the Helm CLI. You can
      bypass this limitation by using the Helm CLI to upgrade. However, if you still
      want to upgrade using the console, select the Helm Chart version from the drop-down
      list and select the Developer Hub version you want to upgrade to. Before performing
      this step, save your values.yaml configuration file in a different location.
      ---- [IMPORTANT] ---- You can upgrade Red Hat Developer Hub directly from any
      previous version to the latest release without installing intermediate versions.
      Before upgrading, you must review the release notes for every skipped version
      to identify breaking changes, deprecations, or required migration steps. For
      example, if upgrading from version 1.5 to 1.7, check the release notes for both
      1.6 and 1.7. ---- 1. In the Developer perspective, click Helm to open the Helm
      Releases tab. 2. Click the overflow menu on the Helm release that you want to
      use and select Upgrade. 3. On the Upgrade Helm Release page, select the version
      of Developer Hub that you want to upgrade to from the chart version drop-down
      list. 4. Click Upgrade. [NOTE] ---- It might take a few minutes to delete the
      resources in the older versions and to start the newer versions of the Developer
      Hub pods. ---- 5. Close all open Developer Hub web pages, and log in again to
      verify that the upgrade was successful. *'
    expected_response: To upgrade the Operator, you must be logged in as an administrator.
      In the Administrator perspective of the OpenShift Container Platform web console,
      click Operators > Installed Operators. On the next page, click Red Hat Developer
      Hub Operator, then click the Subscription tab. On the Subscription details page,
      find the Upgrade status field and click Upgrade available. If no upgrade is
      available, this field will say Up to date. After clicking, you will be on the
      InstallPlan details page where you must click Preview InstallPlan > Approve.
      The Upgrade status will then change to Up to date.
