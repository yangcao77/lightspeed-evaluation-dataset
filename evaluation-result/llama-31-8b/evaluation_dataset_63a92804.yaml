  - contexts:
    - 'the value of the disabled field to true in your dynamic-plugins.yaml file.
      For example: ```yaml package: ./dynamic plugins/dist/red hat developer hub backstage
      plugin global header disabled: true ``` ## Mount points for dynamic plugin integration
      You can customize the application header in Developer Hub using mount points
      for dynamic plugins. These mount points give flexibility in configuring the
      position of the header, its components and dropdown menus. You can create a
      customized experience with the following enhancements: application/header::
      Controls the header position. Use config.position to set placement as either
      above-main-content or above-sidebar. global.header/component:: Configures header
      components. Use config.priority to set the order of components, and pass properties
      (including CSS styles) via config.props. Self-service button:: ```yaml mountPoint:
      global.header/component importName: HeaderIconButton config: priority: 80 props:
      title: Self service icon: add to: create ``` Spacer element:: ```yaml mountPoint:
      global.header/component importName: Spacer config: priority: 99 props: growFactor:
      0 ``` Divider element:: ```yaml mountPoints: mountPoint: global.header/component
      importName: Divider config: priority: 150 ``` global.header/profile:: Configures
      the profile dropdown list when the ProfileDropdown component is enabled. * To
      add a settings link to the profile dropdown, use the following code: ```yaml
      mountPoint: global.header/profile importName: MenuItemLink config: priority:
      100 props: title: Settings link: /settings icon: manageAccounts ``` global.header/create::
      Configures the create dropdown list when the CreateDropdown component is enabled.
      * To add a section for registering a component, use the following code: ```yaml
      mountPoint: global.header/create importName: RegisterAComponentSection config:
      props: growFactor: 0 ``` ## Configuring the logo in the global header You can
      configure a company logo in the global header of the Red Hat Developer Hub (RHDH)
      to reflect your company&#8217;s branding. CompanyLogo is part of the global
      header by default and offers full control over the theming, navigation behavior,
      sizing, and fallback options. This component supports the following props, which
      are provided through configuration: logo: The base64 encoded logo image. to:
      The redirect path for when users click the logo is ''/catalog''. width: The
      logo width is optional and defaults to 150 px. height: The logo height is optional
      and defaults to 40 px. 1. To display a custom company logo in the global header,
      update the configuration with a mount point for CompanyLogo: ```yaml # ...rest
      of the global header configuration red-hat-developer-hub.backstage-plugin-global-header:
      mountPoints: - mountPoint: application/header importName: GlobalHeader config:
      # Supported values: above-main-content | above-sidebar position: above-main-content
      mountPoint: global.header/component importName: CompanyLogo config: priority:
      200 props: # Path to navigate when users click the logo: to: ''/catalog'' width:
      300 height: 200 logo: <string> or <object> # Logo can be a base64 string or
      theme specific object # Example 1: Single logo for all themes # logo: "<base64_encoded_images>"
      # Example 2: Theme-specific logos # logo: dark: ''data:image/png;base64,...''
      # Used in dark theme light: ''data:image/png;base64,...'' # Used in light theme
      ``` 2. (Optional) If you do not provide logo props to the CompanyLogo component,
      the component instead uses values defined under app.branding in your app-config.yaml
      file. You can configure the CompanyLogo as shown in the following configuration:
      ```yaml app: branding: fullLogoWidth: 220 # Fallback width fullLogo: <string>
      or <object> #fullLogo can be a base64 string or theme-specific object # Example
      1: Single logo for all themes #fullLogo: "<base64_encoded_image> # Example 2:
      Theme-specific logos #fullLogo: dark: ''data:image/png;base64,...'' # Used in
      dark theme light: ''data:image/png;base64,...'' # Used in light theme ``` CompanyLogo
      uses the following configuration elements to control fallback and sizing behavior:
      * Logo source priority * The component selects the logo source in the following
      order: First, CompanyLogo props (logo, logo.light, logo.dark), then, app.branding.fullLogo.
      If you do not provide a logo through either, the component displays the default
      Developer Hub theme-specific logo. * Logo width priority * The component applies
      the first available value from props.width, then app.branding.fullLogoWidth
      from app-config.yaml. If you do not specify the width using either, the component
      applies a default width (150 px). [NOTE] ---- CompanyLogo preserves the images
      aspect ratio and never crops or distorts it. If the configured width results
      in a height greater than the maximum allowed (default: 40px), the image is automatically
      scaled down. As a result, adjusting only the width may not visibly change the
      logo unless the height is also configured. Increasing the logo height increases
      the height of the global header. The component first applies the value from
      props.height. If you do not specify the height, the component applies a default
      height (40px). ---- 1. The logo appears correctly in the global header. 2. Click
      the logo to confirm it redirects to the path you defined in props.to. 3. Toggle
      between light and dark themes to ensure the correct logo loads in each. 4. (Optional)
      Temporarily remove the CompanyLogo props to test the fallback to app.branding.fullLogo.
      ## Enabling logo in the sidebar You can configure a logo in the sidebar of the
      Red Hat Developer Hub (RHDH). 1. To display the logo exclusively in the sidebar,
      set the value of the app.sidebar.logo parameter to true as shown in the following
      example: ```yaml app: sidebar: logo: true ``` [NOTE] ---- To display the logo
      in only the sidebar, remove the CompanyLogo component from the configuration.
      ---- 2. To display the same logo in the sidebar for all themes, update the configuration
      as shown in the following configuration: ```yaml app: sidebar: logo: true branding:
      fullLogoWidth: 220 fullLogo: ''data:image/svg+xml;base64,...'' ``` 3. For theme-specific
      logos, you can configure the sidebar logo as shown in the following configuration:
      ```yaml app: sidebar: logo: true branding: fullLogoWidth: 220 fullLogo: light:
      ''data:image/svg+xml;base64,...'' dark: ''data:image/svg+xml;base64,...'' ```
      1. The logo appears correctly in the sidebar. 2. Toggle between light and dark
      themes to ensure the correct logo loads in each. ## Displaying the preferred
      username in the profile dropdown You can display the preferred username in the
      global header profile drop-down list by configuring spec.profile.displayName
      in the user entity. When not configured, the application falls back to a metadata.title.
      If neither is configured, it defaults to a user-friendly name generated by the
      useProfileInfo hook. 1. To configure spec.profile.displayName, use the following
      code: ```yaml apiVersion: backstage.io/v1alpha1 kind: User metadata: # Required
      unique username name: <my_display_name> # Optional preferred title'
    expected_response: When using the `global.header/component` mount point to configure
      header components, you can pass properties, including CSS styles, via `config.props`.
    query: According to the documentation, what is the specified method for applying
      CSS styles to header components in the Red Hat Developer Hub?
    response: The specified method for applying CSS styles to header components in
      the Red Hat Developer Hub is to use the `app-config.yaml` file. This file is
      used to customize the theme, branding, and other settings of the Developer Hub
      instance. To apply CSS styles to header components, you can add configurations
      to the `app-config.yaml` file. For example, you can customize the font color,
      size, and style of text in paragraphs, headings, headers, and buttons, as well
      as the header color, gradient, and shape. Additionally, you can customize some
      components from the Developer Hub GUI, such as the theme mode (Light Theme,
      Dark Theme, or Auto).
