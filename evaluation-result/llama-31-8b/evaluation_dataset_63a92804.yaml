      configuration by inspecting dynamic-plugins.default.yaml file that lists the
      required environment variables for each plugin. The variables for each plugin
      are in the format of ${PLUGIN_VARIABLE_NAME} 3. If any required environment
      variables are missing, set the environment variables by using a secret. For
