      \ = jsonencode({\n      auths = {\n        registry.redhat.io = {\n        \
      \  username = var.redhat_user_name\n          password = var.redhat_password\n\
      \          email   = var.email\n        }\n      }\n  })\n  }\n}\n\nresource\
      \ \"kubernetes_service_account\" \"default\" {\n  metadata {\n    name = \"\
      default\"\n  }\n}\n\nresource \"kubernetesynı [\"imagePullSecrets\"][0].name}\n\
      \n\n    ``` \n\nPlese note the provided terraform code directly applies to the\
