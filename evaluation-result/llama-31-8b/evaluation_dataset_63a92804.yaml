      \ in the app-config.yaml file:\n\n```yaml\n{\"name\": \"knowledge_search\",\
      \ \"parameters\": {\"query\": \"app-config.yaml global header customize\"}}\
      \ \n```\n\nThis function call will provide information on how to customize the\
      \ global header in the app-config.yaml file, including the components and names\
      \ that can be used."
