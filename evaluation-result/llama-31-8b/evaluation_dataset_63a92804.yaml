- conversation_group_id: installation-463
  description: installation
  turns:
  - contexts:
    - 'Deploying Developer Hub on AKS with the Helm chart You can deploy your Developer
      Hub application on Azure Kubernetes Service (AKS) to access a comprehensive
      solution for building, testing, and deploying applications. You have a Microsoft
      Azure account with active subscription. You have installed the Azure CLI. You
      have installed the kubectl CLI. You are logged into your cluster using kubectl,
      and have developer or admin permissions. You have installed Helm 3 or the latest.
      Make sure that your system meets the minimum sizing requirements. See Sizing
      requirements for Red Hat Developer Hub. Permissions issue: Developer Hub containers
      might encounter permission related errors, such as Permission denied when attempting
      certain operations. This error can be addressed by adjusting the fsGroup in
      the PodSpec.securityContext. Ingress configuration: In AKS, configuring ingress
      is essential for accessing the installed Developer Hub instance. Accessing the
      Developer Hub instance requires enabling the Routing add on, an NGINX based
      Ingress Controller, using the following command: ```terminal $ az aks approuting
      enable --resource-group <your_ResourceGroup> --name <your_ClusterName> ``` [TIP]
      ---- You might need to install the Azure CLI extension aks-preview. If the extension
      is not installed automatically, you might need to install it manually using
      the following command: ```terminal $ az extension add --upgrade -n aks-preview
      --allow-preview true ``` ---- [NOTE] ---- After you install the Ingress Controller,
      the app-routing-system namespace with the Ingress Controller will be deployed
      in your cluster. Note the address of your Developer Hub application from the
      installed Ingress Controller (for example, 108.141.70.228) for later access
      to the Developer Hub application, later referenced as <app_address>. ```terminal
      $ kubectl get svc nginx --namespace app-routing-system -o jsonpath=''{.status.loadBalancer.ingress[0].ip}''
      ``` ---- * Namespace management: You can create a dedicated namespace for Developer
      Hub deployment in AKS using the following command: ```terminal $ kubectl create
      namespace <your_namespace> ``` 1. Log in to AKS by running the following command:
      ```terminal $ az login [- tenant=<optional_directory_name>] ``` 2. Create a
      resource group by running the following command: ```terminal $ az group create
      --name <resource_group_name> --location <location> ``` [TIP] ---- You can list
      available regions by running the following command: ```terminal $ az account
      list locations o table ``` ---- 3. Create an AKS cluster by running the following
      command: ```terminal $ az aks create \ --resource-group <resource_group_name>
      \ --name <cluster_name> \ --enable-managed-identity \ --generate-ssh-keys ```
      You can refer to --help for additional options. 4. Connect to your cluster by
      running the following command: ```terminal $ az aks get credentials - resource
      group <resource_group_name> - name <cluster_name> ``` The previous command configures
      the Kubernetes client and sets the current context in the kubeconfig to point
      to your AKS cluster. 5. Open terminal and run the following command to add the
      Helm chart repository: ```terminal $ helm repo add openshift-helm-charts https://charts.openshift.io/
      ``` 6. Create and activate the <my-rhdh-project> namespace: ```terminal DEPLOYMENT_NAME=<redhat
      developer hub> NAMESPACE=<rhdh> kubectl create namespace ${NAMESPACE} kubectl
      config set context - current - namespace=${NAMESPACE} ``` 7. Create a pull secret,
      which is used to pull the Developer Hub images from the Red Hat Container Registry,
      by running the following command: ```terminal $ kubectl -n $NAMESPACE create
      secret docker-registry rhdh-pull-secret \ --docker-server=registry.redhat.io
      \ --docker-username=<redhat_user_name> \ --docker-password=<redhat_password>
      \ --docker-email=<email> ``` 8. Create a file named values.yaml using the following
      template: ```yaml global: host: <app_address> route: enabled: false upstream:
      ingress: enabled: true className: webapprouting.kubernetes.azure.com host: backstage:
      image: pullSecrets: rhdh pull secret podSecurityContext: fsGroup: 3000 postgresql:
      image: pullSecrets: rhdh pull secret primary: podSecurityContext: enabled: true
      fsGroup: 3000 volumePermissions: enabled: true ``` 9. To install Developer Hub
      by using the Helm chart, run the following command: ```terminal $ helm n $NAMESPACE
      install f values.yaml $DEPLOYMENT_NAME openshift helm charts/redhat developer
      hub - version 1.9.0 ``` 10. Verify the deployment status: ```terminal $ kubectl
      get deploy $DEPLOYMENT_NAME -n $NAMESPACE ``` 11. Configure your Developer Hub
      Helm chart instance with the Developer Hub database password and router base
      URL values from your cluster: ```terminal PASSWORD=$(kubectl get secret redhat
      developer hub postgresql o jsonpath="{.data.password}" | base64 d) CLUSTER_ROUTER_BASE=$(kubectl
      get route console n openshift console o=jsonpath=''{.spec.host}'' | sed ''s/^[^.]
      \.//'') helm upgrade $DEPLOYMENT_NAME i "https://github.com/openshift helm charts/charts/releases/download/redhat
      redhat developer hub 1.9.0/redhat developer hub 1.9.0.tgz" \ set global.clusterRouterBase="$CLUSTER_ROUTER_BASE"
      \ set global.postgresql.auth.password="$PASSWORD" ``` 12. Display the running
      Developer Hub instance URL, by running the following command: ```terminal $
      echo "https://$DEPLOYMENT_NAME $NAMESPACE.$CLUSTER_ROUTER_BASE" ``` Open the
      running Developer Hub instance URL in your browser to use Developer Hub. To
      upgrade the deployment, run the following command: ```terminal $ helm upgrade
      $DEPLOYMENT_NAME i https://github.com/openshift helm charts/charts/releases/download/redhat
      redhat developer hub 1.9.0/redhat developer hub 1.9.0.tgz ``` To delete the
      deployment, run the following command: ```terminal $ helm n $NAMESPACE delete
      $DEPLOYMENT_NAME ```'
    expected_response: The Azure CLI is a prerequisite that must be installed. It
      is used to enable the Routing add-on for Ingress configuration with the command
      `az aks approuting enable`. If the `aks-preview` extension is not installed
      automatically, you might need to install it manually using the command `az extension
      add`. The Azure CLI is also used to log in to AKS (`az login`), create a resource
      group (`az group create`), list available regions (`az account list locations`),
      create an AKS cluster (`az aks create`), and connect to your cluster (`az aks
      get-credentials`).
    query: what i use azure cli for?
    response: 'The Azure CLI is a command-line tool used for managing Azure resources.
      It can be used for a variety of tasks, including:


      * Deploying and managing Azure resources, such as virtual machines, storage
      accounts, and networks.

      * Configuring and managing Azure services, such as Azure Active Directory, Azure
      Resource Manager, and Azure Storage.

      * Monitoring and troubleshooting Azure resources and services.


      To use Azure CLI, you need to install the Azure CLI on your local machine and
      then log in to your Azure account. Once you are logged in, you can use the CLI
      to execute commands, such as creating a new resource group, deploying a virtual
      machine, or configuring a storage account.


      For example, you can use the Azure CLI to create a new resource group with the
      following command:


      ```bash

      az group create --name my-resource-group --location west-us

      ```


      This command will create a new resource group named "my-resource-group" in the
      "west-us" location.


      You can also use the Azure CLI to deploy a virtual machine with the following
      command:


      ```bash

      az vm create --resource-group my-resource-group --name my-vm --image UbuntuLTS
      --admin-username my-admin-username --admin-password my-admin-password

      ```


      This command will create a new virtual machine named "my-vm" in the "my-resource-group"
      resource group, using the "UbuntuLTS" image, with the specified admin username
      and password.


      The Azure CLI can also be used to configure and manage Azure services, such
      as Azure Active Directory, Azure Resource Manager, and Azure Storage.


      To use the Azure CLI, you can refer to the following resources:


      * Azure CLI documentation: https://docs.microsoft.com/en-us/cli/azure

      * Azure CLI command reference: https://docs.microsoft.com/en-us/cli/azure/reference

      * Azure CLI tutorials: https://docs.microsoft.com/en-us/cli/azure/tutorial


      It''s worth noting that the Azure CLI is an evolving tool, and new features
      and capabilities are being added regularly. It''s always a good idea to check
      the Azure CLI documentation and command reference for the latest information
      and best practices.'
