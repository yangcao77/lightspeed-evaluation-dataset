- conversation_group_id: installation-397
  description: installation
  turns:
  - contexts:
    - 'Customizing Red Hat Developer Hub #  Configuring Red Hat Developer Hub Customizing
      Red Hat Developer Hub # Installing Red Hat Developer Hub on OpenShift Dedicated
      on Google Cloud using the Helm Chart You can install Developer Hub on OpenShift
      Dedicated on Google Cloud using the Red Hat Developer Hub Helm Chart. You have
      a valid Google Cloud account. Your OpenShift Dedicated cluster is running on
      Google Cloud. For more information, seeCreating a cluster on Google Cloud in
      Red Hat OpenShift Dedicated documentation. You have installed Helm 3 or the
      latest. Make sure that your system meets the minimum sizing requirements. See
      Sizing requirements for Red Hat Developer Hub. 1. From the Developer perspective
      on the Developer Hub web console, click +Add. 2. From the Developer Catalog
      panel, click Helm Chart. 3. In the Filter by keyword box, enter Developer Hub
      and click the Red Hat Developer Hub card. 4. From the Red Hat Developer Hub
      page, click Create. 5. From your cluster, copy the OpenShift Container Platform
      router host (for example: apps.<clusterName>.com). 6. Select the radio button
      to configure the Developer Hub instance with either the form view or YAML view.
      [IMPORTANT] ---- Before deploying Developer Hub using the Helm chart, you must
      define custom configuration settings such as the public baseUrl for your instance.
      Without setting baseUrl, the application cannot function correctly. You can
      define this configuration either through the Form view or the YAML view in the
      Helm install wizard. To configure the baseUrl, set the following values in your
      Helm configuration: ```yaml global: app: baseUrl: https://<your developer hub
      link> backend: baseUrl: https://<your developer hub link> cors: origin: https://<your
      developer hub link> ``` You can also define additional secrets, plugins, and
      advanced configuration in your values.yaml file. For full instructions, see:
      Provisioning your custom Red Hat Developer Hub configuration. ---- The Form
      view is selected by default. 1. Using Form view 1. To configure the instance
      with the Form view, go to Root Schema → global → Enable service authentication
      within Backstage instance and paste your OpenShift Container Platform router
      host into the field on the form. 2. Using YAML view 1. To configure the instance
      with the YAML view, paste your OpenShift Container Platform router hostname
      in the global.clusterRouterBase parameter value as shown in the following example:
      ```yaml global: auth: backend: enabled: true clusterRouterBase: apps.<clusterName>.com
      # other Red Hat Developer Hub Helm Chart configurations ``` 7. Edit the other
      values if needed, then click Create and wait for the database and Developer
      Hub to start. To access the the Developer Hub, click the Open URL icon. Configuring
      Red Hat Developer Hub Customizing Red Hat Developer Hub'
    expected_response: 'To configure the Red Hat Developer Hub instance using the
      YAML view, you must first select the YAML view radio button. It is mandatory
      to define custom configuration settings, such as the public baseUrl, before
      deployment. In the YAML view, you set the baseUrl by configuring the following
      values: `global.app.baseUrl`, `global.backend.baseUrl`, and `global.cors.origin`.
      You also configure the instance by pasting your OpenShift Container Platform
      router hostname in the `global.clusterRouterBase` parameter value. The documentation
      also states that you can define additional secrets, plugins, and advanced configuration
      in your values.yaml file before clicking Create.'
    query: When installing Red Hat Developer Hub with a Helm Chart, what is the procedure
      for configuring the instance using the YAML view and what specific parameters
      are mentioned?
    response: "To configure the instance of Red Hat Developer Hub with a Helm Chart,\
      \ you can use the following command:\n\n```bash\nhelm install rhdh ./_redhat-developer-hub-1.9.0.tgz\
      \ -f values.yaml\n```\n\nReplace `_redhat-developer-hub-1.9.0.tgz` with the\
      \ actual name of the Helm chart archive file, and `values.yaml` with the actual\
      \ path to the configuration file.\n\nAdditionally, you can update the `values.yaml`\
      \ file to include specific parameters, such as:\n\n* `global.clusterRouterBase`:\
      \ sets the cluster router base URL\n* `global.postgresql.auth.password`: sets\
      \ the PostgreSQL database password\n* `local.frontendConfig`: sets the frontend\
      \ configuration\n\nHere is an example of how to update the `values.yaml` file:\n\
      \n```yaml\nglobal:\n  clusterRouterBase: $CLUSTER_ROUTER_BASE\n  postgresql:\n\
      \    auth:\n      password: $PASSWORD\n\nlocal:\n  frontendConfig:\n    ingressSecurityConfig:\n\
      \      className: gce\n      backstage:\n        image:\n          pullSecrets:\n\
      \          - rhdh-pull-secret\n        podSecurityContext:\n          fsGroup:\
      \ 2000\n      postgresql:\n        image:\n          pullSecrets:\n        \
      \  - rhdh-pull-secret\n        primary:\n          podSecurityContext:\n   \
      \         enabled: true\n            fsGroup: 3000\n```\n\nReplace `$CLUSTER_ROUTER_BASE`\
      \ and `$PASSWORD` with the actual values for the cluster router base URL and\
      \ PostgreSQL database password, respectively.\n\nBy updating the `values.yaml`\
      \ file with these parameters, you can customize the configuration of the Red\
      \ Hat Developer Hub instance when installing it with a Helm Chart."
