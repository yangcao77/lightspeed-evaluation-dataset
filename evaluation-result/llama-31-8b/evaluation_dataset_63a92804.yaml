- conversation_group_id: configuration-267
  description: configuration
  turns:
  - contexts:
    - '# Manage and consume technical documentation within Red Hat Developer Hub #
      Adding documentation to TechDocs for your project After an administrator configures
      the TechDocs plugin, a developer can add documentation to TechDocs by importing
      it from a remote repository. Any authorized user or group can access the documentation
      that is imported into the TechDocs plugin. ## Importing documentation into TechDocs
      from a remote repository Teams can store their documentation files in the same
      remote repository where they store their code files. You can import documentation
      into your TechDocs plugin from a remote repository that contains the documentation
      files that your team uses. Your organization has documentation files stored
      in a remote repository. You have a mkdocs.yaml file in the root directory of
      your repository. You have the catalog.entity.create and catalog.location.create
      permissions to import documentation into TechDocs from a remote repository.
      1. In your Red Hat Developer Hub instance, click Catalog > Self-service > Register
      Existing Component. 2. In the Select URL box, enter the URL to the catalog-info.yaml
      file that you want to import from your repository using the following format:
      https://github.com/<project_name>/<repo_name>/blob/<branch_name>/<file_directory>/catalog
      info.yaml 3. Click Analyze 4. Click Finish 1. In the Red Hat Developer Hub navigation
      menu, click Docs. 2. Verify that the documentation that you imported is listed
      in the table on the Documentation page. # Search for relevant content To quickly
      find the information required for your services, search or filter the TechDocs
      catalog. Narrowing your search makes sure you find relevant resources without
      browsing multiple repositories. 1. In the Red Hat Developer Hub navigation menu,
      click Docs. 2. On the Documentation page, use the Search bar or filters to locate
      your document: * Search: Enter keywords to find specific terms within documents.
      * Filter by Owner: View documents owned by specific users or groups. * Filter
      by Tags: Narrow results by specific labels or categories. * Filter by Owned:
      View documents belonging to you or your group. * Filter by Starred: View your
      bookmarked favorites. The results update automatically to show the number of
      documents that meet your criteria. # Access and navigate documentation Use the
      built-in navigation tools to move between related documents within a book. This
      ensures you can easily reference implementation details and requirements in
      a logical sequence. 1. In the Red Hat Developer Hub navigation menu, click Docs.
      2. In the Documentation table, click the name of the document you want to view.
      3. Navigate the content using the following on-screen tools: * Search bar: Find
      keywords within the current document. * Table of contents: Jump to specific
      sections. * Navigation menu: Switch between different documents in the same
      book. * Next: Proceed to the next sequential document. * Add-ons: Perform additional
      actions if plugins are configured, such as setting the text size. # Making changes
      to project documentation in TechDocs You can edit a document in your TechDocs
      plugin directly from the document book page. Any authorized user in your organization
      can edit a document regardless of whether or not they are the owner of the document.
      1. In the Red Hat Developer Hub navigation menu, click Docs. 2. In the Documentation
      table, click the name of the document that you want to edit. 3. In the document,
      click the Edit this page icon to open the document in your remote repository.
      4. In your remote repository, edit the document as needed. 5. Use the repository
      provider UI and your usual team processes to commit and merge your changes.
      # Adding video content to enhance TechDocs You can use <iframe> elements to
      add video content to enhance your experience with TechDocs. An administrator
      has configured your AWS S3 bucket to store TechDocs sites. An administrator
      has configured the appropriate techdocs.sanitizer.allowedIframeHosts and backend.csp
      settings in your app config.yaml file. 1. In the section of the TechDocs file
      that you want to embed a video into, add the following configuration: ```yaml
      <iframe width="<video_width>" height="<video_height>" src="<video_url>" title="<video_title>"
      frameborder="<frame_border>" allow="picture in picture" allowfullscreen> </iframe>
      ``` where <video_width>:: Specifies the width of the video in number of pixels,
      for example, 672. <video_height>:: Specifies the height of the video in number
      of pixels, for example, 378. <video_url>:: Specifies the url of the video, for
      example, https://www.youtube.com/watch?v=LB1w8hjBt5k. <video_title>:: Specifies
      the title of the video, for example, Red Hat Developer Hub Overview Video. <frame_border>::
      Specifies the size of the frame border in number of pixels, for example, 0.
      Use a value of 0 for no border. [NOTE] ---- TechDocs uses DOMPurify to sanitize
      HTML. To prevent DOMPurify from removing the <iframe> elements, you must list
      every permitted video host, such as www.youtube.com, under the techdocs.sanitizer.allowedIframeHosts
      section of your app-config.yaml file. You must also add the video host to the
      backend.csp section of your app-config.yaml file. ---- 2. In the frame-src and
      allowedIframeHosts fields of your app-config.yaml file, add any video hosts
      that you want to use. You can add multiple hosts. For example: ```yaml backend:
      csp: connect src: [''https:''] frame src: [''https://www.youtube.com/''] techdocs:
      builder: external sanitizer: allowedIframeHosts: www.youtube.com <additional_video_host_url>
      publisher: type: awsS3 awsS3: bucketName: ${AWS_S3_BUCKET_NAME} accountId: ${AWS_ACCOUNT_ID}
      region: ${AWS_REGION} ``` #'
    expected_response: To embed video content from a host like youtube.com, you must
      list the permitted video host, such as "www.youtube.com", under the `techdocs.sanitizer.allowedIframeHosts`
      section of your app-config.yaml file. You are also required to add the video
      host to the `backend.csp` section of the app-config.yaml file, for example,
      by adding "https://www.youtube.com/" to the `frame-src` field.
    query: What specific configurations are required in the app-config.yaml file to
      permit the embedding of video content from youtube.com within TechDocs?
    response: "Based on the provided knowledge search results, the key configurations\
      \ required in the app-config.yaml file to permit the embedding of video content\
      \ from youtube.com within TechDocs are:\n\n1. List every permitted video host,\
      \ such as www.youtube.com, under the techdocs.sanitizer.allowedIframeHosts section\
      \ of your app-config.yaml file.\n2. Add the video host to the backend.csp section\
      \ of your app-config.yaml file.\n\nHere's an example configuration:\n\n```yaml\n\
      backend:\n  csp:\n    connect-src: ['https:']\n    frame-src: ['https://www.youtube.com/']\n\
      techdocs:\n  builder: external\n  sanitizer:\n    allowedIframeHosts:\n    \
      \  - www.youtube.com\n  publisher:\n    type: awsS3\n    awsS3:\n      bucketName:\
      \ ${AWS_S3_BUCKET_NAME}\n      accountId: ${AWS_ACCOUNT_ID}\n      region: ${AWS_REGION}\n\
      \      s3ForcePathStyle: true\n```\n\nAdditionally, you must also add the video\
      \ host to the backend.csp section of your app-config.yaml file.\n\n```yaml\n\
      backend:\n  csp:\n    frame-src: ['https://www.youtube.com/']\n```\n\nYou can\
      \ reference the complete examples in the knowledge search results for better\
      \ understanding. Remember to adjust the values according to your environment."
    turn_id: 9b5cce9d-b15f-4e42-b251-75b38131322a
    turn_metrics:
