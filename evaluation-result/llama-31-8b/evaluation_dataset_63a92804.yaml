- conversation_group_id: installation-336
  description: installation
  turns:
  - contexts:
    - 'Installing Developer Hub on EKS with the Helm chart When you install the Developer
      Hub Helm chart in Elastic Kubernetes Service (EKS), it orchestrates the deployment
      of a Developer Hub instance, which provides a robust developer platform within
      the AWS ecosystem. You have an EKS cluster with AWS Application Load Balancer
      (ALB) add on installed. For more information, see Application load balancing
      on Amazon Developer Hub and Installing the AWS Load Balancer Controller add
      on. You have configured a domain name for your Developer Hub instance. The domain
      name can be a hosted zone entry on Route 53 or managed outside of AWS. For more
      information, see Configuring Amazon Route 53 as your DNS service documentation.
      You have an entry in the AWS Certificate Manager (ACM) for your preferred domain
      name. Make sure to keep a record of your Certificate ARN. You have subscribed
      to Red Hat Container Registry (registry.redhat.io). For more information, see
      Red Hat Container Registry Authentication. You have set the context to the EKS
      cluster in your current kubeconfig. For more information, see Creating or updating
      a kubeconfig file for an Amazon EKS cluster. You have installed kubectl. For
      more information, see Installing or updating kubectl. You have installed Helm
      3 or the latest. For more information, see Using Helm with Amazon EKS. You have
      a working default storage class, such as the EBS storage add on, configured
      in your EKS cluster. Make sure that your system meets the minimum sizing requirements.
      See Sizing requirements for Red Hat Developer Hub. 1. Go to your terminal and
      run the following command to add the Helm chart repository containing the Developer
      Hub chart to your local Helm registry: ```terminal $ helm repo add openshift-helm-charts
      https://charts.openshift.io/ ``` 2. Create a pull secret using the following
      command: ```terminal $ kubectl create secret docker-registry rhdh-pull-secret
      \ --docker-server=registry.redhat.io \ --docker-username=<user_name> \ 1 --docker-password=<password>
      \ 2 --docker-email=<email> 3 ``` Enter your username in the command. Enter your
      password in the command. Enter your email address in the command. The created
      pull secret is used to pull the Developer Hub images from the Red Hat Container
      Registry. 3. Create a file named values.yaml using the following template: ```yaml
      global: # TODO: Set your application domain name. host: <your Developer Hub
      domain name> route: enabled: false upstream: service: # NodePort is required
      for the ALB to route to the Service type: NodePort ingress: enabled: true annotations:
      kubernetes.io/ingress.class: alb alb.ingress.kubernetes.io/scheme: internet
      facing # TODO: Using an ALB HTTPS Listener requires a certificate for your own
      domain. Fill in the ARN of your certificate, e.g.: alb.ingress.kubernetes.io/certificate-arn:
      arn:aws:acm:xxx:xxxx:certificate/xxxxxx alb.ingress.kubernetes.io/listen ports:
      ''[{"HTTP": 80}, {"HTTPS":443}]'' alb.ingress.kubernetes.io/ssl redirect: ''443''
      # TODO: Set your application domain name. external-dns.alpha.kubernetes.io/hostname:
      <your rhdh domain name> backstage: image: pullSecrets: - rhdh-pull-secret podSecurityContext:
      # you can assign any random value as fsGroup fsGroup: 2000 postgresql: image:
      pullSecrets: - rhdh-pull-secret primary: podSecurityContext: enabled: true #
      you can assign any random value as fsGroup fsGroup: 3000 volumePermissions:
      enabled: true ``` 4. Update your required domain name, (for example, in Route
      53 or your external DNS service) to point to the provisioned IP address. Elastic
      Kubernetes Service provisions an Application Load Balancer (ALB) with a corresponding
      IP address. 5. Run the following command in your terminal to deploy Developer
      Hub using the latest version of Helm Chart and using the values.yaml file created
      in the previous step: ```terminal $ helm install rhdh \ openshift-helm-charts/redhat-developer-hub
      \ [--version 1.9.0] \ --values /path/to/values.yaml ``` [NOTE] ---- For the
      latest chart version, see https://github.com/openshift-helm-charts/charts/tree/main/charts/redhat/redhat/redhat-developer-hub
      ---- Wait until the DNS name is responsive, indicating that your Developer Hub
      instance is ready for use.'
    expected_response: 'To pull Developer Hub images from the Red Hat Container Registry,
      you must first have a subscription to registry.redhat.io. After that, you need
      to create a pull secret by running the command: `kubectl create secret docker-registry
      rhdh-pull-secret \ --docker-server=registry.redhat.io \ --docker-username=<user_name>
      \ --docker-password=<password> \ --docker-email=<email>`. This created pull
      secret is then used to pull the images. In the `values.yaml` file, you must
      reference this secret under both `backstage: image: pullSecrets` and `postgresql:
      image: pullSecrets`.'
    query: I am platform engineer and I need install Red Hat Developer Hub, what is
      the things I need do for pull the images from the Red Hat Container Registry,
      I am having trouble with this part of setup?
    response: "Here are the steps to pull the images from the Red Hat Container Registry:\n\
      \n1. Create a pull secret using your Red Hat credentials to pull the container\
      \ images from the protected Red Hat Container Registry (registry.redhat.io):\n\
      \n    ```terminal\n    $ kubectl -n {my-rhdh-namespace} create secret docker-registry\
      \ my-rhdh-pull-secret \\\n        --docker-server=registry.redhat.io \\\n  \
      \      --docker-username=<redhat_user_name> \\\n        --docker-password=<redhat_password>\
      \ \\\n        --docker-email=<email>\n    ```\n\n2. Add the image pull secret\
      \ in the default service account within the namespace where the Developer Hub\
      \ instance is being deployed:\n\n    ```terminal\n    $ kubectl patch serviceaccount\
      \ default \\\n        -p '{\\\"imagePullSecrets\\\": [{\\\"name\\\": \\\"my-rhdh-pull-secret\\\
      \"}]}' \\\n        -n {my-rhdh-namespace}\n    ```\n\n3. To expose the application,\
      \ make sure you create Ingresses instead of OpenShift Routes.\n\n4. To use the\
      \ Developer Hub Operator to run Developer Hub with your custom configuration,\
      \ create your Backstage custom resource (CR) that mounts files provisioned in\
      \ your custom config maps and injects environment variables provisioned in your\
      \ custom secrets.\n\n5. Make sure you have access, with developer permissions,\
      \ to the AKS cluster aimed at containing your Developer Hub instance. Your administrator\
      \ has installed the Red Hat Developer Hub Operator in the cluster.\n\n6. Use\
      \ the Kubernetes CLI ('kubectl') to create a file named values.yaml using the\
      \ following template:\n\n    ```yaml\n    global:\n      host: <app_address>\n\
      \    route:\n      enabled: false\n    upstream:\n      ingress:\n        enabled:\
      \ true\n        className: webapprouting.kubernetes.azure.com\n        host:\
      \ <app_address>\n    backstage:\n      image:\n        pullSecrets:\n      \
      \    - rhdh-pull-secret\n      podSecurityContext:\n        fsGroup: 3000\n\
      \    postgresql:\n      image:\n        pullSecrets:\n          - rhdh-pull-secret\n\
      \      primary:\n        podSecurityContext:\n          enabled: true\n    \
      \      fsGroup: 3000\n    volumePermissions:\n      enabled: true\n    ```\n\
      \n7. Install Developer Hub by using the Helm chart, run the following command:\n\
      \n    ```terminal\n    $ helm -n {rhdhNs} install -f values.yaml {app_name}\
      \ openshift-helm-charts/redhat-developer-hub --version 1.9.0\n    ```\n\n8.\
      \ Make sure you have the necessary permissions and are logged in as an administrator\
      \ on the OpenShift Container Platform web console.\n\n9. Follow the instructions\
      \ in the documentation for the specific platform you are using to complete the\
      \ installation.\n\nNote: These steps are based on the provided knowledge base\
      \ and may require additional setup or configuration depending on your specific\
      \ environment."
