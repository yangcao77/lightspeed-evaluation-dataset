      \n```yaml\nupstream:\n  backstage:\n    extraVolumes:\n      # IMPORTANT: Due\
      \ to a Helm limitation with arrays, you must also\n      # include all the volumes\
      \ defined in the default Helm Chart\n      # before adding the new one\n   \
      \   # ...\n      - name: registry-ca-bundle\n        configMap:\n          name:\
      \ registry-ca-bundle\n\n    initContainers:\n      - name: install-dynamic-plugins\n\
