- conversation_group_id: configuration-54
  description: configuration
  turns:
  - contexts:
    - 'want to add. You might need to add Template to the global catalog.rules.allow
      list or add a granular rule to the location to allow for Software Templates
      ingestion, as shown in the following example: ```yaml # ... catalog: locations:
      type: url target: https://<repository_url>/example template.yaml rules: allow:
      [Template] # ... ``` where: catalog.locations.type:: Enter the url type if you
      are importing templates from a repository, such as GitHub or GitLab. catalog.locations.target::
      Enter the URL for the template. catalog.locations.rules.allow:: Enter the Template
      rule to allow new Software Templates to be added to the catalog. After creating
      a component with the updated template, verify the provenance annotations in
      the resulting Catalog Entity YAML. 1. In the Red Hat Developer Hub navigation
      menu, go to Catalog and locate the newly created catalog component. 2. To view
      the underlying data that links the entity to the template, select the INSPECT
      ENTITY option. 3. To verify provenance annotations, complete the following steps:
      1. Select the YAML Raw or JSON Raw view and verify the presence of the data
      item for the scaffoldedFrom link. 2. Optional: If versioning was included, verify
      the presence of the backstage.io/template-version annotation. [NOTE] ---- If
      you publish the catalog component to an external repository (such as Git), the
      component file in that repository must also contain the backstage.io/template-version
      annotation. ---- ### Viewing Software Template dependencies As a developer,
      you can track which entities were created from a specific Software Template.
      When a platform engineer configures provenance on a template, you can quickly
      identify the complete dependency and impact map of that template by viewing
      all linked components and resources in the Catalog. To view all components created
      from a specific template, complete the following steps: 1. In the Red Hat Developer
      Hub navigation menu, click Catalog, use the filters to find and select the Software
      Template you wish to inspect. 2. In the Software Template detail page, click
      the Dependencies tab. This view lists all catalog entities such as components,
      resources, and systems that reference this template, including any version information
      if configured. ## Automated Software Template lifecycle management When Software
      Templates receive security updates or configuration changes, you can apply those
      updates to all downstream repositories automatically so that your applications
      remain compliant without manual file comparisons. Automated template lifecycle
      management maintains consistency by monitoring your source templates. When a
      template version changes, the scaffolder-relation-processor plugin identifies
      all entities provisioned from that template and creates a pull request (PR)
      or merge request (MR) containing the necessary file updates, additions, or deletions.
      ### Enabling automated template updates To automate the synchronization of changes
      from Software Templates to your repositories, you must configure the plugin
      in your backend settings and ensure that your entities contain the required
      metadata. You have administrator access to the Red Hat Developer Hub configuration.
      You have configured GitHub or GitLab integrations in your RHDH app config.yaml
      file. Your scaffolded entities include the spec.scaffoldedFrom field referencing
      the source template. Your entities include the backstage.io/managed by location
      annotation pointing to a valid GitHub or GitLab URL. 1. Enable the template
      sync and notification plugins in your RHDH dynamic-plugins.yaml file: ```yaml
      plugins: # Enables the core template synchronization logic - package: ''./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-scaffolder-relation-processor''
      disabled: false # Required only if you want to receive notifications for new
      pull requests - package: ''./dynamic-plugins/dist/backstage-plugin-notifications''
      disabled: false ``` 2. Open your RHDH app-config.yaml file. 3. Configure the
      pull request (PR) feature by adding the following configuration: ```yaml scaffolder:
      pullRequests: templateUpdate: enabled: true ``` 4. Optional: Enable notifications
      to alert entity owners when a PR is created: ```yaml scaffolder: notifications:
      templateUpdate: enabled: true ``` 5. Restart the Red Hat Developer Hub instance
      to apply the changes. 1. Update the version of a source template in its repository.
      2. Navigate to a repository scaffolded from that template. 3. Confirm that a
      new pull request named [component-name]/template-upgrade-v[version] exists.
      ### Template sync considerations and limitations Review the following details
      to troubleshoot or refine the synchronization process. The plugin automatically
      assigns a reviewer if the entity owner is a User entity with a defined VCS login.
      GitHub: Requires the github.com/user login annotation. GitLab: Requires the
      gitlab.com/user login annotation. If the owner is a Group, the plugin creates
      the PR without an assigned reviewer. The synchronization engine uses regex matching
