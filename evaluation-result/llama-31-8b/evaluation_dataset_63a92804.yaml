      0L0'
    expected_response: For an Operator deployment, the dynamic-plugin configuration
      is stored in a ConfigMap referenced by your Backstage custom resource (CR).
      In a Helm deployment, the configuration is located in your values.yaml file
      or in separate configuration files.
    query: Backstage custom resource config location
    response: "To provide the best possible answer to the prompt for a custom resource\
      \ in Backstage, here is the markdown formatted response with embedded code blocks.\
      \ \n\nTo create a Backstage custom resource, you can either use the minimal\
      \ `my-rhdh-custom-resource.yaml` custom resource example or the custom resource\
      \ example with dynamic plugins and RBAC policies config maps, and external PostgreSQL\
      \ database secrets.\n\n```yaml\n# Minimal my-rhdh-custom-resource.yaml custom\
      \ resource example\napiVersion: rhdh.redhat.com/v1alpha5\nkind: Backstage\n\
      metadata:\n  name: my-rhdh-custom-resource\nspec:\n  application:\n    appConfig:\n\
      \      mountPath: /opt/app-root/src\n      configMaps:\n         - name: my-rhdh-app-config\n\
      \    extraEnvs:\n      secrets:\n         - name: <my_product_secrets>\n   \
      \ extraFiles:\n      mountPath: /opt/app-root/src\n    route:\n      enabled:\
      \ true\n  database:\n    enableLocalDb: true\n```\n\nOr, you can use the custom\
      \ resource example with dynamic plugins and RBAC policies config maps, and external\
      \ PostgreSQL database secrets:\n\n```yaml\n# my-rhdh-custom-resource.yaml custom\
      \ resource example with dynamic plugins and RBAC policies config maps, and external\
      \ PostgreSQL database secrets\napiVersion: rhdh.redhat.com/v1alpha5\nkind: Backstage\n\
      metadata:\n  name: <my-rhdh-custom-resource>\nspec:\n  application:\n    appConfig:\n\
      \      mountPath: /opt/app-root/src\n      configMaps:\n         - name: my-rhdh-app-config\n\
      \         - name: rbac-policies\n    dynamicPluginsConfigMapName: dynamic-plugins-rhdh\n\
      \    extraEnvs:\n      secrets:\n         - name: <my_product_secrets>\n   \
      \      - name: my-rhdh-database-secrets\n    extraFiles:\n      mountPath: /opt/app-root/src\n\
      \      secrets:\n        - name: my-rhdh-database-certificates-secrets\n   \
      \       key: postgres-crt.pem, postgres-ca.pem, postgres-key.key\n    route:\n\
      \      enabled: true\n  database:\n    enableLocalDb: false\n```\n\nBoth of\
      \ these custom resource examples can be used as templates to create and manage\
      \ custom resources in Backstage. The operator automatically sets the base URLs\
      \ for your Backstage application in the default app-config ConfigMap known as\
      \ backstage-appconfig-{CR_name} based on your route parameters and the OpenShift\
      \ cluster ingress domain. \n\nNote: The `my-product-namespace` in the OpenShift\
      \ Container Platform web console should be replaced with the actual namespace\
      \ of your project."
