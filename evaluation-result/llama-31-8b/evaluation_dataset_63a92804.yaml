      from the npx @red-hat-developer-hub/cli@latest plugin package command.
    query: What file must be updated to add custom dynamic plugins to Red Hat Developer
      Hub?
    response: The file to update for custom dynamic plugins in Red Hat Developer Hub
      is `dynamic-plugins.yaml`.
