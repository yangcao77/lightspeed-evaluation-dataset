- conversation_group_id: plugins-132
  description: plugins
  turns:
  - contexts:
    - 'Installing dynamic plugins with the Red Hat Developer Hub Operator You can
      store the configuration for dynamic plugins in a ConfigMap object that your
      Backstage custom resource (CR) can reference. Dynamic plugins might require
      certain Kubernetes resources to be configured. These resources are referred
      to as plugin dependencies. For more information, see Dynamic plugins dependency
      management. In Red Hat Developer Hub (RHDH), you can automatically create these
      resources when the Backstage CR is applied to the cluster. [NOTE] ---- If the
      pluginConfig field references environment variables, you must define the variables
      in your <my_product_secrets> secret. ---- 1. From the OpenShift Container Platform
      web console, select the ConfigMaps tab. 2. Click Create ConfigMap. 3. From the
      Create ConfigMap page, select the YAML view option in Configure via and edit
      the file, if needed. Example ConfigMap object using the GitHub dynamic plugin
      ```yaml kind: ConfigMap apiVersion: v1 metadata: name: dynamic-plugins-rhdh
      data: dynamic-plugins.yaml: | includes: - dynamic-plugins.default.yaml plugins:
      - package: ''./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-github-dynamic''
      disabled: false pluginConfig: catalog: providers: github: organization: "${GITHUB_ORG}"
      schedule: frequency: { minutes: 1 } timeout: { minutes: 1 } initialDelay: {
      seconds: 100 } ``` 4. Click Create. 5. Go to the Topology view. 6. Click on
      the overflow menu for the Red Hat Developer Hub instance that you want to use
      and select Edit Backstage to load the YAML view of the Red Hat Developer Hub
      instance. ![operator install 2] 7. Add the dynamicPluginsConfigMapName field
      to your Backstage CR. For example: ```yaml apiVersion: rhdh.redhat.com/v1alpha5
      kind: Backstage metadata: name: my rhdh spec: application: # ... dynamicPluginsConfigMapName:
      dynamic plugins rhdh # ... ``` 8. Click Save. 9. Navigate back to the Topology
      view and wait for the Red Hat Developer Hub pod to start. 10. Click the Open
      URL icon to start using the Red Hat Developer Hub platform with the new configuration
      changes. Ensure that the dynamic plugins configuration has been loaded, by appending
      /api/dynamic plugins info/loaded plugins to your Red Hat Developer Hub root
      URL and checking the list of plugins: Example list of plugins ```json [ { "name":
      "backstage plugin catalog backend module github dynamic", "version": "0.5.2",
      "platform": "node", "role": "backend plugin module" }, { "name": "backstage
      plugin techdocs", "version": "1.10.0", "role": "frontend plugin", "platform":
      "web" }, { "name": "backstage plugin techdocs backend dynamic", "version": "1.9.5",
      "platform": "node", "role": "backend plugin" }, ] ``` ### Dynamic plugins dependency
      management Dynamic plugins configured for the Backstage custom resource (CR)
      may require certain Kubernetes resources to be configured to make the plugin
      work. These resources are referred to as plugin dependencies. In Red Hat Developer
      Hub (RHDH), you can automatically create these resources when the Backstage
      CR is applied to the cluster. #### Cluster level plugin dependencies configuration
      You can configure plugin dependencies by including the required Kubernetes resources
      in the /config/profile/{PROFILE}/plugin-deps directory. You must add the required
      resources as Kubernetes manifests in YAML format in the plugin-deps directory.
      Example showing how to add example-dep1.yaml and example-dep2.yaml as plugin
      dependencies: ```terminal config/ profile/ rhdh/ kustomization.yaml plugin deps/
      example dep1.yaml example dep2.yaml ``` [NOTE] ---- * If a resource manifest
      does not specify a namespace, it will be created in the namespace of the Backstage
      CR. * Resources may contain {{backstage-name}} and {{backstage-ns}} placeholders,
      which will be replaced with the name and namespace of the Backstage CR, respectively.
      ---- The kustomization.yaml file must contain the following lines: ```yaml configMapGenerator:
      files: plugin deps/example dep1.yaml plugin deps/example dep2.yaml name: plugin
      deps ``` #### Plugin dependencies infrastructure To install infrastructural
      resources that are required by plugin dependencies, for example, other operators
      or custom resources (CR), you can include these in the /config/profile/{PROFILE}/plugin-infra
      directory. To create these infrastructural resources (along with the operator
      deployment), use the make plugin-infra command. [NOTE] ---- On a production
      cluster, use this command with caution as it might reconfigure cluster-scoped
      resources. ---- #### Plugin configuration You must reference the plugin dependencies
      in the dependencies field of the plugin configuration when the Backstage CR
      is applied. The Operator creates the resources described in the files located
      in the plugin-deps directory. You can reference plugin dependencies in the dynamic-plugins
      ConfigMap which can either be part of the default profile configuration for
      all Backstage custom resources or part of the ConfigMap referenced in the Backstage
      CR. In Red Hat Developer Hub, you can include plugin dependencies in the dynamic
      plugin configuration. Each dependencies.ref value can either match the full
      file name or serve as a prefix for the file name. The operator will create the
      resources described in the files contained in the plugin-deps that start with
      the specified ref value or exactly match it Example showing how to add example-dep
      plugin dependency: ```yaml apiVersion: v1 kind: ConfigMap metadata: name: default
      dynamic plugins data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      plugins: disabled: false package: "path or url to example plugin" dependencies:
      ref: example dep ``` ### Installing dynamic plugins using the Helm chart You
      can deploy a Developer Hub instance by using a Helm chart, which is a flexible
      installation method. With the Helm chart, you can sideload dynamic plugins into
      your Developer Hub instance without having to recompile your code or rebuild
      the container. To install dynamic plugins in Developer Hub using Helm, add the
      following global.dynamic parameters in your Helm chart: plugins: the dynamic
      plugins list intended for installation. By default, the list is empty. You can
      populate the plugins list with the following fields: package: a package specification
      for the dynamic plugin package that you want to install. You can use a package
      for either a local or an external dynamic plugin installation. For a local installation,
      use a path to the local folder containing the dynamic plugin. For an external
      installation, use a package specification from a public NPM repository. integrity
      (required for external packages): an integrity checksum in the form of <alg>
      <digest> specific to the package. Supported algorithms include sha256, sha384
      and sha512. pluginConfig: an optional plugin specific app config.yaml YAML fragment.
      See plugin configuration for more information. disabled: disables the dynamic
      plugin if set to true. Default: false.'
    expected_response: 'To install dynamic plugins in Developer Hub using a Helm chart,
      you add `global.dynamic` parameters. This includes `plugins`, which is the list
      of dynamic plugins for installation. This list can be populated with the following
      fields: `package`, a specification for the dynamic plugin; `integrity`, a required
      checksum for external packages; `pluginConfig`, an optional plugin-specific
      YAML fragment; and `disabled`, which is set to `true` to disable the plugin.'
    query: What global dynamic parameters are used to install dynamic plugins in Developer
      Hub using a Helm chart?
    response: "The global dynamic parameters used to install dynamic plugins in Developer\
      \ Hub using a Helm chart are:\n\n* `plugins`: the dynamic plugins list intended\
      \ for installation\n* `package`: a package specification for the dynamic plugin\
      \ package that you want to install\n* `integrity`: an integrity checksum in\
      \ the form of `<alg>-<digest>` specific to the package\n* `pluginConfig`: an\
      \ optional plugin-specific app-config.yaml YAML fragment\n* `disabled`: disables\
      \ the dynamic plugin if set to true\n* `forceDownload`: Set the value to true\
      \ to force a reinstall of the plugin, bypassing the cache\n* `pullPolicy`: Similar\
      \ to the forceDownload parameter and is consistent with other image container\
      \ platforms\n\nThese parameters can be specified in the `global.dynamic` section\
      \ of the Helm chart configuration file. For example:\n\n```yaml\nglobal:\n \
      \ dynamic:\n    plugins:\n      - package: <package-spec>\n      - package:\
      \ <package-spec>\n        integrity: sha512-<hash>\n        pluginConfig: <plugin-config>\n\
      \      disabled: false\n      forceDownload: true\n      pullPolicy: Always\n\
      ```\n\nNote that the `pullPolicy` setting can be used to control how the plugin\
      \ is installed, and can be set to either `Always` or `IfNotPresent`. The `forceDownload`\
      \ option can be used to force a reinstall of the plugin, bypassing the cache."
    turn_id: 5cce00eb-7894-4064-8e54-5161e87e890d
