    query: Wat is the IS_ENTITY_OWNER rule used for?
    response: The IS_ENTITY_OWNER rule is used to allow entities owned by a specified
      claim. This rule is used in conditional policies to specify that a user must
      be the owner of an entity to have access to it. The rule takes a list of claims
      as a parameter, which are matched against the ownedBy fields of the entities.
