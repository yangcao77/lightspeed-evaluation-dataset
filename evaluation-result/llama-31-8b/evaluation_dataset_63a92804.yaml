- conversation_group_id: catalog-196
  description: catalog
  turns:
  - contexts:
    - 'Troubleshooting MCP server and client problems The following procedures guide
      you through resolving common issues when using a Model Communication Protocol
      (MCP) server and tool. ### Verifying successful installation of MCP plugins
      1. Log in to the OCP cluster running RHDH and go to your RHDH project using
      the following code: ``` $ oc project {my product namespace} ``` 2. Inspect the
      logs for the installation of the RHDH dynamic plugins using the following code:
      ``` $ oc logs c install dynamic plugins deployment/<my product deployment> ```
      1. You must see an entry for the MCP backend server plugin as shown in the following
      code: ``` ..... prior logs .... ======= Installing dynamic plugin oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:bs_1.42.5__0.1.2!backstage-plugin-mcp-actions-backend
      ==> Copying image oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:next__0.2.0
      to local filesystem ==> Successfully installed dynamic plugin oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:bs_1.42.5__0.1.2!backstage-plugin-mcp-actions-backend
      ``` 2. You must see entries for any of the MCP tool plugins you installed as
      shown in the following code: ``` ..... prior logs .... ======= Installing dynamic
      plugin oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.42.5__0.2.3!red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool
      ==> Copying image oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.42.5__0.2.3!red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool
      to local filesystem ==> Successfully installed dynamic plugin oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.42.5__0.2.3!red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool
      ``` ### Checking MCP tool logs for status and errors The Backstage LoggerService
      target name starts with the name of the MCP tool (either software-catalog-mcp-tool
      or techdocs-mcp-tool). The MCP tools generate a log by default. For example:
      ```terminal `[backend]: 2025-09-25T16:24:22.660Z software-catalog-mcp-tool info
      fetch-catalog-entities: Fetching catalog entities with options: kind="Component"`
      ``` If any errors occur in the MCP tools, check the logs. ### Understand and
      respond to MCP tool error messages The MCP tools response provides an optional
      error message that communicates any issues encountered during the use of the
      tool, including potential input validation errors. ### Resolving the Model does
      not support tool calling error This error indicates that the model configured
      in your MCP client lacks the required functionality to handle tool calls. The
      error message appears similar to: Invalid request: model gemma3:27b does not
      support tool calls. 1. Consult your model documentation to confirm its support
      for tool calling. 2. If the current model does not support tool calling, change
      the model that your MCP client uses to a tool-calling compatible model. ###
      Resolving authentication issues when tools are not found If your MCP client
      connects to the server but cannot find deployed tools, an authentication or
      configuration issue is likely. 1. Verify the authentication token. 1. Configure
      a static token for the RHDH MCP server. 2. Set this token as the bearer token
      in your MCP client and make sure the authorization header is the configuration
      that specifies Bearer before the token, for example, Bearer <mcp_token>. 2.
      Check the MCP endpoint configuration. 1. Confirm that the MCP server URL properly
      resolves, particularly if you are using a desktop client. 2. Use legacy SSE
      endpoint if your MCP client requires it instead of the Streamable endpoint.
      (For more details, see the Configuration topic). 3. Verify your RHDH app-config.yaml
      file for duplicate backend entries and make sure that the indentation is accurate.
      1. Make sure that the configuration for the static token and MCP plugin sources
      go under an existing backend field, if one is present. 2. If you are unsure,
      see the sample app configuration provided in the reference procedure. ### Resolve
      nonsensical MCP tool output Nonsensical output often occurs when smaller models
      or models with smaller context sizes cannot effectively manage repeated tool
      calls within the same context window. To improve the quality of the tool output,
      take the following actions: 1. Select an appropriate model for tool calling.
      1. Verify that the model has good support for tool calling. 2. Make sure your
      model is not too small. We recommend a model with at least 7 billion parameters
      and a context window of 32k. 2. Refine your queries. 1. Use more well-defined
      queries that limit the amount of data returned in the response from the tool.
      3. If possible, increase the context window size of the model. We recommend
      at least 32k for these MCP tools.'
    expected_response: The Backstage LoggerService target name starts with the name
      of the MCP tool, which is techdocs-mcp-tool. The MCP tools generate a log by
      default, and if any errors occur, you should check the logs.
