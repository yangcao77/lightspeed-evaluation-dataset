- conversation_group_id: installation-42
  description: installation
  turns:
  - contexts:
    - 'Installing Red Hat Developer Hub on OpenShift Container Platform in a partially
      disconnected environment with the Helm chart If your network has access to the
      registry.redhat.io registry and the charts.openshift.io Helm chart repository,
      you can deploy your Red Hat Developer Hub instance in your partially disconnected
      environment by mirroring the specified resources directly to the target registry.
      You have installed Red Hat OpenShift Container Platform 4.16 or later. You have
      access to the charts.openshift.io Helm chart repository. You have access to
      the registry.redhat.io. You have access to a mirror registry that can be reached
      from the disconnected cluster, for example, the OpenShift Container Platform
      image registry. For more information about exposing the OpenShift Container
      Platform image registry, see Exposing the registry. You are logged in to your
      target mirror registry and have permissions to push images to it. For more information,
      see Configuring credentials that allow images to be mirrored. You have installed
      the OpenShift CLI (oc) on your workstation. Recommended on OpenShift Container
      Platform: You have installed the oc mirror OpenShift CLI (oc) plugin v2. For
      more information, see Installing the oc mirror OpenShift CLI plugin. You have
      an account in Red Hat Developer portal. Make sure that your system meets the
      minimum sizing requirements. See Sizing requirements for Red Hat Developer Hub.
      1. Log in to your OpenShift Container Platform account using the OpenShift CLI
      (oc) by running the following command: ```terminal $ oc login u <user> p <password>
      https://api.<hostname>:6443 ``` 2. From your disconnected cluster, log in to
      the image registry that you want to mirror, for example, the OpenShift Container
      Platform image registry. 3. Create an ImageSetConfiguration.yaml file to specify
      the resources that you want to mirror. For example: ```yaml apiVersion: mirror.openshift.io/v2alpha1
      kind: ImageSetConfiguration mirror: helm: repositories: name: openshift charts
      url: https://charts.openshift.io charts: name: redhat developer hub version:
      "1.9" ``` version: "1.9":: Enter the Red Hat Developer Hub version to mirror.
      4. Mirror the resources specified in the image set configuration file directly
      to the target registry by running the oc-mirror command. For example: ```terminal
      $ oc mirror - config=<mirror_config_directory>/ImageSetConfiguration.yaml <target
      mirror registry> ``` where: <mirror_config_directory>:: Specifies the location
      of your image set configuration file on your system, for example, .user. <target_mirror_registry>::
      Specifies the location and name of your target mirror registry, for example,docker://registry.example:5000.
      [NOTE] ---- Running the oc-mirror command creates a local workspace containing
      the Helm chart and a ImageContentSourcePolicy (ICSP) manifest. The ICSP manifest
      contains an automatically-generated imageContentSourcePolicy.yaml file that
      you must apply against the cluster in a later step. ---- 5. In your workspace,
      locate the ImageDigestMirrorSet (IDMS) and ImageTagMirrorSet (ITMS) files by
