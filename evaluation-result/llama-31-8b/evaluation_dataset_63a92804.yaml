    query: How do the Red Hat Developer Hub Operator let me run my custom configuration,
      like with the config maps and secrets I made?
    response: "To run Red Hat Developer Hub with your custom configuration, create\
      \ your Backstage custom resource (CR) that mounts files provisioned in your\
      \ custom config maps and injects environment variables provisioned in your custom\
      \ secrets. You can create an empty Backstage CR and run Developer Hub with the\
      \ default configuration. The `app-config-rhdh` config map must include your\
      \ customized `app-config.yaml` file.\n\n``` yaml\napiVersion: rhdh.redhat.com/v1alpha5\n\
      kind: Backstage\nmetadata:\n  name: <my-rhdh-custom-resource>\nspec:\n  application:\n\
      \    appConfig:\n      mountPath: /opt/app-root/src\n      configMaps:\n   \
      \     - name: my-rhdh-app-config\n    extraEnvs:\n      secrets:\n        -\
