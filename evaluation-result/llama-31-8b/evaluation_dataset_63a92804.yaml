- conversation_group_id: configuration-160
  description: configuration
  turns:
  - contexts:
    - 'Managing plugins by using Extensions Administrators can install and configure
      plugins directly through the Extensions interface. [IMPORTANT] ---- This feature
      is supported in development environments only. In a production environment,
      the interface prevents plugin installation and is not supported. ---- ![extensions
      restart plugin 1] 1. Navigate to Administration > Extensions. 2. On the Catalog
      tab, select a plugin to install. You can use the default configuration or modify
      it. 3. On the Installed tab, use the Actions menu on a plugin card to: * Edit
      the configuration. * Disable or enable the plugin. 4. Restart the backend to
      apply your changes. ### Configuring RBAC to manage Extensions You can add Extensions
      permissions by creating or updating and existing RBAC role. For more information
      about using RBAC to manage role-based controls, see Managing role-based access
      controls (RBAC) using the Red Hat Developer Hub Web UI. #### Creating a role
      in the Developer Hub UI to manage Extensions You have enabled RBAC, have a policy
      administrator role in Developer Hub, and have added plugins with permission.
      1. Go to Administration at the bottom of the sidebar in the Developer Hub. The
      RBAC tab appears, displaying all the created roles in the Developer Hub. 2.
      Click Create to create a role. 3. Enter the user name and description (optional)
      of role in the given fields and click Next. 4. In Add users and groups, select
      the user name, and click Next. 5. In Add permission policies, select Extensions
      from the plugins dropdown. 6. Expand Extensions, select both the Create and
      Read permissions for the Extensions plugin and click Next. 7. Click Create to
      create the role. ![extensions rbac role create] After you refresh the RHDH application,
      when you select a plugin, the Actions drop-down is active. When you click the
      Actions drop-down, you can edit the the plugin configuration, and enable or
      disable the plugin. ### Configuring RHDH to install plugins by using Extensions
      When you install a plugin using Extensions UI, the configuration that you use
      is saved to a dynamic-plugins.extensions.yaml file within the dynamic-plugins-root
      persistent volume. This ensures the configuration is available when you restart
      the application, allowing you to edit or re-enable the plugin. You must create
      a persistent volume claim (PVC) to ensure that the cache persists when you restart
      the RHDH application. For more information about using the dynamic plugins cache,
      see Using the dynamic plugins cache. You have created a persistent volume claim
      (PVC) for the dynamic plugins cache with the name dynamic plugins root. You
      have installed Red Hat Developer Hub using the Helm chart or the Operator. You
      have installed the OpenShift CLI (oc). 1. Create the extensions configuration
      file and save it as dynamic-plugins.extensions.yaml. For example: ```yaml includes:
      dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/red hat
      developer hub backstage plugin extensions disabled: false pluginConfig: dynamicPlugins:
      frontend: red hat developer hub.backstage plugin marketplace: translationResources:
      importName: marketplaceTranslations ref: marketplaceTranslationRef module: Alpha
      appIcons: name: pluginsIcon importName: PluginsIcon dynamicRoutes: path: /extensions
      importName: DynamicMarketplacePluginRouter menuItem: icon: pluginsIcon text:
      Extensions textKey: menuItem.extensions menuItems: extensions: parent: default.admin
      package: ./dynamic plugins/dist/red hat developer hub backstage plugin extensions
      backend dynamic disabled: false pluginConfig: extensions: installation: enabled:
      true saveToSingleFile: file: /opt/app root/src/dynamic plugins root/dynamic
      plugins.extensions.yaml ``` where: translationResources:: Sets the extension
      point for localization. 2. Copy the file to your cluster by running the following
      commands: ```yaml oc get pods n <your namespace> oc cp ./dynamic plugins.extensions.yaml
      <your namespace>/<pod name>:/opt/app root/src/dynamic plugins root/dynamic plugins.extensions.yaml
      ``` 3. Update your RHDH application to use this file: 1. For operator-based
      installations: 1. Update your Backstage CR to update the NODE_ENV environment
      variable to development, as follows: ```yaml apiVersion: rhdh.redhat.com/v1alpha5
      kind: Backstage metadata: name: developer hub namespace: rhdh spec: application:
      dynamicPluginsConfigMapName: dynamic plugins rhdh extraEnvs: envs: name: NODE_ENV
      value: "development" secrets: name: secrets rhdh extraFiles: mountPath: /opt/app
      root/src route: enabled: true database: enableLocalDb: true ``` 2. Update your
      dynamic-plugins-rhdh config map to include your extensions configuration file,
      as follows: ```yaml kind: ConfigMap apiVersion: v1 metadata: name: dynamic plugins
      rhdh namespace: rhdh data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      /dynamic plugins root/dynamic plugins.extensions.yaml plugins: [] ``` 2. For
      Helm chart installations: 1. Upgrade the Helm release to include your extensions
      configuration file and update the NODE_ENV environment variable to development:
      ```yaml global: auth: backend: enabled: true clusterRouterBase: apps.<clusterName>.com
      dynamic: includes: dynamic plugins.default.yaml /dynamic plugins root/dynamic
      plugins.extensions.yaml upstream: backstage: extraEnvVars: name: NODE_ENV value:
      development ``` 2. Click Upgrade Enable a plugin by using the Extensions UI,
      restart your RHDH application and refresh the UI to confirm that the plugin
      is enabled. ### Configuring RHDH Local to install plugins by using Extensions
      You can use RHDH Local to test installing plugins by using Extensions. [IMPORTANT]
      ---- RHDH Local is maintained as an open-source project by Red Hat, but is not
      supported or subject to any service level agreement (SLA). ---- You have installed
      RHDH Local. For more information about setting up RHDH Local, see Test locally
      with Red Hat Developer Hub. 1. Update your dynamic plugins.override.yaml file:
      ```yaml includes: dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/red
      hat developer hub backstage plugin extensions disabled: false pluginConfig:
      dynamicPlugins: frontend: red hat developer hub.backstage plugin marketplace:
      translationResources: importName: marketplaceTranslations ref: marketplaceTranslationRef
      module: Alpha appIcons: name: pluginsIcon importName: PluginsIcon dynamicRoutes:
      path: /extensions importName: DynamicMarketplacePluginRouter menuItem: icon:
      pluginsIcon text: Extensions textKey: menuItem.extensions menuItems: extensions:
      parent: default.admin package: ./dynamic plugins/dist/red hat developer hub
      backstage plugin extensions backend dynamic disabled: false pluginConfig: extensions:
      installation: enabled: true saveToSingleFile: file: /opt/app root/src/configs/dynamic
      plugins/dynamic plugins.override.yaml ``` where: translationResources:: Sets
      the extension point for localization. 2. Update your compose.yaml file: ```yaml
      rhdh: container_name: rhdh environment: NODE_OPTIONS: "- inspect=0.0.0.0:9229"
      NODE_ENV: "development" ``` Enable a plugin by using the Extensions UI, restart
      your RHDH application and refresh the UI to confirm that the plugin is enabled.
      ### Installing plugins by using Extensions You can install and configure plugins
      by using Extensions. You have configured RHDH to allow plugins installation
      from Extensions. You have configured RBAC to allow the current user to manage
      plugin configuration. 1. Navigate to Extensions. 2. Select a plugin to install.
      3. Click'
    expected_response: "For Helm chart installations, you need to upgrade the Helm\
      \ release to include your extensions configuration file and update the NODE_ENV\
      \ environment variable to development with the following configuration:\n```yaml\n\
      global:\n  auth:\n    backend:\n      enabled: true\n  clusterRouterBase: apps.<clusterName>.com\n\
      \  dynamic:\n    includes:\n      dynamic-plugins.default.yaml\n      /dynamic-plugins-root/dynamic-plugins.extensions.yaml\n\
      \  upstream:\n    backstage:\n      extraEnvVars:\n        name: NODE_ENV\n\
      \        value: development\n```\nAfterward, click Upgrade."
    query: How do i configer my RHDH Helm chart instalation to use the Extensions
      UI for plugins?
    response: 'Based on the search results, here is the final answer to the question
      "How do I configure my RHDH Helm chart installation to use the Extensions UI
      for plugins?":


      To configure your RHDH Helm chart installation to use the Extensions UI for
      plugins, follow these steps:


      1. Create a persistent volume claim (PVC) for the dynamic plugins cache with
      the name `dynamic-plugins-root`.


      2. Install Red Hat Developer Hub using the Helm chart or the Operator.


      3. Install the OpenShift CLI (oc).


      4. Create the extensions configuration file and save it as `dynamic-plugins.extensions.yaml`.


      5. In your Helm chart, add the global.dynamic parameters required to install
      a dynamic plugin.


      6. In your Helm chart, add the default `backstage-plugin-techdocs-module-addons-contrib`
      package configuration.


      7. Add the `techdocsAddons` section to the Helm chart, specifying the external
      TechDocs add-on you want to install.


      8. Update your Helm chart configuration file to include the `registry-ca-bundle`
      ConfigMap.


      9. Mount the CA bundle ConfigMap into your RHDH configuration.


      10. Update your Backstage CR to include the `dynamicPluginsConfigMapName` key-value
      pair, specifying the name of your dynamic plugins ConfigMap.


      11. Apply the changes and restart your RHDH application.


      12. Refresh the UI to confirm that the plugin is enabled and configured correctly.


      Please note that these steps are based on the search results and may require
      additional configuration or setup depending on your specific environment and
      requirements.


      For more information, please refer to the search results cited below:


      *

      *

      *'
