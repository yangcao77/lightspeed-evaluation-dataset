- conversation_group_id: ci_cd-409
  description: ci_cd
  turns:
  - contexts:
    - 'Configuring CI/CD to generate and publish TechDocs sites TechDocs reads the
      static generated documentation files from a cloud storage bucket, such as OpenShift
      Data Foundation. The documentation site is generated on the CI/CD workflow associated
      with the repository containing the documentation files. You can generate docs
      on CI and publish to a cloud storage using the techdocs-cli CLI tool. You can
      use the following example to create a script for TechDocs publication: ```shell
      # Prepare REPOSITORY_URL=''https://github.com/org/repo'' git clone $REPOSITORY_URL
      cd repo # Install @techdocs/cli, mkdocs and mkdocs plugins npm install -g @techdocs/cli
      pip install "mkdocs-techdocs-core==1.*" # Generate techdocs cli generate - no
      docker # Publish techdocs cli publish - publisher type awsS3 - storage name
      <bucket/container> - entity <Namespace/Kind/Name> ``` The TechDocs workflow
      starts the CI when a user makes changes in the repository containing the documentation
      files. You can configure the workflow to start only when files inside the docs/
      directory or mkdocs.yml are changed. Configuring dynamic plugins # TechDocs
      add ons TechDocs add-ons are dynamic plugins that extend the functionality of
      the built-in TechDocs plugin. For example, you can use add-ons to report documentation
      issues, change text size, or view images in overlay in either the TechDocs Reader
      page or an Entity page. The following table describes the TechDocs add-ons that
      are available for Red Hat Developer Hub 1.9: The backstage-plugin-techdocs-module-addons-contrib
      plugin package exports both preinstalled and external add-ons supported by Red
      Hat to the TechDocs plugin. This plugin package is preinstalled on Red Hat Developer
      Hub and is enabled by default. If the plugin package is disabled, all of the
      TechDocs add-ons exported by the package as also disabled. ## package the third-party
      TechDocs add-on as a dynamic plugin, navigate to the root directory where the
      plugin is stored (not the dist-dynamic directory) and run the npx command with
      the --tag option to specify the image name and tag. For example: ```terminal
      $ npx @red hat developer hub/cli@latest plugin package - tag quay.io/<user_name>/<techdocs_add
      on_image>:latest ``` [NOTE] ---- The output of the package-dynamic-plugins command
      provides the file path to the plugin for use in the dynamic-plugin-config.yaml
      file. ---- 5. To publish the third-party TechDocs add-on to a Quay repository,
      push the image to a registry using one of the following commands, depending
      on your virtualization tool: * To use podman, enter the following command: ```terminal
      $ podman push quay.io/<user_name>/<techdocs_add on_image>:latest ``` To use
      docker, enter the following command: ```terminal $ docker push quay.io/<user_name>/<techdocs_add
      on_image>:latest ``` 6. Open your dynamic-plugins.yaml file to view or modify
      the configuration for the third-party TechDocs add-on. For example: ```yaml
      plugins: package: oci://quay.io/<user_name>/<techdocs_add on_image>:latest!<techdocs_add
      on_package> disabled: false pluginConfig: dynamicPlugins: frontend: <techdocs_add
      on_package> techdocsAddons: importName: <third party_add on_name> config: props:
      <techdocs_add on_property_key>: <techdocs_add on_property_value> ``` where <user_name>::
      Specifies your Quay user name or organization name. <techdocs_add-on_image>::
      Specifies the name of the image for the third-party add-on that you want to
      use, for example, mermaid. <techdocs_add-on_package>:: Specifies the , for example,
      backstage-plugin-techdocs-addon-mermaid. <third-party_add-on_name>:: Specifies
      the name of the third-party add-on that you want to use, for example, Mermaid.
      <techdocs_add-on_property_key>:: Specifies the name of the custom property that
      can be passed to the third-party add-on, for example, themeVariables. Properties
      are specific to each add-on. You can list multiple properties for an add-on.
      <techdocs_add-on_property_value>:: Specifies the value of a property key for
      the third-party add-on, for example, lineColor: #000000. Configuring dynamic
      plugins Installing and viewing plugins in Red Hat Developer Hub ##'
    expected_response: The TechDocs workflow starts the CI when a user makes changes
      in the repository containing the documentation files. You can configure the
      workflow to start only when files inside the docs/ directory or mkdocs.yml are
      changed. The documentation site itself is generated on the CI/CD workflow associated
      with the repository, and you can use the techdocs-cli CLI tool to generate docs
      on CI and publish them to cloud storage.
    query: How do I configure the CI/CD worflow for TechDocs?
    response: "Based on the knowledge_search tool results, here is a sample configuration\
      \ for the CI/CD workflow for TechDocs:\n\nHere is a sample YAML configuration\
      \ file for the CI/CD workflow for TechDocs:\n\n```yaml\napiVersion: v1\nkind:\
      \ ConfigMap\nmetadata:\n  name: dynamic-plugins-rhdh\ndata:\n  dynamic-plugins.yaml:\
      \ |\n    includes:\n      - dynamic-plugins.default.yaml\n    plugins:\n   \
      \   - disabled: false\n        package: ./dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic\n\
      \        pluginConfig:\n          techdocs:\n            builder: external\n\
      \            generator:\n              runIn: local\n            publisher:\n\
      \              awsS3:\n                bucketName: '${BUCKET_NAME}'\n      \
      \          credentials:\n                  accessKeyId: '${AWS_ACCESS_KEY_ID}'\n\
      \                  secretAccessKey: '${AWS_SECRET_ACCESS_KEY}'\n           \
      \     endpoint: 'https://${BUCKET_HOST}'\n                region: '${BUCKET_REGION}'\n\
      \                s3ForcePathStyle: true\n              type: awsS3\n```\n\n\
      You can create a dedicated Amazon S3 bucket to store TechDocs sites. Here is\
      \ how to create an AWS S3 bucket:\n\n1.  On the AWS console, create an AWS S3\
      \ bucket.\n2.  On the Create bucket page, enter a Bucket name and use the default\
      \ selections for all other settings.\n3.  Create an IAM policy to give authorized\
      \ users permissions to generate and publish TechDocs for your organization.\n\
      \nYou can implement a TechDocs pipeline using GitHub Actions to automatically\
      \ generate and publish your TechDocs whenever a user in your organization makes\
      \ a change to a documentation file stored in your GitHub repository.\n\nFor\
      \ more information, see the [TechDocs documentation](https://docs.redhat.com/en-us/docs/techdocs/docs-user-guide/configuration)."
