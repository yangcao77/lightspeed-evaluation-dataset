  description: catalog
  turns:
  - contexts:
    - 'Scorecard metric thresholds You can configure thresholds to turn raw metrics
      into meaningful health indicators, such as Success, Warning, or Error, helping
      you identify healthy components and detect issues early. ### Scorecard metric
      threshold categorization rules A threshold defines conditions or expressions
      to assign metric values to specific visual categories. To categorize metric
      values accurately, you must follow the following evaluation rules: Sequential
      evaluation: The system processes threshold rules in the order you define them
      and applies only the first matching rule. Restrictive ordering: You must sequence
      rules from the most restrictive range to the least restrictive range to verify
      that the system assigns categories correctly. Supported categories: Use only
      the success, warning, and error keys to define thresholds. ### Supported Scorecard
      threshold expression syntax Metric threshold expressions use mathematical and
      logical operators to evaluate data. Use the following operators to define health
      criteria based on the metric data type. ### Scorecard metric threshold precedence
      Threshold rules follow a specific order of precedence. Higher-priority configurations
      override lower-priority settings, allowing you to define global defaults with
      entity-specific exceptions. ### Standardize Scorecard metric thresholds across
      components You can define global thresholds in your RHDH app-config.yaml file
      to standardize health indicators across all components. Global configurations
      replace the default thresholds provided by a metric source. If you omit a threshold
      category, such as success, the Scorecard plugin does not assign that category
      to the metric. The following example defines thresholds for the jira.open_issues
      metric. These settings apply to all components using this metric unless an entity
      annotation overrides them. ```yaml scorecard: plugins: jira: open_issues: thresholds:
      rules: - key: success expression: ''<10'' # fewer than 10 open issues - key:
      warning expression: ''10-50'' # Between 10 and 50 open issues - key: error expression:
      ''>50'' # More than 50 open issues ``` ### Override rules to configure entity-specific
      thresholds in Scorecards Use annotations in the catalog-info.yaml file of a
      component to override global threshold rules. These annotations merge with and
      take precedence over the global rules defined in your RHDH app-config.yaml file.
      The annotation key must use the following format: scorecard.io/{providerId}.thresholds.rules.{thresholdKey}:
      ''{expression}'' In the following example, the component overrides the warning
      and error rules for the jira.open_issues metric. The success rule remains unchanged
      from the global configuration. ```yaml # catalog-info.yaml apiVersion: backstage.io/v1alpha1
      kind: Component metadata: name: critical-production-service annotations: # Changes
      global ''warning'' from ''10-50'' to ''10-15'' scorecard.io/jira.open_issues.thresholds.rules.warning:
      ''10-15'' # Changes global ''error'' from ''>50'' to ''>15'' scorecard.io/jira.open_issues.thresholds.rules.error:
      ''>15'' spec: type: service ``` ### Verify logical flow in Scorecard threshold
      rules To ensure Scorecard assigns the correct health status, order rules carefully,
      because the evaluation stops at the first matching rule. Evaluation order for
      rules:: To ensure the system evaluates all values correctly, sequence rules
      from the most strict (smallest range) value to the least strict (largest range).
      If rules are ordered incorrectly, a broad rule can prevent the system from reaching
      stricter rules. Problematic rule order example:: If rules are ordered incorrectly,
      a less restrictive rule can prevent stricter rules from being evaluated: 1.
      warning: <50: Any value less than 50 triggers the warning rule and stops evaluation.
      2. success: <10: This rule is not evaluated because all values less than 10
      have already matched the preceding warning rule. Correct ordering example::
      The following example demonstrates the correct sequence for successes, warnings,
      and errors: ```yaml rules: - key: success expression: ''<10'' # Most restrictive:
      Only values below 10 - key: warning expression: ''10-50'' # Values between 10
      and 50 - key: error expression: ''>50'' # Least restrictive: All values above
      50 ``` ## Monitoring component health and readiness with Scorecard metrics You
      can view metrics to evaluate the health and security of your software components
      directly in the RHDH catalog. You have installed your RHDH instance. You have
      configured the GitHub or Jira Scorecard (or both) plugin. You must have permissions
      to read the Scorecard metrics. 1. In your RHDH navigation menu, go to Catalog.
      2. Select the software component (catalog entity) that has Scorecard metrics
      configured. 3. On the component Service page, click the Scorecard tab. 4. Select
      a metric tile to view detailed data. ##'
    expected_response: 'To configure entity-specific thresholds and override global
      rules for a Scorecard metric, you use annotations in the `catalog-info.yaml`
      file of a component. These annotations merge with and take precedence over the
      global rules defined in your RHDH `app-config.yaml` file. The annotation key
      must be in the format `scorecard.io/{providerId}.thresholds.rules.{thresholdKey}:
      ''{expression}''`. For example, to override the `warning` and `error` rules
      for the `jira.open_issues` metric, you would add annotations to the component''s
      `metadata` section, such as `scorecard.io/jira.open_issues.thresholds.rules.warning:
      ''10-15''` and `scorecard.io/jira.open_issues.thresholds.rules.error: ''>15''`.
      Any rule that is not overridden in the annotation, like the `success` rule in
      this example, will remain unchanged from the global configuration.'
    query: As a Platform Engineer responsible for our Red Hat Developer Hub, could
      you please provide a comprehensive explanation of the specific procedure for
      overriding the globally configured Scorecard metric thresholds for a Jira-related
      metric, such as `jira.open_issues`, for an individual software component?
    response: "To override globally configured scorecard metric thresholds for a Jira-related\
      \ metric in Red Hat Developer Hub, you can define entity-specific thresholds\
      \ in the catalog-info.yaml file of the component. \n\nHere's an example of how\
      \ you can override global threshold rules for the jira.open_issues metric:\n\
      \n```yaml\nscorecard:\n  plugins:\n    jira:\n      open_issues:\n        options:\n\
      \          mandatoryFilter: Type = Task AND Resolution = Unresolved\n      \
      \    customFilter: priority in (\"Critical\", \"Blocker\")\n```\n\nYou can also\
      \ define custom threshold rules to suit your needs. For instance, if you want\
      \ to set the warning threshold for jira.open_issues between 10 and 50, you can\
      \ use the following code:\n\n```yaml\nscorecard:\n  plugins:\n    jira:\n  \
      \    open_issues:\n        thresholds:\n          rules:\n            - key:\
      \ success\n              expression: '<10'\n            - key: warning\n   \
      \           expression: '10-50'\n            - key: error\n              expression:\
      \ '>50'\n```\n\nMake sure to update your RHDH configuration accordingly to reflect\
      \ these changes. \n\nPlease note that the above YAML snippets are meant to illustrate\
      \ the concept and may need to be adjusted based on your specific requirements\
      \ and RHDH configuration. Always refer to the official Red Hat documentation\
      \ for the most accurate and up-to-date information. \n\nFor example, you may\
      \ need to add the following settings to your RHDH app-config.yaml file:\n\n\
      ```yaml\nscorecard:\n  plugins:\n    jira:\n      open_issues:\n        thresholds:\n\
      \          rules:\n            - key: success\n              expression: '<10'\n\
      \            - key: warning\n              expression: '10-50'\n           \
      \ - key: error\n              expression: '>50'\n```\n\nCite sources: `<|file-c7317c0b5f44447bbbc1745bd77f2f07>|`"
