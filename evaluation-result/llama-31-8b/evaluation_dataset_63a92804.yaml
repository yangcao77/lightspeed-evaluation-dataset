      \        # include all the other fields defined in the default Helm Chart\n\
      \        # ...\n        volumeMounts:\n          # IMPORTANT: Due to a Helm\
      \ limitation with arrays, you must also\n          # include all the volume\
      \ mounts defined in the default Helm Chart\n          # before adding the new\
      \ one\n          # ...\n          - name: registry-ca-bundle\n            mountPath:\
      \ /etc/pki/tls/certs/\n```\n\n3. Upgrade the Helm release to include your extensions\
      \ configuration file and update the NODE_ENV environment variable to development:\n\
      \n```yaml\nglobal:\n  auth:\n    backend:\n      enabled: true\n  clusterRouterBase:\
      \ apps.<clusterName>.com\n  dynamic:\n    includes:\n      - dynamic-plugins.default.yaml\n\
      \      - /dynamic-plugins-root/dynamic-plugins.extensions.yaml\nupstream:\n\
      \  backstage:\n    extraEnvVars:\n      - name: NODE_ENV\n        value: development\n\
      ```\n\n4. Click Upgrade.\n\n5. Enable a plugin by using the Extensions UI, restart\
      \ your RHDH application and refresh the UI to confirm that the plugin is enabled.\n\
      \n6. Set the value of the upstream.backstage.extraAppConfig.configMapRef and\
      \ upstream.backstage.extraAppConfig.filename parameters as follows:\n\nHelm\
      \ configuration excerpt\n\n```yaml\nupstream:\n  backstage:\n    extraAppConfig:\n\
      \      - configMapRef: my-rhdh-app-config\n        filename: app-config.yaml\n\
      ```\n\n7. Save the configuration changes.\n\nNote: These steps are based on\
