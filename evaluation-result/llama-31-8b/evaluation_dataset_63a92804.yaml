  description: rbac
  turns:
  - contexts:
    - 'secrets. ```yaml apiVersion: rhdh.redhat.com/v1alpha5 kind: Backstage metadata:
      name: <my rhdh custom resource> spec: application: appConfig: mountPath: /opt/app
      root/src configMaps: name: my rhdh app config name: rbac policies dynamicPluginsConfigMapName:
      dynamic plugins rhdh extraEnvs: envs: name: HTTP_PROXY value: ''http://10.10.10.105:3128''
      name: HTTPS_PROXY value: ''http://10.10.10.106:3128'' name: NO_PROXY value:
      ''localhost,example.org'' secrets: name: my rhdh secrets extraFiles: mountPath:
      /opt/app root/src secrets: name: my rhdh database certificates secrets key:
      postgres crt.pem, postgres ca.pem, postgres key.key replicas: 2 database: enableLocalDb:
      false ``` application:: appConfig:: Register your my-rhdh-app-config and rbac-policies
      config maps. dynamicPluginsConfigMapName:: Register your dynamic-plugins-rhdh
      config map. extraEnvs:: env:: Enter your proxy environment variables. secrets::
      Register your <my_product_secrets> and my-rhdh-database-secrets secrets. extraFiles::
      secrets:: Register the postgres-crt.pem, postgres-ca.pem, and postgres-key.key
      files contained in the my-rhdh-database-certificates-secrets secret. replicas::
      Enable high availability (HA) by increasing the replicas count to a value higher
      or equal to 2. database:: enableLocalDb:: Use your external PostgreSQL database
      rather than the internal PostgreSQL database. 2. Apply your Backstage CR to
      start or update your Developer Hub instance. ```terminal $ oc apply - filename=my
      rhdh custom resource.yaml - namespace=my rhdh project ``` # Switching the theme
      mode for your Developer Hub instance You can switch the RHDH interface between
      the following modes: Light Dark Auto (Default, matches your system preference)
      [NOTE] ---- In RHDH, theme configurations are used to change the look and feel
      of different UI components. So, you might notice changes in different UI components,
      such as buttons, tabs, sidebars, cards, and tables along with some changes in
      background color and font used on the RHDH pages. ---- You are logged in to
      the RHDH web console. 1. From the Developer Hub web console, click Settings.
      2. From the Appearance panel, select Light, Dark, or Auto to change the theme
      mode. ![custom theme mode 1] The interface immediately updates to reflect the
      selected theme. # Managing role-based access controls (RBAC) using the Red Hat
      Developer Hub Web UI Policy administrators can use the Developer Hub web interface
      (Web UI) to allocate specific roles and permissions to individual users or groups.
      Allocating roles ensures that access to resources and functionalities is regulated
      across the Developer Hub. With the policy administrator role in Developer Hub,
      you can assign permissions to users and groups. This role allows you to view,
      create, modify, and delete the roles using Developer Hub Web UI. ## Creating
      a role in the Red Hat Developer Hub Web UI You can create a role in the Red
      Hat Developer Hub using the Web UI. You have enabled RBAC, have a policy administrator
      role in Developer Hub, and have added plugins with permission. 1. Go to Administration
      at the bottom of the sidebar in the Developer Hub. The RBAC tab appears, displaying
      all the created roles in the Developer Hub. 2. (Optional) Click any role to
      view the role information on the OVERVIEW page. 3. Click CREATE to create a
      role. 4. Enter the name and description of the role in the given fields and
      click NEXT. 5. Add users and groups using the search field, and click NEXT.
      6. Select Plugin and Permission from the drop-downs in the Add permission policies
      section. 7. Select or clear the Policy that you want to set in the Add permission
      policies section, and click NEXT. 8. Review the added information in the Review
      and create section. 9. Click CREATE. The created role appears in the list available
      in the RBAC tab. ## Editing a role in the Red Hat Developer Hub Web UI You can
      edit a role in the Red Hat Developer Hub using the Web UI. [NOTE] ---- The policies
      generated from a policy.csv or ConfigMap file cannot be edited or deleted using
      the Developer Hub Web UI. ---- You have enabled RBAC, have a policy administrator
      role in Developer Hub, and have added plugins with permission. The role that
      you want to edit is created in the Developer Hub. 1. Go to Administration at
      the bottom of the sidebar in the Developer Hub. The RBAC tab appears, displaying
      all the created roles in the Developer Hub. 2. (Optional) Click any role to
      view the role information on the OVERVIEW page. 3. Select the edit icon for
      the role that you want to edit. 4. Edit the details of the role, such as name,
      description, users and groups, and permission policies, and click NEXT. 5. Review
      the edited details of the role and click SAVE. After editing a role, you can
      view the edited details of a role on the OVERVIEW page of a role. You can also
      edit a role’s users and groups or permissions by using the edit icon on the
      respective cards on the OVERVIEW page. ## Deleting a role in the Red Hat Developer
      Hub Web UI You can delete a role in the Red Hat Developer Hub using the Web
      UI. [NOTE] ---- The policies generated from a policy.csv or ConfigMap file cannot
      be edited or deleted using the Developer Hub Web UI. ---- You have enabled RBAC
      and have a policy administrator role in Developer Hub. The role that you want
      to delete is created in the Developer Hub. 1. Go to Administration at the bottom
      of the sidebar in the Developer Hub. The RBAC tab appears, displaying all the
      created roles in the Developer Hub. 2. (Optional) Click any role to view the
      role information on the OVERVIEW page. 3. Select the delete icon from the Actions
      column for the role that you want to delete. Delete this role? pop-up appears
      on the screen. 4. Click DELETE.'
