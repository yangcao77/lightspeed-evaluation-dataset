      Component jira/label: UI jira/team: 9d3ea319-fb5b-4621-9dab-05fe502283e jira/custom-filter:
      ''reporter = "abc@xyz.com" AND resolution is not EMPTY'' spec: type: website
      lifecycle: experimental owner: guests system: examples providesApis: [example-grpc-api]
      ``` where: jira/project-key:: Required: Enter the Jira project key. jira/component::
      Optional: Enter the Jira component name. jira/label:: Optional: Enter the Jira
      label. jira/team:: Optional: Enter the Jira team ID (not the team title). jira/custom-filter::
      Optional: Enter a custom Jira Query Language (JQL) filter. 5. Ingest the catalog
