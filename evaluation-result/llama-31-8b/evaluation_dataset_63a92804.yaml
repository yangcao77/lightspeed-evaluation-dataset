      - <https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9/html-single/customizing_red_hat_developer_hub/index#customizing-the-global-header-of-red-hat-developer-hub>\n\
      - <https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9/html-single/customizing_red_hat_developer_hub/index#customizing-the-application-of-red-hat-developer-hub>\n\
      \nThe approach to “how to get the content from the documentation” is to identify\
      \ the links to these sections and copy and past them into the browser which\
      \ directs the user to a developer hub documentation webpage.\n\nThe process\
      \ to answer the users question had to first address what’s needed to be answered\
      \ by the AI assistant, what tool will be used to do this, identify the sections\
      \ needed to answer the question in the documentation that meets these needs,\
      \ obtain these sections from the documentation and format them accordingly so\
      \ they can be provided to the user as an answer to their question.\n\nTo achieve\
      \ all this the knowledge_search has to be done in the following format: {\"\
      name\": \"knowledge_search\", \"parameters\": {\"query\": \"app-config.yaml\
      \ and Red Hat Developer Hub\"}}"
