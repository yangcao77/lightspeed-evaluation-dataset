- conversation_group_id: configuration-298
  description: configuration
  turns:
  - contexts:
    - '# Adoption Insights in Red Hat Developer Hub # Adoption Insights The Red Hat
      Developer Hub instance includes the Adoption Insights plugin preinstalled and
      enabled by default. As organizations generate an increasing number of data events,
      there is a growing need for detailed insights into the adoption and engagement
      metrics of the internal developer portal. These insights help platform engineers
      make data-driven decisions to improve its performance, usability, and translate
      them into actionable insights. You can use Adoption Insights in Red Hat Developer
      Hub to visualize key metrics and trends to get information about the usage of
      Developer Hub in your organization. The information provided by Adoption Insights
      in Developer Hub helps you pinpoint areas of improvement, highlights popular
      features, and evaluates progress toward adoption goals. You can also monitor
      user growth against licensed users and identify trends over time. The Adoption
      Insights dashboard in Developer Hub includes the following cards: Active users
      Total number of users Top catalog entities Top 3 templates Top 3 techdocs Top
      3 plugins Portal searches ![adoption insights] ## Configuring the Adoption Insights
      plugin in Red Hat Developer Hub The Adoption Insights plugin is preinstalled
      and enabled on a Developer Hub instance by default. You can disable or enable
      the Adoption Insights plugin and change other parameters, by configuring the
      app-config ConfigMap, which is created by the Red Hat Developer Hub Helm chart
      or Operator. [IMPORTANT] ---- If you previously used the Developer Preview of
      the Adoption Insights plugin and enabled the plugin manually, you must remove
      those earlier plugins as they are no longer required, and Adoption Insights
      is enabled by default. In your dynamic plugins ConfigMap, for example: dynamic-plugins-rhdh.yaml,
      remove the references to red-hat-developer-hub-backstage-plugin-adoption-insights,
      red-hat-developer-hub-backstage-plugin-adoption-insights-backend, and red-hat-developer-hub-backstage-plugin-analytics-module-adoption-insights.
      Additionally update the package.disabled value of the backstage-community-plugin-analytics-provider-segment
      plugin to false as shown in the following example: ```yaml plugins: package:
      ./dynamic plugins/dist/backstage community plugin analytics provider segment
      disabled: false ``` ---- ## Customizing the Adoption Insights plugin in Red
      Hat Developer Hub You can customize the Adoption Insights plugin to suit your
      needs by disabling or re-enabling it, and adjusting other settings as needed.
      To customize maxBufferSize, flushInterval, debug, and licensedUsers in the Adoption
      Insights plugin, in your Red Hat Developer Hub app config.yaml file, update
      the relevant settings as shown in the following code: ```yaml app: analytics:
      adoptionInsights: maxBufferSize: _<maximum_buffer_size>_ 1 flushInterval: _<flush_interval>_
      2 debug: _<debug_value>_ 3 licensedUsers: _<licensed_users>_ 4 ``` (Optional)
      Specifies the maximum buffer size for event batching. The default value is 20.
      (Optional) Specifies the flush interval in milliseconds for event batching.
      The default value is 5000ms. (Optional) The default value is false. (Optional)
      Specifies the maximum number of licensed users who can access the RHDH instance.
      The default value is 100. * To disable the Adoption Insights plugin, in your
      dynamic plugins ConfigMap, for example dynamic-plugins-rhdh.yaml file, update
      the package.disabled value of the plugin to true as shown in the following example:
      ```yaml package: ./dynamic plugins/dist/red hat developer hub backstage plugin
      adoption insights disabled: true package: ./dynamic plugins/dist/red hat developer
      hub backstage plugin adoption insights backend dynamic disabled: true package:
      ./dynamic plugins/dist/red hat developer hub backstage plugin analytics module
      adoption insights dynamic disabled: true ``` Optional: Configure the required
      RBAC permission for the users who are not administrators as shown in the following
      example: ```yaml p, role:default/_<your_team>_, adoption insights.events.read,
      read, allow g, user:default/_<your_user>_, role:default/_<your_team>_ ``` See
      Permission policies in Red Hat Developer Hub. ##'
    expected_response: You can disable or enable the Adoption Insights plugin and
      change other parameters by configuring the app-config ConfigMap, which is created
      by the Red Hat Developer Hub Helm chart or Operator.
    query: so im trying to configure the adoption insights plugin and the docs say
