- conversation_group_id: catalog-316
  description: catalog
  turns:
  - contexts:
    - 'Importing multiple GitLab repositories In Red Hat Developer Hub, you can select
      your GitLab projects and automate their onboarding to the Developer Hub catalog.
      This feature is a Technology Preview. [IMPORTANT] ---- Technology Preview features
      provide early access to upcoming product innovations, enabling you to test functionality
      and provide feedback during the development process. However, these features
      are not fully supported under Red Hat Subscription Level Agreements, may not
      be functionally complete, and are not intended for production use. As Red Hat
      considers making future iterations of Technology Preview features generally
      available, we will attempt to resolve any issues that customers experience when
      using these features. See: Technology Preview support scope. ---- You have enabled
      the Bulk Import feature and given access to it. You have set up a GitLab personal
      access token (PAT). You configured the GitLab integration by adding the following
      section to your RHDH app config.yaml file: ```yaml integrations: gitlab: host:
      ${GITLAB_HOST} token: ${GITLAB_TOKEN} ``` You enabled the GitLab catalog provider
      plugin in your dynamic plugins.yaml file to import GitLab users and groups:
      ```yaml plugins: package: ''./dynamic plugins/dist/backstage plugin catalog
      backend module gitlab org dynamic'' disabled: false ``` 1. In the Developer
      Hub left sidebar, click Bulk Import. 2. If your RHDH instance has multiple source
      control tools configured, select GitLab as your Source control tool option.
      3. Select the projects to import, and validate. Developer Hub creates a merge
      request in each selected project to add the required catalog-info.yaml file.
      4. For each project to import, click the PR link to review and merge the changes
      in Gitlab. 1. Click Bulk Import in Developer Hub left sidebar. 2. Verify that
      each imported GitLab project in the Selected projects list has the status Waiting
      for approval or Imported. 3. For projects with the Waiting for approval status,
      click the merge request link to add the catalog-info.yaml file to the project
      repository. ## Monitoring Bulk Import actions using audit logs The Bulk Import
      backend plugin adds the following events to the Developer Hub audit logs. See
      Audit logs in Red Hat Developer Hub for more information on how to configure
      and view audit logs. Bulk Import Events: BulkImportUnknownEndpoint:: Tracks
      requests to unknown endpoints. BulkImportPing:: Tracks GET requests to the /ping
      endpoint, which allows us to make sure the bulk import backend is up and running.
      BulkImportFindAllOrganizations:: Tracks GET requests to the /organizations endpoint,
      which returns the list of organizations accessible from all configured GitHub
      Integrations. BulkImportFindRepositoriesByOrganization:: Tracks GET requests
      to the /organizations/:orgName/repositories endpoint, which returns the list
      of repositories for the specified organization (accessible from any of the configured
      GitHub Integrations). BulkImportFindAllRepositories:: Tracks GET requests to
      the /repositories endpoint, which returns the list of repositories accessible
      from all configured GitHub Integrations. BulkImportFindAllImports:: Tracks GET
      requests to the /imports endpoint, which returns the list of existing import
      jobs along with their statuses. BulkImportCreateImportJobs:: Tracks POST requests
      to the /imports endpoint, which allows to submit requests to bulk-import one
      or many repositories into the Developer Hub catalog, by eventually creating
      import pull requests in the target repositories. BulkImportFindImportStatusByRepo::
      Tracks GET requests to the /import/by-repo endpoint, which fetches details about
      the import job for the specified repository. BulkImportDeleteImportByRepo::
      Tracks DELETE requests to the /import/by-repo endpoint, which deletes any existing
      import job for the specified repository, by closing any open import pull request
      that could have been created. ```json { "actor": { "actorId": "user:default/myuser",
      "hostname": "localhost", "ip": "::1", "userAgent": "Mozilla/5.0 (X11; Linux
      x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36"
      }, "eventName": "BulkImportFindAllOrganizations", "isAuditLog": true, "level":
      "info", "message": "''get /organizations'' endpoint hit by user:default/myuser",
      "meta": {}, "plugin": "bulk-import", "request": { "body": {}, "method": "GET",
      "params": {}, "query": { "pagePerIntegration": "1", "sizePerIntegration": "5"
      }, "url": "/api/bulk-import/organizations?pagePerIntegration=1&sizePerIntegration=5"
      }, "response": { "status": 200 }, "service": "backstage", "stage": "completion",
      "status": "succeeded", "timestamp": "2024-08-26 16:41:02" } ``` ## Input parameters
      for Bulk Import Scaffolder template As an administrator, you can use the Bulk
      Import plugin to run a Scaffolder template task with specified parameters, which
      you must define within the template. The Bulk Import plugin analyzes Git repository
      information and provides the following parameters for the Scaffolder template
      task: repoUrl:: Normalized repository URL in the following format: ```yaml ${gitProviderHost}?owner=${owner}&repo=${repository
      name} ``` name:: The repository name. organization:: The repository owner, which
      can be a user nickname or organization name. branchName:: The proposed repository
      branch. By default, the proposed repository branch is bulk-import-catalog-entity.
      targetBranchName:: The default branch of the Git repository. gitProviderHost::
      The Git provider host parsed from the repository URL. You can use this parameter
      to write Git-provider-agnostic templates. Example of a Scaffolder template:
      ```yaml parameters: - title: Repository details required: - repoUrl - branchName
      - targetBranchName - name - organization properties: repoUrl: type: string title:
      Repository URL (Backstage format) description: github.com?owner=Org&repo=repoName
      organization: type: string title: Owner of the repository name: type: string
      title: Name of the repository branchName: type: string title: Branch to add
      the catalog entity to targetBranchName: type: string title: Branch to target
      the PR/MR to gitProviderHost: type: string title: Git provider host ``` ## Setting
      up a custom Scaffolder workflow for Bulk Import As an administrator, you can
      create a custom Scaffolder template in line with the repository conventions
      of your organization and add the template into the Red Hat Developer Hub catalog
      for use by the Bulk Import plugin on multiple selected repositories. You can
      define various custom tasks, including, but not limited to the following: Importing
      existing catalog entities from a repository Creating pull requests for cleanup
      Calling webhooks for external system integration You created a custom Scaffolder
      template for the Bulk Import plugin. You have run your RHDH instance with the
      following environment variable enabled to allow the use of the Scaffolder functionality:
      ```yaml export NODE_OPTIONS=- no node snapshot ``` Configure your app config.yaml
      configuration to instruct the Bulk Import plugin to use your custom template
      as shown in the following example: ```yaml bulkImport: importTemplate: <your_template_entity_reference_or_template_name>
      importAPI: `open pull requests` | `scaffolder`; ``` where: importTemplate:::
      Enter your Scaffolder template entity reference. importAPI:: Set the API to
      ''scaffolder'' to trigger the defined workflow'
