    query: How RHDH use the PostgreSQL database and what it store?
    response: 'RHDH uses the PostgreSQL database to store its data. The database stores
      the indexed Software Catalog, and the source of truth remains in external systems,
      such as Git repositories, CI/CD platforms, and other integrations. To configure
      an external PostgreSQL instance, you need to provide the following details:


      *   `db-host`: Denotes your PostgreSQL instance Domain Name System (DNS) or
      IP address

      *   `db-port`: Denotes your PostgreSQL instance port number, such as 5432

      *   `username`: Denotes the user name to connect to your PostgreSQL instance

      *   `password`: Denotes the password to connect to your PostgreSQL instance


      You can configure an external PostgreSQL instance using the Red Hat Developer
      Hub Operator or the Helm Chart. To use the Operator, you need to create a credential
      secret to connect with the PostgreSQL instance.


      **Step 1: Configure the PostgreSQL instance**


      You need to create a credential secret to connect with the PostgreSQL instance.
      Provide the name of the credential secret and the credential data to connect
      with your PostgreSQL instance.


      **Step 2: Configure the database replication**


      To ensure high availability, you need to configure database replication. You
      can do this by creating a secret to hold the PostgreSQL TLS certificates.


      **Step 3: Configure the backend**


      You need to configure the backend to use the external PostgreSQL instance. You
      can do this by creating a Backstage custom resource (CR) and setting the `database.enableLocalDb`
      property to `false`. This will disable the creation of local PostgreSQL instances.


      **Step 4: Apply the Backstage CR**


      Finally, you need to apply the Backstage CR to the namespace where you have
      deployed the Developer Hub instance.


      By following these steps, you can configure an external PostgreSQL instance
      for your RHDH instance.'
