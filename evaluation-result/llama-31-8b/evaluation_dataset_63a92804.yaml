  - contexts:
    - 'Exposing your operator-based Red Hat Developer Hub instance on Amazon Elastic
      Kubernetes Service (EKS) On Amazon Elastic Kubernetes Service (EKS), to expose
      your Red Hat Developer Hub instance, Kubernetes ingresses replace OpenShift
      Container Platform routes. The Red Hat Developer Hub operator does not create
      ingresses. Therefore, to access your Developer Hub instance via a domain name,
      create the required ingresses on EKS and point your domain name to it. You have
      installed Red Hat Developer Hub by using the Red Hat Developer Hub Operator.
      You have an EKS cluster with AWS Application Load Balancer (ALB) add on installed.
      For more information, see Application load balancing on Amazon Elastic Kubernetes
      Service and Installing the AWS Load Balancer Controller add on. You have configured
      a domain name for your Developer Hub instance. The domain name can be a hosted
      zone entry on Route 53 or managed outside of AWS. For more information, see
      Configuring Amazon Route 53 as your DNS service documentation. You have an entry
      in the AWS Certificate Manager (ACM) for your preferred domain name. Make sure
      to keep a record of your Certificate ARN. You have set the context to the EKS
      cluster in your current kubeconfig. For more information, see Creating or updating
      a kubeconfig file for an Amazon EKS cluster. 1. Create an Ingress manifest file,
      named rhdh-ingress.yaml, specifying your Developer Hub service name as follows:
      ```yaml apiVersion: networking.k8s.io/v1 kind: Ingress metadata: name: my-rhdh-ingress
      annotations: alb.ingress.kubernetes.io/scheme: internet-facing alb.ingress.kubernetes.io/target-type:
      ip # TODO: Using an ALB HTTPS Listener requires a certificate for your own domain.
      Fill in the ARN of your certificate, e.g.: alb.ingress.kubernetes.io/certificate-arn:
      arn:aws:acm:us-xxx:xxxx:certificate/xxxxxx alb.ingress.kubernetes.io/listen-ports:
      ''[{"HTTP": 80}, {"HTTPS":443}]'' alb.ingress.kubernetes.io/ssl-redirect: ''443''
      external-dns.alpha.kubernetes.io/hostname: <my_developer_hub_domain> spec: ingressClassName:
      alb rules: - host: <my_developer_hub_domain> http: paths: - path: / pathType:
      Prefix backend: service: name: my-rhdh-custom-resource port: name: http-backend
      EOF ``` Replace <my_developer_hub_domain> with your Developer Hub domain name
      and update the value of alb.ingress.kubernetes.io/certificate-arn with your
      certificate ARN. 2. Update your required domain name, (for example, in Route
      53 or your external DNS service) to point to the provisioned IP address. Elastic
      Kubernetes Service provisions an Application Load Balancer (ALB) with a corresponding
      IP address. 3. To deploy the created Ingress, run: ```terminal $ kubectl n my
      rhdh project apply f rhdh ingress.yaml ``` Wait until the DNS name is responsive,
      indicating that your Developer Hub instance is ready for use. #'
