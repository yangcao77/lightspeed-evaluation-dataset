- conversation_group_id: plugins-9
  description: plugins
  turns:
  - contexts:
    - 'Enabling and configuring the JFrog plugin JFrog Artifactory is a front-end
      plugin that displays the information about your container images stored in the
      JFrog Artifactory repository. The JFrog Artifactory plugin is preinstalled with
      Developer Hub and disabled by default. To use it, you need to enable and configure
      it first. ## Enabling the JFrog Artifactory plugin The JFrog Artifactory plugin
      is preinstalled in Developer Hub with basic configuration properties. To enable
      it, set the disabled property to false as follows: ```yaml global: dynamic:
      includes: dynamic plugins.default.yaml plugins: package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/backstage community plugin jfrog artifactory:<tag>
      disabled: false ``` The <tag> variable is your RHDH application&#39;s version
      of Backstage and the plugin version, in the format: bs_<backstage-version>__<plugin-version>
      (note the double underscore delimiter). This format is only applicable for Community
      supported plugins. To find the correct image tag for <tag>: 1. Look in the RHDH
      release notes preface for your Backstage version. 2. Locate the plugin version
      for paths starting with oci://ghcr.io within one of the tables provided in the
      Dynamic plugins reference. For example, because RHDH 1.9 is based on Backstage
      1.45.3, the tag will have the format bs_1.45.3__<plugin-version> [TIP] ----
      To ensure environment stability, use a SHA256 digest instead of a version tag.
      See Determining SHA256 Digests ---- ## Configuring the JFrog Artifactory plugin
      1. Set the proxy to the desired JFrog Artifactory server in the app-config.yaml
      file as follows: ```yaml proxy: endpoints: ‘/jfrog-artifactory/api’: target:
      http://<hostname>:8082 # or https://<customer>.jfrog.io headers: # Authorization:
      ''Bearer <YOUR TOKEN>'' # Change to "false" in case of using a self-hosted Artifactory
      instance with a self-signed certificate secure: true ``` 2. Add the following
      annotation to the entity’s catalog-info.yaml file to enable the JFrog Artifactory
      plugin features in RHDH components: ```yaml metadata: annotations: ''jfrog artifactory/image
      name'': ''<IMAGE NAME>'' ``` # which provides access for both Kubernetes plugin
      and Tekton plugin. * Add the following annotation to the entity''s catalog-info.yaml
      file to identify whether an entity contains the Kubernetes resources: ```yaml
      annotations: ... backstage.io/kubernetes-id: <BACKSTAGE_ENTITY_NAME> ``` * You
      can also add the backstage.io/kubernetes-namespace annotation to identify the
      Kubernetes resources using the defined namespace. ```yaml annotations: ... backstage.io/kubernetes-namespace:
      <RESOURCE_NS> ``` * Add the following annotation to the catalog-info.yaml file
      of the entity to enable the Tekton related features in RHDH. The value of the
      annotation identifies the name of the RHDH entity: ```yaml annotations: ...
      janus-idp.io/tekton : <BACKSTAGE_ENTITY_NAME> ``` * Add a custom label selector,
      which RHDH uses to find the Kubernetes resources. The label selector takes precedence
      over the ID annotations. ```yaml annotations: ... backstage.io/kubernetes-label-selector:
      ''app=my-app,component=front-end'' ``` * Add the following label to the resources
      so that the Kubernetes plugin gets the Kubernetes resources from the requested
      entity: ```yaml labels: ... backstage.io/kubernetes id: <BACKSTAGE_ENTITY_NAME>
      ``` [NOTE] ---- When you use the label selector, the mentioned labels must be
      present on the resource. ---- The Tekton plugin is pre loaded in RHDH with basic
      configuration properties. To enable it, set the disabled property to false as
      follows: ```yaml global: dynamic: includes: dynamic plugins.default.yaml plugins:
      package: ./dynamic plugins/dist/backstage community plugin tekton disabled:
      false ``` #'
    expected_response: 'The JFrog Artifactory plugin is preinstalled with Developer
      Hub and is disabled by default. To enable it, you must set the `disabled` property
      to `false` in the `dynamic-plugins.default.yaml` file. After it is enabled,
      you need to configure it by setting the proxy to the desired JFrog Artifactory
      server in the `app-config.yaml` file. Additionally, you must add the `''jfrog
      artifactory/image name'': ''<IMAGE NAME>''` annotation to the entity’s `catalog-info.yaml`
      file to enable its features in RHDH components.'
    query: How do I enabel the JFrog plugin?
    response: "To enable the JFrog plugin in Backstage, you can follow these steps:\n\
      \n1. Set the proxy to the desired JFrog Artifactory server in the `app-config.yaml`\
      \ file as follows:\n```\nproxy:\n  endpoints:\n    ‘/jfrog-artifactory/api’:\n\
      \      target: http://<hostname>:8082 # or https://<customer>.jfrog.io\n   \
      \   headers:\n      # Authorization: 'Bearer <YOUR TOKEN>' \n      # Change\
      \ to \"false\" in case of using a self-hosted Artifactory instance with a self-signed\
      \ certificate\n      secure: true\n```\n2. Add the following annotation to the\
      \ entity’s `catalog-info.yaml` file to enable the JFrog Artifactory plugin features\
      \ in RHDH components:\n```\nmetadata:\n  annotations:\n    'jfrog-artifactory/image-name':\
      \ '<IMAGE-NAME>'\n```\nNote: Make sure to replace `<hostname>` and `<customer>`\
      \ with the actual values for your JFrog Artifactory server. Also, ensure that\
      \ the `disabled` property is set to `false` in the `dynamic-plugins-config.yaml`\
      \ file for the JFrog Artifactory plugin.\n\nAfter completing these steps, save\
      \ the changes and re-import the catalog to enable the JFrog plugin in Backstage."
