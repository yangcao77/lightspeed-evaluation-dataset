    response: "To find the location of the app-config ConfigMap created by the Red\
      \ Hat Developer Hub Operator, you can use the following steps:\n\n1. Provision\
      \ your custom configuration by creating a config map and secret resources in\
      \ your project. These include the baseUrl and service-to-service authentication\
      \ secrets.\n2. Use the following template to create the config map:\n\n```yaml\n\
      apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: app-config-rhdh\ndata:\n\
      \  \"app-config.yaml\": |\n    app:\n      title: Red Hat Developer Hub\n  \
      \    baseUrl: https://<my_developer_hub_domain>__\n    backend:\n      auth:\n\
      \        externalAccess:\n            - type: legacy\n              options:\n\
      \                subject: legacy-default-config\n                secret: \"\
      ${BACKEND_SECRET}\"\n      baseUrl: https://<my_developer_hub_domain>__\n  \
      \    cors:\n        origin: https://<my_developer_hub_domain>__\n```\n\n3. Create\
      \ and apply these configuration resources using the OpenShift CLI (oc) or the\
      \ web console.\n4. Once the Operator is successfully installed, provision your\
      \ custom configuration.\n5. From the Update channel drop-down menu, select the\
      \ update channel that you want to use, for example, fast or fast-1.9.\n6. From\
      \ the Version drop-down menu, select the version of the Red Hat Developer Hub\
      \ Operator that you want to install. The default version is the latest version\
      \ available in the selected channel.\n7. Select the Operator Installation mode.\n\
      \nBy following these steps, you can create the required config map and secret\
      \ resources in your project and use them to mount files and inject environment\
      \ variables provisioned in your custom secrets. This will help you configure\
      \ Red Hat Developer Hub with your custom configuration.\n\n**TIP:**\n---- \n\
      On Red Hat OpenShift Container Platform, you can skip this step to run Developer\
      \ Hub with the default config map and secret.\nYour changes on this configuration\
      \ might get reverted on Developer Hub restart.\n---- \n\n**NOTE:**\n---- \n\
      The app-config-rhdh config map must include your customized app-config.yaml\
      \ file.\n----"
