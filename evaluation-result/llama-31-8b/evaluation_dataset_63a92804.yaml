      \ updated config should look like this:\n\n    ```yaml\nspec:\n  application:\n\
      \    extraEnvs:\n      secrets:\n        - name: rhdh-secrets\n    ```\n\n3.\
      \  If RHDH is deployed by using the Helm chart, in the upstream.backstage key\
