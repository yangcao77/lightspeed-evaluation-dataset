- conversation_group_id: configuration-102
  description: configuration
  turns:
  - contexts:
    - 'file. <menu_item_name>:: Enter a unique name in the main sidebar navigation
      for either a standalone menu item or a parent menu item. If this field specifies
      a plugin menu item, the name of the menu item must match the name using in the
      corresponding path in dynamicRoutes. For example, if dynamicRoutes defines path:
      /my-plugin, then menu_item_name must be defined as my-plugin. icon:: (Optional)
      Enter the icon name. You can use any of the following icons: * Default icons,
      such as home, group, category, extension, and school. To use default icons,
      set the icon as an (" ") empty string. * A custom icon, where <my_icon> specifies
      the name of your custom icon * An SVG icon, such as: icon: <svg width="20px"
      height="20px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">&#8230;&#8203;</svg>
      * An HTML image, such as: icon: https://img.icons8.com/ios-glyphs/20/FFFFFF/shop.png
      title:: (Optional) Enter the menu item title. Omit it when the title is already
      specified in the dynamicRoutes configuration under menuItem.text. To hide the
      title from the sidebar, set the title as an (" ") empty string. priority:: (Optional)
      Enter an integer value to set the order in which menu items appear in the sidebar.
      parent:: (Optional) Enter the parent menu item under which the current item
      is nested. If this field is used, the parent menu item must be defined elsewhere
      in the menuItems configuration of any enabled plugin. You can define this field
      for each section. enabled:: (Optional) Enter false to hide the menu item from
      the sidebar. Enter true to display the menu item in the sidebar. ```yaml dynamicPlugins:
      frontend: _<package_name>_: dynamicRoutes: path: /my plugin module: CustomModule
      importName: FooPluginPage menuItem: icon: fooIcon text: Foo Plugin Page menuItems:
      my plugin: priority: 10 parent: favorites favorites: icon: favorite title: Favorites
      priority: 100 ``` my-plugin:: Enter the value of the path field in dynamicRoutes.
      priority:: Enter an integer value to set the order in which plugins appear in
      the parent menu item. parent:: Enter the parent menu item id to nest this plugin
      under, such as favorites. favorites:: Configuration for the parent menu item.
      title:: Displays the title name for the parent menu item. ### Modifying or adding
      a custom menu items for your Developer Hub instance Modify a main menu item
      or add a custom menu item using the following step: In the app config.yaml file,
      add a section to the default.main menu items > menuItems section. Use the default.
      prefix to identify the key as a main menu item. ```yaml dynamicPlugins: frontend:
      default.main-menu-items: menuItems: default._<menu_group_parent_item_name>_:
      icon: # home | group | category | extension | school | _<my_icon>_ title: _<menu_group_parent_title>_
      priority: 10 default._<menu_item_name>_: parent: _<menu_group_parent_item_name>_
      icon: # home | group | category | extension | school | _<my_icon>_ title: _<my_menu_title>_
      to: _<path_to_the_menu_target_page>_ priority: 100 enabled: true ``` default.<menu_group_parent_item_name>::
      (Optional) Enter the menu group parent item name to configure static main menu
      items. If no default.<menu_item_name> has a parent value set, this field is
      not needed. icon:: Enter the menu icon. Required for parent menu items. title::
      Enter the menu group title. Required for parent menu items. priority:: (Optional)
      Enter the order of this menu item within its menu level. default.<menu_item_name>::
      Enter the menu item name for which you want to override the default value. Add
      the default. prefix to identify a main menu item. parent:: (Optional) Enter
      the parent menu item for this item. Required if <menu_item_name> is specified
      as the child of any menu items. icon:: (Optional) Enter the menu icon. To use
      the default icon, set the icon as an (" ") empty string. title:: (Optional)
      Enter the menu group title. Only required for adding a new custom main menu
      item. To hide a default main menu item title from the sidebar, set the title
      as an (" ") empty string. to:: (Optional) Enter the path that the menu item
      navigates to. If it is not set, it defaults to the home page. priority:: (Optional)
      Enter the order of this menu item within its menu level. enabled:: (Optional)
      If this field is used to display the menu item in the sidebar, set the value
      to true. To hide the menu item from the sidebar, set the value to false. ```yaml
      default.main menu items: menuItems: default.catalog: icon: category title: My
      Catalog priority: 5 default.learning path: title: '''' default.parentlist: title:
      Overview icon: bookmarks default.home: parent: default.parentlist default.references:
      title: References icon: school to: /references enabled: true ``` icon:: (Optional)
      Enter the icon name, such as category, bookmarks`, school, etc. to change the
      default icon. title:: Enter an empty string '''' to hide the learning path from
      the default sidebar. default.parentlist:: Enter the parent menu items. parent::
      Enter the parent menu under which to nest the the menu entry, such as default.parentlist.
      title:: Enter the menu entry name, such as My Catalog, Overview or References.
      to:: Enter the page to redirect to. For example, default.references redirects
      to the /references page. enabled:: (Optional) Enter true to display the menu
      item in the sidebar. Enter false to hide the menu item from the sidebar. ##
      Configuring entity tab titles Red Hat Developer Hub provides a default opinionated
      tab set for catalog entity views. For consistency with your organization needs,
      you can rename, reorder, remove, and add tab titles. For each tab to modify,
      enter your desired values in the entityTabs section in your app config.yaml
      file: ```yaml upstream: backstage: appConfig: dynamicPlugins: frontend: <plugin_name>:
      entityTabs: mountPoint: <mount_point> path: <path> title: <title> priority:
      <priority> ``` <plugin_name>:: Enter the plugin name, such as backstage-community.plugin-topology.
      mountPoint:: Enter the tab mountpoint, such as entity.page.topology. path::
      Enter the tab path, such as /topology. title:: Enter the tab title, such as
      Topology. priority:: Optional. To reorder tabs, enter the tab priority, such
      as 42. Higher priority appears first. To remove a tab, enter a negative value,
      such as -1. ## Configuring entity detail tab layout Each Red Hat Developer Hub
      entity detail tab has a default opinionated layout. For consistency with your
      organization needs, you can change the entity detail tab content when the plugin
      that contributes the tab content allows a configuration.'
    expected_response: 'To configure entity tabs for a plugin such as backstage-community.plugin-topology,
      you must enter the desired values in the entityTabs section within your app-config.yaml
      file. The configurable fields are: mountPoint, which is the tab mountpoint like
      entity.page.topology; path, which is the tab path like /topology; title, which
      is the tab title like Topology; and an optional priority. To reorder tabs, you
      can set the priority, where a higher value appears first. To remove a tab, you
      can enter a negative value for the priority.'
    query: How can I configure the entity tabs for the backstage-community.plugin-topology
      plugin?
    response: "Based on the knowledge search results, the answer to the prompt \"\
      How can I configure the entity tabs for the backstage-community.plugin-topology\
      \ plugin?\" is:\n\nTo configure the entity tabs for the backstage-community.plugin-topology\
      \ plugin, you can update the `app-config.yaml` file with the following configuration:\n\
