      Like, what data can i actualy use in my template from the git repository?
    response: "Based on the search results, the custom scaffolder template receives\
      \ the following parameters from the Git repository:\n\n1. `repoUrl`: The normalized\
      \ repository URL in the following format: `${gitProviderHost}?owner=${owner}&repo=${repository-name}`\n\
      2. `name`: The repository name\n3. `organization`: The repository owner, which\
      \ can be a user nickname or organization name\n4. `branchName`: The proposed\
      \ repository branch (default: `bulk-import-catalog-entity`)\n5. `targetBranchName`:\
      \ The default branch of the Git repository\n6. `gitProviderHost`: The Git provider\
      \ host parsed from the repository URL\n\nThese parameters are provided by the\
      \ Bulk Import plugin, which analyzes the Git repository information and passes\
      \ them to the Scaffolder template task.\n\nExample of a Scaffolder template:\n\
      ```\nbulkImport:\n  importTemplate: <your_template_entity_reference_or_template_name>\n\
      \  importAPI: `open-pull-requests` | `scaffolder`\n```\nwhere:\n\n* `importTemplate`\
      \ specifies the Scaffolder template entity reference.\n* `importAPI` specifies\
      \ the import workflow, which can be either `open-pull-requests` (default) or\
      \ `scaffolder` (custom import scenario).\n\nOptional: You can direct the Bulk\
      \ Import plugin to hand off the entire list of selected repositories to a custom\
      \ Orchestrator workflow by setting `importAPI` to `scaffolder`.\n\nTo use these\
      \ parameters in your Scaffolder template, you can access them using the `parameters`\
      \ object, for example:\n```\nname: ${{ parameters.name }}\nowner: ${{ parameters.owner\
      \ }}\nrepoUrl: ${{ parameters.repoUrl }}\n```\nNote that you should use the\
      \ `parameters` object to access the values of these parameters, rather than\
      \ hardcoding them directly. This will ensure that the values are correctly resolved\
      \ and updated during the synchronization process."
