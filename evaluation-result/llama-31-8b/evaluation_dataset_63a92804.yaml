  description: installation
  turns:
  - contexts:
    - '# Installing Red Hat Developer Hub on OpenShift Container Platform You can
      install Red Hat Developer Hub on OpenShift Container Platform by using one of
      the following installers: The Red Hat Developer Hub Operator:: * Ready for immediate
      use in OpenShift Container Platform after an administrator installs it with
      OperatorHub * Uses Operator Lifecycle Management (OLM) to manage automated subscription
      updates on OpenShift Container Platform * Requires preinstallation of Operator
      Lifecycle Management (OLM) to manage automated subscription updates on Kubernetes
      The Red Hat Developer Hub Helm chart:: * Ready for immediate use in both OpenShift
      Container Platform and Kubernetes * Requires manual installation and management
      [IMPORTANT] ---- You must set the baseUrl in app-config.yaml to match the external
      URL of your Developer Hub instance (for example, https://rhdh.example.com).
      This value is required for the Red Hat Developer Hub to function correctly.
      If it is not set, frontend and backend services cannot communicate properly,
      and features may not work as expected. ---- Use the installation method that
      best meets your needs and preferences. * Choosing an installation method: Helm
      Charts vs. Operators * Working with Operators * Working with Helm charts # Installing
      Red Hat Developer Hub on OpenShift Container Platform with the Operator You
