  description: configuration
  turns:
  - contexts:
    - 'as: <rhdh-customization-provider>. 3. Add the following to the app-config.yaml
      file: ```yaml techRadar: url: <tech_radar_data_url> ``` <tech_radar_data_url>::
      Enter your Tech Radar data URL, such as: http://<rhdh-customization-provider>/tech-radar.
      # Customizing Red Hat Developer Hub appearance By modifying the visual aspects
      of the interface, organizations can align Red Hat Developer Hub with their branding
      guidelines and improve the overall user experience. The following default theme
      configurations are available for Red Hat Developer Hub: The Red Hat Developer
      Hub theme:: Default theme configurations to make your developer portal look
      like a standard Red Hat Developer Hub instance. For more information, see The
      Backstage theme:: Default theme configurations to make your developer portal
      look like a standard Backstage instance. For more information, see You can change
      or disable particular parameters in a default theme or create a fully customized
      theme by modifying the app-config.yaml file. From the app-config.yaml file,
      you can customize common theme components, including the following components:
      Company name and logo Font color, size, and style of text in paragraphs, headings,
      headers, and buttons Header color, gradient, and shape Button color Navigation
      indicator color You can also customize some components from the Developer Hub
      GUI, such as the theme mode (Light Theme, Dark Theme, or Auto). ## Switching
      the theme mode for your Developer Hub instance You can switch the RHDH interface
      between the following modes: Light Dark Auto (Default, matches your system preference)
      [NOTE] ---- In RHDH, theme configurations are used to change the look and feel
      of different UI components. So, you might notice changes in different UI components,
      such as buttons, tabs, sidebars, cards, and tables along with some changes in
      background color and font used on the RHDH pages. ---- You are logged in to
      the RHDH web console. 1. From the Developer Hub web console, click Settings.
      2. From the Appearance panel, select Light, Dark, or Auto to change the theme
      mode. ![custom theme mode 1] The interface immediately updates to reflect the
      selected theme. ## Customizing the branding logo of your Developer Hub instance
      You can customize the branding logo of your Developer Hub instance by configuring
      the branding section in the app-config.yaml file, as shown in the following
      example: ```yaml app: branding: fullLogo: ${BASE64_EMBEDDED_FULL_LOGO} 1 iconLogo:
      ${BASE64_EMBEDDED_ICON_LOGO} 2 ``` fullLogo:: Enter the logo on the expanded
      (pinned) sidebar as a base64 encoded image. iconLogo:: Enter the logo on the
      collapsed (unpinned) sidebar as a base64 encoded image. You can format the BASE64_EMBEDDED_FULL_LOGO
      environment variable as follows: ```yaml BASE64_EMBEDDED_FULL_LOGO: "data:_<media_type>_;base64,<base64_data>"
      ``` The following example demonstrates how to customize the BASE64_EMBEDDED_FULL_LOGO
      using the data:_<media_type>;base64,<base64_data>_ format: ```yaml SVGLOGOBASE64=$(base64
      i logo.svg) BASE64_EMBEDDED_FULL_LOGO="data:image/svg+xml;base64,$SVGLOGOBASE64"
      ``` Replace image/svg+xml with the correct media type for your image (for example,
      image/png and image/jpeg), and adjust the file extension accordingly. As a result,
      you can embed the logo directly without referencing an external file. You can
      also customize the width of the branding logo by setting a value for the fullLogoWidth
      field in the branding section, as shown in the following example: ```yaml app:
      branding: fullLogoWidth: 110px # ... ``` fullLogoWidth:: The default value for
      the logo width is 110px. The following units are supported: integer, px, em,
      rem, percentage. ## Understand the sidebar menu items for your RHDH instance
      The RHDH sidebar menu provides navigation through the following two distinct
      sections: Main menu items:: Consists of the core navigation structure, such
      as Catalog and Templates. These items are static and appear for all users. Dynamic
      plugin menu items:: Consists of items that are generated dynamically based on
      your installed plugins and configuration preferences. These items appear beneath
      the main menu. ### Customizing the sidebar menu items for your Developer Hub
      instance Customize the main menu items using the following steps: 1. Open the
      app-config.yaml file. 1. To customize the order and parent-child relationships
      for the main menu items, use the dynamicPlugins.frontend.default.main-menu-items.menuItems
      field. 2. For dynamic plugin menu items, use the dynamicPlugins.frontend.<package_name>.menuItems
      field. ```yaml dynamicPlugins: frontend: default.main menu items: menuItems:
      default.home: title: Home icon: home priority: 100 enabled: true default.my
      group: title: My Group icon: group priority: 90 enabled: true default.catalog:
      title: Catalog icon: category to: catalog priority: 80 enabled: true default.apis:
      title: APIs icon: extension to: api docs priority: 70 enabled: true default.learning
      path: title: Learning Paths icon: school, to: learning paths priority: 60 enabled:
      true default.create: title: Self service icon: add to: create priority: 50 enabled:
      true ``` ### Enabling sidebar menu items localization in RHDH You can add translation
      key support for sidebar menu items, so that users can onboard in their preferred
      language. In Developer Hub, all existing and newly created sidebar menu items
      support localization using the titleKey translation key. [NOTE] ---- If a translation
      key is present but the corresponding localized string is missing, the system
      defaults to the original text defined in the sidebar menu items configuration
      (title). If no translation key is defined at all, the original text is displayed.
      ---- You have enabled localization in your RHDH application. 1. For sidebar
      menu items in your configuration file, you must define both the original text
      and the new localization keys. For example, in the dynamicPlugins.frontend.default.main-menu-items.menuItems.default.favorites
      section of your app-config.yaml file, add the titleKey, as follows: Example
      app-config.yaml fragment ```yaml dynamicPlugins: frontend: default.main menu
      items: menuItems: default.favorites: title: Favorites titleKey: menuItem.favorites
      icon: favorite priority: 100 enabled: true ``` 2. In your translation file,
      map the titleKey from the first step to the localized strings for each supported
      language. Example allTranslations.json fragment ```yaml { "rhdh": { "en": {
      "menuItem.favorites": "Favorites" }, "fr": { "menuItem.favorites": "Favoris"
      } } } ``` ### Configuring a dynamic plugin menu item for your Developer Hub
      instance Configure a dynamic plugin menu item using the following step: In the
      app config.yaml file, update the menuItems section of your <plugin_name> plugin.
      For example: ```yaml dynamicPlugins: frontend: _<plugin_name>_: menuItems: <menu_item_name>:
      icon: # home | group | category | extension | school | _<my_icon>_ title: _<plugin_page_title>_
      priority: 10 parent: favorites enabled: true ``` <plugin_name>:: Enter the plugin
      name. This name is the same as the scalprum.name key in the package.json'
