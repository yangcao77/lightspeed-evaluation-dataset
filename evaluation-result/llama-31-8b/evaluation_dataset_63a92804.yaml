  turns:
  - contexts:
    - 'access OpenAI models through the OpenAI API. VERTEX_AI_PROJECT:: The Google
      Cloud project ID required to access Gemini through Vertex AI. VERTEX_AI_LOCATION::
      The Google Cloud region required to access Gemini through Vertex AI. GOOGLE_APPLICATION_CREDENTIALS::
