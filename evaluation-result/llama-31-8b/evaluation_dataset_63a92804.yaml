- conversation_group_id: plugins-22
  description: plugins
  turns:
  - contexts:
    - 'the template. The Orchestrator iterates through the repository list, launching
      the template once for each repository and passes only the data for that single
      repository to the template run. This allows you to automate tasks such as creating
      the catalog-info.yaml, running compliance checks, or registering the entity
      with the catalog. # ServiceNow Custom actions in Red Hat Developer Hub In Red
      Hat Developer Hub, you can access ServiceNow custom actions (custom actions)
      for fetching and registering resources in the catalog. The custom actions in
      Developer Hub enable you to facilitate and automate the management of records.
      Using the custom actions, you can perform the following actions: Create, update,
      or delete a record Retrieve information about a single record or multiple records
      ## Enabling ServiceNow custom actions plugin in Red Hat Developer Hub In Red
      Hat Developer Hub, the ServiceNow custom actions are provided as a pre-loaded
      plugin, which is disabled by default. You can enable the custom actions plugin
      using the following procedure. Red Hat Developer Hub is installed and running.
      You have created a project in the Developer Hub. 1. To activate the custom actions
      plugin, add a package with plugin name and update the disabled field in your
      Helm chart as follows: ```yaml global: dynamic: includes: dynamic plugins.default.yaml
      plugins: package: ./dynamic plugins/dist/backstage community plugin scaffolder
      backend module servicenow dynamic disabled: false ``` [NOTE] ---- The default
      configuration for a plugin is extracted from the dynamic-plugins.default.yaml
      file, however, you can use a pluginConfig entry to override the default configuration.
      ---- 2. Set the following variables in the Helm chart to access the custom actions:
      ```yaml servicenow: # The base url of the ServiceNow instance. baseUrl: ${SERVICENOW_BASE_URL}
      # The username to use for authentication. username: ${SERVICENOW_USERNAME} #
      The password to use for authentication. password: ${SERVICENOW_PASSWORD} ```
      ## Supported ServiceNow custom actions in Red Hat Developer Hub The ServiceNow
      custom actions enable you to manage records in the Red Hat Developer Hub. The
      custom actions support the following HTTP methods for API requests: GET: Retrieves
      specified information from a specified resource endpoint POST: Creates or updates
      a resource PUT: Modify a resource PATCH: Updates a resource DELETE: Deletes
      a resource [GET] servicenow:now:table:retrieveRecord:: Retrieves information
      of a specified record from a table in the Developer Hub. [GET] servicenow:now:table:retrieveRecords::
      Retrieves information about multiple records from a table in the Developer Hub.
      [POST] servicenow:now:table:createRecord:: Creates a record in a table in the
      Developer Hub. [PUT] servicenow:now:table:modifyRecord:: Modifies a record in
      a table in the Developer Hub. [PATCH] servicenow:now:table:updateRecord:: Updates
      a record in a table in the Developer Hub. [DELETE] servicenow:now:table:deleteRecord::
      Deletes a record from a table in the Developer Hub. # Kubernetes custom actions
      in Red Hat Developer Hub With Kubernetes custom actions, you can create and
      manage Kubernetes resources. The Kubernetes custom actions plugin is preinstalled
      and disabled on a Developer Hub instance by default. You can disable or enable
      the Kubernetes custom actions plugin, and change other parameters, by configuring
      the Red Hat Developer Hub Helm chart. [NOTE] ---- Kubernetes scaffolder actions
      and Kubernetes custom actions refer to the same concept throughout this documentation.
      ---- ## Enabling Kubernetes custom actions plugin in Red Hat Developer Hub In
      Red Hat Developer Hub, the Kubernetes custom actions are provided as a preinstalled
      plugin, which is disabled by default. You can enable the Kubernetes custom actions
      plugin by updating the disabled key value in your Helm chart. You have installed
      Red Hat Developer Hub with the Helm chart. To enable the Kubernetes custom actions
      plugin, complete the following step: In your Helm chart, add a package with
      the Kubernetes custom action plugin name and update the disabled field. For
      example: ```yaml global: dynamic: includes: dynamic plugins.default.yaml plugins:
      package: ./dynamic plugins/dist/backstage community plugin scaffolder backend
      module kubernetes dynamic disabled: false ``` [NOTE] ---- The default configuration
      for a plugin is extracted from the dynamic-plugins.default.yaml file, however,
      you can use a pluginConfig entry to override the default configuration. ----
      ## Using Kubernetes custom actions plugin in Red Hat Developer Hub In Red Hat
      Developer Hub, the Kubernetes custom actions enable you to run template actions
      for Kubernetes. To use a Kubernetes custom action in your custom template, add
      the following Kubernetes actions to your template: ```yaml action: kubernetes:create
      namespace id: create kubernetes namespace name: Create kubernetes namespace
      input: namespace: my rhdh project clusterRef: bar token: TOKEN skipTLSVerify:
      false caData: Zm9v labels: app.io/type=ns; app.io/managed by=org; ``` Configuring
      templates ## Creating a template using Kubernetes custom actions in Red Hat
      Developer Hub To create a template, define a Template object as a YAML file.
      The Template object describes the template and its metadata. It also contains
      required input variables and a list of actions that are executed by the scaffolding
      service. ```yaml apiVersion: scaffolder.backstage.io/v1beta3 kind: Template
      metadata: name: create-kubernetes-namespace title: Create a kubernetes namespace
      description: Create a kubernetes namespace spec: type: service parameters: -
      title: Information required: [namespace, token] properties: namespace: title:
      Namespace name type: string description: Name of the namespace to be created
      clusterRef: title: Cluster reference type: string description: Cluster resource
      entity reference from the catalog ui:field: EntityPicker ui:options: catalogFilter:
      kind: Resource url: title: Url type: string description: Url of the kubernetes
      API, will be used if clusterRef is not provided token: title: Token type: string
      ui:field: Secret description: Bearer token to authenticate with skipTLSVerify:
      title: Skip TLS verification type: boolean description: Skip TLS certificate
      verification, not recommended to use in production environment, default to false
      caData: title: CA data type: string ui:field: Secret description: Certificate
      Authority base64 encoded certificate labels: title: Labels type: string description:
      Labels to be applied to the namespace ui:widget: textarea ui:options: rows:
      3 ui:help: ''Hint: Separate multiple labels with a semicolon!'' ui:placeholder:
      ''kubernetes.io/type=namespace; app.io/managed-by=org'' steps: - id: create-kubernetes-namespace
      name: Create kubernetes namespace action: kubernetes:create-namespace input:
      namespace: ${{ parameters.namespace }} clusterRef: ${{ parameters.clusterRef
      }} url: ${{ parameters.url }} token: ${{ secrets.token }} skipTLSVerify: ${{
      parameters.skipTLSVerify }} caData: ${{ secrets.caData }} labels: ${{ parameters.labels
      }} ``` ## Supported Kubernetes custom actions in Red Hat Developer Hub In Red
      Hat Developer Hub, you can use'
