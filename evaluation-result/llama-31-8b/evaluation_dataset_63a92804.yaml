- conversation_group_id: configuration-201
  description: configuration
  turns:
  - contexts:
    - 'Enabling metrics monitoring in a Red Hat Developer Hub Operator installation
      on an OpenShift Container Platform cluster You can enable and view metrics for
      an Operator-installed Red Hat Developer Hub instance from the OpenShift Container
      Platform web console. Metrics are exposed through an HTTP service endpoint under
      the /metrics canonical name. By setting the spec.monitoring.enabled field to
      true in your Red Hat Developer Hub custom resource (CR), you instruct the Operator
      to automatically create and manage the necessary ServiceMonitor to scrape metrics
      from the service endpoint. Your OpenShift Container Platform cluster has monitoring
      for user defined projects enabled. You have installed Red Hat Developer Hub
      on OpenShift Container Platform using the Red Hat Developer Hub Operator. You
      have installed the OpenShift CLI (oc). 1. Use the OpenShift CLI (oc) to edit
      your existing Red Hat Developer Hub CR. ```bash $ oc edit Backstage <instance-name>
      ``` 2. In the CR, locate the spec field and add the monitoring configuration
      block. ```yaml spec: monitoring: enabled: true ``` 3. Save the RHDH CR. The
      RHDH Operator detects the configuration and automatically creates the corresponding
      ServiceMonitor custom resource (CR). [NOTE] ---- The Operator automatically
      configures the ServiceMonitor with the correct labels (app.kubernetes.io/instance
      and app.kubernetes.io/name) that match your Backstage CR. The ServiceMonitor
      will be named metrics-<cr-name>. No additional label configuration is required.
      ---- 1. From the OpenShift Container Platform web console, select the Observe
      view. 2. Click the Metrics tab to view metrics for Red Hat Developer Hub pods.
      3. From the OpenShift Container Platform web console, click Project > Services
      and verify the labels for backstage-developer-hub. ## Enabling metrics monitoring
      in a Helm chart installation on an OpenShift Container Platform cluster You
      can enable and view metrics for a Red Hat Developer Hub Helm deployment from
      the OpenShift Container Platform web console. Metrics monitoring is enabled
      through configuration during a chart upgrade. After the upgrade, the Helm release
      generates the necessary ServiceMonitor resource. Your OpenShift Container Platform
      cluster has monitoring for user defined projects enabled. You have installed
      Red Hat Developer Hub on OpenShift Container Platform using the Helm chart.
      1. From the OpenShift Container Platform web console, select the Topology view.
      2. Click the overflow menu of the Red Hat Developer Hub Helm chart, and select
      Upgrade. ![helm upgrade] 3. On the Upgrade Helm Release page, select the YAML
      view option in Configure via, then configure the metrics section in the YAML,
      as shown in the following example: ```yaml upstream: # ... metrics: serviceMonitor:
      enabled: true path: /metrics port: http metrics # ... ``` ![upgrade helm metrics]
      4. Click Upgrade. 1. From the OpenShift Container Platform web console, select
      the Observe view. 2. Click the Metrics tab to view metrics for Red Hat Developer
      Hub pods. Configuring and using the monitoring stack in Red Hat OpenShift Container
      Platform # Monitoring and logging Red Hat Developer Hub on Amazon Web Services
      (AWS) You can configure Red Hat Developer Hub to use Amazon CloudWatch for real-time
      monitoring and Amazon Prometheus for comprehensive logging. This is convenient
      when hosting Developer Hub on Amazon Web Services (AWS) infrastructure. ##'
    expected_response: To enable metrics monitoring for an Operator-installed Red
      Hat Developer Hub instance, you must edit the existing Red Hat Developer Hub
      custom resource (CR) using the OpenShift CLI (oc). In the CR, locate the spec
      field and add a monitoring configuration block, setting the "enabled" field
      to "true". After saving the CR, the RHDH Operator detects the configuration
      and automatically creates the corresponding ServiceMonitor custom resource.
    query: What is the procedure for enabling metrics monitoring for a Red Hat Developer
      Hub instance that was installed using the Operator on an OpenShift Container
      Platform cluster?
    response: 'To enable metrics monitoring for a Red Hat Developer Hub instance installed
      with Operator on OpenShift Container Platform, you should follow these steps:


      1. Ensure your OpenShift Container Platform cluster has monitoring for user-defined
      projects enabled.

      2. Install the Red Hat Developer Hub Operator in the OpenShift Container Platform
      console.

      3. Use the OpenShift CLI (oc) to edit your existing Red Hat Developer Hub custom
      resource (CR).

      4. In the CR, locate the spec field and add the monitoring configuration block.

      5. Save the RHDH CR. The RHDH Operator detects the configuration and automatically
      creates the corresponding ServiceMonitor custom resource (CR).


      By following these steps, you can enable metrics monitoring for your Red Hat
      Developer Hub instance installed with Operator on OpenShift Container Platform.'
