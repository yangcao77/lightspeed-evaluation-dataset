      \ branding:\n    fullLogo: ${BASE64_EMBEDDED_FULL_LOGO}\n    fullLogoWidth:\
      \ 110px\n    iconLogo: ${BASE64_EMBEDDED_ICON_LOGO}\nbackend:\n  cache:\n  \
      \  store: redis\n    connection: ${REDIS_CONNECTION}\ntechdocs:\n  cache:\n\
      \    ttl: 3600000\ncatalog:\n  providers:\n    <enter_your_provider_configuration>\n\
