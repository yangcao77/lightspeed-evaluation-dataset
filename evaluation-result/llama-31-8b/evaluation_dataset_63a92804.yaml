      \  name: backstage-read-only\nrules:\n  - apiGroups:\n      - argoproj.io\n\
      \    resources:\n      - rollouts\n      - analysisruns\n    verbs:\n      -\
      \ get\n      - list\n```\nApply this manifest to the cluster using `kubectl\
      \ apply -f <your-clusterrole-file>.yaml` and ensure the ServiceAccount accessing\
      \ the cluster has this ClusterRole assigned. Finally, you need to add annotations\
      \ to your `catalog-info.yaml` to identify the Kubernetes resources for Backstage,\
      \ using methods like `backstage.io/kubernetes-id`, `backstage.io/kubernetes-namespace`,\
