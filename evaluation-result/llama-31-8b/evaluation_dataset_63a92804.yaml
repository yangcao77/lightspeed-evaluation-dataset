- conversation_group_id: installation-471
  description: installation
  turns:
  - contexts:
    - 'OpenShift Container Platform CLI 1. Log in to the OpenShift Container Platform
      cluster as the cluster administrator and switch to the project or namespace
      in which Developer Hub was installed. ```terminal $ oc login u <user> p <password>
      https://api.<HOSTNAME>:6443 $ oc project my rhdh project ``` 2. For a new version
      of the Developer Hub Helm chart, run the following upgrade command: ```terminal
      $ helm upgrade i rhdh f new values.yml \ openshift helm charts/redhat developer
      hub - version 1.9.0 ``` [NOTE] ---- You can also provide extra values to the
      chart by creating a new-values.yml file on your workstation with values that
      override the attributes in the installed chart or by adding new attributes.
      ----'
    expected_response: 'To upgrade, first log in to the OpenShift Container Platform
      cluster as the cluster administrator and switch to the project or namespace
      where Developer Hub was installed. Then, for a new version of the Developer
      Hub Helm chart, run the upgrade command: `$ helm upgrade i rhdh f new values.yml
      \ openshift helm charts/redhat developer hub - version 1.9.0`. You can provide
      extra values to the chart by creating a new-values.yml file on your workstation
      with values that override the attributes in the installed chart or by adding
      new attributes.'
    query: How do I upgrde the Developer Hub and also provid extra values using the
      helm chart?
    response: "To upgrade the Developer Hub and provide extra values using the helm\
      \ chart, you can follow these steps:\n\n1.  Identify the latest version of the\
      \ Developer Hub available for upgrade.\n\n    ```terminal\n    helm repo add\
      \ redhat-developer-hub https://charts.openshift.io\n    helm repo update\n \
      \   helm show version --url=https://charts.openshift.io/redhat-developer-hub\
      \ --version 1.9.0 --template={{ .Values.global | yaml}} > values.default.yaml\n\
      \    ```\n\n2.  Backup your current configuration by running the following command:\n\
      \n    ```terminal\n    helm -n <your_namespace> -f values.yaml create backup\
      \ <your_deploy_name>-backup $(date +\"rhdh-backup-%Y%m%d-%H:%M-%S\") --set global.clusterRouterBase=\"\
      $CLUSTER_ROUTER_BASE\" --set global.postgresql.auth.password=\"$PASSWORD\"\n\
      \    ```\n\n3.  Update your Developer Hub helm chart instance with the latest\
      \ version of the helm chart. This can be done by running the following command:\n\
      \n    ```terminal\n    helm repo add redhat-developer-hub https://charts.openshift.io\n\
      \    helm repo update\n    helm -n <your_namespace> upgrade -i rhdh ./<helm_chart_archive_file_name>_\
      \ -f values.yaml --set global.clusterRouterBase=\"$CLUSTER_ROUTER_BASE\" --set\
      \ global.postgresql.auth.password=\"$PASSWORD\" openshift-helm-charts/redhat-developer-hub\
      \ --version 1.9.0\n    ```\n\n    Make sure to replace <helm\\_chart\\_archive\\\
      _file\\_name\\> with the actual name of your helm chart archive file.\n\n4.\
      \  To resolve any conflicts that may arise from the upgrade, you can also use\
      \ the Helm reconcile command to resolve any differences between the outdated\
      \ and updated versions of your Deployments.\n\n    ```terminal\n    helm -n\
      \ <your_namespace> reconcile rhdh -f values.yaml\n    ```\n\n5.  Verify that\
      \ the deployment was successful by checking the status of the Developer Hub\
      \ instance.\n\n    ```terminal\n    $ kubectl get deploy <your_deploy_name>-developer-hub\
      \ -n <your_namespace>\n    ```\n\n    Make sure to replace `<your_deploy_name>`\
      \ and `<your_namespace>` with the actual name of your deployment and the namespace\
      \ where it is deployed.\n\nThe above commands will help you upgrade the Developer\
      \ Hub and provide extra values using the helm chart.\n\nSource:\n\n[1] document\\\
      _id file-34507e0b13714872bc61b0956e32bc16, score: 2.3573312380796616, parse\\\
      _tree 2023-02-15\n\n*   Upgrading Red Hat Developer Hub uses the following steps:\n\
      \    1.  On the Upgrade Helm Release page, select the version of Developer Hub\
      \ that you want to upgrade to from the chart version drop-down list.\n    2.\
      \  Click Upgrade.\n    3.  Close all open Developer Hub web pages, and log in\
      \ again to verify that the upgrade was successful.\n    *   On older versions\
      \ of OpenShift Container Platform, installing the repertoire catalog for OpenShift\
      \ Console required cluster administration privileges. Starting with OpenShift\
      \ Container Platform 4, cluster administration privilege is no longer required.\
      \ To upgrade ODC, you can use the catalog manager command, but drastic changes\
      \ to your cluster are not reflected immediately. refrain from upgrading ODC.\
      \ Considering you already have version 2.2, configure knowledge (document\\\
      _id file-441937d9860f469898c556df21d8d4c4, score 1.7922051511484955)\n    *\
