- conversation_group_id: rbac-444
  description: rbac
  turns:
  - contexts:
    - 'This approach allows team leads to manage access and permissions for their
      own teams independently, while administrators maintain global oversight. In
      Red Hat Developer Hub, you can delegate RBAC access using the multitenancy feature
      of the RBAC plugin, specifically the IS_OWNER conditional rule. You can either
      use the web UI or the RBAC backend API, depending on your preferred workflow
      and level of automation: Use the web UI to create roles, assign users or groups,
      define permissions, and apply ownership conditions through an intuitive interface.
      Use the API for a more flexible and automatable approach, where you can programmatically
      manage roles, permissions, and ownership conditions using authenticated curl
      requests. By delegating RBAC access through either method, you can expect the
      following outcomes: Team leads can manage RBAC settings for their teams independently.
      Visibility of other users'' or teams'' permissions is restricted. Administrators
      retain overarching control while delegating team specific access. Your RHDH
      instance is running with the RBAC plugin installed and configured. You have
      administrative access to RHDH. ## '
    expected_response: 'In Red Hat Developer Hub, you can delegate RBAC access through
      two methods: using the web UI for an intuitive interface to create roles, assign
      users, define permissions, and apply ownership conditions, or using the RBAC
      backend API for a more flexible and automatable approach to programmatically
      manage these settings. The expected outcomes from delegating RBAC access are
      that team leads can manage settings for their own teams independently, visibility
      of other teams'' permissions is restricted, and administrators retain overarching
      control while delegating team-specific access.'
    query: As a Platform Engineer, what are the available methods for delegating RBAC
      access in Red Hat Developer Hub, and what are the expected outcomes of implementing
      this delegation?
    response: 'The available methods for delegating RBAC access in Red Hat Developer
      Hub are:


      1. Using the web UI: The administrator can enable the RBAC feature, create a
      new role for team leads, and assign users or groups to the role.

      2. Using the RBAC backend API: The administrator can create a new role for team
      leads, add users or groups to the role, and define permissions for the role
      using the RBAC backend API.


      The expected outcomes of implementing this delegation are:


      * Team leads can manage RBAC settings for their teams independently.

      * Visibility of other users'' or teams'' permissions is restricted.

      * Administrators retain overarching control while delegating team-specific access.'
