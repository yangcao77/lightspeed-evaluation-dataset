      to provide early access to upcoming product features, enabling customers to
      test functionality and provide feedback during the development process. These
      features are not supported by Red Hat in any way and are not functionally complete
      or production-ready. They are intended for testing and should not be used for
      production or business-critical workloads.


      As Red Hat Developer Hub is built on top of Backstage, it inherits many features
      and plugins, including plugins that are still in Technology Preview. For example,
      the Adoption Insights plugin is preinstalled and enabled on a Developer Hub
      instance by default.


