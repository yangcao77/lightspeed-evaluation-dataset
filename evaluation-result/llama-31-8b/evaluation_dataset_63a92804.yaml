      1. Download the plugin-infra.sh script as shown in the following example:\n\n\
      ```terminal\n$ curl -sSLO https://raw.githubusercontent.com/redhat-developer/rhdh-operator/refs/heads/release-1.9/config/profile/rhdh/plugin-infra/plugin-infra.sh\
