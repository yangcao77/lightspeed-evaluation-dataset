- conversation_group_id: configuration-80
  description: configuration
  turns:
  - contexts:
    - 'custom app-config.yaml file, add the titleKey, descriptionKey, and textKey
      values, as follows: app-config.yaml fragment ```yaml app: quickstart: # Existing
      Quickstart steps should also be updated with keys - title: ''Setup Authentication''
      titleKey: steps.setupAuth.title description: ''Learn the basics of navigating
      the Developer Hub interface'' descriptionKey: steps.setupAuth.description icon:
      ''home'' cta: text: ''Get Started'' textKey: steps.setupAuth.ctaTitle link:
