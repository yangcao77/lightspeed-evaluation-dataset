    expected_response: 'The Scorecard plugin in Red Hat Developer Hub (RHDH) is used
      to achieve the following goals: identify and prioritize risks using unified
      health data for faster remediation decisions; maintain security standards by
      automatically surfacing compliance gaps to enforce best practices; streamline
      workflows by accessing all metrics in RHDH to reduce development overhead; and
      standardize service quality by defining and measuring consistent health criteria
      across the organization.'
    query: What are the primary goals that can be achieved by utilizing the Scorecard
      plugin within RHDH?
    response: 'The primary goals that can be achieved by utilizing the Scorecard plugin
      within RHDH are:


      1. **Evaluate project health using Scorecards**: The Scorecard plugin allows
      you to monitor the health and quality of your projects in RHDH. You can track
      key metrics and quickly understand the health of your projects.


      2. **Standardize Scorecard metric thresholds across components**: The Scorecard
      plugin allows you to define global thresholds in your RHDH app-config.yaml file
      to standardize health indicators across all components. Global configurations
      replace the default thresholds provided by a metric source.


      3. **Override rules to configure entity-specific thresholds in Scorecards**:
      Use annotations in the catalog-info.yaml file of a component to override global
      threshold rules. These annotations merge with and take precedence over the global
      rules defined in your RHDH app-config.yaml file.


      4. **Configure portfolio health on the home page**: The Scorecard plugin allows
      you to monitor the collective health of your portfolio by adding the aggregated
      Scorecard widget to the RHDH home page. This widget consolidates key performance
      indicators (KPIs) across all entities that you own.


      5. **Monitor component health and readiness with Scorecard metrics**: The Scorecard
      plugin allows you to view metrics to evaluate the health and security of your
      software components directly in the RHDH catalog.


      6. **Monitor collective health across components**: As an administrator, you
      can use the Scorecard plugin to view the collective technical health across
      multiple owned applications or components. This consolidated view helps you
      identify high-level health trends and risks across complex projects.


      7. **Set up Scorecards to monitor your project health**: The Scorecard plugin
      allows you to set up and configure Scorecards so you can track key metrics and
      quickly understand the health of your projects in RHDH.


      8. **Enabling Scorecards**: To monitor component health and quality in RHDH,
      you must enable the Scorecard plugin in your configuration.


      9. **Configure Scorecards to monitor your project health**: The Scorecard plugin
      allows you to track key metrics and quickly understand the health of your projects
      in RHDH.


      10. **Using conditional policies with the Scorecard plugin**: You can use conditional
      policies to allow access to specific parts of the Scorecard plugin. You can
      define the conditional policy in the rbac-conditional-policies.yaml file or
      use the Web UI to select the desired permission.


      Remember to cite the sources immediately at the end of sentences before punctuation,
      using `` format (e.g., ''This is a fact.''). Do not add extra punctuation. Use
      only the file IDs provided (do not invent new ones).'
