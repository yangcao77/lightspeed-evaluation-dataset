- conversation_group_id: authentication-228
  description: authentication
  turns:
  - contexts:
    - 'Installing and configuring Scorecards to view metrics You can install and configure
      the following Scorecards to display metrics and visual health status for software
      components in the RHDH catalog: GitHub Scorecards Jira Scorecards ### Integrating
      GitHub health metrics using Scorecards You can configure the GitHub Scorecard
      plugin to display repository metrics in your RHDH catalog. This integration
      allows you to monitor component health and security risks directly from Red
      Hat Developer Hub. You can grant RHDH access to the GitHub API by using a GitHub
      App or a GitHub token. [IMPORTANT] ---- For long-lived integrations or organizational
      access, you must use a GitHub App. ---- You have installed your RHDH instance.
      You have installed the Scorecard images. Optional: If you choose the GitHub
      App option, you must have permissions in GitHub to create and manage a GitHub
      App. You must have added a custom RHDH application configuration and have enough
      permissions to change it. To install and configure GitHub Scorecards in your
      RHDH instance, complete the following steps: 1. Grant GitHub API access: Create
      one of the following authentication methods: * Configure using a GitHub App.
      1. Create a GitHub App with the required permissions (Read-only for Contents
      to allow reading repositories). [NOTE] ---- You must install the GitHub App
      on the organization (or user account) that owns repositories you want access
      to, granting it the necessary repository access permissions. ---- 1. In the
      General > Clients secrets section, click Generate a new client secret. 2. In
      the General > Private keys section, click Generate a private key. 3. In the
      Install App tab, choose an account to install your GitHub App on. 4. Record
      the App ID, Client ID, Client Secret, and Private key values. 2. Add secrets
      to RHDH by adding the following key/value pairs to your RHDH secrets. You can
      use these secrets in the RHDH configuration files by using their respective
      environment variable names. * GITHUB_INTEGRATION_APP_ID:: The saved App ID.
      * GITHUB_INTEGRATION_CLIENT_ID:: The saved Client ID. * GITHUB_INTEGRATION_CLIENT_SECRET::
      The saved Client Secret. * GITHUB_INTEGRATION_HOST_DOMAIN:: The GitHub host
      domain: github.com. * GITHUB_INTEGRATION_ORGANIZATION:: Your GitHub organization
      name, such as <your_github_organization_name>. * GITHUB_INTEGRATION_PRIVATE_KEY_FILE::
      The saved Private key content. 3. Configure the GitHub integration in your RHDH
      app-config.yaml file by adding the authentication details to the integrations.github
      section: ```yaml integrations: github: host: ${GITHUB_INTEGRATION_HOST_DOMAIN}
      apps: appId: ${GITHUB_INTEGRATION_APP_ID} clientId: ${GITHUB_INTEGRATION_CLIENT_ID}
      clientSecret: ${GITHUB_INTEGRATION_CLIENT_SECRET} privateKey: | ${GITHUB_INTEGRATION_PRIVATE_KEY_FILE}
      ``` Configure using a GitHub token. 1. Create a GitHub token with the following
      permissions: Classic Personal Access Token (PAT): Select the repo scope for
      read/write access to private repositories. Fine Grained Personal Access Token
      (PAT): Choose the specific repositories that RHDH must access. Grant the token
      a Read permission for Contents. 2. Add the token to RHDH secrets by adding the
      following key/value pair to your RHDH secrets. where: GITHUB_TOKEN:: The generated
      GitHub token. 3. Configure the GitHub integration in your RHDH app-config.yaml
      file by adding the authentication details to the integrations.github section:
      ```yaml integrations: github: host: github.com token: ${GITHUB_TOKEN} ``` 2.
      Enable the GitHub Scorecard plugin: Add the GitHub Scorecard module to your
      RHDH dynamic-plugins-config.yaml file: ```yaml plugins: package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/red hat developer hub backstage plugin
      scorecard backend module github:bs_1.45.3__2.3.5!red hat developer hub backstage
      plugin scorecard backend module github disabled: false ``` 3. Annotate catalog
      entities: Link a component to the GitHub data source by editing the catalog-info.yaml
      file for your RHDH entity and adding the required annotations as shown in the
      following code: ```yaml apiVersion: backstage.io/v1alpha1 kind: Component metadata:
      name: my-service annotations: # Required: GitHub project slug in format "owner/repository"
      github.com/project-slug: myorg/my-service # Required: Entity source location
      backstage.io/source-location: url:https://github.com/myorg/my-service spec:
      type: service lifecycle: production owner: _<your_team_name>_ ``` where: annotations:github.com/project-slug::
      The GitHub repository format, for example, owner/repository. annotations:backstage.io/source-location::
      The entity source location format, for example, url:https://github.com/owner/repository.
      spec:owner:: Your team name. [NOTE] ---- You must add the team entity to the
      Catalog to ensure the provided permissions are applicable. ---- 4. Ingest the
      catalog entity: Add the location of your catalog-info.yaml to the catalog.locations
      section in your RHDH app-config.yaml file: ```yaml catalog: locations: type:
      url target: https://github.com/<owner>/<repository>/catalog info.yaml ``` 5.
      Optional: Customize thresholds: Define custom roles for the GitHub Open Pull
      Requests (github.open_prs) metric in your RHDH app-config.yaml file: ```yaml
      scorecard: plugins: github: open_prs: thresholds: rules: key: success expression:
      ''<10'' key: warning expression: ''10 50'' key: error expression: ''>50'' ```
      where: scorecard:plugins:github:open_prs:thresholds:: Lists the default threshold
      values for the GitHub open PRs metric. ### Integrating Jira health metrics using
      Scorecards You can configure the Jira Scorecard plugin to display project tracking
      and delivery velocity data in your RHDH instance. This integration centralizes
      development status and facilitates the evaluation of component readiness. The
      plugin supports Jira Cloud (API v3) and Jira Data Center (API v2). You must
      have administrator privileges for Jira and RHDH. You have installed your RHDH
      instance. You have installed the Scorecard images. You must have added a custom
      RHDH application configuration and have sufficient permissions to change it.
      To install and configure Jira Scorecards in your RHDH instance, complete the
      following steps: [NOTE] ---- You must use the proxy setup to ensure configuration
      compatibility if you also use the Roadie Jira Frontend Plugin. ---- 1. Generate
      a Jira configuration token using one of the following methods, depending on
      your Jira product: * Jira Cloud: Create a personal token. You must create a
      Base64-encoded string using the following plain text format: your-atlassian-email:your-jira-api-token.
      ```bash $ echo n ''your atlassian email:your jira api token'' | base64 ``` Jira
      datacenter: Create a Personal Access Token (PAT) in your Jira datacenter account.
      2. Add Jira secrets: Define the following key/value pairs in your RHDH secrets:
      JIRA_TOKEN:: Enter your generated Jira token. JIRA_BASE_URL:: Enter your Jira
      base URL. 3. Configure the plugin: In your RHDH dynamic plugins config.yaml
      file, enable the plugin using either a direct setup or a proxy setup. Use a
      direct setup: 1. Add the following code to your RHDH dynamic plugins config.yaml
      file: ```yaml plugins: package: oci://ghcr.io/redhat developer/rhdh plugin export
      overlays/red hat developer hub backstage plugin scorecard backend module jira:bs_1.45.3__2.3.5!red
      hat developer'
    expected_response: You can grant Red Hat Developer Hub (RHDH) access to the GitHub
      API by using a GitHub App or a GitHub token. For long-lived integrations or
      organizational access, you must use a GitHub App.
    query: Wut are the ways to grant acces to the GitHub API?
    response: 'There are several ways to grant access to the GitHub API:


      1. Create a GitHub App and install it on your GitHub account. This will give
      you an App ID, Client ID, Client Secret, and Private key. You can then use these
      values to configure the GitHub integration in your Red Hat Developer Hub (RHDH)
      instance.


      2. Add the necessary secrets to your RHDH instance, including the GitHub App
      ID, Client ID, Client Secret, and Private key.


      3. Configure the GitHub authentication provider section in your app-config.yaml
      file, including the Client ID and Client Secret.


      4. Enable the GitHub catalog provider plugin in your dynamic-plugins.yaml file
      to import GitHub users and groups to the Developer Hub software catalog.


      5. Add the GitHub catalog provider section to your app-config.yaml file to provision
      GitHub users and groups to the Developer Hub software catalog.


      6. Configure the GitHub authentication details in your RHDH instance, including
      the App ID, Client ID, Client Secret, and Private key.


      7. Use a GitHub token instead of the App ID and Client Secret. This requires
      creating a GitHub token with the necessary permissions and adding it to the
      RHDH secrets.'
