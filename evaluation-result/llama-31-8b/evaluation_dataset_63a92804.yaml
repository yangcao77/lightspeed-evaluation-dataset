- conversation_group_id: configuration-355
  description: configuration
  turns:
  - contexts:
    - 'access OpenAI models through the OpenAI API. VERTEX_AI_PROJECT:: The Google
      Cloud project ID required to access Gemini through Vertex AI. VERTEX_AI_LOCATION::
      The Google Cloud region required to access Gemini through Vertex AI. GOOGLE_APPLICATION_CREDENTIALS::
      The credentials required to authenticate with Google Cloud to access Vertex
      AI. OLLAMA_URL:: The URL for the Ollama service. SAFETY_MODEL:: The identifier
      for the safety model. The recommended value is llama-guard3:8b. SAFETY_URL::
      The URL hosting the safety model. You must append /v1 to the host address (for
      example: localhost:#/v1). SAFETY_API_KEY:: The API key required to authenticate
      with the safety model, if applicable. 1. Click Create. 1. Update the dynamic
      plugins ConfigMap: Add the Developer Lightspeed for RHDH plugin image to your
      existing dynamic plugins ConfigMap (dynamic-plugins-rhdh). ```yaml includes:
      dynamic plugins.default.yaml plugins: disabled: false package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/red hat developer hub backstage plugin
      lightspeed:bs_1.45.3__1.2.3 pluginConfig: dynamicPlugins: frontend: red hat
      developer hub.backstage plugin lightspeed: translationResources: importName:
      lightspeedTranslations module: Alpha ref: lightspeedTranslationRef dynamicRoutes:
      path: /lightspeed importName: LightspeedPage mountPoints: mountPoint: application/listener
      importName: LightspeedFAB mountPoint: application/provider importName: LightspeedDrawerProvider
      mountPoint: application/internal/drawer state importName: LightspeedDrawerStateExposer
      config: id: lightspeed mountPoint: application/internal/drawer content importName:
      LightspeedChatContainer config: id: lightspeed priority: 100 disabled: false
      package: oci://ghcr.io/redhat developer/rhdh plugin export overlays/red hat
      developer hub backstage plugin lightspeed backend:bs_1.45.3__1.2.3 ``` 2. Required
      only if your environment uses another global floating action button (FAB): You
      must move the existing FAB or disable it to prevent interface elements from
      overlapping by updating your dynamic plugin configuration file with the following
      changes: ```yaml - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-bulk-import
      disabled: true pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-bulk-import:
      mountPoints: # START: If the user has an existing BulkImportPage FAB, move the
      FAB to the left - mountPoint: global.floatingactionbutton/config importName:
      BulkImportPage config: slot: ''bottom-left'' # END icon: BulkImportIcon label:
      ''Bulk import'' toolTip: ''Register multiple repositories in bulk'' to: /bulk-import
      translationResources: - importName: bulkImportTranslations module: Alpha ref:
      bulkImportTranslationRef appIcons: - name: bulkImportIcon importName: BulkImportIcon
      dynamicRoutes: - path: /bulk-import importName: BulkImportPage menuItem: icon:
      bulkImportIcon text: Bulk import textKey: menuItem.bulkImport ``` 3. Update
      your deployment configuration: Update the deployment configuration based on
      how your RHDH instance was installed. You must add two sidecar containers: llama-stack
      and lightspeed-core. * For an Operator-installed RHDH instance (Update Backstage
      custom resource (CR)): 1. In the spec.application.appConfig.configMaps section
      of your Backstage CR, add the Developer Lightspeed for RHDH custom app configuration:
      ```yaml appConfig: configMaps: name: lightspeed app config ``` 2. Update the
      spec.deployment.patch.spec.template.spec.volumes specification to include volumes
      for LCS configuration (lightspeed-stack), shared storage for feedback (shared-storage),
      and RAG data (rag-data-volume): ```yaml volumes: configMap: name: lightspeed
      stack name: lightspeed stack emptyDir: {} name: shared storage emptyDir: {}
      name: rag data volume ``` 3. Add the initContainers section to initialize RAG
      data: ```yaml + ---- initContainers: - name: init-rag-data image: ''quay.io/redhat-ai-dev/rag-content:release-1.9-lcs''
      command: - "sh" - "-c" - "echo ''Copying RAG data...''; cp -r /rag/vector_db/rhdh_product_docs
      /rag-content/ && cp -r /rag/embeddings_model /rag-content/ && echo ''Copy complete.''"
      volumeMounts: - mountPath: /rag-content name: rag-data-volume ---- ... Add the
      Llama Stack and the {lcs-short} containers to the `spec.deployment.patch.spec.template.spec.containers`
      section: ``` + ```yaml containers: # ... Your existing RHDH container definition
      ... - envFrom: - secretRef: name: llama-stack-secrets image: ''quay.io/redhat-ai-dev/llama-stack:0.1.4''
      # Llama Stack image name: llama-stack volumeMounts: - mountPath: /app-root/.llama
      name: shared-storage - mountPath: /rag-content name: rag-data-volume - image:
      ''quay.io/lightspeed-core/lightspeed-stack:0.4.0'' # Lightspeed Core Service
      image name: lightspeed-core volumeMounts: - mountPath: /app-root/lightspeed-stack.yaml
      name: lightspeed-stack subPath: lightspeed-stack.yaml - mountPath: /tmp/data/feedback
      name: shared-storage - mountPath: /tmp/data/transcripts name: shared-storage
      - mountPath: /tmp/data/conversations name: shared-storage ``` 1. Click Save.
      The Pods are automatically restarted. * For a Helm-installed RHDH instance (Update
      the Helm chart): 2. Add your dynamic plugins configuration in the global.dynamic
      property. ```yaml global: dynamic: plugins: package: oci://ghcr.io/redhat developer/rhdh
      plugin export overlays/red hat developer hub backstage plugin lightspeed:bs_1.45.3__1.2.3
      pluginConfig: dynamicPlugins: frontend: red hat developer hub.backstage plugin
      lightspeed: translationResources: importName: lightspeedTranslations module:
      Alpha ref: lightspeedTranslationRef dynamicRoutes: path: /lightspeed importName:
      LightspeedPage mountPoints: mountPoint: application/listener importName: LightspeedFAB
      mountPoint: application/provider importName: LightspeedDrawerProvider mountPoint:
      application/internal/drawer state importName: LightspeedDrawerStateExposer config:
      id: lightspeed mountPoint: application/internal/drawer content importName: LightspeedChatContainer
      config: id: lightspeed priority: 100 package: oci://ghcr.io/redhat developer/rhdh
      plugin export overlays/red hat developer hub backstage plugin lightspeed backend:bs_1.45.3__1.2.3
      ``` 3. Add your Developer Lightspeed for RHDH custom app config file to extraAppConfig:
      ```yaml extraAppConfig: configMapRef: lightspeed app config filename: app config.yaml
      ``` 4. Add the Llama Stack Secret file to extraEnvVarsSecrets: ```yaml extraEnvVarsSecrets:
      llama stack secrets ``` 5. Update the extraVolumes section to include the LCS
      ConfigMap (lightspeed-stack), shared storage, and RAG data volume: ```yaml extraVolumes:
      configMap: name: lightspeed stack name: lightspeed stack emptyDir: {} name:
      shared storage emptyDir: {} name: rag data volume ``` 6. Update the initContainers
      section (if supported by your Helm chart structure) to initialize RAG data.
      ```yaml initContainers: - name: init-rag-data image: ''quay.io/redhat-ai-dev/rag-content:release-1.9-lcs''
      command: - "sh" - "-c" - "echo ''Copying RAG data...''; cp -r /rag/vector_db/rhdh_product_docs
      /data/ && cp -r /rag/embeddings_model /data/ && echo ''Copy complete.''" volumeMounts:
      - mountPath: /data name: rag-data-volume ``` 7. Add the Llama Stack and LCS
      container definitions to extraContainers. [NOTE] ---- If you have Road-Core
      Service installed from the previous Red Hat Developer Lightspeed for Red Hat
      Developer Hub configuration, you must replace the older single container configuration
      found in source with the two sidecars. ---- ```yaml extraContainers: # Llama
      Stack Container - envFrom: - secretRef: name: llama-stack-secrets image: ''quay.io/redhat-ai-dev/llama-stack:0.1.4''
      name: llama-stack volumeMounts: - mountPath: /app-root/.llama name: shared-storage
      - mountPath: /rag-content/embeddings_model name: rag-data-volume subPath: embeddings_model
      - mountPath: /rag-content/vector_db/rhdh_product_docs name: rag-data-volume
      subPath: rhdh_product_docs # Lightspeed Core Service Container - image: ''quay.io/lightspeed-core/lightspeed-stack:0.4.0''
      name: lightspeed-core volumeMounts: - mountPath: /app-root/lightspeed-stack.yaml
      name: lightspeed-stack subPath: lightspeed-stack.yaml - mountPath: /tmp/data/feedback
      name: shared-storage - mountPath: /tmp/data/transcripts name: shared-storage
      - mountPath: /tmp/data/conversations name: shared-storage ``` 8. Click Save
      and then Helm upgrade. 1. Optional: Manage authorization (RBAC): If you have
      users who are not administrators, you must define permissions and roles for
      them to use Developer Lightspeed for RHDH. The Lightspeed Backend plugin uses
      Backstage RBAC for authorization. * For an Operator-installed RHDH instance:
      9. Configure the required RBAC permission by defining an rbac-policies.csv file,
      including lightspeed.chat.read, lightspeed.chat.create, and lightspeed.chat.delete
      permissions: ```csv p, role:default/_<your_team>_, lightspeed.chat.read, read,
      allow p, role:default/_<your_team>_, lightspeed.chat.create, create, allow p,
      role:default/_<your_team>_, lightspeed.chat.delete, delete, allow g, user:default/_<your_user>_,
      role:default/_<your_team>_ ``` 10. Upload your rbac-policies.csv'
    expected_response: The provided context states that you can access OpenAI models
      through the OpenAI API.
    query: So im trying to set up this Developer Lightspeed thing and i see at the
      top it says you can access OpenAI models through the OpenAI API, but then the
      whole rest of the document is just talking about Gemini and Vertex AI and Ollama
      and all these llama-stack containers, where is the part that tell me how to
      configure the OpenAI stuff?
    response: "To configure the OpenAI API, follow these steps:\n\nFirst of all, you\
      \ need to add the yaml file as a ConfigMap to your namespace. The yaml file\
      \ contains the following structure:\n\n```yaml\nversion: 2\nimage_name: redhat-ai-dev-llama-stack-no-guard\n\
      apis:\n  - agents\n  - inference\n  - safety\n  - tool_runtime\n  - vector_io\n\
      \  - files\ncontainer_image:\nexternal_providers_dir:\nproviders:\n  agents:\n\
      \    - config:\n        persistence:\n          agent_state:\n            namespace:\
      \ agents\n            backend: kv_default\n          responses:\n          \
      \  table_name: responses\n            backend: sql_default\n      provider_id:\
      \ meta-reference\n      provider_type: inline::meta-reference\n  inference:\n\
      \    - provider_id: ${env.ENABLE_VLLM:+vllm}\n      provider_type: remote::vllm\n\
      \      config:\n        url: ${env.VLLM_URL:=}\n        api_token: ${env.VLLM_API_KEY:=}\n\
      \        max_tokens: ${env.VLLM_MAX_TOKENS:=4096}\n        tls_verify: ${env.VLLM_TLS_VERIFY:=true}\n\
      \    - provider_id: ${env.ENABLE_OLLAMA:+ollama}\n      provider_type: remote::ollama\n\
      \      config:\n        url: ${env.OLLAMA_URL:=http://localhost:11434}\n   \
      \ - provider_id: ${env.ENABLE_OPENAI:+openai}\n      provider_type: remote::openai\n\
      \      config:\n        api_key: ${env.OPENAI_API_KEY:=}\n  safety:\n    - provider_id:\
      \ ${env.ENABLE_OPENAI:+openai}\n      provider_type: remote::openai\n      config:\n\
      \        api_key: ${env.OPENAI_API_KEY:=}\n```\n\nNext, you need to create a\
      \ secret file for LLM provider credentials. Name the file  `llama-stack-secrets`\
      \ . Add the following structure to the file:\n\n```\napiVersion: v1\nkind: Secret\n\
      metadata:\n  name: llama-stack-secrets\ntype: Opaque\nstringData:\n  ENABLE_VLLM:\
      \ \"true\"\n  ENABLE_OPENAI: \"true\"\n  ENABLE_VERTEX_AI: \"\"\n  ENABLE_OLLAMA:\
      \ \"\"\n  VLLM_URL: \"\"\n  VLLM_API_KEY: \"\"\n  VLLM_MAX_TOKENS: \"\"\n  VLLM_TLS_VERIFY:\
      \ \"\"\n  OPENAI_API_KEY: \"\"\n  VERTEX_AI_PROJECT: \"\"\n  VERTEX_AI_LOCATION:\
      \ \"\"\n  GOOGLE_APPLICATION_CREDENTIALS: \"\"\n  OLLAMA_URL: \"\"\n  SAFETY_MODEL:\
      \ \"llama-guard3:8b\"\n  SAFETY_URL: \"\"\n  SAFETY_API_KEY: \"\"\n```\n\nMake\
      \ sure to update the values for the following variables:\n\n* `ENABLE_VLLM`\n\
      * `ENABLE_OPENAI`\n* `VLLM_URL`\n* `VLLM_API_KEY`\n* `VLLM_MAX_TOKENS`\n* `OPENAI_API_KEY`\n\
      \nTo complete the setup, you need to create a custom dynamic plugins ConfigMap\
      \ and install the Developer Lightspeed for RHDH plugin, the Lightspeed Core\
      \ Service (LCS) sidecar container, and the Llama Stack sidecar container.\n\n\
      Note that this is a summarized version of the steps, and you may need to consult\
      \ the provided documentation for more detailed instructions. Also, make sure\
      \ to cite the sources immediately at the end of sentences before punctuation,\
      \ using  `<file-id>|>`  format."
