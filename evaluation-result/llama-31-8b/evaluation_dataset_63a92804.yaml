- conversation_group_id: authentication-483
  description: authentication
  turns:
  - contexts:
    - 'set: metadata.customField: ''hello'' schedule: frequency: PT1H timeout: PT15M
      ``` rdn:: To change the default value: cn, enter the relative distinguished
      name of each entry. name:: To change the default value: cn, enter the LDAP field
      to map to the RHDH metadata.name field. description:: To set a value, enter
      the LDAP field to map to the RHDH metadata.description field. displayName::
      To change the default value: cn, enter the LDAP field to map to the RHDH metadata.displayName
      field. email:: To change the default value: mail, enter the LDAP field to map
      to the RHDH spec.profile.email field. picture:: To set a value, enter the LDAP
      field to map to the RHDH spec.profile.picture field. memberOf:: To change the
      default value: memberOf, enter the LDAP field to map to the RHDH spec.memberOf
      field. members:: To change the default value: member, enter the LDAP field to
      map to the RHDH spec.children field. type:: To change the default value: groupType,
      enter the LDAP field to map to the RHDH spec.type field. set:: To set a value,
      enter the hard coded JSON to apply to the entities after ingestion, such as
      metadata.customField: ''hello''. 5. Recommended: To use a secure LDAP connection
      (ldaps://), enter optional tls fields. Optional tls fields ```yaml catalog:
      providers: ldapOrg: default: target: ldaps://ds.example.net bind: dn: cn=admin,ou=Users,dc=rhdh
      secret: ${LDAP_SECRET} users: ldapOrg: default: tls: rejectUnauthorized: true
      keys: ''/path/to/keys.pem'' certs: ''/path/to/certs.pem'' ``` rejectUnauthorized::
      Set to false to allow self-signed certificates [WARNING] ---- This option is
      not recommended for production. ---- keys:: Enter a file containing private
      keys in PEM format certs:: Enter a file containing cert chains in PEM format
      6. Optional: Enter configuration for vendor-specific attributes to set custom
      attribute names for distinguished names (DN) and universally unique identifiers
      (UUID) in LDAP directories. Default values are defined per supported vendor
      and automatically detected. ```yaml catalog: providers: ldapOrg: default: vendor:
      dnAttributeName: customDN uuidAttributeName: customUUID ``` dnAttributeName::
      Enter the attribute name that holds the distinguished name (DN) for an entry.
      uuidAttributeName:: Enter the attribute name that holds a universal unique identifier
      (UUID) for an entry. 7. Optional: Enter low level users and groups configuration
      in the options subsection. ```yaml catalog: providers: ldapOrg: default: target:
      ldaps://ds.example.net bind: dn: cn=admin,ou=Users,dc=rhdh secret: ${LDAP_SECRET}
      users: options: scope: sub filter: (uid= ) attributes: cn uid description paged:
      pageSize: 500 groups: options: scope: sub filter: (cn= ) attributes: cn uid
      description paged: pageSize: 500 pagePause: true ``` scope:: To change the default
      value: one, enter how deep the search should go within the directory tree: *
      base to search only the base DN. * one to search one level below the base DN.
      * sub to search all descendant entries. filter:: To change the default value:
      (objectclass=*), enter your LDAP filter. With the default mapping: * For users,
      enter (uid=*) to make sure only users with valid uid field is synced, since
      users without uid will cause error and ingestion fails. * For groups, enter
      (cn=*) [TIP] ---- When you change the mapping, also update the filter. ----
      attributes:: To change the default value: all attributes [''*'', ''+''], enter
      the array of attribute names to import from LDAP. paged:: Enter a value to enable
      paged results. pageSize:: Enter a value to set the results page size, such as
      500. pagePause:: Enter true to tell the client to wait for the asynchronous
      results of the next page, when the page limit has been reached. 5. Recommended:
      To use a secure LDAP connection (ldaps://), mount your LDAP certificates and
      keys files in your Developer Hub deployment, by editing your Backstage custom
      resource. ``` kind: Backstage spec: application: extraFiles: mountPath: /opt/ldap
      secrets secrets: name: my rhdh database database secrets key: ldap certs.pem,
