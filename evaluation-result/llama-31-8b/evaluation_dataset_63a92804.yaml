- conversation_group_id: kubernetes-453
  description: kubernetes
  turns:
  - contexts:
    - 'Provisioning your custom Red Hat Developer Hub configuration To configure Red
      Hat Developer Hub, provision your custom Red Hat Developer Hub config maps and
      secrets to Microsoft Azure Kubernetes Service (AKS) before running Red Hat Developer
      Hub. [TIP] ---- On Red Hat OpenShift Container Platform, you can skip this step
      to run Developer Hub with the default config map and secret. Your changes on
      this configuration might get reverted on Developer Hub restart. ---- By using
      the Kubernetes CLI (''kubectl''), you have access, with developer permissions,
      to the Kubernetes cluster aimed at containing your Developer Hub instance. 1.
      For security, store your secrets as environment variables values in an OpenShift
      Container Platform secret, rather than in clear text in your configuration files.
      Collect all your secrets in the secrets.txt file, with one secret per line in
      KEY=value form. * Enter your authentication secrets. 2. Author your custom app-config.yaml
      file. This is the main Developer Hub configuration file. You need a custom app-config.yaml
      file to avoid the Developer Hub installer to revert user edits during upgrades.
      When your custom app-config.yaml file is empty, Developer Hub is using default
      values. 1. For a production environment, start with the following setup: app-config.yaml
      ```yaml app: title: <Red Hat Developer Hub> branding: fullLogo: ${BASE64_EMBEDDED_FULL_LOGO}
      fullLogoWidth: 110px iconLogo: ${BASE64_EMBEDDED_ICON_LOGO} backend: cache:
      store: redis connection: ${REDIS_CONNECTION} techdocs: cache: ttl: 3600000 catalog:
      providers: <enter_your_provider_configuration> integrations: <enter_your_integrations_configuration>
      permission: enabled: true rbac: admin: users: - name: user:default/<your_policy_administrator_name>
      pluginsWithPermission: - catalog - scaffolder - permission ``` Most fields use
      environment variables that you defined in secrets in the previous step. app::
      title:: Enter your Developer Hub instance display name, such as <Red Hat Developer
      Hub>. branding:: Set your custom logo. Optionally, customize the width of the
      branding logo by changing value for the fullLogoWidth field. The following units
      are supported: integer, px, em, rem, percentage. backend:: cache:: Enable the
      plugins assets cache. techdocs:: cache:: Enable the TechDocs cache. catalog::
      provider:: Enter your catalog provider configuration. integrations:: Enter your
      repository discovery configuration. permissions:: Enable Role-based access control.
      Enter your policy administrator name. 2. Additionally, provision users and enable
      authentication with your external identity provider. 3. Author your custom dynamic-plugins.yaml
      file to enable plugins. By default, Developer Hub enables a minimal plugin set,
      and disables plugins that require configuration or secrets, such as the GitHub
      repository discovery plugin and the Role-based access control (RBAC) plugin.
      Enable the GitHub repository discovery and the RBAC features: dynamic.plugins.yaml
      ```yaml includes: dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/backstage
      plugin catalog backend module github disabled: false package: ./dynamic plugins/dist/backstage
      community plugin rbac disabled: false ``` 4. Provision your custom configuration
      files to your AKS cluster. 1. Create the <my-rhdh-project> {namespace} aimed
      at containing your Developer Hub instance. ```terminal $ oc create namespace
      my-rhdh-project ``` 2. Provision your app-config.yaml and dynamic-plugins.yaml
      files respectively to the my-rhdh-app-config, and dynamic-plugins-rhdh config
      maps in the <my-rhdh-project> project. ```terminal $ oc create configmap my-rhdh-app-config
      --from-file=app-config.yaml --namespace=my-rhdh-project $ oc create configmap
      dynamic-plugins-rhdh --from-file=dynamic-plugins.yaml --namespace=my-rhdh-project
      ``` Alternatively, create the config maps by using the web console. 3. Provision
      your secrets.txt file to the my-rhdh-secrets secret in the <my-rhdh-project>
      project. ```terminal $ oc create secret generic my-rhdh-secrets --from-file=secrets.txt
      --namespace=my-rhdh-project ``` Alternatively, create the secret by using the
      web console. Provision your PostgreSQL database secrets Provision your dynamic
      plugins config map Provision your RBAC policies config map ##'
    expected_response: By using the Kubernetes CLI ('kubectl'), you gain access to
      the Kubernetes cluster with developer permissions. It is used to provision your
      custom configuration files to your AKS cluster by performing actions such as
      creating a namespace for your Developer Hub instance, provisioning your app-config.yaml
      and dynamic-plugins.yaml files to the my-rhdh-app-config and dynamic-plugins-rhdh
      config maps respectively, and provisioning your secrets.txt file to the my-rhdh-secrets
      secret in your project.
    query: According to the documentation, what specific actions can be performed
      with the Kubernetes CLI to provision custom configuration files for Red Hat
      Developer Hub?
    response: "Based on the search results, the specific actions that can be performed\
      \ with the Kubernetes CLI to provision custom configuration files for Red Hat\
      \ Developer Hub are:\n\n1. Create a pull secret using your Red Hat credentials\
      \ to pull the container images from the protected Red Hat Container Registry\
      \ (registry.redhat.io).\n\n```bash\n$ kubectl -n {my-rhdh-namespace} create\
      \ secret docker-registry my-rhdh-pull-secret \\\n    --docker-server=registry.redhat.io\
      \ \\\n    --docker-username=<redhat_user_name> \\\n    --docker-password=<redhat_password>\
      \ \\\n    --docker-email=<email>\n```\n\n2. Add the image pull secret in the\
      \ default service account within the namespace where the Developer Hub instance\
      \ is being deployed:\n\n```bash\n$ kubectl patch serviceaccount default \\\n\
      \    -p '{\"imagePullSecrets\": [{\"name\": \"my-rhdh-pull-secret\"}]}' \\\n\
      \    -n {my-rhdh-namespace}\n```\n\n3. Create your Backstage custom resource\
      \ (CR) that mounts files provisioned in your custom config maps and injects\
      \ environment variables provisioned in your custom secrets:\n\n```yaml\napiVersion:\
      \ v1\nkind: ConfigMap\nmetadata:\n  name: app-config-rhdh\ndata:\n  \"app-config.yaml\"\
      : |\n    app:\n      title: Red Hat Developer Hub\n      baseUrl: https://__<my_developer_hub_domain>__\n\
      \    backend:\n      auth:\n        externalAccess:\n            - type: legacy\n\
      \              options:\n                subject: legacy-default-config\n  \
      \              secret: \"${BACKEND_SECRET}\"\n      baseUrl: https://__<my_developer_hub_domain>__\n\
      \      cors:\n        origin: https://__<my_developer_hub_domain>__\n```\n\n\
      Note: The above commands and configuration files are provided as examples and\
      \ may need to be modified according to your specific use case."
