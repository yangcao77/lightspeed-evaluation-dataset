- conversation_group_id: rbac-418
  description: rbac
  turns:
  - contexts:
    - '# Authorization in Red Hat Developer Hub Administrators can authorize users
      to perform actions and define what users can do in Developer Hub. Role-based
      access control (RBAC) is a security concept that defines how to control access
      to resources in a system by specifying a mapping between users of the system
      and the actions that those users can perform on resources in the system. You
      can use RBAC to define roles with specific permissions and then assign the roles
      to users and groups. RBAC on Developer Hub is built on top of the Permissions
      framework, which defines RBAC policies in code. Rather than defining policies
      in code, you can use the Developer Hub RBAC feature to define policies in a
      declarative fashion by using a simple CSV based format. You can define the policies
      by using Developer Hub web interface or REST API instead of editing the CSV
      directly. An administrator can define authorizations in Developer Hub by taking
      the following steps: 1. Enable the RBAC feature and give authorized users access
      to the feature. 2. Define roles and policies by combining the following methods:
      * The Developer Hub policy administrator uses the Developer Hub web interface
      or REST API. * The Developer Hub administrator edits the main Developer Hub
      configuration file. * The Developer Hub administrator edits external files.
      # Enabling and giving access to the Role-Based Access Control (RBAC) feature
      The Role-Based Access Control (RBAC) feature is disabled by default. Enable
      the RBAC plugin and declare policy administrators to start using RBAC features.
      The permission policies for users and groups in the Developer Hub are managed
      by permission policy administrators. Only permission policy administrators can
      access the Role-Based Access Control REST API. You have added a custom Developer
      Hub application configuration, and have necessary permissions to modify it.
      You have enabled an authentication provider. 1. The RBAC plugin is installed
      but disabled by default. To enable the ./dynamic-plugins/dist/backstage-community-plugin-rbac
      plugin, edit your dynamic-plugins.yaml with the following content. dynamic-plugins.yaml
      fragment ```yaml plugins: package: ./dynamic plugins/dist/backstage community
      plugin rbac disabled: false ``` See Installing and viewing plugins in Red Hat
      Developer Hub. 2. Declare policy administrators to enable a select number of
      authenticated users to configure RBAC policies through the REST API or Web UI,
      instead of modifying the CSV file directly. The permissions can be specified
      in a separate CSV file referenced in your my-rhdh-app-config config map, or
      permissions can be created using the REST API or Web UI. To declare users such
      as <your_policy_administrator_name> as policy administrators, edit your custom
      Developer Hub ConfigMap, such as app-config-rhdh, and add following code to
      the app-config.yaml content: app-config.yaml fragment ```yaml permission: enabled:
      true rbac: admin: users: name: user:default/<your_policy_administrator_name>
      ``` 3. In order to display the available permissions provided by installed plugins
      in the Developer Hub UI, you must supply the corresponding list of plugin IDs.
      There are two ways to do this, by updating your application configuration or
      by using the RBAC REST API permissions endpoint. 1. To provide plugins by updating
      your application configuration, you can specify the plugins with permissions
      in your app-config.yaml file as follows: app-config.yaml fragment ```yaml permission:
      enabled: true rbac: admin: users: name: user:default/<your_policy_administrator_name>
      pluginsWithPermission: catalog scaffolder permission ``` 2. To specify the plugins
      with permissions by using the RBAC REST API permissions endpoint, see the RBAC
      REST API permissions endpoint. 1. Sign out from the existing Red Hat Developer
      Hub session and log in again using the declared policy administrator account.
      2. With RBAC enabled, most features are disabled by default. 1. Navigate to
      the Catalog page in RHDH. The Create button is not visible. You cannot create
      new components. 2. Navigate to the API page. The Register button is not visible.
      Explicitly enable permissions to resources in Developer Hub. # Determining permission
      policy and role configuration source You can configure Red Hat Developer Hub
      policy and roles by using different sources. To maintain data consistency, Developer
      Hub associates each permission policy and role with one unique source. You can
      only use this source to change the resource. The available sources are: Configuration
      file:: Configure roles and policies in the Developer Hub app-config.yaml configuration
      file, for instance to declare your policy administrators. The Configuration
      file pertains to the default role:default/rbac_admin role provided by the RBAC
      plugin. The default role has limited permissions to create, read, update, delete
      permission policies or roles, and to read catalog entities. [NOTE] ---- In case
      the default permissions are insufficient for your administrative requirements,
      you can create a custom admin role with the required permission policies. ----
      REST API:: Configure roles and policies by using the Developer Hub Web UI or
      by using the REST API. CSV file:: Configure roles and policies by using external
      CSV files. Legacy:: The legacy source applies to policies and roles defined
      before RBAC backend plugin version 2.1.3, and is the least restrictive among
      the source location options. [IMPORTANT] ---- Replace the permissions and roles
      using the legacy source with the permissions using the REST API or the CSV file
      sources. ---- To determine the source of a role or policy, use a GET request.
      # Designing your policy rules Carefully design your policies to avoid permission
      conflicts that can result in unintended access denials. Red Hat Developer Hub
      applies policies as follows: The default policy is deny. A conditional rule
      overrides a basic rule. A deny basic rule overrides an allow basic rule. An
      allow conditional rule overrides a deny basic rule. A deny conditional rule
      overrides an allow conditional rule. 1. Use allow rules to explicitly allow
      access. 2. Avoid creating deny rules unless you know precisely how they can
      affect existing basic allow rules and existing conditional rules. # Managing
      role-based access controls (RBAC) using the Red Hat Developer Hub Web UI Policy
      administrators can use the Developer Hub web interface (Web UI) to allocate
      specific roles and permissions to individual users or groups. Allocating roles
      ensures that access to resources and functionalities is regulated across the
      Developer Hub. With the policy administrator'
    expected_response: 'The Role-Based Access Control (RBAC) plugin is installed but
      disabled by default. To enable the `./dynamic-plugins/dist/backstage-community-plugin-rbac`
      plugin, you need to edit your `dynamic-plugins.yaml` file to include the following
      content: `plugins: package: ./dynamic plugins/dist/backstage community plugin
      rbac disabled: false`.'
    query: how to enable the RBAC plugin in Red Hat Developer Hub
    response: "To enable the RBAC plugin in Red Hat Developer Hub, you need to create\
      \ a dynamic-plugins.yaml file and add the following content to it:\n\n```\n\
      plugins:\n  - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac\n\
      \    disabled: false\n```\n\nAdditionally, you need to declare policy administrators\
      \ to enable a select number of authenticated users to configure RBAC policies\
      \ through the REST API or Web UI. You can do this by adding the following code\
      \ to the app-config.yaml file:\n\n```\npermission:\n  enabled: true\n  rbac:\n\
      \    admin:\n      users:\n        - name: user:default/<your_policy_administrator_name>\n\
      ```\n\nReplace `<your_policy_administrator_name>` with the actual name of your\
      \ policy administrator user."
