- conversation_group_id: configuration-244
  description: configuration
  turns:
  - contexts:
    - '# Setting up and configuring your first Red Hat Developer Hub instance Prepare
      your IT infrastructure including Red Hat OpenShift Container Platform and required
      external components, and run your first Red Hat Developer Hub (RHDH) instance
      in production. # Checklist to run your first Red Hat Developer Hub (RHDH) instance
      in production. With the default configuration, Developer Hub runs with a minimal
      feature set that does not require secure connection to external services such
      as an identity provider, a Git provider, and external PostgreSQL and Redis databases.
      Using critical features therefore requires following additional configuration:
      For resiliency:: * Use an external PostgreSQL database. * Enable high-availability.
      For performance:: * Enable assets caching to an external Redis database. For
      security:: * Use secure connections to your external services. * Provision users
      and enable authentication. * Enable role-based access control, and configure
      the permission policy by using the Web UI. For adapting to your environment::
      * Enable GitHub repository discovery. * Customize Developer Hub appearance with
      your logo. # Installing the Red Hat Developer Hub Operator As an administrator,
      you can install the Red Hat Developer Hub Operator. Authorized users can use
      the Operator to install Red Hat Developer Hub on Red Hat OpenShift Container
      Platform (OpenShift Container Platform) and supported Kubernetes platforms.
      For more information on supported platforms and versions, see the Red Hat Developer
      Hub Life Cycle page. Containers are available for the following CPU architectures:
      AMD64 and Intel 64 (x86_64) You are logged in as an administrator on the OpenShift
      Container Platform web console. You have configured the appropriate roles and
      permissions within your project to create or access an application. For more
      information, see the Red Hat OpenShift Container Platform documentation on Building
      applications. You have installed Red Hat OpenShift Container Platform 4.16 to
      4.20. Make sure that your system meets the minimum sizing requirements. See
      Sizing requirements for Red Hat Developer Hub. [IMPORTANT] ---- You can upgrade
      Red Hat Developer Hub directly from any previous version to the latest release
      without installing intermediate versions. However, you must review the release
      notes for every skipped version to identify breaking changes or required migration
      steps. For example, if upgrading from version 1.5 to 1.7, check the release
      notes for both 1.6 and 1.7. ---- 1. In the navigation menu of the OpenShift
      Container Platform console, click Operators > OperatorHub. 2. In the Filter
      by keyword box, enter Developer Hub and click the Red Hat Developer Hub Operator
      card. 3. On the Red Hat Developer Hub Operator page, read the information about
      the Operator and click Install to open the Install Operator page. 4. After the
      Operator is successfully installed, provision your custom configuration: Before
      you create a Developer Hub instance, you must create the required config map
      and Secret resources in your project. These include the baseUrl and service-to-service
      authentication secrets. For detailed steps, see Provisioning your custom Red
      Hat Developer Hub configuration. 5. From the Update channel drop-down menu,
      select the update channel that you want to use, for example, fast or fast-1.9.
      [IMPORTANT] ---- The `fast channel includes all of the updates available for
      a particular version. Any update might introduce unexpected changes in your
      Red Hat Developer Hub deployment. Check the release notes for details about
      any potentially breaking changes. The fast-1.9 channel only provides z-stream
      updates, for example, updating from version 1.9.1 to 1.9.2. If you want to update
      the Red Hat Developer Hub y-version in the future, for example, updating from
      1.9 to 1.10, you must switch to the fast-1.10 channel manually. ---- 6. From
      the Version drop-down menu, select the version of the Red Hat Developer Hub
      Operator that you want to install. The default version is the latest version
      available in the selected channel. 7. Select the Operator Installation mode.
      [NOTE] ---- The All namespaces on the cluster (default) option is selected by
      default. The Specific namespace on the cluster option is not currently supported.
      ---- 8. In the Installed Namespace field, do one of the following actions: *
      Select Operator recommended Namespace to create and use the rhdh-operator namespace.
      This option is selected by default. * Select Select a Namespace to use an alternative
      namespace. * From the Select Project drop-down menu, do one of the following
      actions: * Select an existing project. * Select Create Project to create a new
      project for the Operator. * On the Create Project dialog, enter text into the
      required fields and click Create. [IMPORTANT] ---- For enhanced security, better
      control over the Operator lifecycle, and preventing potential privilege escalation,
      install the Red Hat Developer Hub Operator in a dedicated default rhdh-operator
      namespace. You can restrict other users'' access to the Operator resources through
      role bindings or cluster role bindings. You can also install the Operator in
      another namespace by creating the necessary resources, such as an Operator group.
      For more information, see Installing global Operators in custom namespaces.
      However, if the Red Hat Developer Hub Operator shares a namespace with other
      Operators, then it shares the same update policy as well, preventing the customization
      of the update policy. For example, if one Operator is set to manual updates,
      the Red Hat Developer Hub Operator update policy is also set to manual. For
      more information, see Colocation of Operators in a namespace. ---- 9. Select
      the Update approval method for the Operator. * If you select the Automatic option,
      the Operator is updated without requiring manual confirmation. * If you select
      the Manual option, a notification opens when a new update is released in the
      update channel. The update must be manually approved by an administrator before
      installation can begin. 10. Click Install. [NOTE] ---- If you selected a Manual
      approval strategy, the upgrade status of the subscription remains Upgrading
      until you review and approve the install plan. After you click Approve on the
      Install Plan page, the subscription upgrade status changes to Up to date. If
      you selected an Automatic approval strategy, the upgrade status should resolve
      to Up to date without intervention. ----'
    expected_response: An external Redis database is used with Red Hat Developer Hub
      for performance by enabling assets caching.
    query: For what purpose is an external Redis database used with Red Hat Developer
      Hub?
    response: "Based on the search results, an external Redis database is used in\
      \ Red Hat Developer Hub for:\n\n* Enhancing production performance by sharing\
      \ cached data across multiple backend instances.\n* Providing a shared logical\
      \ cache that ensures all instances access the same processed data, such as rendered\
      \ TechDocs.\n* Supporting high availability configurations using Redis Sentinel\
      \ for small deployments or Redis Cluster for larger deployments.\n\nThis allows\
      \ developers to configure high availability in a Red Hat Developer Hub Operator\
      \ deployment by adjusting replica values in their configuration file.\n \nSource:\
      \ \n References for technical words and concepts appear in ``. "
