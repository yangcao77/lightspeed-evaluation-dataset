- conversation_group_id: installation-296
  description: installation
  turns:
  - contexts:
    - 'Deploying Developer Hub from the OpenShift Container Platform web console with
      the Helm Chart You can use a Helm chart to install Developer Hub on the Red
      Hat OpenShift Container Platform web console. Helm is a package manager on OpenShift
      Container Platform that provides the following features: Applies regular application
      updates using custom hooks Manages the installation of complex applications
      Provides charts that you can host on public and private servers Supports rolling
      back to previous application versions The Red Hat Developer Hub Helm chart is
      available in the Helm catalog on OpenShift Dedicated and OpenShift Container
      Platform. You are logged in to your OpenShift Container Platform account. A
      user with the OpenShift Container Platform admin role has configured the appropriate
      roles and permissions within your project to create an application. For more
      information about OpenShift Container Platform roles, see Using RBAC to define
      and apply permissions. You have created a project in OpenShift Container Platform.
      For more information about creating a project in OpenShift Container Platform,
      see Red Hat OpenShift Container Platform documentation. Make sure that your
      system meets the minimum sizing requirements. See Sizing requirements for Red
      Hat Developer Hub. 1. From the Developer perspective on the Developer Hub web
      console, click +Add. 2. From the Developer Catalog panel, click Helm Chart.
      3. In the Filter by keyword box, enter Developer Hub and click the Red Hat Developer
      Hub card. 4. From the Red Hat Developer Hub page, click Create. 5. From your
      cluster, copy the OpenShift Container Platform router host (for example: apps.<clusterName>.com).
      6. Select the radio button to configure the Developer Hub instance with either
      the form view or YAML view. The Form view is selected by default. * Using Form
      view 1. To configure the instance with the Form view, go to Root Schema -> global
      -> Enable service authentication within Backstage instance and paste your OpenShift
      Container Platform router host into the field on the form. * Using YAML view
      1. To configure the instance with the YAML view, paste your OpenShift Container
      Platform router hostname in the global.clusterRouterBase parameter value as
      shown in the following example: ```yaml global: auth: backend: enabled: true
      clusterRouterBase: apps.<clusterName>.com ``` 7. Edit the other values if needed.
      [NOTE] ---- The information about the host is copied and can be accessed by
      the Developer Hub backend. When an OpenShift Container Platform route is generated
      automatically, the host value for the route is inferred and the same host information
      is sent to the Developer Hub. Also, if the Developer Hub is present on a custom
      domain by setting the host manually using values, the custom host takes precedence.
      ---- 8. Click Create and wait for the database and Developer Hub to start. 9.
      Click the Open URL icon to start using the Developer Hub platform. ![rhdh helm
      install] [NOTE] ---- Your developer-hub pod might be in a CrashLoopBackOff state
      if the Developer Hub container cannot access the configuration files. This error
      is indicated by the following log: ```log Loaded config from app-config-from-configmap.yaml,
      env ... 2023-07-24T19:44:46.223Z auth info Configuring "database" as KeyStore
      provider type=plugin Backend failed to start up Error: Missing required config
      value at ''backend.database.client'' ``` To resolve the error, verify the configuration
      files. ---- ## Deploying Developer Hub on OpenShift Container Platform with
      the Helm CLI You can use the Helm CLI to install Red Hat Developer Hub on Red
      Hat OpenShift Container Platform. You have installed the OpenShift CLI (oc)
      on your workstation. You are logged in to your OpenShift Container Platform
      account. A user with the OpenShift Container Platform admin role has configured
      the appropriate roles and permissions within your project to create an application.
      For more information about OpenShift Container Platform roles, see Using RBAC
      to define and apply permissions. You have created a project in OpenShift Container
      Platform. For more information about creating a project in OpenShift Container
      Platform, see Red Hat OpenShift Container Platform documentation. You have installed
      the Helm CLI tool. 1. Create and activate the <my-rhdh-project> OpenShift Container
      Platform project: ``` NAMESPACE=<rhdh> oc new-project ${NAMESPACE} || oc project
      ${NAMESPACE} ``` 2. Install the Red Hat Developer Hub Helm chart: ``` helm upgrade
      redhat developer hub i https://github.com/openshift helm charts/charts/releases/download/redhat
      redhat developer hub 1.9.0/redhat developer hub 1.9.0.tgz ``` 3. Configure your
      Developer Hub Helm chart instance with the Developer Hub database password and
      router base URL values from your OpenShift Container Platform cluster: ``` PASSWORD=$(oc
      get secret redhat developer hub postgresql o jsonpath="{.data.password}" | base64
      d) CLUSTER_ROUTER_BASE=$(oc get route console n openshift console o=jsonpath=''{.spec.host}''
      | sed ''s/^[^.] \.//'') helm upgrade redhat developer hub i "https://github.com/openshift
      helm charts/charts/releases/download/redhat redhat developer hub 1.9.0/redhat
      developer hub 1.9.0.tgz" \ set global.clusterRouterBase="$CLUSTER_ROUTER_BASE"
      \ set global.postgresql.auth.password="$PASSWORD" ``` 4. Display the running
      Developer Hub instance URL: ``` echo "https://redhat developer hub $NAMESPACE.$CLUSTER_ROUTER_BASE"
      ``` Open the running Developer Hub instance URL in your browser to use Developer
      Hub. Installing Helm'
    expected_response: 'To deploy Developer Hub from the OpenShift Container Platform
      web console with a Helm chart, you must first be logged into your OpenShift
      account, have an admin-configured project with the correct roles and permissions,
      and ensure your system meets the minimum sizing requirements. The steps are:
      1. From the Developer perspective, click +Add. 2. From the Developer Catalog
      panel, click Helm Chart. 3. Search for "Developer Hub" and click the Red Hat
      Developer Hub card. 4. Click Create. 5. Copy your OpenShift Container Platform
      router host. 6. Choose either the Form view or YAML view for configuration.
      In the Form view, paste the router host into the ''Enable service authentication
      within Backstage instance'' field. In the YAML view, paste the hostname into
      the ''global.clusterRouterBase'' parameter. 7. Edit other values if needed.
      8. Click Create and wait for the database and Developer Hub to start. 9. Click
      the Open URL icon to start using the platform.'
