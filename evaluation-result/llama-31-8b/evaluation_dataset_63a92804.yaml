      \        name: llama-stack\n        volumeMounts:\n          - mountPath: /app-root/.llama\n\
      \            name: shared-storage\n          - mountPath: /rag-content\n   \
      \         name: rag-data-volume\n      - image: 'quay.io/lightspeed-core/lightspeed-stack:0.4.0'\
      \ # Lightspeed Core Service image\n        name: lightspeed-core\n        volumeMounts:\n\
      \          - mountPath: /app-root/lightspeed-stack.yaml\n            name: lightspeed-stack\n\
      \            subPath: lightspeed-stack.yaml\n          - mountPath: /tmp/data/feedback\n\
      \            name: shared-storage\n          - mountPath: /tmp/data/transcripts\n\
      \            name: shared-storage\n          - mountPath: /tmp/data/conversations\n\
      \            name: shared-storage\n    ```\n4.  **Save the changes**: Click\
      \ Save to apply the changes. The Pods are automatically restarted.\n5.  **Update\
      \ the Helm chart (if applicable)**: If you have a Helm-installed RHDH instance,\
      \ add your dynamic plugins configuration in the global dynamic property.\n6.\
      \  **Verify the setup**: After implementing the above steps, verify that Llama\
