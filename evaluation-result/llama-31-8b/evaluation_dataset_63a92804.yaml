- conversation_group_id: configuration-404
  description: configuration
  turns:
  - contexts:
    - 'Configuring storage for TechDocs files The TechDocs publisher stores generated
      files in local storage or in cloud storage, such as AWS S3 or OpenShift Data
      Foundation. ### Configuring Amazon S3 for file storage You can create a dedicated
      Amazon S3 bucket to store TechDocs sites. {product} uploads TechDocs to this
      bucket and serves them from the same location. You are logged in to your AWS
      account as an administrator. 1. On the AWS console, create an AWS S3 bucket.
      1. On the Create bucket page, enter a Bucket name and use the default selections
      for all other settings. 2. Create an IAM policy to give authorized users permissions
      to generate and publish TechDocs for your organization. 3. On the Create policy
      > Specify permissions page, in the Policy editor, enter the following JSON content:
      ```JSON { "Version": "2012 10 17", "Statement": [ { "Sid": "TechDocsList", "Effect":
      "Allow", "Action": "s3:ListBucket", "Resource": "arn:aws:s3:::_<bucket_name>_"
      }, { "Sid": "TechDocsObjects", "Effect": "Allow", "Action": [ "s3:GetObject",
      "s3:PutObject", "s3:DeleteObject", "s3:DeleteObjectVersion" ], "Resource": "arn:aws:s3:::_<bucket_name>_/
      " } ] } ``` where <bucket_name>:: Specifies the name of your Amazon S3 bucket.
      4. On the Create policy > Specify permissions page, enter a Policy name. 2.
      Assign the IAM policy to a new or existing user. 3. Generate a new access key
      and a new secret access key. [NOTE] ---- You can use the newly created access
      keys to generate a TechDocs pipeline with GitHub Actions. ---- 4. From the OpenShift
      Container Platform web console, click Topology > Actions > Restart rollout to
      restart the pod. [NOTE] ---- You must restart the pod to apply the configuration
      changes. ---- 1. Go to your Amazon S3 bucket to see a set of static site files
      in your Objects list. ### Configuring OpenShift Data Foundation for file storage
      You can configure OpenShift Data Foundation to store the files that TechDocs
      generates instead of relying on other cloud storage solutions. OpenShift Data
      Foundation provides an ObjectBucketClaim custom resource (CR) that you can use
      to request an S3-compatible bucket backend. You must install the OpenShift Data
      Foundation Operator to use this feature. + [NOTE] ---- For air-gapped environments,
      using OpenShift Data Foundation is the recommended storage for TechDocs. ----
      An OpenShift Container Platform administrator has installed the OpenShift Data
      Foundation Operator in Red Hat OpenShift Container Platform, created an OpenShift
      Data Foundation cluster and configured the StorageSystem schema. For more information,
      see Deploying OpenShift Data Foundation using Amazon Web Services. Create an
      ObjectBucketClaim CR where the generated TechDocs files are stored. For example:
      ```yaml apiVersion: objectbucket.io/v1alpha1 kind: ObjectBucketClaim metadata:
      name: <rhdh_bucket_claim_name> spec: generateBucketName: <rhdh_bucket_claim_name>
      storageClassName: openshift storage.noobaa.io ``` [NOTE] ---- Creating the Developer
      Hub ObjectBucketClaim CR automatically creates both the Developer Hub ObjectBucketClaim
      config map and secret. The config map and secret have the same name as the ObjectBucketClaim
      CR. ---- After you create the ObjectBucketClaim CR, you can use the information
      stored in the config map and secret to make the information accessible to the
      Developer Hub container as environment variables. Depending on the method that
      you used to install Developer Hub, you add the access information to either
      the Red Hat Developer Hub Helm chart or Operator configuration. OpenShift Data
      Foundation Object Bucket Claim #### Making object storage accessible to containers
      by using the Helm chart Creating a ObjectBucketClaim custom resource (CR) automatically
      generates both the Developer Hub ObjectBucketClaim config map and secret. The
      config map and secret contain ObjectBucket access information. Adding the access
      information to the Helm chart configuration makes it accessible to the Developer
      Hub container by adding the following environment variables to the container:
      BUCKET_NAME BUCKET_HOST BUCKET_PORT BUCKET_REGION BUCKET_SUBREGION AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY These variables are then used in the TechDocs plugin configuration.
      You have installed Red Hat Developer Hub on OpenShift Container Platform using
      the Helm chart. You have created an ObjectBucketClaim CR for storing files generated
      by TechDocs. For more information see Using OpenShift Data Foundation for file
      storage In the upstream.backstage key in the Helm chart values, enter the name
      of the Developer Hub ObjectBucketClaim secret as the value for the extraEnvVarsSecrets
      field and the extraEnvVarsCM field. For example: ```yaml upstream: backstage:
      extraEnvVarsSecrets: <rhdh_bucket_claim_name> extraEnvVarsCM: <rhdh_bucket_claim_name>
      ``` ##### Example TechDocs Plugin configuration for the Helm chart The following
      example shows a Developer Hub Helm chart configuration for the TechDocs plugin:
      ```yaml global: dynamic: includes: ''dynamic plugins.default.yaml'' plugins:
      disabled: false package: ./dynamic plugins/dist/backstage plugin techdocs backend
      dynamic pluginConfig: techdocs: builder: external generator: runIn: local publisher:
      awsS3: bucketName: ''${BUCKET_NAME}'' credentials: accessKeyId: ''${AWS_ACCESS_KEY_ID}''
      secretAccessKey: ''${AWS_SECRET_ACCESS_KEY}'' endpoint: ''https://${BUCKET_HOST}''
      region: ''${BUCKET_REGION}'' s3ForcePathStyle: true type: awsS3 ``` #### Making
      object storage accessible to containers by using the Operator Creating a ObjectBucketClaim
      custom resource (CR) automatically generates both the Developer Hub ObjectBucketClaim
      config map and secret. The config map and secret contain ObjectBucket access
      information. Adding the access information to the Operator configuration makes
      it accessible to the Developer Hub container by adding the following environment
      variables to the container: BUCKET_NAME BUCKET_HOST BUCKET_PORT BUCKET_REGION
      BUCKET_SUBREGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY These variables are
      then used in the TechDocs plugin configuration. You have installed Red Hat Developer
      Hub on OpenShift Container Platform using the Operator. You have created an
      ObjectBucketClaim CR for storing files generated by TechDocs. In your Backstage
      CR, enter the name of the Developer Hub ObjectBucketClaim config map as the
      value for the spec.application.extraEnvs.configMaps field and enter the Developer
      Hub ObjectBucketClaim secret name as the value for the spec.application.extraEnvs.secrets
      field. For example: ```yaml apiVersion: rhdh.redhat.com/v1alpha5 kind: Backstage
      metadata: name: <name> spec: application: extraEnvs: configMaps: name: <rhdh_bucket_claim_name>
      secrets: name: <rhdh_bucket_claim_name> ``` ##### Example TechDocs Plugin configuration
      for the Operator The following example shows a Red Hat Developer Hub Operator
      config map configuration for the TechDocs plugin: ```yaml kind: ConfigMap apiVersion:
      v1 metadata: name: dynamic plugins rhdh data: dynamic plugins.yaml: | includes:
      dynamic plugins.default.yaml plugins: disabled: false package: ./dynamic plugins/dist/backstage
      plugin techdocs backend dynamic pluginConfig: techdocs: builder: external generator:
      runIn: local publisher: awsS3: bucketName: ''${BUCKET_NAME}'' credentials: accessKeyId:
      ''${AWS_ACCESS_KEY_ID}'' secretAccessKey: ''${AWS_SECRET_ACCESS_KEY}'' endpoint:
      ''https://${BUCKET_HOST}'' region: ''${BUCKET_REGION}'' s3ForcePathStyle: true
      type: awsS3 ``` ##'
