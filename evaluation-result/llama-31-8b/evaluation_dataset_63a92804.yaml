      continuously scan these external systems and synchronize data to the PostgreSQL
      database for fast querying. The database stores indexed Software Catalog entities
      synchronized from these external systems. If you use catalog providers exclusively,
      you do not require disaster recovery backups because you can repopulate catalog
      data from external sources of truth like Git repositories.
    query: how the git repositories work as source of truth for the catalog?
    response: 'The git repositories work as a source of truth for the catalog in Red
      Hat Developer Hub through the following process:


      1.  **Enabling GitHub repository discovery**: Configure Developer Hub to discover
      and ingest GitHub repositories automatically. If a repository contains a catalog-info.yaml
      file, Developer Hub ingests the repository into the catalog as a component.

      2.  **Creating a GitHub App**: Create a GitHub App with fine-grained permissions,
      short-lived tokens, and more control over which repositories the application
      can access. Opt for a GitHub App instead of an OAuth app to use fine-grained
      permissions, gain more control over which repositories the application can access,
      and use short-lived tokens.

      3.  **Configuring the GitHub integration**: Add the catalog.providers.github
      and the integrations.github sections to your custom Developer Hub app-config.yaml
      configuration file.

      4.  **Bulk importing in Red Hat Developer Hub**: Use the Bulk Import feature
      to automate GitHub repositories'' onboarding and track their import status.
      This feature is available for GitHub repositories and GitLab projects.


      By following these steps, you can establish Git repositories as the source of
      truth for your catalog in Red Hat Developer Hub.'
