- conversation_group_id: authentication-250
  description: authentication
  turns:
  - contexts:
    - 'custom app-config.yaml file is empty, Developer Hub is using default values.
      1. For a production environment, start with the following setup: app-config.yaml
      ```yaml app: title: <Red Hat Developer Hub> branding: fullLogo: ${BASE64_EMBEDDED_FULL_LOGO}
      fullLogoWidth: 110px iconLogo: ${BASE64_EMBEDDED_ICON_LOGO} backend: cache:
      store: redis connection: ${REDIS_CONNECTION} techdocs: cache: ttl: 3600000 catalog:
      providers: <enter_your_provider_configuration> integrations: <enter_your_integrations_configuration>
      permission: enabled: true rbac: admin: users: - name: user:default/<your_policy_administrator_name>
      pluginsWithPermission: - catalog - scaffolder - permission ``` Most fields use
      environment variables that you defined in secrets in the previous step. app::
      title:: Enter your Developer Hub instance display name, such as <Red Hat Developer
      Hub>. branding:: Set your custom logo. Optionally, customize the width of the
      branding logo by changing value for the fullLogoWidth field. The following units
      are supported: integer, px, em, rem, percentage. backend:: cache:: Enable the
      plugins assets cache. techdocs:: cache:: Enable the TechDocs cache. catalog::
      provider:: Enter your catalog provider configuration. integrations:: Enter your
      repository discovery configuration. permissions:: Enable Role-based access control.
      Enter your policy administrator name. 2. Additionally, provision users and enable
      authentication with your external identity provider. 3. Author your custom dynamic-plugins.yaml
      file to enable plugins. By default, Developer Hub enables a minimal plugin set,
      and disables plugins that require configuration or secrets, such as the GitHub
      repository discovery plugin and the Role-based access control (RBAC) plugin.
      Enable the GitHub repository discovery and the RBAC features: dynamic.plugins.yaml
      ```yaml includes: dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/backstage
      plugin catalog backend module github disabled: false package: ./dynamic plugins/dist/backstage
      community plugin rbac disabled: false ``` 4. Provision your custom configuration
      files to your {platform} cluster. 1. Create the <my-rhdh-project> {namespace}
      aimed at containing your Developer Hub instance. ```terminal $ oc create namespace
      my-rhdh-project ``` 2. Provision your app-config.yaml and dynamic-plugins.yaml
      files respectively to the my-rhdh-app-config, and dynamic-plugins-rhdh config
      maps in the <my-rhdh-project> project. ```terminal $ oc create configmap my-rhdh-app-config
      --from-file=app-config.yaml --namespace=my-rhdh-project $ oc create configmap
      dynamic-plugins-rhdh --from-file=dynamic-plugins.yaml --namespace=my-rhdh-project
      ``` Alternatively, create the config maps by using the web console. 3. Provision
      your secrets.txt file to the my-rhdh-secrets secret in the <my-rhdh-project>
      project. ```terminal $ oc create secret generic my-rhdh-secrets --from-file=secrets.txt
      --namespace=my-rhdh-project ``` Alternatively, create the secret by using the
      web console. 4. Provision your PosgreSQL TLS certificates to the my-rhdh-database-secrets
      secret in the <my-rhdh-project> project. ```terminal $ oc create secret generic
      my-rhdh-secrets --from-file=postgres-ca.pem --from-file=postgres-crt.pem --from-file=postgres-key.key
      --namespace=my-rhdh-project ``` # Enable authentication in Red Hat Developer
      Hub (with mandatory steps only) You can enable authentication in Red Hat Developer
      Hub to allow users to sign in to Red Hat Developer Hub using credentials from
      an external identity provider, such as RHBK, GitHub, or Microsoft Azure. This
      integration also allows you to provision user and group data from the identity
      provider to the Developer Hub software catalog, enabling features that rely
      on synchronized user and group data. ## Understand authentication and user provisioning
      Learn about the authentication process from creating user and group entities
      in the software catalog to user sign-in, and how authentication and catalog
      plugins enable each step. Understanding this process is essential for successfully
      configuring your Developer Hub instance, securing access through authorization,
      and enabling features that rely on synchronized user and group data. To fully
      enable catalog features, provision user and group data from the Identity Provider
      to the Developer Hub software catalog. Catalog provider plugins handle this
      task asynchronously. These plugins query the Identity Provider (IdP) for relevant
      user and group information, and create or update corresponding entities in the
      Developer Hub catalog. Scheduled provisioning ensures that the catalog accurately
      reflects the users and groups in your organization. When a user attempts to
      access Developer Hub, Developer Hub redirects them to a configured authentication
      provider, such as Red Hat Build of Keycloak (RHBK), GitHub, or Microsoft Azure.
      This external IdP is responsible for authenticating the user. On successful
      authentication, the Developer Hub authentication plugin, configured in your
      app-config.yaml file, processes the response from the IdP, resolves the identity
      in the Developer Hub software catalog, and establishes a user session within
      Developer Hub. Configuring authentication and user provisioning is critical
      for several reasons. Securing your Developer Hub instance by ensuring only authenticated
      users can gain access. Enabling authorization by allowing you to define access
      controls based on user and group memberships synchronized from your IdP. Provisioning
      user and group data to the catalog is necessary for various catalog features
      that rely on understanding entity ownership and relationships between users,
      groups, and software components. [IMPORTANT] ---- Without this provisioning
      step, features such as displaying who owns a catalog entity might not function
      correctly. ---- [TIP] ---- To explore Developer Hub features in a non-production
      environment, you can: * To use Developer Hub without external IdP, enable the
      guest user to skip configuring authentication and authorization, log in as the
      guest user, and access all Developer Hub features. * To use Developer Hub without
      authorization policies and features relying on the software catalog, you can
      enable the dangerouslyAllowSignInWithoutUserInCatalog resolver option. This
      setting bypasses the check requiring a user to be in the catalog but still enforces
      authentication. ---- [IMPORTANT] ---- Developer Hub uses a one-way synchronization
      model, where user and group data flow from your Identity Provider to the Developer
      Hub software catalog. As a result, deleting users or groups manually through
      the Developer Hub Web UI or REST API might be ineffective or cause inconsistencies,
      since Developer Hub will create those entities again during the next import.
      ---- ##'
    expected_response: In Red Hat Developer Hub, you can enable authentication to
      allow users to sign in using credentials from an external identity provider,
      such as Microsoft Azure. When a user attempts to access Developer Hub, they
      are redirected to the configured authentication provider, like Microsoft Azure,
      which is responsible for authenticating the user. This integration also enables
      the provisioning of user and group data from the identity provider to the Developer
      Hub software catalog, which is necessary for features that rely on synchronized
      user and group data.
    query: Red Hat Developer Hub Microsoft Azure authentication
    response: "To enable Azure authentication in Red Hat Developer Hub, you need to\
      \ add the Microsoft authentication provider to your app-config.yaml file. \n\
      \nHere's how to do it:\n\n1.  Create or modify the `app-config.yaml` file in\
      \ your Developer Hub instance to add the Azure authentication provider.\n2.\
      \  In the Azure portal, register your Azure application and configure it to\
      \ use the Azure authentication provider.\n3.  Review the example configuration\
      \ provided in the documentation to ensure that you have correctly set up your\
      \ Azure application and Developer Hub instance.\n4.  To enable Azure authentication\
      \ in Red Hat Developer Hub, add the necessary API permissions and configure\
      \ the Azure authentication provider in your Developer Hub instance.\n\n\nStep-by-step\
      \ instructions to enable Azure authentication in Red Hat Developer Hub.\n\n\
      *   **Step 1: Configure the app-config.yaml file**\n\n    *   Open the `app-config.yaml`\
      \ file in your Developer Hub instance.\n\n    *   Add the Azure authentication\
      \ provider to the `auth.providers` section:\n\n        ```yaml\n        auth:\n\
      \          environment: production\n          providers:\n            microsoft:\n\
      \              production:\n                clientId: ${MICROSOFT_CLIENT_ID}\n\
      \                clientSecret: ${MICROSOFT_CLIENT_SECRET}\n                tenantId:\
      \ ${MICROSOFT_TENANT_ID}\n        ```\n        \n    *   Replace the placeholders\
      \ with your actual Azure client ID, client secret, and tenant ID.\n    \n  \
      \  *   Save the changes to the `app-config.yaml` file.\n\n*   **Step 2: Register\
      \ your Azure application**\n\n    *   Open the Azure portal and sign in with\
      \ your Azure account.\n\n    *   Browse to the Azure portal's `Applications\
      \ > App registrations` section.\n\n    *   Click on the `New registration` button\
      \ and follow the prompts to create a new Azure application.\n\n    *   Set the\
      \ name for your application, select `Accounts in this organizational directory\
      \ only` as the supported account type, and choose a platform (e.g., Web).\n\n\
      \    *   Save your application's client ID for use in the next step.\n\n*  \
      \ **Step 3: Configure the Azure authentication provider**\n\n    *   Search\
      \ for the authentication provider section in your app-config.yaml file and update\
      \ the clientId, clientSecret, tenantId with your actual Microsoft Azure app\
      \ clinicians from the Azure portal.\n\n    *   You can then configure and test\
      \ the authentication settings in your Developer Hub instance.\n\n\nHere is the\
      \ JSON for a function call with its proper arguments to enable Azure authentication:\n\
      \n{\"name\": \"knowledge_search\", \"parameters\": {\"query\": \"Configure Red\
      \ Hat Developer Hub app-config.yaml file for Azure authentication\"}}"
