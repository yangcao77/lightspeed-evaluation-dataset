- conversation_group_id: plugins-147
  description: plugins
  turns:
  - contexts:
    - 'Packaging and publishing custom plugins as dynamic plugins After exporting
      a custom plugin, you can package the derived package into one of the following
      supported formats: Open Container Initiative (OCI) image (recommended) TGZ file
      JavaScript package [IMPORTANT] ---- Exported dynamic plugin packages must only
      be published to private NPM registries. ---- #### Creating an OCI image with
      dynamic packages You have installed podman or docker. You have exported a custom
      dynamic plugin package. For more information, see . 1. Navigate to the plugin''s
      root directory (not the dist-dynamic directory). 2. Run the following command
      to package the plugin into an OCI image: ```terminal $ npx @red hat developer
      hub/cli@latest plugin package - tag quay.io/example/image:v0.0.1 ``` In the
      previous command, the --tag argument specifies the image name and tag. 3. Run
      one of the following commands to push the image to a registry: ```terminal $
      podman push quay.io/example/image:v0.0.1 ``` ```terminal $ docker push quay.io/example/image:v0.0.1
      ``` The output of the package-dynamic-plugins command provides the plugin''s
      path for use in the dynamic-plugin-config.yaml file. #### Creating a TGZ file
      with dynamic packages title-plugins-rhdh-about * You have exported a custom
      dynamic plugin package. For more information, see . 1. Navigate to the dist-dynamic
      directory. 2. Run the following command to create a tgz archive: ```terminal
      $ npm pack ``` You can obtain the integrity hash from the output of the npm
      pack command by using the --json flag as follows: ```terminal $ npm pack --json
      | head -n 10 ``` 3. Host the archive on a web server accessible to your RHDH
      instance, and reference its URL in the dynamic-plugin-config.yaml file as follows:
      ```yaml plugins: - package: https://example.com/backstage-plugin-myplugin-1.0.0.tgz
      integrity: sha512-<hash> ``` 4. Run the following command to package the plugins:
      ```terminal $ npm pack - pack destination ~/test/dynamic plugins root/ ``` [TIP]
      ---- To create a plugin registry using HTTP server on OpenShift Container Platform,
      run the following commands: ```terminal $ oc project my rhdh project $ oc new
      build httpd - name=plugin registry - binary $ oc start build plugin registry
      - from dir=dynamic plugins root - wait $ oc new app - image stream=plugin registry
      ``` ---- 5. Configure your RHDH to use plugins from the HTTP server by editing
      the dynamic-plugin-config.yaml file: ```yaml plugins: package: http://plugin
