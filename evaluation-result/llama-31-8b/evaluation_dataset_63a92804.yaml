- conversation_group_id: plugins-258
  description: plugins
  turns:
  - contexts:
    - 'Enable user authentication with GitHub Authenticate users with GitHub by provisioning
      the users and groups from GitHub to the Developer Hub software catalog, and
      configuring the GitHub authentication provider in Red Hat Developer Hub. You
      have enough permissions in GitHub to create and manage a GitHub App. [TIP] ----
      Alternatively, ask your GitHub administrator to prepare the required GitHub
      App. ---- * You have added a custom Developer Hub application configuration,
      and have enough permissions to change it. 1. Allow Developer Hub to authenticate
      with GitHub, by creating a GitHub App. [NOTE] ---- Use a GitHub App instead
      of an OAuth app to use fine-grained permissions, use short-lived tokens, scale
      with the number of installations by avoiding rate limits, and have a more transparent
      integration by avoiding to request user input. ---- 1. Register a GitHub App
      with the following configuration: GitHub App name:: Enter a unique name identifying
      your GitHub App, such as authenticating-with-rhdh-<GUID>. Homepage URL:: Enter
      your Developer Hub URL: https://<my_developer_hub_domain>. Authorization callback
      URL:: Enter your Developer Hub authentication backend URL: https://<my_developer_hub_domain>/api/auth/github/handler/frame.
      Webhook:: Clear "Active". Organization permissions:: Enable Read-only access
      to Members. Where can this GitHub App be installed?:: Select Only on this account.
      2. In the General -> Clients secrets section, click Generate a new client secret.
      3. In the Install App tab, choose an account to install your GitHub App on.
      4. Save the following values for the next step: * Client ID * Client secret
      2. Add your GitHub credentials to Developer Hub by adding the following key/value
      pairs to your Developer Hub secrets. You can use these secrets in the Developer
      Hub configuration files by using their environment variable name. GITHUB_CLIENT_ID::
      Enter the saved Client ID. GITHUB_CLIENT_SECRET:: Enter the saved Client Secret.
      GITHUB_URL:: Enter the GitHub host domain: https://github.com. GITHUB_ORG::
      Enter your GitHub organization name, such as <your_github_organization_name>.
      3. Enable the GitHub catalog provider plugin in your dynamic-plugins.yaml file
      to import GitHub users and groups to the Developer Hub software catalog. ```yaml
      plugins: package: ''./dynamic plugins/dist/backstage plugin catalog backend
      module github org dynamic'' disabled: false ``` 4. Enable provisioning GitHub
      users and groups to the Developer Hub software catalog by adding the GitHub
      catalog provider section to your app-config.yaml file: ```yaml catalog: providers:
      githubOrg: id: githuborg githubUrl: "${GITHUB_URL}" orgs: [ "${GITHUB_ORG}"
      ] schedule: frequency: minutes: 30 initialDelay: seconds: 15 timeout: minutes:
      15 ``` id:: Enter a stable identifier for this provider, such as githuborg.
      [WARNING] ---- Entities from this provider are associated with this identifier.
      Therefore, do not to change the identifier over time since that might lead to
      orphaned entities or conflicts. ---- githubUrl:: Enter the configured secret
      variable name: ${GITHUB_URL}. orgs:: Enter the configured secret variable name:
      ${GITHUB_ORG}. schedule.frequency:: Enter your schedule frequency, in the cron,
      ISO duration, or "human duration" format. schedule.timeout:: Enter your schedule
      timeout, in the ISO duration or "human duration" format. schedule.initialDelay::
      Enter your schedule initial delay, in the ISO duration or "human duration" format.
      5. Enable the GitHub authentication provider, by adding the GitHub authentication
      provider section to your app-config.yaml file: ```yaml auth: environment: production
      providers: github: production: clientId: ${GITHUB_CLIENT_ID} clientSecret: ${GITHUB_CLIENT_SECRET}
      signInPage: github ``` environment:: Enter production to disable the Guest login
      option in the Developer Hub login page. clientId:: Enter the configured secret
      variable name: ${GITHUB_CLIENT_ID}. clientSecret:: Enter the configured secret
      variable name: ${GITHUB_CLIENT_SECRET}. signInPage:: Enter github to enable
      the GitHub provider as your Developer Hub sign-in provider. Optional: To configure
      optional fields, see Configuring Red Hat Developer Hub. :_mod-docs-content-type:
      SNIPPET 6. To disable the guest login option, in the app-config.yaml file, set
      the authentication environment to production: ```yaml auth: environment: production
      ``` 1. Verify user and group provisioning by checking the console logs. Successful
      synchronization example: ```json {"class":"GithubMultiOrgEntityProvider","level":"info","message":"Reading
      GitHub users and teams for org: rhdh-dast","plugin":"catalog","service":"backstage","target":"https://github.com","taskId":"GithubMultiOrgEntityProvider:githuborg:refresh","taskInstanceId":"801b3c6c-167f-473b-b43e-e0b4b780c384","timestamp":"2024-09-09
      23:55:58"} {"class":"GithubMultiOrgEntityProvider","level":"info","message":"Read
      7 GitHub users and 2 GitHub groups in 0.4 seconds. Committing...","plugin":"catalog","service":"backstage","target":"https://github.com","taskId":"GithubMultiOrgEntityProvider:githuborg:refresh","taskInstanceId":"801b3c6c-167f-473b-b43e-e0b4b780c384","timestamp":"2024-09-09
      23:55:59"} ``` 2. To verify GitHub authentication: 1. Go to the Developer Hub
      login page. 2. Your Developer Hub sign-in page displays Sign in using GitHub
      and the Guest user sign-in is disabled. 3. Log in with a GitHub account. Integrating
      Red Hat Developer Hub with GitHub ##'
    expected_response: "To enable the GitHub catalog provider plugin in your dynamic-plugins.yaml\
      \ file, which allows you to import GitHub users and groups to the Developer\
      \ Hub software catalog, you must add the following configuration: ```yaml\n\
      plugins:\n  package: './dynamic plugins/dist/backstage plugin catalog backend\
      \ module github org dynamic'\n  disabled: false\n```"
    query: I'm trying to get the GitHub catalog provider plugin working to import
      users and groups, and I know I need to edit the `dynamic-plugins.yaml` file.
      What is the exact package I need to specify and how do I make sure its not dissabled
      in the configuration?
    response: "Based on the search results, the exact package you need to specify\
      \ in the `dynamic-plugins.yaml` file is `backstage-plugin-catalog-backend-module-github-org-dynamic`.\n\
      \nHere's the exact configuration:\n\n```yaml\nplugins:\n  - package: './dynamic-plugins/dist/backstage-plugin-catalog-backend-module-github-org-dynamic'\n\
      \    disabled: false\n```\n\nAdditionally, you will need to add the GitHub catalog\
      \ provider section to your app-config.yaml file:\n\n```yaml\ncatalog:\n  providers:\n\
      \    githubOrg:\n      id: githuborg\n      githubUrl: \"${GITHUB_URL}\"\n \
      \     orgs: [ \"${GITHUB_ORG}\" ]\n      schedule:\n        frequency: \n  \
      \        minutes: 30\n        initialDelay: \n          seconds: 15\n      \
      \  timeout: \n          minutes: 15\n```\n\nMake sure to replace `${GITHUB_URL}`\
      \ and `${GITHUB_ORG}` with your actual GitHub URL and organization name."
