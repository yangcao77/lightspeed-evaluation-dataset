      \             frequency:\n               hours: 1\n             timeout:\n \
      \              minutes: 50\n             initialDelay:\n               minutes:\
      \ 50\n\n4. On the Applications > App registrations > {my-product-app-name-in-azure}\
      \ > Manage > API permissions page, Add a Permission, Microsoft Graph, select\
