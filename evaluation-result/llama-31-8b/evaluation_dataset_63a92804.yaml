- conversation_group_id: configuration-412
  description: configuration
  turns:
  - contexts:
    - 'Removing a TechDocs add-on Administrators can remove installed TechDocs add-ons
      from your Red Hat Developer Hub instance by using either the Operator or Helm
      chart, depending on the method used to install the add-on. If you used the Operator
      to install the add-on, remove it from the ConfigMap. If you used the Helm chart
      to install the add-on, remove it from the Helm chart. If you want to disable
      a plugin instead of removing it from your Red Hat Developer Hub instance, you
      can disable the plugin that you are using to import the TechDocs add-on. Since
      the disabled status is controlled at the plugin level, disabling the plugin
      disables all of the TechDocs add-ons in the specified plugin package. ### Removing
      an external TechDocs add-on from your ConfigMap If you no longer want to use
      the functionality of a TechDocs add-on that is imported from a particular plugin
      that you installed on your Red Hat Developer Hub instance with the Operator,
      you can temporarily disable it or permanently remove it from your ConfigMap.
      The disabled status is controlled at the plugin level, therefore, disabling
      the plugin disables all of the TechDocs add-ons in the disabled plugin package.
      1. From the Developer perspective in the OpenShift Container Platform web console,
      click ConfigMaps. 2. From the ConfigMaps page, click the ConfigMap that contains
      the TechDocs add-on that you want to remove. 3. Select the YAML view option
      in the Configure via field. 4. In the plugins section of the ConfigMap, do one
      of the following actions based on whether you want to disable or remove a TechDocs
      add-on: * To temporarily disable all of the TechDocs add-ons in a particular
      plugin package, change the value of the disabled field to true. For example:
      ```yaml kind: ConfigMap apiVersion: v1 metadata: name: dynamic plugins rhdh
      data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml plugins:
      package: ./dynamic plugins/dist/backstage plugin techdocs module addons contrib
      disabled: true pluginConfig: dynamicPlugins: frontend: backstage.plugin techdocs
      module addons contrib: techdocsAddons: importName: ReportIssue importName: <external_techdocs_add
      on> ``` where: <external_techdocs_add-on>:: Specifies the external TechDocs
      add-on that you want to remove, for example, TextSize. * To remove one or more
      TechDocs add-ons from your Red Hat Developer Hub instance, delete importName:
      <external_techdocs_add-on> for each external TechDocs add-on that you want to
      remove from the techdocsAddons section of your ConfigMap. For example: ```yaml
      kind: ConfigMap apiVersion: v1 metadata: name: dynamic plugins rhdh data: dynamic
      plugins.yaml: | includes: dynamic plugins.default.yaml plugins: package: ./dynamic
      plugins/dist/backstage plugin techdocs module addons contrib disabled: false
      pluginConfig: dynamicPlugins: frontend: backstage.plugin techdocs module addons
      contrib: techdocsAddons: importName: ReportIssue importName: <external_techdocs_add
      on> ``` where: <external_techdocs_add-on>:: Specifies the external TechDocs
      add-on that you want to remove, for example, TextSize. 5. Click Save. 6. In
      the web console navigation menu, click Topology and wait for the Red Hat Developer
      Hub pod to start. 7. Click the Open URL icon to start using the Red Hat Developer
      Hub platform with the new configuration changes. ### Removing an external TechDocs
      add-on from your Helm chart If you no longer want to use the functionality of
      a TechDocs add-on that is imported from a particular plugin that you installed
      on your Red Hat Developer Hub instance with the Helm chart, you can temporarily
      disable it or permanently remove it from your Helm chart. The disabled status
      is controlled at the plugin level, therefore, disabling the plugin disables
      all of the TechDocs add-ons in the disabled plugin package. In the plugins section
      of the Helm chart, do one of the following actions based on whether you want
      to disable or remove a TechDocs add on: To temporarily disable all of the TechDocs
      add ons in a particular plugin package, change the value of the disabled field
      to true. For example: ```yaml global: dynamic: plugins: package: ./dynamic plugins/dist/backstage
      plugin techdocs module addons contrib disabled: true pluginConfig: dynamicPlugins:
      frontend: backstage.plugin techdocs module addons contrib: techdocsAddons: importName:
      ReportIssue importName: <external_techdocs_add on> ``` where: <external_techdocs_add-on>::
      Specifies the external TechDocs add-on that you want to remove, for example,
      TextSize. * To remove one or more TechDocs add-ons from your Red Hat Developer
      Hub instance, delete importName: <external_techdocs_add-on> for each external
      TechDocs add-on that you want to remove from the techdocsAddons section of your
      Helm chart. For example: ```yaml global: dynamic: plugins: package: ./dynamic
      plugins/dist/backstage plugin techdocs module addons contrib disabled: false
      pluginConfig: dynamicPlugins: frontend: backstage.plugin techdocs module addons
      contrib: techdocsAddons: importName: ReportIssue importName: <external_techdocs_add
      on> ``` where: <external_techdocs_add-on>:: Specifies the external TechDocs
      add-on that you want to remove, for example, TextSize. ## Using TechDocs add
      ons After an administrator installs a TechDocs add-on in your Red Hat Developer
      Hub instance, you can use it to extend the functionality of the TechDocs plugin
      and enhance your documentation experience. ### Using the ReportIssue TechDocs
      add-on If you find an error in your organization&#8217;s TechDocs documentation,
      you can use the ReportIssue add-on to open a new GitHub or GitLab issue directly
      from the documentation. ReportIssue automatically imports the text that you
      highlight in the document into a new issue template in your repository. The
      ReportIssue add on is installed and enabled in your TechDocs plugin. You have
      permissions to create issues in the repository where documentation issues are
      reported. 1. In your TechDocs documentation, highlight the text that you want
      to report an issue for. 2. Click the text in the ReportIssue box, for example,
      Open new GitHub issue. 3. From the new issue page in your repository, use the
      template to create the issue that you want to report. [NOTE] ---- The default
      issue title is Documentation feedback: <highlighted_text>, where <highlighted_text>
      is the text that you highlighted in your TechDocs documentation. In the issue
      description, <highlighted_text> is the default value for the The highlighted
      text field. ---- The issue that you created is listed on the issues page in
      your repository. ### Using the TextSize TechDocs add-on You can use the TextSize
      add-on to change the size of the text on either the TechDocs Reader page or
      an Entity page. The TextSize add on is installed'
    expected_response: Administrators can remove an installed TechDocs add-on from
      a Red Hat Developer Hub instance by using either the Operator or a Helm chart,
      depending on the method used to install it. If the Operator was used, the add-on
      is removed from the ConfigMap. If a Helm chart was used, it is removed from
      the Helm chart. As an alternative to removal, you can disable the plugin that
      imports the TechDocs add-on, which will disable all add-ons in that specific
      plugin package.
    query: how to remove a techdocs add-on from Red Hat Developer Hub
    response: "To remove a techdocs add-on from Red Hat Developer Hub configuration\
      \ files, you need to delete importName: <external_techdocs_add-on> for each\
      \ external TechDocs add-on that you want to remove from the techdocsAddons section\
      \ of your Helm chart.\n\nHere is an example of how to do this:\n\n```\nglobal:\n\
      \  dynamic:\n    plugins:\n      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-module-addons-contrib\n\
      \        disabled: false\n        pluginConfig:\n          dynamicPlugins:\n\
      \            frontend:\n              backstage.plugin-techdocs-module-addons-contrib:\n\
      \                techdocsAddons:\n                  - importName: ReportIssue\n\
      \                  - importName: <external_techdocs_add-on>\n```"
    turn_id: d44ee71b-1c13-4ccc-93a7-db7caf85f0c4
