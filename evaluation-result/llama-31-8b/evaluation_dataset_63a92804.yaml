      / mui sidebars: patternfly / mui pages: patternfly / mui headers: patternfly
      / mui toolbars: patternfly / mui dialogs: patternfly / mui cards: patternfly
      / mui tables: patternfly / mui tabs: patternfly / mui ``` # Customizing the
      Home page When using your RHDH app-config.yaml file, you can do any of the following
      tasks: Customize and extend the default Home page layout with additional cards
      that appear based on the plugins you have installed and enabled. Change quick
      access links. Add, reorganize, and remove the available homepage cards. ## Available
      homepage cards As an administrative user, you can easily integrate custom features
      or content from any installed plugin into your Home page layout. You can use
      the additional cards available for configuration based on the frontend plugins
      you enable. The following is a list of the available homepage cards: Search
      bar Quick access Headline Markdown Placeholder Catalog starred entities Featured
      docs [NOTE] ---- Each card can have a layouts definition and props that depend
      on the component you use. ---- ## Customizing the Home page cards As an administrator,
      you can customize the layout and content of the Home page to create a tailored
      user experience. This includes integrating various specialized cards into the
      primary view. The Home page layout uses a 12-column grid system. You can precisely
      define the position (x), width (w), and height (h) for each card across multiple
      screen breakpoints: Extra large (xl) Large (lg) Medium (md) Small (sm) Extra
      small (xs) Extra extra small (xxs) The default Home page is as shown in the
      following app-config.yaml file configuration: ```yaml dynamicPlugins: frontend:
      red-hat-developer-hub.backstage-plugin-dynamic-home-page: dynamicRoutes: - path:
      / importName: DynamicHomePage mountPoints: - mountPoint: home.page/cards importName:
      SearchBar config: layouts: xl: { w: 10, h: 1, x: 1 } lg: { w: 10, h: 1, x: 1
      } md: { w: 10, h: 1, x: 1 } sm: { w: 10, h: 1, x: 1 } xs: { w: 12, h: 1 } xxs:
      { w: 12, h: 1 } - mountPoint: home.page/cards importName: QuickAccessCard config:
      layouts: xl: { w: 7, h: 8 } lg: { w: 7, h: 8 } md: { w: 7, h: 8 } sm: { w: 12,
      h: 8 } xs: { w: 12, h: 8 } xxs: { w: 12, h: 8 } - mountPoint: home.page/cards
      importName: CatalogStarredEntitiesCard config: layouts: xl: { w: 5, h: 4, x:
      7 } lg: { w: 5, h: 4, x: 7 } md: { w: 5, h: 4, x: 7 } sm: { w: 12, h: 4 } xs:
      { w: 12, h: 4 } xxs: { w: 12, h: 4 } ``` You have administrative access and
      can modify the app config.yaml file for dynamic plugin configurations. Configure
      different cards for your Home page in Red Hat Developer Hub as shown in the
      following code: Search:: You can use the SearchBar card to provide essential
      search functionality directly on the Home page. ```yaml dynamicPlugins: frontend:
      red-hat-developer-hub.backstage-plugin-dynamic-home-page: mountPoints: - mountPoint:
      home.page/cards importName: SearchBar config: layouts: xl: { w: 10, h: 1, x:
      1 } lg: { w: 10, h: 1, x: 1 } md: { w: 10, h: 1, x: 1 } sm: { w: 10, h: 1, x:
      1 } xs: { w: 12, h: 1 } xxs: { w: 12, h: 1 } props: path: /search queryParam:
      query ``` Quick access:: You can use the QuickAccessCard card to function as
      a customizable shortcut panel. ```yaml dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-dynamic-home-page:
      mountPoints: - mountPoint: home.page/cards importName: QuickAccessCard config:
      layouts: xl: { h: 8 } lg: { h: 8 } md: { h: 8 } sm: { h: 8 } xs: { h: 8 } xxs:
      { h: 8 } props: title: Quick Access path: /quickaccess ``` Headline:: You can
      use the Headline card to display important information. ```yaml dynamicPlugins:
      frontend: red-hat-developer-hub.backstage-plugin-dynamic-home-page: mountPoints:
      - mountPoint: home.page/cards importName: Headline config: layouts: xl: { h:
      1 } lg: { h: 1 } md: { h: 1 } sm: { h: 1 } xs: { h: 1 } xxs: { h: 1 } props:
      title: Important info ``` Markdown:: You can use the Markdown card to display
      richly formatted content directly within the Home page layout. This card uses
      Markdown syntax to present structured information, such as lists and links (documentation
      and plugin repositories). ```yaml dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-dynamic-home-page:
      mountPoints: - mountPoint: home.page/cards importName: MarkdownCard config:
      layouts: xl: { w: 6, h: 4 } lg: { w: 6, h: 4 } md: { w: 6, h: 4 } sm: { w: 6,
      h: 4 } xs: { w: 6, h: 4 } xxs: { w: 6, h: 4 } props: title: Company links content:
      | ### RHDH * [Website](https://developers.redhat.com/rhdh/overview) * [Documentation](https://docs.redhat.com/en/documentation/red_hat_developer_hub/)
      * [Backstage Community Plugins](https://github.com/backstage/community-plugins)
