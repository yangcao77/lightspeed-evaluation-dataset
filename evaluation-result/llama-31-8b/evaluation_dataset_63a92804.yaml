      position of the header. Supported values are above-main-content and above-sidebar.
      You must configure the support URL in the app config.yaml file to display the
      Support button in the header. You must install the notifications plugin to display
      the Notifications button in the header. 1. Copy the default configuration and
      modify the field values to suit your needs. You can adjust the priority value
      of each header component to control its position. Additionally, you can enable
      or disable components by adding or removing them from the configuration. To
      ensure that the remaining header buttons align with the end of the header before
      the profile dropdown button, set config.props.growFactor to 1 in the Spacer
      mount point to enable the Spacer component. For example: ```yaml mountPoint:
      global.header/component importName: Spacer config: priority: 100 props: growFactor:
      1 ``` 2. To use your custom header, you must install it as a dynamic plugin
      by adding your plugin configuration to your app-config-dynamic.yaml file. For
      example: ```yaml package: <npm_or_oci_package reference> disabled: false pluginConfig:
      dynamicPlugins: frontend: <package_name>: mountPoints: mountPoint: application/header
      importName: <application_header_name> config: position: above main content mountPoint:
      global.header/component importName: <header_component_name> config: priority:
      100 mountPoint: global.header/component importName: <header_component_name>
      config: priority: 90 ``` where: <npm_or_oci_package-reference>:: Specifies the
      package name. <application_header_name>:: Specifies the name of the application
      header. For example: MyHeader <header_component_name>:: Specifies the name of
      the header component. For example: MyHeaderComponent [NOTE] ---- importName
      is an optional name referencing the value returned by the scaffolder field extension
      API. ---- 3. Optional: To disable the global header, set the value of the disabled
      field to true in your dynamic-plugins.yaml file. For example: ```yaml package:
      ./dynamic plugins/dist/red hat developer hub backstage plugin global header
      disabled: true ``` ## Mount points for dynamic plugin integration You can customize
      the application header in Developer Hub using mount points for dynamic plugins.
      These mount points give flexibility in configuring the position of the header,
      its components and dropdown menus. You can create a customized experience with
      the following enhancements: application/header:: Controls the header position.
      Use config.position to set placement as either above-main-content or above-sidebar.
      global.header/component:: Configures header components. Use config.priority
      to set the order of components, and pass properties (including CSS styles) via
      config.props. Self-service button:: ```yaml mountPoint: global.header/component
      importName: HeaderIconButton config: priority: 80 props: title: Self service
      icon: add to: create ``` Spacer element:: ```yaml mountPoint: global.header/component
      importName: Spacer config: priority: 99 props: growFactor: 0 ``` Divider element::
      ```yaml mountPoints: mountPoint: global.header/component importName: Divider
      config: priority: 150 ``` global.header/profile:: Configures the profile dropdown
      list when the ProfileDropdown component is enabled. * To add a settings link
      to the profile dropdown, use the following code: ```yaml mountPoint: global.header/profile
      importName: MenuItemLink config: priority: 100 props: title: Settings link:
      /settings icon: manageAccounts ``` global.header/create:: Configures the create
      dropdown list when the CreateDropdown component is enabled. * To add a section
      for registering a component, use the following code: ```yaml mountPoint: global.header/create
      importName: RegisterAComponentSection config: props: growFactor: 0 ``` ## Configuring
      the logo in the global header You can configure a company logo in the global
      header of the Red Hat Developer Hub (RHDH) to reflect your company&#8217;s branding.
      CompanyLogo is part of the global header by default and offers full control
      over the theming, navigation behavior, sizing, and fallback options. This component
      supports the following props, which are provided through configuration: logo:
      The base64 encoded logo image. to: The redirect path for when users click the
      logo is ''/catalog''. width: The logo width is optional and defaults to 150
      px. height: The logo height is optional and defaults to 40 px. 1. To display
      a custom company logo in the global header, update the configuration with a
      mount point for CompanyLogo: ```yaml # ...rest of the global header configuration
      red-hat-developer-hub.backstage-plugin-global-header: mountPoints: - mountPoint:
      application/header importName: GlobalHeader config: # Supported values: above-main-content
      | above-sidebar position: above-main-content mountPoint: global.header/component
      importName: CompanyLogo config: priority: 200 props: # Path to navigate when
      users click the logo: to: ''/catalog'' width: 300 height: 200 logo: <string>
      or <object> # Logo can be a base64 string or theme specific object # Example
      1: Single logo for all themes # logo: "<base64_encoded_images>" # Example 2:
      Theme-specific logos # logo: dark: ''data:image/png;base64,...'' # Used in dark
      theme light: ''data:image/png;base64,...'' # Used in light theme ``` 2. (Optional)
      If you do not provide logo props to the CompanyLogo component, the component
      instead uses values defined under app.branding in your app-config.yaml file.
      You can configure the CompanyLogo as shown in the following configuration: ```yaml
      app: branding: fullLogoWidth: 220 # Fallback width fullLogo: <string> or <object>
      #fullLogo can be a base64 string or theme-specific object # Example 1: Single
      logo for all themes #fullLogo: "<base64_encoded_image> # Example 2: Theme-specific
      logos #fullLogo: dark: ''data:image/png;base64,...'' # Used in dark theme light:
      ''data:image/png;base64,...'' # Used in light theme ``` CompanyLogo uses the
      following configuration elements to control fallback and sizing behavior: *
      Logo source priority * The component selects the logo source in the following
      order: First, CompanyLogo props (logo, logo.light, logo.dark), then, app.branding.fullLogo.
      If you do not provide a logo through either, the component displays the default
      Developer Hub theme-specific logo. * Logo width priority * The component applies
      the first available value from props.width, then app.branding.fullLogoWidth
      from app-config.yaml. If you do not specify the width using either, the component
      applies a default width (150 px). [NOTE] ---- CompanyLogo preserves the images
      aspect ratio and never crops or distorts it. If the configured width results
      in a height greater than the maximum allowed (default: 40px), the image is automatically
      scaled down. As a result, adjusting only the width may not visibly change the
      logo unless the height is also configured. Increasing the logo height increases
      the height of the global header. The component first applies the value from
      props.height. If you do not specify the height, the component applies a default
      height (40px). ---- 1. The logo appears correctly in the global header. 2. Click
      the logo to confirm it redirects to the path you defined in props.to. 3. Toggle
      between light'
