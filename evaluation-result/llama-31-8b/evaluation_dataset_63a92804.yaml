      \ a unique name identifying your GitHub App, such as integrating-with-rhdh-<GUID>.\n\
      \   - Homepage URL: Enter your Developer Hub URL: https://<my_developer_hub_domain>.\n\
      \   - Authorization callback URL: Enter your Developer Hub authentication backend\
      \ URL: https://<my_developer_hub_domain>/api/auth/github/handler/frame.\n  \
      \ - Webhook: Clear \"Active\".\n   - Organization permissions: Enable Read-only\
      \ access to Members.\n   - Where can this GitHub App be installed?: Select Only\
      \ on this account.\n3. In the General -> Clients secrets section, click Generate\
      \ a new client secret.\n4. In the General -> Private keys section, click Generate\
      \ a private key.\n5. In the Install App tab, choose an account to install your\
      \ GitHub App on.\n6. Save the following values for the next step:\n   - App\
      \ ID\n   - Client ID\n   - Client secret\n   - Private key\n7. Add the auth.providers.github\
      \ section to your app-config.yaml file:\n   ```\n   auth:\n     providers:\n\
      \       github:\n         production:\n           clientId: ${GITHUB_CLIENT_ID}\n\
      \           clientSecret: ${GITHUB_CLIENT_SECRET}\n           disableIdentityResolution:\
      \ true\n   ```\n   where:\n   - clientId: Enter the configured secret variable\
      \ name: ${GITHUB_CLIENT_ID}.\n   - clientSecret: Enter the configured secret\
      \ variable name: ${GITHUB_CLIENT_SECRET}.\n   - disableIdentityResolution: Enter\
      \ true to skip user identity resolution for this provider to enable sign-in\
      \ from an auxiliary authentication provider.\n   [WARNING] Do not enable this\
      \ setting on the primary authentication provider you plan on using for sign-in\
      \ and identity management.\n8. To disable the guest login option, in the app-config.yaml\
      \ file, set the authentication environment to production:\n   ```\n   auth:\n\
      \     environment: production\n   ```\n9. Go to the Developer Hub login page.\n\
      10. Log in with your primary authentication provider account.\n11. In the top\
      \ user menu, go to Settings > Authentication Providers.\n12. In the GitHub line,\
      \ click the Sign in button and log in.\n\nCite source: ``.\n\nNote: The above\
