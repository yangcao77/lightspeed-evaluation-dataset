- conversation_group_id: rbac-449
  description: rbac
  turns:
  - contexts:
    - '{ "result": "CONDITIONAL", "roleEntityRef": "role:default/test", "pluginId":
      "catalog", "resourceType": "catalog-entity", "permissionMapping": ["read"],
      "conditions": { "rule": "IS_ENTITY_OWNER", "resourceType": "catalog-entity",
      "params": { "claims": ["group:default/team-a"] } } } ``` A condition with criteria::
      Consider a condition with criteria, which displays catalogs only if user is
      a member of owner group OR displays list of all catalog user groups. To add
      the criteria, you can add another rule as IS_ENTITY_KIND in the condition as
      follows: ```json { "anyOf": [ { "rule": "IS_ENTITY_OWNER", "resourceType": "catalog
      entity", "params": { "claims": ["group:default/team a"] } }, { "rule": "IS_ENTITY_KIND",
      "resourceType": "catalog entity", "params": { "kinds": ["Group"] } } ] } ```
      [NOTE] ---- Running conditions in parallel during creation is not supported.
      Therefore, consider defining nested conditional policies based on the available
      criteria. ---- ```json { "anyOf": [ { "rule": "IS_ENTITY_OWNER", "resourceType":
      "catalog-entity", "params": { "claims": ["group:default/team-a"] } }, { "rule":
      "IS_ENTITY_KIND", "resourceType": "catalog-entity", "params": { "kinds": ["Group"]
      } } ], "not": { "rule": "IS_ENTITY_KIND", "resourceType": "catalog-entity",
      "params": { "kinds": ["Api"] } } } ``` You can apply the previous example condition
      to the RBAC REST API by adding additional parameters as follows: ```json { "result":
      "CONDITIONAL", "roleEntityRef": "role:default/test", "pluginId": "catalog",
      "resourceType": "catalog entity", "permissionMapping": ["read"], "conditions":
      { "anyOf": [ { "rule": "IS_ENTITY_OWNER", "resourceType": "catalog entity",
      "params": { "claims": ["group:default/team a"] } }, { "rule": "IS_ENTITY_KIND",
      "resourceType": "catalog entity", "params": { "kinds": ["Group"] } } ] } } ```
      The following examples can be used with Developer Hub plugins. These examples
      can help you determine how to define conditional policies: ```json { "result":
      "CONDITIONAL", "roleEntityRef": "role:default/developer", "pluginId": "catalog",
      "resourceType": "catalog-entity", "permissionMapping": ["update", "delete"],
      "conditions": { "not": { "rule": "HAS_ANNOTATION", "resourceType": "catalog-entity",
      "params": { "annotation": "keycloak.org/realm", "value": "<YOUR_REALM>" } }
      } } ``` The previous example of Keycloak plugin prevents users in the role:default/developer
      from updating or deleting users that are ingested into the catalog from the
      Keycloak plugin. [NOTE] ---- In the previous example, the annotation keycloak.org/realm
      requires the value of <YOUR_REALM>. ---- ```json { "result": "CONDITIONAL",
      "roleEntityRef": "role:default/developer", "pluginId": "scaffolder", "resourceType":
      "scaffolder action", "permissionMapping": ["use"], "conditions": { "not": {
      "rule": "HAS_ACTION_ID", "resourceType": "scaffolder action", "params": { "actionId":
      "quay:create repository" } } } } ``` The previous example of Quay plugin prevents
      the role role:default/developer from using the Quay scaffolder action. Note
      that permissionMapping contains use, signifying that scaffolder-action resource
      type permission does not have a permission policy. # User statistics in Red
      Hat Developer Hub In Red Hat Developer Hub, the licensed-users-info-backend
      plugin provides statistical information about the logged-in users using the
      Web UI or REST API endpoints. The licensed-users-info-backend plugin enables
      administrators to monitor the number of active users on Developer Hub. Using
      this feature, organizations can compare their actual usage with the number of
      licenses they have purchased. Additionally, you can share the user metrics with
      Red Hat for transparency and accurate licensing. The licensed-users-info-backend
      plugin is enabled by default. This plugin enables a Download User List link
      at the bottom of the Administration -> RBAC tab. ## Downloading active users
      list in Red Hat Developer Hub You can download the list of users in CSV format
      using the Developer Hub web interface. RBAC plugins (@backstage community/plugin
      rbac and @backstage community/plugin rbac backend) must be enabled in Red Hat
      Developer Hub. An administrator role must be assigned. 1. In Red Hat Developer
      Hub, navigate to Administration and select the RBAC tab. 2. At the bottom of
      the RBAC page, click Download User List. 3. Optional: Modify the file name in
      the Save as field and click Save. 4. To access the downloaded users list, go
      to the Downloads folder on your local machine and open the CSV file.'
    expected_response: 'In Red Hat Developer Hub, the licensed-users-info-backend
      plugin, which is enabled by default, allows administrators to monitor active
      users and download a list. To download the list of users in CSV format, you
      must have the RBAC plugins (@backstage community/plugin rbac and @backstage
      community/plugin rbac backend) enabled and an administrator role assigned. The
      steps are: 1. In Red Hat Developer Hub, navigate to Administration and select
      the RBAC tab. 2. At the bottom of the RBAC page, click Download User List. 3.
      Optionally, modify the file name in the Save as field and click Save. 4. You
      can access the downloaded users list by going to the Downloads folder on your
      local machine and opening the CSV file.'
    query: How can I download the list of active users in Red Hat Developer Hub to
      compare usage with our purchased licenses?
    response: 'Here is the answer based on the provided information:


      To download the list of active users in Red Hat Developer Hub, you can follow
      these steps:


      1. Go to the Administration tab and select the RBAC tab.

      2. Click on the Download User List link at the bottom of the page.

      3. You will be prompted to save a CSV file containing the list of active users.

      4. Open the CSV file in a text editor or spreadsheet program to view the list
      of active users.


      Alternatively, you can use the RBAC REST API to retrieve the list of active
      users in CSV format. You can use a tool like curl to send a GET request to the
      following URL:


      ```

      GET /api/licensed-users-info/users

      ```


      This will return a CSV file containing the list of active users. You can save
      this file to your local machine and open it in a text editor or spreadsheet
      program to view the list of active users.


      Note: You must have the RBAC plugin enabled in Red Hat Developer Hub and an
      administrator role assigned to use this feature.'
