      hat developer hub backstage plugin scorecard backend module jira disabled: false
      ``` 2. In your RHDH app-config.yaml file, add the following proxy settings:
      ```yaml proxy: endpoints: ''/jira/api'': target: ${JIRA_BASE_URL} headers: Accept:
      ''application/json'' Content-Type: ''application/json'' X-Atlassian-Token: ''no-check''
      Authorization: ${JIRA_TOKEN} # Must be configured in your environment jira:
