- conversation_group_id: kubernetes-389
  description: kubernetes
  turns:
  - contexts:
    - 'Exposing your operator-based Red Hat Developer Hub instance on Google Kubernetes
      Engine (GKE) On Google Kubernetes Engine (GKE), to expose your Red Hat Developer
      Hub instance, Kubernetes ingresses replace OpenShift Container Platform routes.
      The Red Hat Developer Hub operator does not create ingresses. Therefore, to
      access your Developer Hub instance via a domain name, create the required ingresses
      on GKE and point your domain name to it. You have installed Red Hat Developer
      Hub by using the Red Hat Developer Hub Operator. You have configured a domain
      name for your Developer Hub instance. You have reserved a static external Premium
      IPv4 Global IP address that is not attached to any virtual machine (VM). For
      more information see Reserve a new static external IP address You have configured
      the DNS records for your domain name to point to the IP address that has been
      reserved. [NOTE] ---- You need to create an A record with the value equal to
      the IP address. This process can take up to one hour to propagate. ---- 1. Create
      a Google-managed certificate manifest file, named managed-certificate.yaml:
      ```yaml apiVersion: networking.gke.io/v1 kind: ManagedCertificate metadata:
      name: my rhdh certificate name spec: domains: <my_developer_hub_domain> ```
      For more information about setting up a Google-managed certificate, see Setting
      up a Google-managed certificate. 2. Deploy the managed certificate: ```terminal
      $ kubectl n my rhdh project apply f managed certificate.yaml ``` 3. Create a
      frontend config manifest file, named frontend-config.yaml, to set a policy for
      redirecting to HTTPS. ```yaml apiVersion: networking.gke.io/v1beta1 kind: FrontendConfig
      metadata: name: my ingress_security_config spec: sslPolicy: gke ingress ssl
      policy https redirectToHttps: enabled: true ``` For more information about setting
      a policy to redirect to HTTPS, see HTTP to HTTPS redirects. 4. Deploy the frontend
      config: ```terminal $ kubectl n my rhdh project apply f frontend config.yaml
      ``` 5. Create an ingress manifest file, named rhdh-ingress.yaml, specifying
      your Developer Hub service name, and using your managed certificate and your
      frontend config: ```yaml apiVersion: networking.k8s.io/v1 kind: Ingress metadata:
      name: my rhdh ingress annotations: kubernetes.io/ingress.class: "gce" kubernetes.io/ingress.global
      static ip name: <ADDRESS_NAME> networking.gke.io/managed certificates: my rhdh
      certificate name networking.gke.io/v1beta1.FrontendConfig: my ingress_security_config
      spec: ingressClassName: gce rules: host: <my_developer_hub_domain> http: paths:
      path: / pathType: Prefix backend: service: name: my rhdh custom resource port:
      name: http backend ``` 6. Deploy the ingress: ```terminal $ kubectl n my rhdh
      project apply f rhdh ingress.yaml ``` Wait for the ManagedCertificate to be
      provisioned. This process can take a couple of hours. Access RHDH with https://<my_developer_hub_domain>.
      For more information on setting up GKE using Ingress with TLS, see Secure GKE
      Ingress. #'
    expected_response: 'On Google Kubernetes Engine (GKE), Kubernetes ingresses replace
      OpenShift Container Platform routes, and the Red Hat Developer Hub operator
      does not create them. To access your Developer Hub instance via a domain name,
      you must create the required ingresses. The process involves creating and deploying
      several manifest files. First, create a Google-managed certificate manifest
      file named `managed-certificate.yaml` with your domain. Then, deploy it using
      the command `$ kubectl n my rhdh project apply f managed certificate.yaml`.
      Next, create a frontend config manifest file, `frontend-config.yaml`, to set
      a policy for redirecting to HTTPS and deploy it with `$ kubectl n my rhdh project
      apply f frontend config.yaml`. Finally, create an ingress manifest file, `rhdh-ingress.yaml`,
      specifying your Developer Hub service name, your managed certificate, and your
      frontend config. This file should include annotations such as `kubernetes.io/ingress.class:
      \"gce\"` and `kubernetes.io/ingress.global static ip name: <ADDRESS_NAME>`.
      Deploy this ingress with the command `$ kubectl n my rhdh project apply f rhdh
      ingress.yaml`. After deployment, you must wait for the ManagedCertificate to
      be provisioned, which can take a couple of hours.'
    query: So the operator dont create the Ingress for my Red Hat Developer Hub on
      GKE, how do i do it then, like what are all the files and commands i need to
      run to create the Ingress and get it working with my domain name?
    response: "To create an Ingress for Red Hat Developer Hub on GKE without an external\
      \ operator, follow these steps:\n\n1.  Create a Kubernetes manifest file (named\
      \ `rhdh-ingress.yaml`) specifying the Red Hat Developer Hub service name as\
      \ follows:\n\n    ```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
      metadata:\n  name: my-rhdh-ingress\n  namespace: my-rhdh-project\nspec:\n  ingressClassName:\
      \ alb\n  rules:\n  - host: <my_developer_hub_domain>\n    http:\n      paths:\n\
      \      - path: /\n        pathType: Prefix\n        backend:\n          service:\n\
      \            name: my-rhdh-service\n            port:\n              name: http-backend\n\
      ```\n\n2.  Create a Google-managed certificate manifest file (named `managed-certificate.yaml`)\
      \ as follows:\n\n    ```yaml\napiVersion: networking.gke.io/v1\nkind: ManagedCertificate\n\
      metadata:\n  name: my-rhdh-certificate-name\nspec:\n  domains:\n  - <my_developer_hub_domain>\n\
      ```\n\n3.  Deploy the created Ingress and managed certificate using the following\
      \ commands:\n\n    ```terminal\n$ kubectl -n my-rhdh-project apply -f rhdh-ingress.yaml\n\
      $ kubectl -n my-rhdh-project apply -f managed-certificate.yaml\n```\n\n4.  Wait\
      \ for the managed certificate to be provisioned. This process may take a couple\
      \ of hours.\n\n5.  Access RHDH with `https://<my_developer_hub_domain>`.\n\n\
      For more information about securing GKE with a Google-managed certificate, see\
      \ [Creating a Google-managed SSL certificate in GKE](https://cloud.google.com/kubernetes-engine/docs/add\
      \ getContent.md#managed-cert).\n\nRemember to replace `<my_developer_hub_domain>`\
      \ with your actual domain name. \n\nNote: Make sure that the permissions are\
      \ properly set up for the RHDH instance to access the necessary resources."
    turn_id: 1d51e930-756e-42ff-95c7-913661405a68
