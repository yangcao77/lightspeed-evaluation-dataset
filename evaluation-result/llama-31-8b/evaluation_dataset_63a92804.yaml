- conversation_group_id: rbac-423
  description: rbac
  turns:
  - contexts:
    - 'Supported RBAC REST API endpoints The RBAC REST API provides endpoints for
      managing roles, permissions, and conditional policies in the Developer Hub and
      for retrieving information about the roles and policies. ### Roles The RBAC
      REST API supports the following endpoints for managing roles in the Red Hat
      Developer Hub. [GET] /api/permission/roles:: Returns all roles in Developer
      Hub. ```json [ { "memberReferences": ["user:default/username"], "name": "role:default/guests"
      }, { "memberReferences": [ "group:default/groupname", "user:default/username"
      ], "name": "role:default/rbac_admin" } ] ``` [GET] /api/permission/roles/<kind>/<namespace>/<name>::
      Returns information for a single role in Developer Hub. ```json [ { "memberReferences":
      [ "group:default/groupname", "user:default/username" ], "name": "role:default/rbac_admin"
      } ] ``` [POST] /api/permission/roles/<kind>/<namespace>/<name>:: Creates a role
      in Developer Hub. ```json { "memberReferences": ["group:default/test"], "name":
      "role:default/test_admin" } ``` ``` 201 Created ``` [PUT] /api/permission/roles/<kind>/<namespace>/<name>::
      Updates memberReferences, kind, namespace, or name for a role in Developer Hub.
      The request body contains the oldRole and newRole objects: ```json { "oldRole":
      { "memberReferences": ["group:default/test"], "name": "role:default/test_admin"
      }, "newRole": { "memberReferences": ["group:default/test", "user:default/test2"],
      "name": "role:default/test_admin" } } ``` ``` 200 OK ``` [DELETE] /api/permission/roles/<kind>/<namespace>/<name>?memberReferences=<VALUE>::
      Deletes the specified user or group from a role in Developer Hub. ``` 204 ```
      [DELETE] /api/permission/roles/<kind>/<namespace>/<name>:: Deletes a specified
      role from Developer Hub. ``` 204 ``` ### Permission policies The RBAC REST API
      supports the following endpoints for managing permission policies in the Red
      Hat Developer Hub. [GET] /api/permission/policies:: Returns permission policies
      list for all users. ```json [ { "entityReference": "role:default/test", "permission":
      "catalog-entity", "policy": "read", "effect": "allow", "metadata": { "source":
      "csv-file" } }, { "entityReference": "role:default/test", "permission": "catalog.entity.create",
      "policy": "use", "effect": "allow", "metadata": { "source": "csv-file" } },
      ] ``` [GET] /api/permission/policies/<kind>/<namespace>/<name>:: Returns permission
      policies related to the specified entity reference. ```json [ { "entityReference":
      "role:default/test", "permission": "catalog-entity", "policy": "read", "effect":
      "allow", "metadata": { "source": "csv-file" } }, { "entityReference": "role:default/test",
      "permission": "catalog.entity.create", "policy": "use", "effect": "allow", "metadata":
      { "source": "csv-file" } } ] ``` [POST] /api/permission/policies:: Creates a
      permission policy for a specified entity. ```json [ { "entityReference": "role:default/test",
      "permission": "catalog entity", "policy": "read", "effect": "allow" } ] ```
      ``` 201 Created ``` [PUT] /api/permission/policies/<kind>/<namespace>/<name>::
      Updates a permission policy for a specified entity. The request body contains
      the oldPolicy and newPolicy objects: ```json { "oldPolicy": [ { "permission":
      "catalog entity", "policy": "read", "effect": "allow" }, { "permission": "catalog.entity.create",
      "policy": "create", "effect": "allow" } ], "newPolicy": [ { "permission": "catalog
      entity", "policy": "read", "effect": "deny" }, { "permission": "policy entity",
      "policy": "read", "effect": "allow" } ] } ``` ``` 200 ``` [DELETE] /api/permission/policies/<kind>/<namespace>/<name>?permission={value1}&policy={value2}&effect={value3}::
      Deletes a permission policy added to the specified entity. ``` 204 No Content
      ``` [DELETE] /api/permission/policies/<kind>/<namespace>/<name>:: Deletes all
      permission policies added to the specified entity. ```json [ { "entityReference":
      "role:default/test", "permission": "catalog entity", "policy": "delete", "effect":
      "allow" }, { "entityReference": "role:default/test", "permission": "catalog
      entity", "policy": "update", "effect": "allow" } ] ``` ``` 204 No Content ```
      [GET] /api/permission/plugins/policies:: Returns permission policies for all
      static plugins. ```json [ { "pluginId": "catalog", "policies": [ { "isResourced":
      true, "permission": "catalog entity", "policy": "read" }, { "isResourced": false,
      "permission": "catalog.entity.create", "policy": "create" }, { "isResourced":
      true, "permission": "catalog entity", "policy": "delete" }, { "isResourced":
      true, "permission": "catalog entity", "policy": "update" }, { "isResourced":
      false, "permission": "catalog.location.read", "policy": "read" }, { "isResourced":
      false, "permission": "catalog.location.create", "policy": "create" }, { "isResourced":
      false, "permission": "catalog.location.delete", "policy": "delete" } ] }, ...
      ] ``` [GET] /api/permission/plugins/id:: Returns object with list plugin IDs:
      ```json [ { "ids": ["catalog", "permission"] } ] ``` [POST] /api/permission/plugins/id::
      Add more plugins IDs defined in the request object. Request Parameters: object
      in JSON format. ```json [ { "ids": ["scaffolder"] } ] ``` Returns a status code
      of 200 and JSON with actual object stored in the server: ```json [ { "ids":
      ["catalog", "permission", "scaffolder"] } ] ``` [DELETE] /api/permission/plugins/id::
      Delete plugins IDs defined in the request object. Request Parameters: object
      in JSON format. ```json [ { "ids": ["scaffolder"] } ] ``` Returns a status code
      of 200 and JSON with actual object stored in the server: ```json [ { "ids":
      ["catalog", "permission"] } ] ``` [NOTE] ---- In order to prevent an inconsistent
      state after a deployment restart, the REST API does not allow deletion of plugin
      IDs that were provided by using the application configuration. These ID values
      can only be removed through the configuration file. ---- ### Conditional policies
      The RBAC REST API supports the following endpoints for managing conditional
      policies in the Red Hat Developer Hub. [GET] /api/permission/plugins/condition-rules::
      Returns available conditional rule parameter schemas for the available plugins
      that are enabled in Developer Hub. ```json [ { "pluginId": "catalog", "rules":
      [ { "name": "HAS_ANNOTATION", "description": "Allow entities with the specified
      annotation", "resourceType": "catalog-entity", "paramsSchema": { "type": "object",
      "properties": { "annotation": { "type": "string", "description": "Name of the
      annotation to match on" }, "value": { "type": "string", "description": "Value
      of the annotation to match on" } }, "required": [ "annotation" ], "additionalProperties":
      false, "$schema": "http://json-schema.org/draft-07/schema#" } }, { "name": "HAS_LABEL",
      "description": "Allow entities with the specified label", "resourceType": "catalog-entity",
      "paramsSchema": { "type": "object", "properties": { "label": { "type": "string",
      "description": "Name of the label to match on" } }, "required": [ "label" ],
      "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"
      } }, { "name": "HAS_METADATA", "description": "Allow entities with the specified
      metadata subfield", "resourceType": "catalog-entity", "paramsSchema": { "type":
      "object", "properties": { "key": { "type": "string", "description": "Property
      within the entities metadata to match on" }, "value": { "type": "string", "description":
      "Value of the given property to match on" } }, "required": [ "key" ], "additionalProperties":
      false, "$schema": "http://json-schema.org/draft-07/schema#" } }, { "name": "HAS_SPEC",
      "description": "Allow entities with the specified spec subfield", "resourceType":
      "catalog-entity", "paramsSchema": { "type": "object", "properties": { "key":
      { "type": "string", "description": "Property within the entities spec to match
      on" }, "value": { "type": "string", "description": "Value of the given property
      to match on" } }, "required": [ "key" ], "additionalProperties": false, "$schema":
      "http://json-schema.org/draft-07/schema#" } }, { "name": "IS_ENTITY_KIND", "description":
      "Allow entities matching a specified kind", "resourceType": "catalog-entity",
      "paramsSchema": { "type": "object", "properties": { "kinds": { "type": "array",
      "items": { "type": "string" }, "description": "List of kinds to match at least
      one of" } }, "required": [ "kinds" ], "additionalProperties":'
    expected_response: The RBAC REST API supports the [GET] /api/permission/plugins/condition-rules
      endpoint for managing conditional policies in the Red Hat Developer Hub. This
      endpoint returns available conditional rule parameter schemas for the available
      plugins that are enabled in Developer Hub.
    query: how i get Conditional policies?
    response: "The information about the conditional policies in Red Hat Developer\
      \ Hub might be scattered across multiple resources. Following is an answer in\
      \ response to your query \"Conditional policies in Red Hat Developer Hub\" by\
      \ citing the relevant sources:\n\nTo define conditional policies in Red Hat\
      \ Developer Hub, use the `rbac-conditional-policies.yaml` file in the `rbac-policies`\
      \ config map. You must upload your `rbac-policies.csv` and `rbac-conditional-policies.yaml`\
      \ files to a `rbac-policies` config map. After that, update your Developer Hub\
      \ Backstage Helm chart to mount in the Developer Hub filesystem your files from\
      \ the `rbac-policies` config map. Finally, update your Developer Hub app-config.yaml\
      \ configuration file to use the `rbac-policies.csv` and `rbac-conditional-policies.yaml`\
      \ external files.\n\nHere is the format for defining conditional policies in\
      \ a `rbac-conditional-policies.yaml` file:\n\n```yaml\nresult: CONDITIONAL\n\
      roleEntityRef: <role_entity_reference>\npluginId: <plugin_id>\nresourceType:\
      \ <resource_type>\npermissionMapping:\n  - read\n  - update\n  - delete\nconditions:\
      \ <conditions>\n ```\n\nPlease note that in order to prevent an inconsistent\
      \ state after a deployment restart, the REST API does not allow deletion of\
      \ plugin IDs that were provided by using the application configuration. These\
      \ ID values can only be removed through the configuration file.\n\nAccording\
      \ to the [knowledge_search](function){:.FUNCTION} output, try this sample YAML\
      \ snippet to define conditional policies:\n\n```yaml\nresult: CONDITIONAL\n\
      roleEntityRef: role:default/<YOUR_ROLE>\npluginId: catalog\nresourceType: catalog-entity\n\
      permissionMapping:\n  - read\n  - update\n  - delete\nconditions:\n  not:\n\
      \    rule: HAS_SPEC\n    resourceType: catalog-entity\n    params:\n      key:\
      \ type\n      value: kubernetes-cluster\n```\n\nIn addition, the [knowledge_search](function){:.FUNCTION}\
      \ output gives more information on managing role-based access controls (RBAC)\
