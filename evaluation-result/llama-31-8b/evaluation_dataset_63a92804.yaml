      \      enabled: true\n  database:\n    enableLocalDb: false\n```\n\nTo create\
      \ and apply these configuration resources, follow the steps in Provisioning\
      \ your custom Red Hat Developer Hub configuration for the full procedure.\n\n\
      Please note that the `my-rhdh-app-config` config map must include your customized\
      \ `app-config.yaml` file."
