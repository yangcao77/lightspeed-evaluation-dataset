    response: "Based on the combined knowledge search results, here's the information\
      \ on exposing additional routes in a dynamic plugin and configuring a corresponding\
      \ `menuItem` in the main sidebar navigation:\n\nYou can expose additional routes\
      \ in a dynamic plugin by configuring `dynamicRoutes` as shown in the following\
      \ example:\n\n```yaml\n# dynamic-plugins-config.yaml\nplugins:\n  - plugin:\
      \ <plugin_path_or_url>\n    disabled: false\n    pluginConfig:\n      dynamicPlugins:\n\
      \        frontend:\n          my-plugin-package-name: \n            dynamicRoutes:\n\
      \              - path: /my-new-page\n                importName: FooPluginPage\n\
      \                menuItem:\n                  icon: favorite\n             \
      \     text: My Custom Page\n```\n\nTo configure a custom sidebar item, you can\
      \ use the `menuItem` property in the `dynamicRoutes` configuration. The `menuItem`\
      \ property accepts the following properties:\n\n* `icon`: The Backstage system\
      \ icon name.\n* `text`: The display title of the menu item.\n* `enabled`: Optional:\
      \ Allows the user to remove a `menuItem` from the sidebar when it is set to\
      \ false.\n\nYou can customize the order and parent-child relationships of plugin\
      \ menu items in the main sidebar navigation using the `menuItems` configuration\
      \ as shown in the following example:\n\n```yaml\n# dynamic-plugins-config.yaml\n\
      plugins:\n  - plugin: <plugin_path_or_url>\n    disabled: false\n    pluginConfig:\n\
      \      dynamicPlugins:\n        frontend:\n          my-plugin-package-name:\
      \ \n            menuItems:\n              my-plugin:\n                priority:\
      \ 10\n                parent: favorites\n              favorites:\n        \
      \        icon: favorite\n                title: Favorites\n                priority:\
      \ 100\n```\n\nYou can also customize the title and icon of the menu item using\
      \ the `title` and `icon` properties:\n\n```yaml\n# dynamic-plugins-config.yaml\n\
      plugins:\n  - plugin: <plugin_path_or_url>\n    disabled: false\n    pluginConfig:\n\
      \      dynamicPlugins:\n        frontend:\n          my-plugin-package-name:\
      \ \n            menuItems:\n              my-plugin:\n                title:\
      \ My Custom Page\n                icon: fooIcon\n                priority: 10\n\
      \                parent: favorites\n```\n\nFinally, you can configure multiple\
      \ application listeners by adding entries to the `mountPoints` field in the\
      \ `app-config.yaml` file:\n\n```yaml\n# app-config.yaml\ndynamicPlugins:\n \
      \ frontend:\n    my-plugin-package-name: \n      mountPoints:\n        - mountPoint:\
      \ application/listener\n          importName: <exported listener component>\n\
      ```\n\nThis code snippet configures a dynamic plugin with a custom sidebar menu\
      \ item and exposes additional routes in the dynamic plugin. It also customizes\
      \ the title and icon of the menu item and configures multiple application listeners."
