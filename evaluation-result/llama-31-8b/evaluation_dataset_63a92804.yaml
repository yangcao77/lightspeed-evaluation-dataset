      performs to build the project, such as fetching a repository skeleton, injecting
      parameters, and publishing the code to a Git provider. ## Creating a basic Software
      Template To automate the setup of standardized environments for your developers,
      you must create a template definition. This definition allows RHDH to automate
      the repetitive tasks of repository creation and initial configuration. You have
      administrator access to a RHDH instance. You have a Git repository to store
      Software Template files. 1. Create a directory in your Git repository for the
      Software Template. 2. Create a file named template.yaml in that directory. 3.
      In the template.yaml file, define the apiVersion, kind, and metadata to identify
      the starter kit in the software catalog. 4. Add a spec section to define the
      parameters that a developer must provide when they use the Software Template.
      5. Define the steps required to generate the project, such as fetch:template
      to retrieve the skeleton and publish:github to create the new repository. [IMPORTANT]
      ---- You must include TechDocs in your Software Templates to ensure that documentation
      is automatically generated for every new project created from the Software Template.
      ---- 1. Inspect the template.yaml file to ensure the YAML syntax is valid. 2.
      Confirm that the name and action fields are defined so the template is correctly
      recognized as a Scaffolder task. 3. Check that the defined parameters match
      the variables used in your Software Template skeleton files. 4. Navigate to
      the form playground at <instance-url>/create/template-form and test the Software
      Template configuration to confirm the fields and logic render as intended. ##
      Sample Software Template The following example shows a Software Template that
      defines project parameters and publishes the generated code to a GitHub repository.
      ```yaml apiVersion: scaffolder.backstage.io/v1beta3 kind: Template metadata:
      name: basic-node-service title: Basic Node.js Service description: A starter
      kit for a standardized Node.js microservice. tags: - nodejs - recommended spec:
      owner: platform-team type: service parameters: - title: ProjectDetails required:
      - name - owner properties: name: title: Name type: string description: Unique
      name for the new repository. owner: title: Owner type: string description: The
      group responsible for this component. ui:field: OwnerPicker ui:options: allowedKinds:
      - Group steps: - id: fetch-base name: Fetch Skeleton action: fetch:template
      input: url: ./skeleton values: name: ${{ parameters.name }} owner: ${{ parameters.owner
      }} - id: publish name: Publish to GitHub action: publish:github input: allowedHosts:
      [''github.com''] description: This is ${{ parameters.name }} repoUrl: github.com?owner=my-org&repo=${{
      parameters.name }} output: links: - title: Repository url: ${{ steps[''publish''].output.remoteUrl
      }} ``` ## Enabling Self service with Software Templates To allow developers
      to create new projects independently using your standards, you must publish
      the Software Template definition to the RHDH catalog. This registration makes
      the template a selectable option in the software creator interface. You have
      administrator access to a RHDH instance. You have a Git repository to store
      Software Template files. 1. Navigate to the Create page in the RHDH interface.
      2. Select Register Component. 3. Enter the full URL to your template.yaml file
      in the Repository URL field. 4. Click Analyze and then Import. 1. Navigate to
      the Create page. 2. Confirm that your new template appears in the list of available
      options. ## Extending Software Templates for complex project requirements Use
      advanced logic to create Software Templates that adapt to specific project requirements
      and user inputs. The following table outlines the goals for advanced templating:
      # Customizing the Learning Paths in Red Hat Developer Hub In Red Hat Developer
      Hub, you can configure Learning Paths by hosting the required data externally,
      and using the built-in proxy to deliver this data rather than the default. You
      can provide Learning Paths data from the following sources: A JSON file hosted
      on a web server, such as GitHub or GitLab. A dedicated service that provides
      the Learning Paths data in JSON format using an API. ## About Learning Paths
      You can use the Learning Paths plugin in Red Hat Developer Hub to integrate
      customized e-learning content into the developer workflows. By using Learning
      Paths, you can create a collaborative learning culture, boost productivity,
      and ensure that teams stay updated with relevant best practices and technologies.
      The overall purpose is to accelerate onboarding, address skill gaps, ensure
      regulatory compliance, promote best practices, and facilitate product updates.
      ## Customizing the Learning Paths by using a hosted JSON file For ease of use
      and simplicity, you can configure the Learning Paths by using a hosted JSON
      file. 1. Publish the JSON file containing your Learning Paths data to a web
      server, such as GitHub or Gitlab. You can find an example at https://raw.githubusercontent.com/redhat-developer/rhdh/release-1.9/packages/app/public/learning-paths/data.json.
      2. Configure the Developer Hub proxy to access the Learning Paths data from
      the hosted JSON file, by adding the following to the app-config.yaml file: ```yaml
      proxy: endpoints: ''/developer hub'': target: <target> pathRewrite: ''^/api/proxy/developer
      hub/learning paths'': ''<learning_path.json>'' changeOrigin: true secure: true
      ``` <target>:: Enter the hosted JSON file base URL, such as https://raw.githubusercontent.com.
      <learning_path.json>:: Enter the hosted JSON file path without the base URL,
      such as ''/redhat-developer/rhdh/main/packages/app/public/learning-paths/data.json''
      [TIP] ---- When also configuring the home page, due to the use of overlapping
