- conversation_group_id: installation-392
  description: installation
  turns:
  - contexts:
    - 'Installing Developer Hub on GKE with the Helm chart When you install the Developer
      Hub Helm chart in Google Kubernetes Engine (GKE), it orchestrates the deployment
      of a Developer Hub instance, which provides a robust developer platform within
      the GKE ecosystem. You have subscribed to the Red Hat Container Registry (registry.redhat.io).
      For more information, see Red Hat Container Registry Authentication. You have
      installed kubectl. For more information, see Install kubectl. You have installed
      the Google Cloud CLI. For more information, see Install the gcloud CLI. You
      have logged in to your Google account and created a GKE Autopilot or GKE Standard
      cluster. You have configured a domain name for your Developer Hub instance.
      You have reserved a static external Premium IPv4 Global IP address that is not
      attached to any VM. For more information see Reserve a new static external IP
      address You have configured the DNS records for your domain name to point to
      the IP address that has been reserved. Make sure that your system meets the
      minimum sizing requirements. See Sizing requirements for Red Hat Developer Hub.
      [NOTE] ---- You need to create an A record with the value equal to the IP address.
      This process can take up to one hour to propagate. ---- * You have installed
      Helm 3 or the latest. For more information, see Installing Helm. 1. Go to your
      terminal and run the following command to add the Helm chart repository containing
      the Developer Hub chart to your local Helm registry: ```terminal helm repo add
      openshift-helm-charts https://charts.openshift.io/ ``` 2. Create a pull secret
      using the following command: ```terminal $ kubectl n <your namespace> create
      secret docker registry rhdh pull secret \ 1 docker server=registry.redhat.io
      \ docker username=<user_name> \ 2 docker password=<password> \ 3 docker email=<email>
      4 ``` Enter your GKE namespace in the command. Enter your username in the command.
      Enter your password in the command. Enter your email address in the command.
      The created pull secret is used to pull the Developer Hub images from the Red
      Hat Container Registry. 3. Set up a Google-managed certificate by creating a
      ManagedCertificate object that you must attach to the ingress. ```yaml apiVersion:
      networking.gke.io/v1 kind: ManagedCertificate metadata: name: <rhdh_certificate_name>
      spec: domains: <rhdh_domain_name> ``` For more information about setting up
      a Google-managed certificate, see Setting up a Google-managed certificate. 4.
      Create a FrontendConfig object to set a policy for redirecting to HTTPS. You
      must attach this policy to the ingress. ```yaml apiVersion: networking.gke.io/v1beta1
      kind: FrontendConfig metadata: name: <ingress_security_config> spec: sslPolicy:
      gke ingress ssl policy https redirectToHttps: enabled: true ``` For more information
      about setting a policy to redirect to HTTPS, see HTTP to HTTPS redirects. 5.
      Create a file named values.yaml using the following template: Example values.yaml
      file ```yaml global: host: <rhdh_domain_name> route: enabled: false upstream:
      service: type: NodePort ingress: enabled: true annotations: kubernetes.io/ingress.class:
      gce kubernetes.io/ingress.global static ip name: <ADDRESS_NAME> networking.gke.io/managed
      certificates: <rhdh_certificate_name> networking.gke.io/v1beta1.FrontendConfig:
      <ingress_security_config> className: gce backstage: image: pullSecrets: rhdh
      pull secret podSecurityContext: fsGroup: 2000 postgresql: image: pullSecrets:
      rhdh pull secret primary: podSecurityContext: enabled: true fsGroup: 3000 volumePermissions:
      enabled: true ``` 6. Run the following command in your terminal to deploy Developer
      Hub using the latest version of Helm Chart and using the values.yaml file: ```terminal
      $ helm n <your_namespace> install f values.yaml <your_deploy_name> \ openshift
      helm charts/redhat developer hub \ version 1.9.0 ``` For the latest Helm Chart
      version, see this Helm Charts repository. Confirm that the deployment is complete.
      ```terminal $ kubectl get deploy <your_deploy_name>-developer-hub -n <your_namespace>
      ``` Verify that the service and ingress were created. ```terminal $ kubectl
      get service n <your_namespace> $ kubectl get ingress n <your_namespace> ```
      [NOTE] ---- Wait for the ManagedCertificate to be provisioned. This process
      can take a couple of hours. ---- * Access RHDH with https://<my_developer_hub_domain>.
      * To upgrade your deployment, use the following command: ```terminal $ helm
      n <your_namespace> upgrade f values.yaml <your_deploy_name> openshift helm charts/redhat
      developer hub - version <UPGRADE_CHART_VERSION> ``` To delete your deployment,
      use the following command: ```terminal $ helm n <your_namespace> delete <your_deploy_name>
      ```'
    expected_response: 'To create a pull secret, run the following command in your
      terminal: `kubectl n <your namespace> create secret docker-registry rhdh-pull-secret
      \ --docker-server=registry.redhat.io \ --docker-username=<user_name> \ --docker-password=<password>
      \ --docker-email=<email>`. You need to provide your GKE namespace, username,
      password, and email address. The created pull secret is used to pull the Developer
      Hub images from the Red Hat Container Registry.'
    query: How do I create a pull secret for the Red Hat Container Registry to install
      Developer Hub on GKE?
    response: "To create a pull secret for the Red Hat Container Registry to install\
      \ Developer Hub on GKE, you can create a secret using your Red Hat credentials\
      \ to pull the container images from the protected Red Hat Container Registry\
      \ (registry.redhat.io) and then add the image pull secret in the default service\
      \ account within the namespace where the Developer Hub instance is being deployed.\
      \ \n\nHere is an example of how to do this:\n\n```bash\n$ kubectl -n {my-rhdh-namespace}\
      \ create secret docker-registry my-rhdh-pull-secret \\\n    --docker-server=registry.redhat.io\
      \ \\\n    --docker-username=<redhat_user_name> \\\n    --docker-password=<redhat_password>\
      \ \\\n    --docker-email=<email>\n```\n\nYou can reference these materials for\
      \ more information on how to create a pull secret for the Red Hat Container\
      \ Registry to install Developer Hub on GKE:\n\n- [Installing Red Hat Developer\
      \ Hub on Google Kubernetes Engine (GKE)](https://docs.redhat.com/en-us/developer/hub/latest/installing_red_hat_developer_hub_on_google_kubernetes_engine_gke.html)\
      \ \n- [Installing Red Hat Developer Hub on Amazon Elastic Kubernetes Service\
      \ (EKS)](https://docs.redhat.com/en-us/developer/hub/latest/installing_red_hat_developer_hub_on_amazon_elastic_kubernetes_service_eks.html)\n\
      \nThe benefits of creating a pull secret for the Red Hat Container Registry\
      \ to install Developer Hub on GKE include avoiding the need to hard-code sensitive\
      \ information into your Kubernetes manifests and allowing for easy switching\
      \ between different Docker image repositories or credentials without changing\
      \ your code.\n\nThe best practice to create a pull secret for the Red Hat Container\
      \ Registry to install Developer Hub on GKE is to keep your Docker registry credentials\
      \ separate from your Kubernetes manifests and store them in a secrets manager\
      \ like Kubernetes Secrets or HashiCorp Vault. This way, you can easily rotate\
      \ or update your credentials without affecting your production environment.\n\
      \nTo improve the experience for users when reading the text, it's recommended\
      \ to provide examples or code snippets that illustrate how to create a pull\
      \ secret for the Red Hat Container Registry to install Developer Hub on GKE,\
      \ and to use clear and concise language that is free of unnecessary jargon or\
      \ technical terms that might be unfamiliar to users."
