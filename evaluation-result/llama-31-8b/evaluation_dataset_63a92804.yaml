      * Use the OpenShift Container Platform console to install the Operator.

      * You can use the `OperatorHub` page to install the Operator.



      4. Installing Red Hat Developer Hub on OpenShift Container Platform:


      * You can install Red Hat Developer Hub on OpenShift Container Platform by using
      the Red Hat Developer Hub Operator or the Helm chart.

      * Make sure that the OpenShift Container Platform version is 4.16 to 4.20.

      * Make sure that your system meets the minimum sizing requirements.


      5. Installing the Red Hat Developer Hub Helm chart:


