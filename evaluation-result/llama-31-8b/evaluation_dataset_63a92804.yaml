      \ Developer Hub on OpenShift Container Platform, follow these steps:\n\n1. Perform\
      \ one of the following steps:\n   - Log in as an administrator in the OpenShift\
      \ Container Platform web console.\n   - Install Red Hat Developer Hub on OpenShift\
      \ Container Platform using the Red Hat Developer Hub Operator.\n   - If you\
      \ have created the dynamic-plugins-rhdh ConfigMap file and not configured the\
      \ analytics-provider-segment plugin, add the plugin to the list of plugins and\
      \ set its plugins.disabled parameter to true.\n   - If you have created the\
      \ dynamic-plugins-rhdh ConfigMap file and configured the analytics-provider-segment\
      \ plugin, search the plugin in the list of plugins and set its plugins.disabled\
      \ parameter to true.\n   - If you have not created the ConfigMap file, create\
      \ it with the following YAML code:\n\n```yaml\nkind: ConfigMap\napiVersion:\
      \ v1\nmetadata:\n  name: dynamic-plugins-rhdh\ndata:\n  dynamic-plugins.yaml:\
      \ |\n    includes:\n      - dynamic-plugins.default.yaml\n    plugins:\n   \
      \   - package: './dynamic-plugins/dist/backstage-community-plugin-analytics-provider-segment'\n\
      \        disabled: true\n```\n\n2. Set the value of the dynamicPluginsConfigMapName\
      \ parameter to the name of your dynamic-plugins-rhdh config map in your Backstage\
      \ custom resource:\n\n```yaml\n# ...\nspec:\n  application:\n    dynamicPluginsConfigMapName:\
      \ dynamic-plugins-rhdh\n# ...\n```\n\n3. Save the configuration changes.\n\n\
      Alternatively, you can disable telemetry data collection using the Helm Chart:\n\
      \n1. In the Developer perspective of the OpenShift Container Platform web console,\
      \ go to the Helm view to see the list of Helm releases.\n2. Click the overflow\
      \ menu on the Helm release that you want to use and select Upgrade.\n\n[Note]\n\
      ----\n\nYou can also create a new Helm release by clicking the Create button\
