      Hub Plugin extension capabilities provide a preinstalled and enabled catalog
      of available plugins in Developer Hub User profile drop down menu provides access
      to profile settings, appearance customization, Developer Hub metadata, and a
      logout button ## Customizing your Red Hat Developer Hub global header You can
      use the red-hat-developer-hub.backstage-plugin-global-header dynamic plugin
      to extend the global header with additional buttons and customize the order
      and position of icons and features. Additionally, you can create and integrate
