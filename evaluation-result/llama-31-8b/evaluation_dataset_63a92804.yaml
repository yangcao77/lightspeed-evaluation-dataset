- conversation_group_id: kubernetes-181
  description: kubernetes
  turns:
  - contexts:
    - 'Forwarding Red Hat Developer Hub audit logs to Splunk You can use the Red Hat
      OpenShift Logging (OpenShift Logging) Operator and a ClusterLogForwarder instance
      to capture the streamed audit logs from a Developer Hub instance and forward
      them to the HTTPS endpoint associated with your Splunk instance. You have a
      cluster running on a supported OpenShift Container Platform version. You have
      an account with cluster admin privileges. You have a Splunk Cloud account or
      Splunk Enterprise installation. 1. Log in to your OpenShift Container Platform
      cluster. 2. Install the OpenShift Logging Operator in the openshift-logging
      namespace and switch to the namespace: ```bash $ oc project openshift-logging
      ``` 3. Create a serviceAccount named log-collector and bind the collect-application-logs
      role to the serviceAccount : ```bash $ oc create sa log-collector ``` ```bash
      $ oc create clusterrolebinding log-collector --clusterrole=collect-application-logs
      --serviceaccount=openshift-logging:log-collector ``` 4. Generate a hecToken
      in your Splunk instance. 5. Create a key/value secret in the openshift-logging
      namespace and verify the secret: ```bash $ oc -n openshift-logging create secret
      generic splunk-secret --from-literal=hecToken=<HEC_Token> ``` ```bash $ oc -n
      openshift-logging get secret/splunk-secret -o yaml ``` 6. Create a basic `ClusterLogForwarder`resource
      YAML file as follows: ```yaml apiVersion: logging.openshift.io/v1 kind: ClusterLogForwarder
      metadata: name: instance namespace: openshift logging ``` For more information,
      see Creating a log forwarder. 7. Define the following ClusterLogForwarder configuration
      using OpenShift web console or OpenShift CLI: 1. Specify the log-collector as
      serviceAccount in the YAML file: ```yaml serviceAccount: name: log-collector
      ``` 2. Configure inputs to specify the type and source of logs to forward. The
      following configuration enables the forwarder to capture logs from all applications
      in a provided namespace: ```yaml inputs: name: my app logs input type: application
      application: includes: namespace: my rhdh project containerLimit: maxRecordsPerSecond:
      100 ``` For more information, see Forwarding application logs from specific
      pods. 3. Configure outputs to specify where the captured logs are sent. In this
      step, focus on the splunk type. You can either use tls.insecureSkipVerify option
      if the Splunk endpoint uses self-signed TLS certificates (not recommended) or
      provide the certificate chain using a Secret. ```yaml outputs: name: splunk
      receiver application type: splunk splunk: authentication: token: key: hecToken
      secretName: splunk secret index: main url: ''https://my splunk instance link''
      rateLimit: maxRecordsPerSecond: 250 ``` For more information, see Forwarding
      logs to Splunk in OpenShift Container Platform documentation. 4. Optional: Filter
      logs to include only audit logs: ```yaml filters: name: audit logs only type:
      drop drop: test: field: .message notMatches: isAuditEvent ``` For more information,
      see Filtering logs by content in OpenShift Container Platform documentation.
      5. Configure pipelines to route logs from specific inputs to designated outputs.
      Use the names of the defined inputs and outputs to specify multiple inputRefs
      and outputRefs in each pipeline: ```yaml pipelines: - name: my-app-logs-pipeline
      detectMultilineErrors: true inputRefs: - my-app-logs-input outputRefs: - splunk-receiver-application
      filterRefs: - audit-logs-only ``` 8. Run the following command to apply the
      ClusterLogForwarder configuration: ```bash $ oc apply -f <ClusterLogForwarder-configuration.yaml>
      ``` 9. Optional: To reduce the risk of log loss, configure your ClusterLogForwarder
      pods using the following options: 1. Define the resource requests and limits
      for the log collector as follows: ```yaml collector: resources: requests: cpu:
      250m memory: 64Mi ephemeral-storage: 250Mi limits: cpu: 500m memory: 128Mi ephemeral-storage:
      500Mi ``` 2. Define tuning options for log delivery, including delivery, compression,
      and RetryDuration. Tuning can be applied per output as needed. ```yaml tuning:
      delivery: AtLeastOnce 1 compression: none minRetryDuration: 1s maxRetryDuration:
      10s ``` AtLeastOnce delivery mode means that if the log forwarder crashes or
      is restarted, any logs that were read before the crash but not sent to their
      destination are re-sent. It is possible that some logs are duplicated after
      a crash. 1. Confirm that logs are being forwarded to your Splunk instance by
      viewing them in the Splunk dashboard. 2. Troubleshoot any issues using OpenShift
      Container Platform and Splunk logs as needed. ##'
    expected_response: 'To forward Red Hat Developer Hub audit logs to Splunk, you
      must first create a basic `ClusterLogForwarder` resource YAML file. You then
      define its configuration by specifying the `log-collector` as the `serviceAccount`,
      configuring `inputs` to capture logs from your application''s namespace, and
      configuring `outputs` of type `splunk` to send logs to your Splunk instance''s
      URL using a secret that contains your `hecToken`. To forward only audit logs,
      you can optionally add a `filter` of type `drop` that drops any log message
      where the `.message` field does not match `isAuditEvent`. Finally, you configure
      `pipelines` to route logs from the specified `inputRefs` to the designated `outputRefs`,
      applying the `filterRefs` as needed. Once the YAML file is complete, you apply
      the configuration using the command: `oc apply -f <ClusterLogForwarder-configuration.yaml>`.
      To reduce the risk of log loss, you can also optionally define resource requests
      and limits for the log collector and set tuning options for log delivery, such
      as setting the delivery mode to `AtLeastOnce`.'
    query: How do I configure a ClusterLogForwarder to forward Red Hat Developer Hub
      audit logs to Splunk?
