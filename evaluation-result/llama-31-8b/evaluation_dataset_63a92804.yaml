      a custom plugin, see . 1. Specify the archive URL and its integrity hash in
      the dynamic-plugins.yaml file using the following example: ```yaml plugins:
      - disabled: false package: https://example.com/backstage-plugin-myplugin-1.0.0.tgz
      integrity: sha512-9WlbgEdadJNeQxdn1973r5E4kNFvnT9GjLD627GWgrhCaxjCmxqdNW08cj+Bf47mwAtZMt1Ttyo+ZhDRDj9PoA==
      ``` 2. To apply the changes, restart the RHDH application. #### Loading a plugin
      packaged as a JavaScript package The custom plugin is packaged as a dynamic
      plugin in a JavaScript package. For more information about packaging a custom
      plugin, see . 1. Run the following command to obtain the integrity hash from
      the NPM registry: ```terminal $ npm view --registry <registry-link> <npm package>@<version>
      dist.integrity ``` 2. Specify the package name, version, and its integrity hash
      in the dynamic-plugins.yaml file as follows: ```yaml plugins: - disabled: false
      package: @example/backstage-plugin-myplugin@1.0.0 integrity: sha512-9WlbgEdadJNeQxdn1973r5E4kNFvnT9GjLD627GWgrhCaxjCmxqdNW08cj+Bf47mwAtZMt1Ttyo+ZhDRDj9PoA==
      ``` 3. If you are using a custom NPM registry, create a .npmrc file with the
      registry URL and authentication details: ```text registry=<registry-link> //<registry-link>:_authToken=<auth-token>
      ``` 4. When using OpenShift Container Platform or Kubernetes: * Use the Helm
      chart to add the .npmrc file by creating a secret. For example: Example secret
      configuration ```yaml apiVersion: v1 kind: Secret metadata: name: <release_name>
      dynamic plugins npmrc 1 type: Opaque stringData: .npmrc: | registry=<registry
      link> //<registry link>:_authToken=<auth token> ``` Replace <release_name> with
      your Helm release name. This name is a unique identifier for each chart installation
      in the Kubernetes cluster. * For RHDH Helm chart, name the secret using the
      following format for automatic mounting: <release_name>-dynamic-plugins-npmrc
      5. To apply the changes, restart the RHDH application. ## Example of installing
      a custom plugin in Red Hat Developer Hub This example demonstrates how to package
      and install dynamic plugins using the Backstage Entity Feedback community plugin
      that is not included in Red Hat Developer Hub pre-installed dynamic plugins.
      You need to ensure that your custom plugin is built with a compatible version
      of Backstage. In Developer Hub, click Settings. Your custom plugin must be compatible
      with the Backstage Version (or the closest previous version) that is displayed
      in the Metadata section of Red Hat Developer Hub. For example, if you view the
      history of the backstage.json file for the Entity Feedback plugin, the 1fc87de
      commit is closest previous version to Backstage version of 1.39.1. backstage.json
      file history in Github ![custom limitations] Your local environment meets the
      following requirements: Node.js: Version 22.x Yarn: Version 4.x git CLI jq CLI:
      Command line JSON processor OpenShift CLI (oc): The client for interacting with
      your OpenShift cluster. Container runtime: Either podman or docker is required
      for packaging the plugin into an OCI image and logging into registries. Container
      registry access: Access to an OCI compliant container registry (such as the
      internal OpenShift registry or a public registry like Quay.io). 1. Clone the
      source code for the Entity Feedback plugin, as follows: ```terminal $ git clone
      https://github.com/backstage/community plugins.git $ cd community plugins ```
      2. Prepare your environment to build the plugin by enabling Yarn for your Node.js
      installation, as follows: ```terminal $ corepack enable yarn ``` 3. Install
      the dependencies, compile the code, and build the plugins, as follows: ```terminal
      $ cd workspaces/entity feedback $ yarn install $ yarn tsc $ yarn build:all ```
      [NOTE] ---- After this step, with upstream Backstage, you publish the built
      plugins to a NPM or NPM-compatible registry. In this example, as you are building
      this plugin to support it being loaded dynamically by Red Hat Developer Hub,
      you can skip the npm publish step that publishes the plugin to a NPM registry.
      Instead, you can package the plugin for dynamic loading and publish it as a
      container image on Quay.io or your preferred container registry. ---- 4. Prepare
      the Entity Feedback frontend plugin by using the Red Hat Developer Hub CLI.
      The following command uses the plugin files in the dist folder that was generated
      by the yarn build:all command, and creates a new dist-scalprum folder that contains
      the necessary configuration and source files to enable dynamic loading: ```terminal
      $ cd plugins/entity feedback $ npx @red hat developer hub/cli@latest plugin
      export ``` When this command packages a frontend plugin, it uses a default Scalprum
      configuration if one is not found. The Scalprum configuration is used to specify
      the plugin entry point and exports, and then to build a dist-scalprum folder
      that contains the dynamic plugin. The default Scalprum configuration is shown
      below, however a scalprum key can be added to the package.json file used by
      your plugin to set custom values, if necessary: ```json { "name": "backstage
      community.plugin entity feedback", "exposedModules": { "PluginRoot": "./src/index.ts"
      } } ``` The following plugin-manifest.json'
