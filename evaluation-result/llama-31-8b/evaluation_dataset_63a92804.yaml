- conversation_group_id: plugins-408
  description: plugins
  turns:
  - contexts:
    - 'Configuring CI/CD to generate and publish TechDocs sites TechDocs reads the
      static generated documentation files from a cloud storage bucket, such as OpenShift
      Data Foundation. The documentation site is generated on the CI/CD workflow associated
      with the repository containing the documentation files. You can generate docs
      on CI and publish to a cloud storage using the techdocs-cli CLI tool. You can
      use the following example to create a script for TechDocs publication: ```shell
      # Prepare REPOSITORY_URL=''https://github.com/org/repo'' git clone $REPOSITORY_URL
      cd repo # Install @techdocs/cli, mkdocs and mkdocs plugins npm install -g @techdocs/cli
      pip install "mkdocs-techdocs-core==1.*" # Generate techdocs cli generate - no
      docker # Publish techdocs cli publish - publisher type awsS3 - storage name
      <bucket/container> - entity <Namespace/Kind/Name> ``` The TechDocs workflow
      starts the CI when a user makes changes in the repository containing the documentation
      files. You can configure the workflow to start only when files inside the docs/
      directory or mkdocs.yml are changed. Configuring dynamic plugins # TechDocs
      add ons TechDocs add-ons are dynamic plugins that extend the functionality of
      the built-in TechDocs plugin. For example, you can use add-ons to report documentation
      issues, change text size, or view images in overlay in either the TechDocs Reader
      page or an Entity page. The following table describes the TechDocs add-ons that
      are available for Red Hat Developer Hub 1.9: The backstage-plugin-techdocs-module-addons-contrib
      plugin package exports both preinstalled and external add-ons supported by Red
      Hat to the TechDocs plugin. This plugin package is preinstalled on Red Hat Developer
      Hub and is enabled by default. If the plugin package is disabled, all of the
      TechDocs add-ons exported by the package as also disabled. ## package the third-party
      TechDocs add-on as a dynamic plugin, navigate to the root directory where the
      plugin is stored (not the dist-dynamic directory) and run the npx command with
      the --tag option to specify the image name and tag. For example: ```terminal
      $ npx @red hat developer hub/cli@latest plugin package - tag quay.io/<user_name>/<techdocs_add
      on_image>:latest ``` [NOTE] ---- The output of the package-dynamic-plugins command
      provides the file path to the plugin for use in the dynamic-plugin-config.yaml
      file. ---- 5. To publish the third-party TechDocs add-on to a Quay repository,
      push the image to a registry using one of the following commands, depending
      on your virtualization tool: * To use podman, enter the following command: ```terminal
      $ podman push quay.io/<user_name>/<techdocs_add on_image>:latest ``` To use
      docker, enter the following command: ```terminal $ docker push quay.io/<user_name>/<techdocs_add
      on_image>:latest ``` 6. Open your dynamic-plugins.yaml file to view or modify
      the configuration for the third-party TechDocs add-on. For example: ```yaml
      plugins: package: oci://quay.io/<user_name>/<techdocs_add on_image>:latest!<techdocs_add
