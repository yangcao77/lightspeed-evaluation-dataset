  - contexts:
    - 'to your RHDH instance with administrator credentials. 2. Navigate to Administration
      → RBAC. 3. Click Create Role and define a new role for team leads, such as role:default/team_lead.
      4. In the Members section, add the user or group, such as user:default/team_lead.
      5. Grant permissions required by team leads, such as: * policy.entity.create
      to allow policy creation. * catalog-entity:read to allow catalog access. 6.
      Apply conditions to limit access as follows: * Use the IS_OWNER rule to ensure
      team leads can only manage resources they own. 7. Click Save to create the role
      and apply changes. Log in as a team lead. Verify the following: RBAC UI is accessible.
      Only users or roles related to their team are visible. No access to roles or
      permissions outside their scope is granted. ## Delegating RBAC access in Red
      Hat Developer Hub by using API You can delegate the RBAC access in Red Hat Developer
      Hub by using the RBAC backend API. You have API access using curl or another
      tool. 1. Create a new role designated for team leads using the RBAC backend
      API: ```bash $ curl -X POST ''http://localhost:7007/api/permission/roles'' \
      --header "Authorization: Bearer $ADMIN_TOKEN" \ --header "Content-Type: application/json"
      \ --data ''{ "memberReferences": ["user:default/team_lead"], "name": "role:default/team_lead",
      "metadata": { "description": "This is an example team lead role" } }'' ``` 2.
      Allow team leads to read catalog entities and create permissions in the RBAC
      plugin using the following API request: ```bash $ curl -X POST ''http://localhost:7007/api/permission/policies''
      \ --header "Authorization: Bearer $ADMIN_TOKEN" \ --header "Content-Type: application/json"
      \ --data ''[ { "entityReference": "role:default/team_lead", "permission": "policy.entity.create",
      "policy": "create", "effect": "allow" }, { "entityReference": "role:default/team_lead",
      "permission": "catalog-entity", "policy": "read", "effect": "allow" } ]'' ```
      3. To ensure team leads can only manage what they own, use the IS_OWNER conditional
      rule as follows: ```bash $ curl -X POST ''http://localhost:7007/api/permission/roles/conditions''
      \ --header "Authorization: Bearer $ADMIN_TOKEN" \ --header "Content-Type: application/json"
      \ --data ''{ "result": "CONDITIONAL", "pluginId": "permission", "resourceType":
      "policy-entity", "conditions": { "rule": "IS_OWNER", "resourceType": "policy-entity",
      "params": { "owners": [ "user:default/team_lead" ] } }, "roleEntityRef": "role:default/team_lead",
      "permissionMapping": [ "read", "update", "delete" ] }'' ``` The previous example
      of conditional policy limits visibility and control to only owned roles and
      policies. 4. Log in to RHDH as team lead and verify the following: 1. Use the
      following request and verify that you do not see any roles: Example curl to
      retrieve roles visible to the team lead ```bash $ curl X GET ''http://localhost:7007/api/permission/roles''
      \ header "Authorization: Bearer $TEAM_LEAD_TOKEN" ``` 2. Use the following request
      to create a new role for their team: Example curl of team lead creating a new
      role for their team with ownership assigned ```bash $ curl -X POST ''http://localhost:7007/api/permission/roles''
      \ --header "Authorization: Bearer $TEAM_LEAD_TOKEN" \ --header "Content-Type:
      application/json" \ --data ''{ "memberReferences": ["user:default/team_member"],
      "name": "role:default/team_a", "metadata": { "description": "This is an example
      team_a role", "owner": "user:default/team_lead" } }'' ``` [NOTE] ---- You can
      set the ownership during creation, but you can also update the ownership at
      any time. ---- 3. Use the following request to assign a permission policy to
      the new role: Example curl for granting read access to catalog entities for
      the new role ```bash $ curl -X POST ''http://localhost:7007/api/permission/policies''
      \ --header "Authorization: Bearer $ADMIN_TOKEN" \ --header "Content-Type: application/json"
      \ --data ''[ { "entityReference": "role:default/team_a", "permission": "catalog-entity",
      "policy": "read", "effect": "allow" } ]'' ``` 4. Use the following request to
      verify that only team-owned roles and policies are visible: Example curl to
      retrieve roles and permission policies visible to the team lead ```bash $ curl
      X GET ''http://localhost:7007/api/permission/roles'' \ header "Authorization:
      Bearer $TEAM_LEAD_TOKEN" $ curl X GET ''http://localhost:7007/api/permission/policies''
      \ header "Authorization: Bearer $TEAM_LEAD_TOKEN" ``` Log in as a team lead
      and verify the following: The RBAC UI is accessible. Only the assigned users
      or group is visible. Permissions outside the scoped team are not viewable or
      editable. Log in as an administrator and verify that you retain full visibility
      and control. # Permission policies reference Permission policies in Red Hat
      Developer Hub are a set of rules to govern access to resources or functionalities.
      These policies state the authorization level that is granted to users based
      on their roles. The permission policies are implemented to maintain security
      and confidentiality within a given environment. You can define the following
      types of permissions in Developer Hub: resource type basic The distinction between
      the two permission types depends on whether a permission includes a defined
      resource type. You can define the resource type permission using either the
      associated resource type or the permission name as shown in the following example:
      ```csv p, role:default/myrole, catalog.entity.read, read, allow g, user:default/myuser,
      role:default/myrole p, role:default/another role, catalog entity, read, allow
      g, user:default/another user, role:default/another role ``` You can define the
      basic permission in Developer Hub using the permission name as shown in the
      following example: ```csv p, role:default/myrole, catalog.entity.create, create,
      allow g, user:default/myuser, role:default/myrole ``` Developer Hub supports
      following permission policies: Catalog permissions:: Bulk import permission::
      Scaffolder permissions:: RBAC permissions:: Kubernetes permissions:: OCM permissions::
      Basic OCM permissions only restrict access to the cluster view, but they do
      not prevent access to the Kubernetes clusters in the resource view. For more
      effective permissions, consider applying a conditional policy to restrict access
      to catalog entities that are of type kubernetes-cluster. Access restriction
      is dependent on the set of permissions granted to a role. For example, if the
      role had full permissions (read, update, and delete), then you must specify
      all its permissions in the permissionMapping field. ```csv result: CONDITIONAL
      roleEntityRef: ''role:default/<YOUR_ROLE>'' pluginId: catalog resourceType:
      catalog entity permissionMapping: read update delete conditions: not: rule:
      HAS_SPEC resourceType: catalog entity params: key: type value: kubernetes cluster
      ``` OCM permissions:: Topology permissions:: Tekton permissions:: ArgoCD permissions::
      Quay permissions:: # Conditional policies in Red Hat Developer Hub The permission
      framework in Red Hat Developer Hub provides conditions, supported by the RBAC
      backend plugin (backstage-plugin-rbac-backend). The conditions work as content
      filters for the Developer Hub resources that are provided by the RBAC backend
      plugin. The RBAC backend API stores conditions assigned to roles in the database.
