      \ -d ''{ "result":"CONDITIONAL", "roleEntityRef":"role:default/test", "pluginId":"catalog",
      "resourceType":"catalog-entity", "permissionMapping": ["read", "update", "delete"],
      "conditions": { "rule": "IS_ENTITY_OWNER", "resourceType": "catalog-entity",
      "params": {"claims": ["group:default/janus-authors"]} } }'' ``` Review the returned
      HTTP status code: 200 OK:: The request was successful. 201 Created:: The request
      resulted in a new resource being successfully created. 204 No Content:: The
      request was successful, and the response payload has no more content. 400 Bad
      Request:: Input error with the request. 401 Unauthorized:: Lacks valid authentication
      for the requested resource. 403 Forbidden:: Refusal to authorize request. 404
      Not Found:: Could not find requested resource. 409 Conflict:: Request conflict
      with the current state and the target resource. ## Sending requests to the RBAC
      REST API by using a REST client You can send RBAC REST API requests using any
      REST client. You have access to the RBAC feature. 1. Find your Bearer token
      to authenticate to the REST API. 1. In your browser, open the web console Network
      tab. 2. In the main screen, reload the Developer Hub Homepage. 3. In the web
      console Network tab, search for the query?term= network call. 4. Save the token
      in the response JSON for the next steps. 2. In your REST client, run a command
      with the following parameters and review the response: Authorization:: Enter
      your saved authorization token. HTTP method:: Enter the HTTP method for your
      API endpoint. * GET: To retrieve specified information from a specified resource
      endpoint. * POST: To create or update a resource. * PUT: To update a resource.
      * DELETE: To delete a resource. URL:: Enter your Developer Hub URL and API endpoint:
      https://<my_developer_hub_domain>/<endpoint>, such as https://<my_developer_hub_domain>/api/permission/policies.
      Body:: Enter the JSON body with data that your API endpoint might need with
      the HTTP POST request. ## Sending requests to the RBAC REST API by using an
      external service You can send GET requests to the RBAC REST API by using an
      external service authenticated by using a service-to-service token. You have
      access to the RBAC feature. The external service can send HTTP GET requests,
      and is authenticated by using a service to service token. 1. The external service
      sends a GET request to the RBAC REST API with the service-to-service token in
      the Authorization header. 2. The RBAC REST API validates the service-to-service
      token, and then processes the request if the token is valid. Otherwise, the
      RBAC REST API returns an error response. 3. The RBAC REST API returns the response
      to the external service. 4. The external service processes the response from
      the RBAC REST API. ##'
