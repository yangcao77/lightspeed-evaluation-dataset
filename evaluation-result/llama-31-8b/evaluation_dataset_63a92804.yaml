- conversation_group_id: rbac-322
  description: rbac
  turns:
  - contexts:
    - 'for high-fidelity automation. This field defines the import workflow and currently
      supports two following options: open-pull-requests:: This is the default import
      workflow, which includes the logic for creating pull requests for every selected
      repository. scaffolder:: This workflow uses an import scenario defined in the
      Scaffolder template to create import jobs. Select this option to use the custom
      import scenario defined in your Scaffolder template. Optional: You can direct
      the Bulk Import plugin to hand off the entire list of selected repositories
      to a custom Orchestrator workflow. [IMPORTANT] ---- The Scaffolder template
      must be generic and not specific to a single repository if you want your custom
      Scaffolder template to run successfully for every repository in the bulk list.
      ---- The Bulk Import plugin runs the custom Scaffolder template for the list
      of repositories using the /task imports API endpoint. ## Running Orchestrator
      workflows for bulk imports As a platform engineer, you can configure the Bulk
      Import plugin to run Orchestrator workflows for bulk import operations. This
      mode uses the Orchestrator engine to provide advanced capabilities, such as
      creating pull requests or publishing configurations across multiple repositories.
      You have installed and configured the Orchestrator plugin in your Backstage
      instance. You have registered a generic custom workflow (for example, universal
      pr) in the Orchestrator plugin. You have Role Based Access Control (RBAC) permissions
      to configure the Bulk Import plugin. 1. Configure the Bulk Import plugin by
      editing your app-config.yaml file to enable Orchestrator mode. ```yaml bulkImport:
      orchestratorWorkflow: your_workflow_id importAPI: ''orchestrator'' ``` where:
      orchestratorWorkflow:: The ID of the workflow to run for each repository. importAPI::
      The execution mode for the workflow. Enter orchestrator to enable workflow execution.
      2. Verify that the Orchestrator workflow receives the following input: ```yaml
      { "inputData": { "owner": "redhat developer", "repo": "rhdh plugins", "baseBranch":
      "main", "targetBranch": "bulk import orchestrator" }, "authTokens": [ { "token":
      "<github_token>", "provider": "github" } ] } ``` where: owner:: Specifies the
      repository owner (organization or user name). repo:: Specifies the repository
      name. baseBranch:: Specifies the default branch of the Git repository (for example,
      main). targetBranch:: Specifies the target branch for the import operation.
      By default, this is set to bulk-import-orchestrator. authTokens:: Specifies
      the authentication tokens for the Git provider: * For GitHub: { token: <github_token>,
      provider: github } * For GitLab: { token: <gitlab_token>, provider: gitlab }
      3. Navigate to the Bulk Import page in the sidebar and complete the following
      steps: 1. Select your Git provider (for example, GitHub or GitLab). 2. Select
      the projects you want to import. 4. Click import to run the workflow. Locate
      your repository and confirm status is COMPLETED. ## Data handoff and custom
      workflow design When you configure the Bulk Import plugin by setting the importAPI
      field to scaffolder, the Bulk Import Backend passes all necessary context directly
      to the Scaffolder API. As an administrator, you can define the Scaffolder template
      workflow and structure the workflow to do the following: Define template parameters
      to consume input:: Structure the Scaffolder template to receive the repository
      data as template parameters for the current workflow run. The template must
      be generic, and not specific to a single repository, so that it can successfully
      run for every repository in the bulk list. Automate processing for each repository::
      Implement the custom logic needed for a single repository within the template.
      The Orchestrator iterates through the repository list, launching the template
      once for each repository and passes only the data for that single repository
      to the template run. This allows you to automate tasks such as creating the
      catalog-info.yaml, running compliance checks, or registering the entity with
      the catalog.'
    expected_response: To run Orchestrator workflows for bulk imports, you must have
      Role Based Access Control (RBAC) permissions to configure the Bulk Import plugin.
    query: What do I need for Role Based Acess Control if I want to configure the
      Bulk Import plugin to run Orchestrator workflows?
    response: 'You need to configure Role-Based Access Control (RBAC) permission for
      the users who are not administrators.


      Here is the RBAC permission configuration for the Bulk Import plugin:


      ```csv

      p, role:default/bulk-import, bulk.import, use, allow

      g, user:default/<your_user>, role:default/bulk-import

      ```


      Replace `<your_user>` with the actual username of the user who needs to be granted
      the RBAC permission.


      You can also configure the required bulk.import RBAC permission in the `rbac-policy.csv`
      file as follows:


      ```csv

      p, role:default/bulk-import, bulk.import, use, allow

      g, user:default/<your_user>, role:default/bulk-import

      ```'
