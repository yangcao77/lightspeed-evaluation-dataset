- conversation_group_id: kubernetes-204
  description: kubernetes
  turns:
  - contexts:
    - 'Monitoring with Amazon Prometheus You can configure Red Hat Developer Hub to
      use Amazon Prometheus for comprehensive logging. Amazon Prometheus extracts
      data from pods that have specific pod annotations. ### Prerequisites You configured
      Prometheus for your Elastic Kubernetes Service (EKS) clusters. You created an
      Amazon managed service for the Prometheus workspace. You configured Prometheus
      to import the Developer Hub metrics. You ingested Prometheus metrics into the
      created workspace. ### Configuring annotations for monitoring with Amazon Prometheus
      by using the Red Hat Developer Hub Operator To enable logging to Amazon Prometheus,
      you can configure the required pod annotations by using the Red Hat Developer
