- conversation_group_id: plugins-377
  description: plugins
  turns:
  - contexts:
    - 'Troubleshooting ### Plugin not loading after migration If a plugin fails to
      load, perform the following checks: 1. Verify the ghcr.io path is correct and
      the image tag or digest exists. 2. Confirm your cluster has network access to
      ghcr.io. 3. Review Developer Hub logs for OCI pull errors. [TIP] ---- To ensure
      environment stability, use a SHA256 digest instead of a version tag. See Determining
      SHA256 Digests ---- ### Determining tag values The <tag> variable is your RHDH
      application&#39;s version of Backstage and the plugin version, in the format:
      bs_<backstage-version>__<plugin-version> (note the double underscore delimiter).
      This format is only applicable for Community supported plugins. To find the
      correct image tag for <tag>: 1. Look in the RHDH release notes preface for your
      Backstage version. 2. Locate the plugin version for paths starting with oci://ghcr.io
      within one of the tables provided in the Dynamic plugins reference. For example,
      because RHDH 1.9 is based on Backstage 1.45.3, the tag will have the format
      bs_1.45.3__<plugin-version> [TIP] ---- To ensure environment stability, use
      a SHA256 digest instead of a version tag. See Determining SHA256 Digests ----
      ### Determining SHA256 digests You can look up the SHA256 digest using the Skopeo
      CLI or by searching in the RHDH Plugin Export Overlays repository Skopeo CLI
      Ensure you have skopeo and jq installed 1. Locate the plugin path in the Dynamic
      plugins reference 2. Run the following command, replacing the plugin path prefix
      oci:// with docker:// ```bash skopeo inspect docker://<plugin path>:<tag> |
      jq ''.Digest'' ``` RHDH Plugin Export Overlays Repo Go to the plugin packages
      list in the rhdh-plugin-export-overlays repository. Search for your plugin and
      select the tag that is associated with this release. ## Additional resources
      RHDH Plugin Export Overlays GitHub repository #### Deprecated plugins [IMPORTANT]
      ---- Red Hat Developer Hub (RHDH) includes a number of deprecated plugins, which
      are no longer being actively developed. It is recommended that if you depend
      on any of these plugins, you migrate to an alternative solution as soon as possible,
      as these plugins will be removed in a future release. ---- RHDH includes the
      following 2 deprecated plugins: # Other installable plugins The following Technology
      Preview plugins are not preinstalled and must be installed from an external
      source:'
    expected_response: 'If a plugin from ghcr.io fails to load, you should perform
      the following checks: 1. Verify the ghcr.io path is correct and the image tag
      or digest exists. 2. Confirm your cluster has network access to ghcr.io. 3.
      Review Developer Hub logs for OCI pull errors.'
    query: What are the troubleshooting steps if a Red Hat Developer Hub plugin from
      ghcr.io is not loading?
    response: "To troubleshoot the issue with the Red Hat Developer Hub plugin from\
      \ ghcr.io not loading, follow these steps:\n\n1. Check the installation logs\
      \ for successful logs related to the plugin.\n\t* Search for the logs in the\
      \ install-dynamic-plugin directory.\n\t* Look for logs related to the plugin\
      \ you are trying to load.\n\t* Check if there are any errors or warnings related\
      \ to the plugin.\n2. Verify that the plugin is properly configured.\n\t* Check\
      \ the dynamic-plugins-default.yaml file for any configuration issues.\n\t* Ensure\
      \ that the plugin is listed in the plugins section of the file.\n\t* Verify\
      \ that the plugin's dependencies are properly installed.\n3. Check for any known\
      \ issues with the plugin.\n\t* Visit the Red Hat Customer Portal to search for\
      \ any known issues with the plugin.\n\t* Check for any recent updates or patches\
      \ for the plugin.\n4. If none of the above steps resolve the issue, contact\
      \ Red Hat Support for further assistance.\n\t* Create a support case for Red\
      \ Hat Global Support Services (GSS) and select Red Hat Developer Hub as the\
      \ product.\n\t* Provide detailed information about the issue, including any\
      \ error messages or logs.\n\n"
