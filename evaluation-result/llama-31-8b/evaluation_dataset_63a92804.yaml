- conversation_group_id: plugins-77
  description: plugins
  turns:
  - contexts:
    - '# Customizing Red Hat Developer Hub Authorized users can customize Red Hat
      Developer Hub (RHDH) appearance and features, such as templates, Learning Paths,
      Tech Radar, Home page, and quick access cards. # Customizing your Red Hat Developer
      Hub title You can change the default Red Hat Developer Hub display name. Custom
      Developer Hub configuration. In your custom app config.yaml file, enter your
      Developer Hub instance display name, such as <Red Hat Developer Hub>. app config.yaml
      excerpt ```yaml app: title: My custom Red Hat Developer Hub title ``` # Customizing
      your Red Hat Developer Hub base URL You can change the default Red Hat Developer
      Hub base URL. You know your desired Developer Hub external URL: https://<my_developer_hub_domain>,
      and have configured DNS to point to your Red Hat OpenShift Container Platform
      cluster. Custom Developer Hub configuration. In your custom app config.yaml
      file, enter your Developer Hub external URL, such as https://<my_developer_hub_domain>.
      app config.yaml excerpt ```yaml app: baseUrl: https://<my_developer_hub_domain>
      backend: baseUrl: https://<my_developer_hub_domain> cors: origin: https://<my_developer_hub_domain>
      ``` # Customizing Red Hat Developer Hub backend secret The default Red Hat Developer
      Hub configuration defines the Developer Hub backend secret for service to service
      authentication. You can define your custom Developer Hub backend secret. You
      added a custom Developer Hub application configuration, and have sufficient
      permissions to modify it. 1. To define the Developer Hub backend secret, add
      to your custom <my_product_secrets>.txt file the BACKEND_SECRET environment
      variable with a base64 encoded string. Use a unique value for each Developer
      Hub instance. ```yaml $ echo > <my_product_secrets>.txt "BACKEND_SECRET=$(node
      -p ''require("crypto").randomBytes(24).toString("base64")'')" ``` <my_product_secrets>.txt
      example ``` BACKEND_SECRET=3E2/rIPuZNFCtYHoxVP8wjriffnN1q/z ``` 2. Add your
      backend secret to your custom app-config.yaml file. app-config.yaml excerpt
      defining the backend secret ```yaml backend: auth: externalAccess: type: legacy
      options: subject: legacy default config secret: "${BACKEND_SECRET}" ``` # a
      Learning Paths data URL such as: http://<rhdh-customization-provider>/learning-paths.
      2. Configure the Developer Hub proxy to use your dedicated service to provide
      the Learning Path data, add the following to the app-config.yaml file: ```yaml
      proxy: endpoints: ''/developer hub/learning paths'': target: <learning_path_data_url>
      changeOrigin: true qsecure: true 1 ``` Change to "false" in case of using self
      hosted cluster with a self-signed certificate ## Starting and completing lessons
      in Learning Paths As a developer, you can start a course and complete the lessons
      at your own pace. 1. You can log in to developers.redhat.com 2. Your platform
      engineer has granted you access to the Learning Paths plugin. To start a course
      in Learning Paths, complete the following steps: 1. In your Red Hat Developer
      Hub navigation menu, click Learning Paths. 2. Select the tile for the course
      you would like to begin. [NOTE] ---- This action redirects you to the main page
      of the course in the Red Hat Developers site. ---- #'
    expected_response: When a developer selects the tile for a course they would like
      to begin in Learning Paths, this action redirects them to the main page of the
      course on the Red Hat Developers site. Additionally, the context mentions that
      as a developer, you can log in to developers.redhat.com.
    query: so im trying to figure out this learning paths plugin for the hub and i
