- conversation_group_id: catalog-240
  description: catalog
  turns:
  - contexts:
    - '```yaml scorecard: dataRetentionDays: 12 ``` 3. Save the file. 4. Restart the
      RHDH backend to apply the changes. 1. Review the backend logs during the next
      scheduled cleanup cycle to make sure the job runs without errors. 2. Query the
      database to confirm that records older than your specified limit are removed.
      ### Establishing ownership in the Software Catalog To enable automatic metric
      aggregation in the Scorecard plugin, you must establish ownership relationships
      between users, groups, and components in the Software Catalog. The Scorecard
      plugin uses these definitions to calculate health trends based on who owns the
      entities. When you implement the following examples, you must replace the placeholder
      values with your specific project details. Group entity:: The Group entity defines
      a team within a specific namespace. ```yaml apiVersion: backstage.io/v1alpha1
      kind: Group metadata: name: _<example_team>_ namespace: _<your_namespace>_ spec:
      type: team children: [user:_<your_namespace>_/userName] ``` User entity:: The
      User entity defines an individual and establishes their team membership by using
      the memberOf field. ```yaml apiVersion: backstage.io/v1alpha1 kind: User metadata:
      name: userName title: Example User spec: profile: displayName: Example User
      memberOf: [group:_<your_namespace>_/example team] ``` Component entities:: The
      Component specification defines the owner to include the component in a user''s
      or team''s aggregated metrics. ```yaml # Example of user ownership apiVersion:
      backstage.io/v1alpha1 kind: Component metadata: name: _<user_owned_service>_
      annotations: github.com/_<your_project_name>_: example-org/example-repository
      jira/project-key: ET spec: type: service owner: user:_<your_namespace>_/userName
      lifecycle: production ``` ```yaml # Example of group ownership apiVersion: backstage.io/v1alpha1
      kind: Component metadata: name: _<group_owned_service>_ annotations: github.com/_<your_project_name>_:
      example-org/example-repository jira/project-key: ET spec: type: service owner:
      group:_<your_namespace>_/_<example_team>_ lifecycle: production ``` ### View
      aggregated metrics for owned entities To monitor the collective health of your
      software portfolio, you can view aggregated metrics for your owned entities
      in RHDH. The Scorecard plugin automatically consolidates these metrics based
      on your ownership definitions in the Software Catalog, which eliminates the
      need for manual group selection. (To view aggregated KPIs) You have established
      owner group relationships in the Software Catalog. You have administrative access
      to the RHDH configuration. You have the catalog.entity.read permission for the
      entities included in the aggregation. You have the scorecard.metric.read permission
      to view aggregated metrics on the home page. 1. Navigate to your RHDH home page.
      2. Locate the Scorecard dashboard to view the aggregated metrics for your owned
      entities. 3. Optional: To include entities from a nested group hierarchy in
      the aggregation, you must enable transitive parent group ownership. Confirm
      that the displayed Key Performance Indicators (KPIs) reflect the status of all
      components, systems, and resources defined under your ownership in the Software
      Catalog. ### Available metric data for entities Use the Scorecard API endpoints
      to list available metrics, retrieve values for specific catalog entities, and
      analyze performance trends for entities or aggregated groups. To use these endpoints,
      make sure your account has the following permissions: scorecard.metric.read
      catalog.entity.read (for the specific entities you intend to query) The following
      table summarizes the available endpoints and their primary functions. Filtering
      metrics (GET /metrics):: Use these parameters to refine the list of metrics.
      [NOTE] ---- You must not use both parameters in the same request. ---- Identifying
      entities (GET /metrics/catalog/&#8230;&#8203;):: Use path parameters to specify
      an entity in the Software Catalog. If a request fails, the API returns a status
      code and a message. Use the following table to resolve common issues.'
    expected_response: The Scorecard API endpoints are used to list available metrics,
      retrieve values for specific catalog entities, and analyze performance trends
      for entities or aggregated groups.
    query: What are the primary functions of the Scorecard API?
    response: "The primary functions of the Scorecard API are:\n\n1. To identify and\
      \ prioritize risks: Use unified health data to make faster remediation decisions.\n\
      2. To maintain security standards: Automatically surface compliance gaps to\
      \ enforce best practices.\n3. To streamline workflows: Access all metrics in\
      \ RHDH to reduce development overhead.\n4. To standardize service quality: Define\
      \ and measure consistent health criteria across the organization.\n\nThese functions\
      \ are achieved through the use of threshold rules, which define conditions or\
      \ expressions to assign metric values to specific visual categories. The Scorecard\
      \ plugin uses these definitions to calculate health trends based on who owns\
      \ the entities in the Software Catalog.\n\nTo enable automatic metric aggregation,\
      \ you must establish ownership relationships between users, groups, and components\
      \ in the Software Catalog. The Scorecard plugin uses these definitions to calculate\
      \ health trends based on who owns the entities.\n\nYou can configure the Scorecard\
      \ plugin to display project tracking and delivery velocity data in your RHDH\
      \ instance. This integration centralizes development status and facilitates\
      \ the evaluation of component readiness.\n\nThe plugin supports Jira Cloud (API\
      \ v3) and Jira Data Center (API v2). To install and configure Jira Scorecards\
      \ in your RHDH instance, complete the following steps:\n\n1. Generate a Jira\
      \ configuration token using one of the following methods, depending on your\
      \ Jira product:\n\t* Jira Cloud: Create a personal token. You must create a\
      \ Base64-encoded string using the following plain text format: your-atlassian-email:your-jira-api-token.\n\
      \t* Jira datacenter: Create a Personal Access Token (PAT) in your Jira datacenter\
      \ account.\n\n2. Use the generated token to configure the Jira Scorecard plugin\
      \ in your RHDH instance.\n\nNote: You must use the proxy setup to ensure configuration\
      \ compatibility if you also use the Roadie Jira Frontend Plugin."
