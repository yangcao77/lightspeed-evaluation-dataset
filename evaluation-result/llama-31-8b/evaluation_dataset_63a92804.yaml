      3. In the Install App tab, choose an account to install your GitHub App on.
      4. Save the following values for the next step: * Client ID * Client secret
      2. Add your GitHub credentials to Developer Hub by adding the following key/value
      pairs to your Developer Hub secrets. You can use these secrets in the Developer
      Hub configuration files by using their environment variable name. GITHUB_CLIENT_ID::
      Enter the saved Client ID. GITHUB_CLIENT_SECRET:: Enter the saved Client Secret.
      GITHUB_URL:: Enter the GitHub host domain: https://github.com. GITHUB_ORG::
      Enter your GitHub organization name, such as <your_github_organization_name>.
      3. Enable the GitHub catalog provider plugin in your dynamic-plugins.yaml file
      to import GitHub users and groups to the Developer Hub software catalog. ```yaml
      plugins: package: ''./dynamic plugins/dist/backstage plugin catalog backend
      module github org dynamic'' disabled: false ``` 4. Enable provisioning GitHub
      users and groups to the Developer Hub software catalog by adding the GitHub
      catalog provider section to your app-config.yaml file: ```yaml catalog: providers:
      githubOrg: id: githuborg githubUrl: "${GITHUB_URL}" orgs: [ "${GITHUB_ORG}"
      ] schedule: frequency: minutes: 30 initialDelay: seconds: 15 timeout: minutes:
      15 ``` id:: Enter a stable identifier for this provider, such as githuborg.
      [WARNING] ---- Entities from this provider are associated with this identifier.
      Therefore, do not to change the identifier over time since that might lead to
      orphaned entities or conflicts. ---- githubUrl:: Enter the configured secret
      variable name: ${GITHUB_URL}. orgs:: Enter the configured secret variable name:
      ${GITHUB_ORG}. schedule.frequency:: Enter your schedule frequency, in the cron,
