    query: i am trying to do the upgrade for the Developer Hub, what is the command
      i need to run for the new helm chart version and how can i also give it some
      extra values to override the attributes that are already there?
    response: 'To answer the user''s query, we need to use the knowledge search tool
      to find the correct information.


      Based on the knowledge search tool results, the correct information to answer
      the user''s query is:


      To upgrade to a later version of Red Hat Developer Hub in OpenShift Container
      Platform, you can use either the web console or the CLI.


      If you have installed Developer Hub manually using the Helm CLI, the Helm chart
      release upgrade in the OpenShift Developer Console is going to fail. The failure
      is due to the limitations when using the OpenShift Container Platform console
      to upgrade a Helm release that was initially deployed using the Helm CLI. You
      can bypass this limitation by using the Helm CLI to upgrade.


      To upgrade using the CLI, you need to run the following command:


      ```terminal

      $ helm upgrade $DEPLOYMENT_NAME -i https://github.com/openshift-helm-charts/charts/releases/download/redhat-redhat-developer-hub-1.9.0/redhat-developer-hub-1.9.0.tgz

      ```


      To delete the deployment, run the following command:


      ```terminal

      $ helm -n $NAMESPACE delete $DEPLOYMENT_NAME

      ```


      To provide extra values to the chart, you can create a new-values.yaml file
      on your workstation with values that override the attributes in the installed
      chart or by adding new attributes.


      You can also use the following command to upgrade the deployment with extra
      values:


      ```terminal

      $ helm -n $NAMESPACE upgrade -f new-values.yaml $DEPLOYMENT_NAME openshift-helm-charts/redhat-developer-hub
      --version 1.9.0

      ```


      Please note that you need to replace `$DEPLOYMENT_NAME` and `$NAMESPACE` with
      the actual values of your deployment and namespace.


