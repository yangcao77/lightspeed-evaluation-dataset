      health and quality in RHDH, you must enable the Scorecard plugin in your configuration.
      You have installed your RHDH instance. You have provisioned your custom dynamic
      plugins config map. Add the following configuration in your RHDH dynamic plugin
      config.yaml file: ```yaml plugins: package: oci://ghcr.io/redhat developer/rhdh
      plugin export overlays/red hat developer hub backstage plugin scorecard:bs_1.45.3__2.3.5!red
      hat developer hub backstage plugin scorecard disabled: false pluginConfig: dynamicPlugins:
      frontend: red hat developer hub.backstage plugin scorecard: entityTabs: path:
