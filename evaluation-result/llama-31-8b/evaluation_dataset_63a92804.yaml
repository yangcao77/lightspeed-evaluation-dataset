      : \"catalog entity\",\n        \"params\": {\n          \"claims\": [\"$ownerRefs\"\
      ]\n        }\n      }\n    }\n    ```\n\nThe main difference is that `$currentUser`\
      \ is replaced with just the user's entity reference, while `$ownerRefs` is replaced\
      \ with an array that includes both the user's entity reference and their parent\
      \ group's entity reference."
