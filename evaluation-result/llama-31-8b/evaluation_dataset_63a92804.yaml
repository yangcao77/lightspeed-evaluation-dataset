- conversation_group_id: rbac-422
  description: rbac
  turns:
  - contexts:
    - 'Creating a role in the Red Hat Developer Hub Web UI You can create a role in
      the Red Hat Developer Hub using the Web UI. You have enabled RBAC, have a policy
      administrator role in Developer Hub, and have added plugins with permission.
      1. Go to Administration at the bottom of the sidebar in the Developer Hub. The
      RBAC tab appears, displaying all the created roles in the Developer Hub. 2.
      (Optional) Click any role to view the role information on the OVERVIEW page.
      3. Click CREATE to create a role. 4. Enter the name and description of the role
      in the given fields and click NEXT. 5. Add users and groups using the search
      field, and click NEXT. 6. Select Plugin and Permission from the drop-downs in
      the Add permission policies section. 7. Select or clear the Policy that you
      want to set in the Add permission policies section, and click NEXT. 8. Review
      the added information in the Review and create section. 9. Click CREATE. The
      created role appears in the list available in the RBAC tab. ## Editing a role
      in the Red Hat Developer Hub Web UI You can edit a role in the Red Hat Developer
      Hub using the Web UI. [NOTE] ---- The policies generated from a policy.csv or
      ConfigMap file cannot be edited or deleted using the Developer Hub Web UI. ----
      You have enabled RBAC, have a policy administrator role in Developer Hub, and
      have added plugins with permission. The role that you want to edit is created
      in the Developer Hub. 1. Go to Administration at the bottom of the sidebar in
      the Developer Hub. The RBAC tab appears, displaying all the created roles in
      the Developer Hub. 2. (Optional) Click any role to view the role information
      on the OVERVIEW page. 3. Select the edit icon for the role that you want to
      edit. 4. Edit the details of the role, such as name, description, users and
      groups, and permission policies, and click NEXT. 5. Review the edited details
      of the role and click SAVE. After editing a role, you can view the edited details
      of a role on the OVERVIEW page of a role. You can also edit a role’s users and
      groups or permissions by using the edit icon on the respective cards on the
      OVERVIEW page. ## Deleting a role in the Red Hat Developer Hub Web UI You can
      delete a role in the Red Hat Developer Hub using the Web UI. [NOTE] ---- The
      policies generated from a policy.csv or ConfigMap file cannot be edited or deleted
      using the Developer Hub Web UI. ---- You have enabled RBAC and have a policy
      administrator role in Developer Hub. The role that you want to delete is created
      in the Developer Hub. 1. Go to Administration at the bottom of the sidebar in
      the Developer Hub. The RBAC tab appears, displaying all the created roles in
      the Developer Hub. 2. (Optional) Click any role to view the role information
      on the OVERVIEW page. 3. Select the delete icon from the Actions column for
      the role that you want to delete. Delete this role? pop-up appears on the screen.
      4. Click DELETE. # Managing authorizations by using the REST API To automate
      the maintenance of Red Hat Developer Hub permission policies and roles, you
      can use Developer Hub role-based access control (RBAC) REST API. You can perform
      the following actions with the REST API: Retrieve information about: All permission
      policies Specific permission policies Specific roles Static plugins permission
      policies Create, update, or delete: Permission policy Role ## Sending requests
      to the RBAC REST API by using the curl utility You can send RBAC REST API requests
      by using the curl utility. You have access to the RBAC feature. 1. Find your
      Bearer token to authenticate to the REST API. 1. In your browser, open the web
      console Network tab. 2. In the main screen, reload the Developer Hub Homepage.
      3. In the web console Network tab, search for the query?term= network call.
      4. Save the token in the response JSON for the next steps. 2. In a terminal,
      run the curl command and review the response: ``` $ curl -v \ -H "Authorization:
      Bearer <token>" \ -X <method> "https://<my_developer_hub_domain>/<endpoint>"
      \ ``` ``` $ curl -v -H "Content-Type: application/json" \ -H "Authorization:
      Bearer <token>" \ -X <method> "https://<my_developer_hub_domain>/<endpoint>"
      \ -d <body> ``` <token>:: Enter your saved authorization token. <method>:: Enter
      the HTTP method for your API endpoint. * GET: To retrieve specified information
      from a specified resource endpoint. * POST: To create or update a resource.
      * PUT: To update a resource. * DELETE: To delete a resource. https://<my_developer_hub_domain>::
      Enter your Developer Hub URL. <endpoint>:: Enter the API endpoint to which you
      want to send a request, such as /api/permission/policies. <body>:: Enter the
      JSON body with data that your API endpoint requires with the HTTP POST, or PUT
      request, and might require with the HTTP DELETE request. ``` $ curl -v -H "Content-Type:
      application/json" \ -H "Authorization: Bearer <token>" \ -X POST "https://<my_developer_hub_domain>/api/permission/roles"
      \ -d ''{ "memberReferences": ["group:default/example"], "name": "role:default/test",
      "metadata": { "description": "This is a test role" } }'' ``` ``` $ curl -v -H
      "Content-Type: application/json" \ -H "Authorization: Bearer <token>" \ -X PUT
      "https://<my_developer_hub_domain>/api/permission/roles/role/default/test" \
      -d ''{ "oldRole": { "memberReferences": [ "group:default/example" ], "name":
      "role:default/test" }, "newRole": { "memberReferences": [ "group:default/example",
      "user:default/test" ], "name": "role:default/test" } }'' ``` ``` $ curl -v -H
      "Content-Type: application/json" \ -H "Authorization: Bearer $token" \ -X POST
      "https://<my_developer_hub_domain>/api/permission/policies" \ -d ''[{ "entityReference":"role:default/test",
      "permission": "catalog-entity", "policy": "read", "effect":"allow" }]'' ```
      ``` $ curl -v -H "Content-Type: application/json" \ -H "Authorization: Bearer
      $token" \ -X PUT "https://<my_developer_hub_domain>/api/permission/policies/role/default/test"
      \ -d ''{ "oldPolicy": [ { "permission": "catalog-entity", "policy": "read",
      "effect": "allow" } ], "newPolicy": [ { "permission": "policy-entity", "policy":
      "read", "effect": "allow" } ] }'' ``` ``` $ curl -v -H "Content-Type: application/json"
      \ -H "Authorization: Bearer $token" \ -X POST "https://<my_developer_hub_domain>/api/permission/roles/conditions"
      \ -d ''{ "result": "CONDITIONAL", "roleEntityRef": "role:default/test", "pluginId":
      "catalog", "resourceType": "catalog-entity",'
    expected_response: To delete a role in the Red Hat Developer Hub using the Web
      UI, you must have enabled RBAC and have a policy administrator role. The role
      you want to delete must have been created in the Developer Hub. First, go to
      Administration at the bottom of the sidebar, where the RBAC tab will appear.
      From the Actions column, select the delete icon for the role you wish to remove.
      A pop-up will appear asking "Delete this role?", and you must click DELETE to
      confirm. Note that policies generated from a policy.csv or ConfigMap file cannot
      be deleted using the Developer Hub Web UI.
    query: how do i delte a role in the Develper Hub?
    response: "To delete a role in the Developer Hub, follow these steps:\n\n1. Log\
      \ in to your Developer Hub account.\n2. Go to Administration at the bottom of\
      \ the sidebar.\n3. Click on the RBAC tab, which displays all the created roles\
      \ in the Developer Hub.\n4. Select the delete icon from the Actions column for\
      \ the role that you want to delete.\n5. A Delete this role? pop-up appears on\
      \ the screen. Click DELETE.\n\nAlternatively, you can also use the RBAC REST\
      \ API to delete a role. \n\nTo view, create, modify, and delete roles using\
      \ the RBAC REST API, take the following steps:\n\n1.   Find your Bearer token\
      \ to authenticate to the REST API. \n\n    1.   In your browser, open the web\
      \ console Network tab.\n    2.   In the main screen, reload the Developer Hub\
      \ Homepage.\n    3.   In the web console Network tab, search for the query?term=\
      \ network call.\n    4.   Save the token in the response JSON for the next steps.\n\
      2.   Use the RBAC REST API request to delete a role, for example:\n\n    ```\n\
      DELETE /api/permission/roles/<kind>/<namespace>/<name>?memberReferences=<VALUE>::\
      \ \n```\n\n    Updates memberReferences, kind, namespace, or name for a role\
      \ in Developer Hub.\n\n    ```\nDELETE /api/permission/roles/<kind>/<namespace>/<name>::\
      \ \n```\n\n    Deletes a specified role from Developer Hub."
