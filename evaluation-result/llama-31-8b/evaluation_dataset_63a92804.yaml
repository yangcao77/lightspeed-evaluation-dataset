- conversation_group_id: installation-378
  description: installation
  turns:
  - contexts:
    - '# Installing Red Hat Developer Hub on Google Kubernetes Engine (GKE) Red Hat
      Developer Hub (RHDH) is an enterprise-grade platform for building developer
      portals. Administrative users can configure roles, permissions, and other settings
      to enable other authorized users to deploy a RHDH instance on Google Kubernetes
      Engine (GKE) using either the Operator or Helm chart. # Installing Developer
      Hub on Google Kubernetes Engine (GKE) by using the Operator To benefit from
      over-the-air updates and catalogs provided by Operator-based applications distributed
      with the Operator Lifecycle Manager (OLM) framework, consider installing Red
      Hat Developer Hub by using the Red Hat Developer Hub Operator distributed in
      the Red Hat Container Registry. On GKE, the most notable differences over an
      OpenShift-based installation are: The OLM framework and the Red Hat Container
      Registry are not built in. The Red Hat Container Registry pull secret is not
      managed globally. To expose the application, Ingresses replace OpenShift Routes.
      For clarity, the content is broken down in sections highlighting these platform-specific
      additional steps. ## Installing the Developer Hub Operator on Google Kubernetes
      Engine (GKE) by using the OLM framework The Red Hat Container Registry (registry.redhat.io),
      based on the Operator Lifecycle Manager (OLM) framework, contains a distribution
      of the Red Hat Developer Hub Operator, aimed at managing your Red Hat Developer
      Hub instance lifecycle. However, on Google Kubernetes Engine (GKE): The Operator
      Lifecycle Manager (OLM) framework and the Red Hat Container Registry are not
      built in. The Red Hat Container Registry pull secret is not managed globally.
      Therefore, install the OLM framework, the Red Hat Container Registry, and provision
      your Red Hat Container Registry pull secret to install Developer Hub Operator.
      You have installed the kubectl CLI on your local environment. Your system meets
      the sizing requirements for Red Hat Developer Hub. You have installed the Operator
      Lifecycle Manager (OLM). Your credentials to the Red Hat Container Registry:
      <redhat_user_name> <redhat_password> <email> You have logged in to your Google
      account and created a GKE Autopilot or GKE Standard cluster. 1. Connect to your
      GKE cluster: ```terminal $ gcloud container clusters get-credentials <cluster-name>
      --location=<cluster-location> ``` <cluster-name>:: Enter your GKE cluster name.
      <cluster-location>:: Enter your GKE cluster location. 2. Create the rhdh-operator
      namespace to contain the Red Hat Developer Hub Operator: ```terminal $ kubectl
      create namespace rhdh-operator ``` 3. Create a pull secret using your Red Hat
      credentials to pull the container images from the protected Red Hat Container
      Registry (registry.redhat.io): ```terminal $ kubectl n rhdh operator create
      secret docker registry rhdh pull secret \ docker server=registry.redhat.io \
      docker username=<redhat_user_name> \ docker password=<redhat_password> \ docker
      email=<email> ``` 4. Create a catalog source that contains the Red Hat operators:
      ```terminal $ cat <<EOF | kubectl -n rhdh-operator apply -f - apiVersion: operators.coreos.com/v1alpha1
      kind: CatalogSource metadata: name: redhat-catalog spec: sourceType: grpc image:
      registry.redhat.io/redhat/redhat-operator-index:v4.20 secrets: - "rhdh-pull-secret"
      displayName: Red Hat Operators EOF ``` 5. Create an operator group to manage
      your operator subscriptions: ```terminal $ cat <<EOF | kubectl apply -n rhdh-operator
      -f - apiVersion: operators.coreos.com/v1 kind: OperatorGroup metadata: name:
      rhdh-operator-group EOF ``` 6. Create a subscription to install the Red Hat
      Developer Hub Operator: ```terminal $ cat <<EOF | kubectl apply -n rhdh-operator
      -f - apiVersion: operators.coreos.com/v1alpha1 kind: Subscription metadata:
      name: rhdh namespace: rhdh-operator spec: channel: fast installPlanApproval:
      Automatic name: rhdh source: redhat-catalog sourceNamespace: rhdh-operator startingCSV:
      rhdh-operator.v1.9.0 EOF ``` 7. To wait until the Operator deployment finishes
      to be able to run the next step, run: ```terminal $ until kubectl -n rhdh-operator
      get deployment rhdh-operator &>/dev/null; do echo -n . sleep 3 done echo "RHDH
      Operator Deployment created" ``` 8. Include your pull secret name in the Operator
      deployment manifest, to avoid ImagePullBackOff errors: ```terminal $ kubectl
      n rhdh operator patch deployment \ rhdh operator - patch ''{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"rhdh
      pull secret"}]}}}}'' \ type=merge ``` Verify the deployment name: ```terminal
      $ kubectl get deployment n rhdh operator ``` ##'
    expected_response: 'To install the Red Hat Developer Hub Operator on Google Kubernetes
      Engine (GKE), you must first install the Operator Lifecycle Manager (OLM) framework,
      as it is not built-in. The process is as follows: 1. Connect to your GKE cluster.
      2. Create the `rhdh-operator` namespace. 3. Create a pull secret with your Red
      Hat credentials for the Red Hat Container Registry. 4. Create a `CatalogSource`
      that contains the Red Hat operators. 5. Create an `OperatorGroup` to manage
      operator subscriptions. 6. Create a `Subscription` to install the Red Hat Developer
      Hub Operator. 7. Wait for the Operator deployment to finish. 8. Patch the Operator
      deployment manifest to include your pull secret name to avoid `ImagePullBackOff`
      errors.'
