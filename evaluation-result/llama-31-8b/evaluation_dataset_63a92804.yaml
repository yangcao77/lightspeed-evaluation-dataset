    expected_response: "In Red Hat Developer Hub, conditional policy aliases are dynamically\
      \ replaced with their corresponding values during policy evaluation. Each alias\
      \ is prefixed with a $ sign. The supported aliases are:\n\n*   **$currentUser**:\
      \ This alias is replaced with the user entity reference for the user who is\
      \ requesting access to the resource. For example, if a user named Tom from the\
      \ default namespace requests access, `$currentUser` becomes `user:default/tom`.\
      \ An example of a conditional policy object using this alias is:\n    ```json\n\
      \    {\n      \"result\": \"CONDITIONAL\",\n      \"roleEntityRef\": \"role:default/developer\"\
