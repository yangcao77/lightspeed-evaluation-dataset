- conversation_group_id: configuration-190
  description: configuration
  turns:
  - contexts:
    - 'Configuring Model Context Protocol in Red Hat Developer Hub You can enable
      your MCP client applications to use the MCP protocol to access RHDH information
      and workflows. This configuration is a prerequisite for MCP clients to use the
      defined MCP tools and access the exposed capabilities of RHDH. You have installed
      the MCP server and tool plugins in Red Hat Developer Hub. 1. In your Red Hat
      Developer Hub app-config.yaml file, configure a static token for authentication
      against the MCP server endpoint. MCP clients (such as Cursor, Continue, or Lightspeed
      Core) use these tokens to authenticate against the Backstage MCP server. For
      example: ```yaml backend: auth: externalAccess: type: static options: token:
      ${MCP_TOKEN} subject: mcp clients ``` where: ${MCP_TOKEN}:: Set the token value
      that you generate manually and share with your MCP clients. [NOTE] ---- Tokens
      must be long and complex strings without whitespace to prevent brute-force guessing.
      1. To generate a sample token, use the following command: ``` $ node p `require("crypto").randomBytes(24).toString("base64")`
      ``` ---- 2. Register the MCP tools that you install as a plugin source: ```yaml
      backend: actions: pluginSources: software catalog mcp tool techdocs mcp tool
      ``` ```yaml # Full app-config.yaml file example with MCP configuration app:
      title: AI Dev Developer Hub baseUrl: "${RHDH_BASE_URL}" auth: environment: development
      session: secret: "${BACKEND_SECRET}" providers: guest: dangerouslyAllowOutsideDevelopment:
      true backend: actions: pluginSources: - ''software-catalog-mcp-tool'' - ''techdocs-mcp-tool''
      auth: externalAccess: - type: static options: token: ${MCP_TOKEN} subject: mcp-clients
      keys: - secret: "${BACKEND_SECRET}" baseUrl: "${RHDH_BASE_URL}" cors: origin:
      "${RHDH_BASE_URL}" signInPage: oidc ``` ### Configuring MCP clients to access
      the RHDH server You must configure an MCP client before it can interact with
      the MCP server. For more information on the list of clients and their respective
      configurations, see Example Clients. You have configured one of the following
      endpoints as the server URL, where <my_developer_hub_domain> is the hostname
      of your RHDH instance. Streamable: https://<my_developer_hub_domain>/api/mcp
      actions/v1 SSE (Legacy): https://<my_developer_hub_domain>/api/mcp actions/v1/sse
      [NOTE] ---- Some clients do not yet support the Streamable endpoint, and you
      might need to use the SSE endpoint instead. ---- * You have set the ${MCP_TOKEN}
      environment variable in your MCP server configuration as the bearer token when
      authenticating with the MCP server. 1. Configure Cursor as a client. 1. From
      your Desktop app, navigate to Cursor Settings and select MCP Tools > New MCP
      Server. 2. Add the following configuration: ```yaml { "mcpServers": { "backstage
      actions": { "url": "https://<my_developer_hub_domain>/api/mcp actions/v1", "headers":
      { "Authorization": "Bearer <MCP_TOKEN>" } } } } ``` where: <MCP_TOKEN>:: Enter
      the previously configured static token <my_developer_hub_domain>:: Enter the
      hostname of your RHDH instance 2. Configure Continue as a client. 1. In your
      agent yaml configuration file, add the following configuration: ```yaml mcpServers:
      name: backstage actions type: sse url: https://<my_developer_hub_domain>/api/mcp
      actions/v1/sse requestOptions: headers: Authorization: "Bearer <MCP_TOKEN>"
      ``` where: <MCP_TOKEN>:: Enter the previously configured static token <my_developer_hub_domain>::
      Enter the hostname of your RHDH instance 3. Configure Developer Lightspeed for
      RHDH as a client. For more details, see Red Hat Developer Lightspeed for Red
      Hat Developer Hub. 1. In the lightspeed-stack.yaml configuration, add the following
      configuration for mcp_servers: ```yaml mcp_servers: name: mcp::backstage provider_id:
      model context protocol url: https://<my_developer_hub_domain>/api/mcp actions/v1
      authorization_headers: Authorization: "client" ``` where: model-context-protocol::
      This is the tool runtime provider defined and configured in the llama-stack
      run.yaml configuration for use in LCS. 2. Optional: If you want to use your
      own Llama Stack configuration, add the following code to your Llama Stack configuration
      file (run.yaml). ```yaml providers: tool_runtime: provider_id: model context
      protocol provider_type: remote::model context protocol config: {} ``` 3. To
      authorize requests to the MCP endpoint using <MCP_TOKEN>, add it in the Developer
      Lightspeed for RHDH app-config.yaml file, to make POST requests to LCS, as shown
      in the following code: ```yaml lightspeed: mcpServers: name: mcp::backstage
      token: ${MCP_TOKEN} ``` 4. Optional: You can query the LCS /v1/streaming_query
      endpoint directly by providing the MCP_TOKEN in the header, as shown in the
      following code: ```yaml curl -X POST \ -H `Content-Type: application/json` \
      -H `MCP-HEADERS: {"mcp::backstage": {"Authorization": "Bearer <MCP_TOKEN>"}}`
      \ -d `{"query": "Can you give me all catalog templates of type ''service'',
      "model": "gpt-4o-mini", "provider": "openai"}` \ _<url>_/v1/streaming_query
      ``` where: <url>:: Enter the LCS endpoint. You can use localhost(pass:c,a,q:[<RHDH_servicename>.my-rhdh-project.svc.cluster.local:8080])
      or the service name for this field if you are inside the Backstage container.
      ##'
    expected_response: 'To configure Developer Lightspeed for RHDH as a client, you
      must add the following configuration for `mcp_servers` in the `lightspeed-stack.yaml`
      file: `mcp_servers: name: mcp::backstage provider_id: model context protocol
      url: https://<my_developer_hub_domain>/api/mcp actions/v1 authorization_headers:
      Authorization: "client"`. To authorize requests to the MCP endpoint using `<MCP_TOKEN>`,
      you must add it to the Developer Lightspeed for RHDH `app-config.yaml` file,
      as shown in the following code: `lightspeed: mcpServers: name: mcp::backstage
      token: ${MCP_TOKEN}`.'
    query: How do I configure Litespeed Core as an MCP clent?
    response: "To enable LiteSpeed Core as an MCP client, you must first configure\
      \ a static token for authentication against the MCP server endpoint. \n\nYou\
      \ can find the necessary instructions by searching for the following knowledge\
      \ chunks:\n\n- In Red Hat Developer Hub's app-config.yaml file, add a static\
      \ token for authentication against the MCP server endpoint.\n``` yaml\nbackend:\n\
      \  auth:\n    externalAccess:\n      - type: static\n        options:\n    \
      \      token: ${MCP_TOKEN}\n          subject: mcp-clients\n```\n\n- Configure\
      \ a static token for the RHDH MCP server.\n- Set this token as the bearer token\
      \ in your MCP client.\n- Check the MCP endpoint configuration.\n\nCite sources\
      \ immediately at the end of sentences before punctuation, using format (e.g.,\
      \ 'This is a fact.').\n\nHere are the required properties to configure the LiteSpeed\
      \ Core Service as an MCP client:\n\n``` YAML\nkind: ConfigMap\napiVersion: v1\n\
      metadata:\n  name: lightspeed-stack\ndata:\n  lightspeed-stack.yaml: |\n   \
      \ name: Lightspeed Core Service (LCS)\n    service:\n      host: 0.0.0.0\n \
      \   # Use ${LIGHTSPEED_SERVICE_PORT} if you are not running the Service on port\
      \ `8080`\n    # port: ${LIGHTSPEED_SERVICE_PORT}\n      auth_enabled: false\n\
      \      workers: 1\n      color_log: true\n      access_log: true\n    llama_stack:\n\
      \      use_as_library_client: false\n      url: http://localhost:8321\n    user_data_collection:\n\
      \      feedback_enabled: true\n      feedback_storage: \"/tmp/data/feedback\"\
      \n      transcripts_enabled: true\n      transcripts_storage: \"/tmp/data/transcripts\"\
      \n    authentication:\n      module: \"noop\"\n    conversation_cache:\n   \
      \   type: \"sqlite\"\n      sqlite:\n        db_path: \"/tmp/data/conversations/lcs_cache.db\"\
      \n```\n\nAdd the Llama Stack and LCS container definitions to `extraContainers`.\n\
      \nRemember to use the environment variables in the right format. \n\nCite the\
      \ relevant resources and credits at the end of your answer, following the format\
      \ (e.g., 'Source: Falliero, C.).'"
