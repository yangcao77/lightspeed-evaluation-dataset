    response: 'The specific Google Cloud configuration details and credentials required
      to access Gemini through Vertex AI when setting up the Developer Lightspeed
      for RHDH plugin are:


      The API endpoint URL for the LLM provider is the `VLLM_URL` field in the secret
      YAML file, which should be set to the API endpoint URL provided by your LLM
      provider. The provider must comply with the OpenAI API specification.


      The API key required to access OpenAI models through the OpenAI API is the `OPENAI_API_KEY`
      field in the secret YAML file. This should be set to the API key provided by
      OpenAI.


      The credentials required to authenticate with Google Cloud to access Vertex
      AI are the `GOOGLE_APPLICATION_CREDENTIALS` field in the secret YAML file. This
      should be set to the service account email and private key file path.


      The identifier for the safety model is the `SAFETY_MODEL` field in the secret
      YAML file. The recommended value is `llama-guard3:8b`.


      The URL hosting the safety model is the `SAFETY_URL` field in the secret YAML
      file. This should be set to the URL provided by your safety model provider,
      plus `#!/v1`.'
