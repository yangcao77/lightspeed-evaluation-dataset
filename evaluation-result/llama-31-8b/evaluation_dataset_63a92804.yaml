  description: plugins
  turns:
  - contexts:
    - 'Installing and configuring a TechDocs add-on TechDocs add-ons supported by
      Red Hat are exported to the TechDocs plugin by the`backstage-plugin-techdocs-module-addons-contrib`
      plugin package, which is preinstalled on Red Hat Developer Hub and enabled by
      default. The <ReportIssue /> add-on is part of the default configuration of
      this plugin package and comes ready to use in the TechDocs plugin. You can install
      other supported TechDocs add-ons by configuring the`backstage-plugin-techdocs-module-addons-contrib`
      plugin package in the Red Hat Developer Hub ConfigMap or Helm chart, depending
      on whether you use the Operator or Helm chart for installation. If you want
      to customize your TechDocs experience beyond the functions of the supported
      add-ons, you can install third-party add-ons on your TechDocs plugin, including
      add-ons that you create yourself. ### Installing and configuring an external
      TechDocs add-on using the Operator You can use a dynamic plugin to import TechDocs
      add-ons into your TechDocs plugin. If you use the Red Hat Developer Hub Operator
      to install the dynamic plugin, you can add TechDocs add-ons to the plugin package
      in your ConfigMap. Preinstalled add-ons, such as ReportIssue, are included in
      the default backstage-plugin-techdocs-module-addons-contrib package configuration.
      External add-ons that are supported by Red Hat are installed by manually adding
      them to the techdocsAddons section of the configuration file. 1. From the Developer
      perspective in the OpenShift Container Platform web console, click ConfigMaps
      > Create ConfigMap. 2. From the Create ConfigMap page, select the YAML view
      option in the Configure via field. 3. In the newly created ConfigMap, add the
      default backstage-plugin-techdocs-module-addons-contrib package configuration.
      For example: ```yaml kind: ConfigMap apiVersion: v1 metadata: name: dynamic
      plugins rhdh data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      plugins: package: ./dynamic plugins/dist/backstage plugin techdocs module addons
      contrib disabled: false pluginConfig: dynamicPlugins: frontend: backstage.plugin
      techdocs module addons contrib: techdocsAddons: importName: ReportIssue ```
      4. In the techdocsAddons section of the ConfigMap, add importName: <external_techdocs_add-on>
      for each external TechDocs add-on that you want to add from the specified plugin
      package. For example: ```yaml kind: ConfigMap apiVersion: v1 metadata: name:
      dynamic plugins rhdh data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      plugins: package: ./dynamic plugins/dist/backstage plugin techdocs module addons
      contrib disabled: false pluginConfig: dynamicPlugins: frontend: backstage.plugin
      techdocs module addons contrib: techdocsAddons: importName: ReportIssue importName:
      <external_techdocs_add on> ``` where: <external_techdocs_add-on>:: Specifies
      the external TechDocs add-on that you want to install, for example, TextSize
      or LightBox. 5. Click Create. 6. In the web console navigation menu, click Topology.
      7. Click on the overflow menu for the Red Hat Developer Hub instance that you
      want to use and select Edit Backstage to load the YAML view of the Red Hat Developer
      Hub instance. 8. In your Backstage CR, add the dynamicPluginsConfigMapName:
      <dynamic_plugins_configmap> key-value pair. For example: ```yaml apiVersion:
      rhdh.redhat.com/v1alpha5 kind: Backstage metadata: name: my rhdh spec: application:
      # ... dynamicPluginsConfigMapName: _<dynamic_plugins_configmap>_ # ... ``` where:
      <dynamic_plugins_configmap>:: Specifies the name of your dynamic plugins ConfigMap
      for your Red Hat Developer Hub instance, for example, dynamic-plugins-rhdh.
      9. Click Save. 10. In the web console navigation menu, click Topology and wait
      for the Red Hat Developer Hub pod to start. 11. Click the Open URL icon to start
      using the Red Hat Developer Hub platform with the new configuration changes.
      ### Installing and configuring an external TechDocs add-on using the Helm chart
      You can use a dynamic plugin to import TechDocs add-ons into your TechDocs plugin.
      If you use the Red Hat Developer Hub Helm chart to install the dynamic plugin,
      you can add TechDocs add-ons to the plugin package in your Helm chart. Preinstalled
      add-ons, such as ReportIssue, are included in the default backstage-plugin-techdocs-module-addons-contrib
      package configuration. External add-ons that are supported by Red Hat are installed
      by manually adding them to the techdocsAddons section of the configuration file.
      The TechDocs plugin is installed and enabled. 1. In your Helm chart, add the
      global.dynamic parameters required to install a dynamic plugin, as shown in
      Installing dynamic plugins using the Helm chart [NOTE] ---- The default configuration
      includes the dynamic-plugins.default.yaml file, which contains all of the dynamic
      plugins, including TechDocs add-ons, that are preinstalled in Red Hat Developer
      Hub, whether they are enabled or disabled by default. ---- 2. In your Helm chart,
      add the default backstage-plugin-techdocs-module-addons-contrib package configuration.
      For example: ```yaml global: dynamic: plugins: package: ./dynamic plugins/dist/backstage
      plugin techdocs module addons contrib disabled: false pluginConfig: dynamicPlugins:
      frontend: backstage.plugin techdocs module addons contrib: techdocsAddons: importName:
      ReportIssue ``` 3. In the techdocsAddons section of the Helm chart, add importName:
      <external_techdocs_add-on> for each external TechDocs add-on that you want to
      add from the specified plugin package. For example: ```yaml global: dynamic:
      plugins: package: ./dynamic plugins/dist/backstage plugin techdocs module addons
      contrib disabled: false pluginConfig: dynamicPlugins: frontend: backstage.plugin
      techdocs module addons contrib: techdocsAddons: importName: ReportIssue importName:
      <external_techdocs_add on> ``` where: <external_techdocs_add-on>:: Specifies
      the external TechDocs add-on that you want to install, for example, TextSize
      or LightBox. ### Installing and configuring a third-party TechDocs add-on You
      can install compatible third-party TechDocs add-on on your Red Hat Developer
      Hub instance as a front-end dynamic plugin. The third party TechDocs add on
      has a valid package.json file in its root directory, containing all required
      metadata and dependencies. The third party plugin is packaged as a dynamic plugin
