      To configure Continue as a client, add the following to your agent yaml configuration
      file: mcpServers: name: backstage actions type: sse url: https://<my_developer_hub_domain>/api/mcp
      actions/v1/sse requestOptions: headers: Authorization: "Bearer <MCP_TOKEN>".
      You must also replace the <MCP_TOKEN> and <my_developer_hub_domain> placeholders.'
