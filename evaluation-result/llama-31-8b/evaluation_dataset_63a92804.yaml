      15 integrations: github: host: ${GITHUB_INTEGRATION_HOST_DOMAIN} apps: appId:
      ${GITHUB_INTEGRATION_APP_ID} clientId: ${GITHUB_INTEGRATION_CLIENT_ID} clientSecret:
      ${GITHUB_INTEGRATION_CLIENT_SECRET} privateKey: | ${GITHUB_INTEGRATION_PRIVATE_KEY_FILE}
      ``` #'
