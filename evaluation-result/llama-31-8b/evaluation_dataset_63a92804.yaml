- conversation_group_id: kubernetes-179
  description: kubernetes
  turns:
  - contexts:
    - '# Audit logs in Red Hat Developer Hub # Audit logs in Red Hat Developer Hub
      Audit logs are a chronological set of records documenting the user activities,
      system events, and data changes that affect your Red Hat Developer Hub users,
      administrators, or components. Administrators can view Developer Hub audit logs
      in the OpenShift Container Platform web console to monitor scaffolder events,
      changes to the RBAC system, and changes to the Catalog database. Audit logs
      include the following information: Name of the audited event Actor that triggered
      the audited event, for example, terminal, port, IP address, or hostname Event
      metadata, for example, date, time Event status, for example, success, failure
      Severity levels, for example, info, debug, warn, error You can use the information
      in the audit log to achieve the following goals: Enhance security:: Trace activities,
      including those initiated by automated systems and software templates, back
      to their source. Know when software templates are executed, and the details
      of application and component installations, updates, configuration changes,
      and removals. Automate compliance:: Use streamlined processes to view log data
      for specified points in time for auditing purposes or continuous compliance
      maintenance. Debug issues:: Use access records and activity details to fix issues
      with software templates or plugins. [NOTE] ---- Audit logs are not forwarded
      to the internal log store by default because this does not provide secure storage.
      You are responsible for ensuring that the system to which you forward audit
      logs is compliant with your organizational and governmental regulations, and
      is properly secured. ---- ## Configuring audit logs for Developer Hub on OpenShift
      Container Platform Use the OpenShift Container Platform web console to configure
      the following OpenShift Container Platform logging components to use audit logging
      for Developer Hub: Logging deployment:: Configure the logging environment, including
      both the CPU and memory limits for each logging component. Logging collector::
      Configure the spec.collection stanza in the ClusterLogging custom resource (CR)
      to use a supported modification to the log collector and collect logs from STDOUT.
      Log forwarding:: Send logs to specific endpoints inside and outside your OpenShift
      Container Platform cluster by specifying a combination of outputs and pipelines
      in a ClusterLogForwarder CR. Red Hat OpenShift Container Platform Configuring
      your Logging deployment Red Hat OpenShift Container Platform Configuring the
      logging collector Red Hat OpenShift Container Platform Enabling JSON log forwarding
      Red Hat OpenShift Container Platform Configuring log forwarding ##'
    expected_response: For Developer Hub audit logs, you configure the spec.collection
      stanza in the ClusterLogging custom resource (CR) to use a supported modification
      to the log collector and collect logs from STDOUT.
    query: How is the ClusterLogging custom resource used for Developer Hub audit
      logs?
    response: "The ClusterLogging custom resource is used for Developer Hub audit\
      \ logs in the following way:\n\n1. Configure the logging environment, including\
      \ both the CPU and memory limits for each logging component.\n2. Configure the\
      \ spec.collection stanza in the ClusterLogging custom resource (CR) to use a\
      \ supported modification to the log collector and collect logs from STDOUT.\n\
      3. Send logs to specific endpoints inside and outside your cluster by specifying\
      \ a combination of outputs and pipelines in a ClusterLogForwarder CR.\n\nYou\
      \ can use the Red Hat OpenShift Logging (OpenShift Logging) Operator and a ClusterLogForwarder\
      \ instance to capture the streamed audit logs from a Developer Hub instance\
      \ and forward them to the HTTPS endpoint associated with your Splunk instance.\n\
      \nThe following are the required steps:\n\n1. Log in to your OpenShift Container\
      \ Platform cluster.\n2. Install the OpenShift Logging Operator in the openshift-logging\
      \ namespace and switch to the namespace.\n3. Create a serviceAccount named log-collector\
      \ and bind the collect-application-logs role to the serviceAccount.\n4. Generate\
      \ a hecToken in your Splunk instance.\n5. Create a key/value secret in the openshift-logging\
      \ namespace and verify the secret.\n6. Create a basic ClusterLogForwarder resource\
      \ YAML file as follows:\n```\napiVersion: logging.openshift.io/v1\nkind: ClusterLogForwarder\n\
      metadata:\n  name: instance\n  namespace: openshift-logging\n```\n\nNote that\
      \ the above information is extracted from the provided knowledge search results,\
      \ which are a part of the user's query on how to use ClusterLogging for Developer\
      \ Hub audit logs."
