- conversation_group_id: plugins-6
  description: plugins
  turns:
  - contexts:
    - 'Enabling and configuring the Keycloak plugin The Keycloak backend plugin, which
      integrates Keycloak into Developer Hub, has the following capabilities: Synchronization
      of Keycloak users in a realm. Synchronization of Keycloak groups and their users
      in a realm. [NOTE] ---- The supported Red Hat Build of Keycloak (RHBK) version
      is 26.0. ---- ## Enabling the Keycloak plugin To enable the Keycloak plugin,
      you must set the following environment variables: KEYCLOAK_BASE_URL KEYCLOAK_LOGIN_REALM
      KEYCLOAK_REALM KEYCLOAK_CLIENT_ID KEYCLOAK_CLIENT_SECRET 1. The Keycloak plugin
      is pre-loaded in Developer Hub with basic configuration properties. To enable
      it, set the disabled property to false as follows: ```yaml global: dynamic:
      includes: dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/backstage
      community plugin catalog backend module keycloak dynamic disabled: false ```
      ## Configuring the Keycloak plugin 1. To configure the Keycloak plugin, add
      the following in your app-config.yaml file: schedule:: Configure the schedule
      frequency, timeout, and initial delay. The fields support cron, ISO duration,
      "human duration" as used in code. ```yaml catalog: providers: keycloakOrg: default:
      schedule: frequency: { minutes: 1 } timeout: { minutes: 1 } initialDelay: {
      seconds: 15 } ``` userQuerySize and groupQuerySize:: Optionally, configure the
      Keycloak query parameters to define the number of users and groups to query
      at a time. Default values are 100 for both fields. ```yaml catalog: providers:
      keycloakOrg: default: userQuerySize: 100 groupQuerySize: 100 ``` Authentication::
      Communication between Developer Hub and Keycloak is enabled by using the Keycloak
      API. Username and password, or client credentials are supported authentication
      methods. The following table describes the parameters that you can configure
      to enable the plugin under catalog.providers.keycloakOrg.<ENVIRONMENT_NAME>
      object in the app-config.yaml file: 2. When using client credentials 1. Set
      the access type to confidential. 2. Enable service accounts. 3. Add the following
      roles from the realm-management client role: * query-groups * query-users *
      view-users 3. Optionally, if you have self-signed or corporate certificate issues,
      you can set the following environment variable before starting Developer Hub:
      ``` NODE_TLS_REJECT_UNAUTHORIZED=0 ``` [WARNING] ---- Setting the environment
      variable is not recommended. ---- ## Keycloak plugin metrics The Keycloak backend
      plugin supports OpenTelemetry metrics that you can use to monitor fetch operations
      and diagnose potential issues. ### Available Counters ### Labels All counters
      include the taskInstanceId label, which uniquely identifies each scheduled fetch
      task. You can use this label to trace failures back to individual task executions.
      Users can enter queries in the Prometheus UI or Grafana to explore and manipulate
      metric data. In the following examples, a Prometheus Query Language (PromQL)
      expression returns the number of backend failures. ``` backend_keycloak_fetch_data_batch_failure_count_total{taskInstanceId="df040f82
      2e80 44bd 83b0 06a984ca05ba"} 1 ``` ``` sum(backend_keycloak_fetch_data_batch_failure_count_total)
      sum(backend_keycloak_fetch_data_batch_failure_count_total offset 1h) ``` [NOTE]
      ---- PromQL supports arithmetic operations, comparison operators, logical/set
      operations, aggregation, and various functions. Users can combine these features
      to analyze time-series data effectively. Additionally, the results can be visualized
      using Grafana. ---- ### Exporting Metrics You can export metrics using any OpenTelemetry-compatible
      backend, such as Prometheus. OpenTelemetry Backstage OpenTelemetry setup guide
      # Enabling and configuring the Nexus Repository Manager plugin The Nexus Repository
      Manager plugin displays the information about your build artifacts in your Developer
      Hub application. The build artifacts are available in the Nexus Repository Manager.
      ## Enabling the Nexus Repository Manager plugin The Nexus Repository Manager
      plugin is pre-loaded in Developer Hub with basic configuration properties. To
      enable it, set the disabled property to false as follows: ```yaml global: dynamic:
      includes: dynamic plugins.default.yaml plugins: package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/backstage community plugin nexus repository
      manager:<tag> disabled: false ``` The <tag> variable is your RHDH application&#39;s
      version of Backstage and the plugin version, in the format: bs_<backstage-version>__<plugin-version>
      (note the double underscore delimiter). This format is only applicable for Community
      supported plugins. To find the correct image tag for <tag>: 1. Look in the RHDH
      release notes preface for your Backstage version. 2. Locate the plugin version
      for paths starting with oci://ghcr.io within one of the tables provided in the
      Dynamic plugins reference. For example, because RHDH 1.9 is based on Backstage
      1.45.3, the tag will have the format bs_1.45.3__<plugin-version> [TIP] ----
      To ensure environment stability, use a SHA256 digest instead of a version tag.
      See Determining SHA256 Digests ---- ## Configuring the Nexus Repository Manager
      plugin 1. Set the proxy to the desired Nexus Repository Manager server in the
      app-config.yaml file as follows: ```yaml proxy: ''/nexus-repository-manager'':
      target: ''https://<NEXUS_REPOSITORY_MANAGER_URL>'' headers: X-Requested-With:
      ''XMLHttpRequest'' # Uncomment the following line to access a private Nexus
      Repository Manager using a token # Authorization: ''Bearer <YOUR TOKEN>'' changeOrigin:
      true # Change to "false" in case of using self hosted Nexus Repository Manager
      instance with a self-signed certificate secure: true ``` 2. Optional: Change
      the base URL of Nexus Repository Manager proxy as follows: ```yaml nexusRepositoryManager:
      # default path is `/nexus-repository-manager` proxyPath: /custom-path ``` 3.
      Optional: Enable the following experimental annotations: ```yaml nexusRepositoryManager:
      experimentalAnnotations: true ``` 4. Annotate your entity using the following
      annotations: ```yaml metadata: annotations: # insert the chosen annotations
      here # example nexus-repository-manager/docker.image-name: `<ORGANIZATION>/<REPOSITORY>`,
      ``` # Enabling the Tekton plugin You can use the Tekton plugin to visualize
      the results of CI/CD pipeline runs on your Kubernetes or OpenShift clusters.
      The plugin allows users to visually see high level status of all associated
      tasks in the pipeline for their applications. You have installed and configured
      the @backstage/plugin kubernetes and @backstage/plugin kubernetes backend dynamic
      plugins. You have configured the Kubernetes plugin to connect to the cluster
      using a ServiceAccount. The ClusterRole must be granted for custom resources
      (PipelineRuns and TaskRuns) to the ServiceAccount accessing the cluster. [NOTE]
      ---- If you have the RHDH Kubernetes plugin configured, then the ClusterRole
      is already granted. ---- * To view the pod logs, you have granted permissions
      for pods/log. * You can use the following code to grant the ClusterRole for
      custom resources and pod logs: ```yaml kubernetes: ... customResources: group:
      ''tekton.dev'' apiVersion: ''v1'' plural: ''pipelineruns'' group: ''tekton.dev''
