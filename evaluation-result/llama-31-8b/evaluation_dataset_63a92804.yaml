- conversation_group_id: plugins-401
  description: plugins
  turns:
  - contexts:
    - '# TechDocs for Red Hat Developer Hub # About TechDocs The Red Hat Developer
      Hub instance comes with the TechDocs plugin preinstalled and enabled by default.
      Your organization can use the TechDocs plugin to create, find, and manage documentation
      in a central location and in a standardized way. You can also enhance your technical
      documentation experience with built-in TechDocs features and add-ons. For example:
      Docs-like-code approach:: Write your technical documentation in Markdown files
      that are stored inside your project repository along with your code. Documentation
      site generation:: Use MkDocs to create a full-featured, Markdown-based, static
      HTML site for your documentation that is rendered centrally in Developer Hub.
      Documentation site metadata and integrations:: See additional metadata about
      the documentation site alongside the static documentation, such as the date
      of the last update, the site owner, top contributors, open GitHub issues, Slack
      support channels, and Stack Overflow Enterprise tags. Built-in navigation and
      search:: Locate the information that you need within a document quickly and
      easily. Add-ons:: Make your documentation more functional and interactive with
      supported TechDocs add-ons. Some add-ons are preinstalled and enabled by default.
      To extend the default functionality, you can dynamically load external and third-party
      add-ons into your Red Hat Developer Hub instance. If you want to further customize
      your TechDocs experience, you can create add-ons that meet specific documentation
      needs for your organization. # Configuring TechDocs The TechDocs plugin is preinstalled
      and enabled on a Developer Hub instance by default. You can disable or enable
      the TechDocs plugin, and change other parameters, by configuring the Red Hat
      Developer Hub Helm chart or the Red Hat Developer Hub Operator ConfigMap. [IMPORTANT]
      ---- Red Hat Developer Hub includes a built-in TechDocs builder that generates
      static HTML documentation from your codebase. However, the default basic setup
      of the local builder is not intended for production. ---- You can use a CI/CD
      pipeline with the repository that has a dedicated job to generate docs for TechDocs.
      The generated static files are stored in OpenShift Data Foundation or in a cloud
      storage solution of your choice and published to a static HTML documentation
      site. After you configure OpenShift Data Foundation to store the files that
      TechDocs generates, you can configure the TechDocs plugin to use the OpenShift
      Data Foundation for cloud storage. ##'
    expected_response: OpenShift Data Foundation can be used as a cloud storage solution
      to store the static files generated by TechDocs. After configuring OpenShift
      Data Foundation to store these files, the TechDocs plugin can be configured
      to use it for cloud storage.
    query: What is the role of OpenShift Data Foundation in relation to TechDocs?
    response: "Based on the provided knowledge search results, the role of OpenShift\
      \ Data Foundation in relation to TechDocs is to provide a storage solution for\
      \ TechDocs files. It can be used in place of other cloud storage solutions,\
      \ and it offers an ObjectBucketClaim custom resource (CR) that can be used to\
      \ request an S3-compatible bucket backend. The ObjectBucketClaim CR automatically\
      \ generates both the Developer Hub ObjectBucketClaim config map and secret,\
      \ which contain ObjectBucket access information.\n\nTo make object storage accessible\
      \ to containers, you can use the Helm chart or the Operator configuration. By\
      \ adding the access information to the Helm chart configuration or the Operator\
      \ configuration, you can make it accessible to the Developer Hub container by\
      \ adding environment variables to the container.\n\nThe TechDocs plugin can\
      \ be configured to use OpenShift Data Foundation for cloud storage. This means\
      \ that the generated files can be stored in OpenShift Data Foundation instead\
      \ of in a cloud storage solution like AWS S3.\n\nIn summary, OpenShift Data\
      \ Foundation plays a role in providing a storage solution for TechDocs files\
      \ and offering an ObjectBucketClaim custom resource (CR) to request an S3-compatible\
      \ bucket backend. It can be used in place of other cloud storage solutions,\
      \ and its access information can be added to the Helm chart configuration or\
      \ the Operator configuration to make object storage accessible to containers.\n\
      \nHere is an example of how to configure OpenShift Data Foundation for TechDocs:\n\
      \n```yaml\napiVersion: objectbucket.io/v1alpha1\nkind: ObjectBucketClaim\nmetadata:\n\
      \  name: <rhdh_bucket_claim_name>\nspec:\n  generateBucketName: <rhdh_bucket_claim_name>\n\
      \  storageClassName: openshift-storage.noobaa.io\n```\n\nThis example creates\
      \ an ObjectBucketClaim CR with the specified name and storage class. The `generateBucketName`\
      \ field specifies the name of the bucket to be generated, and the `storageClassName`\
      \ field specifies the storage class to use for the bucket.\n\nTo add the access\
      \ information to the Helm chart configuration or the Operator configuration,\
      \ you can use the following example:\n\n```yaml\nupstream:\n  backstage:\n \
      \   extraEnvVarsSecrets:\n      - <rhdh_bucket_claim_name>\n    extraEnvVarsCM:\n\
      \      - <rhdh_bucket_claim_name>\n```\n\nThis example adds the access information\
      \ to the Helm chart configuration or the Operator configuration by specifying\
      \ the name of the Developer Hub ObjectBucketClaim secret and config map.\n\n\
      To configure the TechDocs plugin to use OpenShift Data Foundation for cloud\
      \ storage, you can use the following example:\n\n```yaml\ntechdocs:\n  builder:\
      \ external\n  publisher:\n    type: awsS3\n    awsS3:\n      bucketName: '${BUCKET_NAME}'\n\
      \      credentials:\n        accessKeyId: '${AWS_ACCESS_KEY_ID}'\n        secretAccessKey:\
      \ '${AWS_SECRET_ACCESS_KEY}'\n      endpoint: 'https://${BUCKET_HOST}'\n   \
      \   region: '${BUCKET_REGION}'\n      s3ForcePathStyle: true\n      type: awsS3\n\
      ```\n\nThis example configures the TechDocs plugin to use OpenShift Data Foundation\
      \ for cloud storage by specifying the bucket name, credentials, endpoint, region,\
      \ and s3ForcePathStyle."
