- conversation_group_id: configuration-98
  description: configuration
  turns:
  - contexts:
    - 'package: ./dynamic plugins/dist/red hat developer hub backstage plugin quickstart
      disabled: true ``` ## Using Quickstart onboarding steps You can use the Quickstart
      onboarding steps to learn more about the administrator features of RHDH. (Optional)
      If RBAC is enabled, you must have administrator permissions to access to the
      Quickstart feature. To start a Quickstart step in Red Hat Developer Hub, complete
      the following steps: 1. In your RHDH navigation menu, click the Help (?) icon.
      2. In the dropdown menu, click Quick start. 3. Select the Quickstart step that
      you would like to begin. 4. To close the Quickstart drawer, click Hide. ![About
      Quickstarts] [NOTE] ---- Your overall progress is tracked and displayed as a
      progress bar and a progress percentage in the Quickstart footer. ---- ## Enabling
      Quickstart localization in RHDH You can enable translation key support for Quickstart
      titles, descriptions, and CTAs, so that users can onboard in their preferred
      language. In Developer Hub, all existing and newly created Quickstart steps
      support localization using dedicated translation keys (titleKey, descriptionKey,
      cta.textKey). [NOTE] ---- If a translation key is present but the corresponding
      localized string is missing, the system defaults to the original text defined
      in the Quickstart configuration (title, description, text). If no translation
      key is defined at all, the original text is displayed. ---- You have enabled
      localization in your RHDH application. 1. For all Quickstart steps (both existing
      and new) in your configuration file, you must define both the original text
      and the new localization keys. For example, in the quickstart section of your
      custom app-config.yaml file, add the titleKey, descriptionKey, and textKey values,
      as follows: app-config.yaml fragment ```yaml app: quickstart: # Existing Quickstart
      steps should also be updated with keys - title: ''Setup Authentication'' titleKey:
      steps.setupAuth.title description: ''Learn the basics of navigating the Developer
      Hub interface'' descriptionKey: steps.setupAuth.description icon: ''home'' cta:
      text: ''Get Started'' textKey: steps.setupAuth.ctaTitle link: ''/catalog'' #
      ... ``` where: title:: (Mandatory) Fallback for the title. titleKey:: Key for
      the translated title. description:: (Mandatory) Fallback for the description.
      descriptionKey:: Key for the translated description. text:: (Mandatory) Fallback
      for the CTA text. textKey:: Key for the translated CTA text. 2. In your dynamic-plugins.yaml
      file, add the translationResources section to your red-hat-developer-hub-backstage-plugin-quickstart
      configuration, as follows: app-config.yaml fragment ```yaml plugins: - package:
      ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-quickstart disabled:
      false pluginConfig: dynamicPlugins: frontend: red-hat-developer-hub.backstage-plugin-quickstart:
      # translationResources definition is required for translations to work translationResources:
      - importName: quickstartTranslations ref: quickstartTranslationRef # ... other
      configurations like mountPoints ... ``` where: importName:: Enter the name used
      to reference the import. ref:: Reference to the resource definition. 3. In your
      translation file, map the keys from the first step to the localized strings
      for each supported language. allTranslations.json fragment ```yaml "plugin.quickstart":
      { "en": { "steps.setupAuth.title": "Manage plugins EN", "steps.setupAuth.description":
      "EN Browse and install extensions to add features, connect with external tools,
      and customize your experience.", "steps.setupAuth.ctaTitle": "Start" }, "fr":
      { "steps.setupAuth.title": "Gérer les plugins FR", "steps.setupAuth.description":
      "FR Parcourez et installez des extensions pour ajouter des fonctionnalités,
      vous connecter à des outils externes et personnaliser votre expérience.", "steps.setupAuth.ctaTitle":
      "Commencer" } } ``` # Customizing the Tech Radar page in Red Hat Developer Hub
      In Red Hat Developer Hub, the Tech Radar page is provided by the tech-radar
      dynamic plugin, which is disabled by default. For information about enabling
      dynamic plugins in Red Hat Developer Hub see Configuring dynamic plugins. In
      Red Hat Developer Hub, you can configure Learning Paths by passing the data
      into the app-config.yaml file as a proxy. The base Tech Radar URL must include
      the /developer-hub/tech-radar proxy. [NOTE] ---- Due to the use of overlapping
      pathRewrites for both the tech-radar and homepage quick access proxies, you
      must create the tech-radar configuration (^api/proxy/developer-hub/tech-radar)
      before you create the homepage configuration (^/api/proxy/developer-hub). For
      more information about customizing the Home page in Red Hat Developer Hub, see
      Customizing the Home page in Red Hat Developer Hub. ---- You can provide data
      to the Tech Radar page from the following sources: JSON files hosted on GitHub
      or GitLab. A dedicated service that provides the Tech Radar data in JSON format
      using an API. ## Customizing the Tech Radar page by using a JSON file For ease
      of use and simplicity, you can configure the Tech Radar page by using a hosted
      JSON file. You have specified the data sources for the Tech Radar plugin in
      the integrations section of the app config.yaml file. For example, you have
      enabled Developer Hub integration with GitHub. You have enabled the ./dynamic
      plugins/dist/backstage community plugin tech radar and /dynamic plugins/dist/backstage
      community plugin tech radar backend dynamic plugins. 1. Publish the JSON file
      containing your Tech Radar data to a web server, such as GitHub or Gitlab. You
      can find an example at https://raw.githubusercontent.com/backstage/community-plugins/main/workspaces/tech-radar/plugins/tech-radar-common/src/sampleTechRadarResponse.json.
      2. Configure Developer Hub to access the Tech Radar data from the hosted JSON
      files, by adding the following to the app-config.yaml file: ```yaml techRadar:
      url: <tech_radar_data_url> ``` <tech_radar_data_url>:: Enter the Tech Radar
      data hosted JSON URL. ## Customizing the Tech Radar page by using a customization
      service For advanced scenarios, you can host your Red Hat Developer Hub customization
      service to provide data to all configurable Developer Hub pages, such as the
      Tech Radar page. You can even use a different service for each page. You have
      specified the data sources for the Tech Radar plugin in the integrations section
      of the app config.yaml file. For example, you have enabled Developer Hub integration
