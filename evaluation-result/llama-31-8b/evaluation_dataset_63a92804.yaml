- conversation_group_id: configuration-364
  description: configuration
  turns:
  - contexts:
    - 'Get AI-assisted help for your development tasks To assist with development
      tasks, platform questions, and debugging, use Red Hat Developer Lightspeed for
      Red Hat Developer Hub, a generative AI virtual assistant integrated directly
      into Red Hat Developer Hub (RHDH). You can use the conversational interface
      to ask platform-specific questions, analyze logs, generate code, and create
      test plans, which reduces the time spent searching through official documentation
      or disparate tools. ### Configure safety guards in Red Hat Developer Hub To
      protect users from insecure or harmful AI model outputs, Red Hat Developer Hub
      (RHDH) uses Llama Guard as a default safety shield. You must configure these
      guards to align with your organization&#8217;s security policies. Default safety
      guard configuration:: The system uses Llama Guard as the default safety shield.
      Override these settings in the run.yaml file. [NOTE] ---- The external_providers_dir
      parameter defaults to null and is no longer required in your configuration.
      ---- Overriding safety guards:: To implement custom security layers or different
      safety shields, you must define a new safety provider within a custom run.yaml
      file. Disabling safety guards:: To run RHDH without safety guards, you must
      use the run-no-guard.yaml configuration file. [IMPORTANT] ---- Running without
      safety guards increases the risk of unvalidated model output. Only use this
      configuration in secure development environments. ---- Applying the no-guard
      configuration:: To run the system without a safety guard, perform these steps:
      1. Add the following YAML file as a config map to your namespace: ```yaml version:
      2 image_name: redhat ai dev llama stack no guard apis: agents inference safety
      tool_runtime vector_io files container_image: external_providers_dir: providers:
      agents: config: persistence: agent_state: namespace: agents backend: kv_default
      responses: table_name: responses backend: sql_default provider_id: meta reference
      provider_type: inline::meta reference inference: provider_id: ${env.ENABLE_VLLM:+vllm}
      provider_type: remote::vllm config: url: ${env.VLLM_URL:=} api_token: ${env.VLLM_API_KEY:=}
      max_tokens: ${env.VLLM_MAX_TOKENS:=4096} tls_verify: ${env.VLLM_TLS_VERIFY:=true}
      provider_id: ${env.ENABLE_OLLAMA:+ollama} provider_type: remote::ollama config:
      url: ${env.OLLAMA_URL:=http://localhost:11434} provider_id: ${env.ENABLE_OPENAI:+openai}
      provider_type: remote::openai config: api_key: ${env.OPENAI_API_KEY:=} provider_id:
      ${env.ENABLE_VERTEX_AI:+vertexai} provider_type: remote::vertexai config: project:
      ${env.VERTEX_AI_PROJECT:=} location: ${env.VERTEX_AI_LOCATION:=us central1}
      provider_id: sentence transformers provider_type: inline::sentence transformers
      config: {} tool_runtime: provider_id: model context protocol provider_type:
      remote::model context protocol config: {} provider_id: rag runtime provider_type:
      inline::rag runtime config: {} vector_io: provider_id: faiss provider_type:
      inline::faiss config: persistence: namespace: vector_io::faiss backend: faiss_kv
      files: provider_id: localfs provider_type: inline::localfs config: storage_dir:
      /tmp/llama stack files metadata_store: table_name: files_metadata backend: sql_files
      storage: backends: kv_default: type: kv_sqlite db_path: /tmp/kvstore.db sql_default:
      type: sql_sqlite db_path: /tmp/sql_store.db sql_files: type: sql_sqlite db_path:
      /rag content/vector_db/rhdh_product_docs/1.9/files_metadata.db faiss_kv: type:
      kv_sqlite db_path: /rag content/vector_db/rhdh_product_docs/1.9/faiss_store.db
      stores: metadata: namespace: registry backend: faiss_kv inference: table_name:
      inference_store backend: sql_default max_write_queue_size: 10000 num_writers:
      4 conversations: table_name: openai_conversations backend: sql_default registered_resources:
      models: model_id: sentence transformers/all mpnet base v2 metadata: embedding_dimension:
      768 model_type: embedding provider_id: sentence transformers provider_model_id:
      /rag content/embeddings_model tool_groups: provider_id: rag runtime toolgroup_id:
      builtin::rag vector_dbs: vector_db_id: rhdh product docs 1_8 embedding_model:
      sentence transformers/all mpnet base v2 embedding_dimension: 768 provider_id:
      faiss server: auth: host: port: 8321 quota: tls_cafile: tls_certfile: tls_keyfile:
      ``` 2. Mount the config map to your Llama Stack container at /app-root/run.yaml
      to make sure it overrides the default image file: ```yaml name: llama stack
      volumeMounts: mountPath: /app root/run.yaml subPath: run.yaml name: llama stack
      config ``` 3. Configure the required volume: ```yaml volumes: name: llama stack
      config configMap: name: llama stack config ``` where: llama-stack-config:: The
      config map where you added the new no-guard configuration file. 4. Restart the
      deployment if it does not trigger an automatic rollout. Your platform engineer
      has installed and configured the Developer Lightspeed for RHDH plugin in your
      RHDH instance. ### Get the best results for assistant queries To resolve technical
      blockers and accelerate development tasks, you must structure your queries to
      provide specific context to the AI assistant. Using precise prompts ensures
      that Developer Lightspeed for RHDH generates relevant code snippets, architectural
      advice, or platform-specific instructions. Use the following strategies to improve
      the accuracy of the assistant&#8217;s output during your development workflow:
      Specify technologies:: Instead of asking "How do I use templates?", ask "How
      do I create a Software Template that scaffolds a Node.js service with a CI/CD
      pipeline". Provide context:: Include details about your environment, such as
      "I am deploying to OpenShift; how do I configure my catalog-info.yaml to show
      pod health?". Leverage conversation context:: Ask follow-up questions to refine
      a previous answer. For example, if the assistant provides a code snippet, you
      can ask "Now rewrite that using TypeScript interfaces." Validate with citations::
      Examine the provided documentation links and citations in the response to verify
      that the generated advice aligns with your organization''s official standards.
      Improve assistant accuracy:: Rate the utility of responses by selecting the
      Thumbs up or Thumbs down icons. This feedback helps tune the model for your
      organization''s specific requirements. [IMPORTANT] ---- To maintain security
      standards, do not include sensitive personal information, plain-text credentials,
      or confidential business data in your queries. ---- ### Monitor AI responses
      and context management Developer Lightspeed for RHDH provides features to track
      the AI reasoning process and maintain the context of your development tasks.
      Thinking cards:: An expandable thinking card appears while the AI processes
      a query. A pulse animation indicates the reasoning phase. You can expand the
      card to view detailed reasoning or collapse it to minimize screen clutter. Tool
      call transparency:: An expandable card displays details for Model Context Protocol
      (MCP) tool calls, which allows you to monitor background processes. Context-aware
      citations:: Retrieval-Augmented Generation (RAG) citations appear only when
      the AI uses internal documentation. This makes sure that general knowledge responses
      remain concise. Context preservation during model changes:: When you select
      a different AI model, Developer Lightspeed for RHDH starts a new conversation.
      This makes sure that your previous chats remain available in your history. Structural
      readability:: The interface formats headings and bullet points automatically
      to make sure responses are scannable. ### Managing chats Manage your chat history
      in RHDH to organize your workspace, resume previous tasks, or find past solutions.
      ![chat options] You have configured the Developer Lightspeed for RHDH plugin
      in Red Hat Developer Hub. You must be logged in to the portal. 1. Click the
      Lightspeed floating action button (FAB) at the bottom right of the screen to
      open the chat overlay.'
