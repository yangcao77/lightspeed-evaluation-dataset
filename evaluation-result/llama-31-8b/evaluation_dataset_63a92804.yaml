- conversation_group_id: authentication-254
  description: authentication
  turns:
  - contexts:
    - 'Enable or disable authentication with the Guest user For trial or non-production
      environments, you can enable guest access to skip configuring authentication
      and authorization and explore Developer Hub features. For production environments,
      disable guest access to ensure secure authentication and authorization. ###
      Enable the Guest login To allow users to log in as a guest on the login page,
      enable the guest login option. 1. In the app-config.yaml file, set the authentication
      environment to development: ```yaml auth: environment: development ``` 2. Restart
      the Developer Hub application to apply the changes. 1. Go to the login page
      of your Developer Hub instance. 2. Verify that the option to log in as a guest
      is available. ### Disable the Guest login To prevent users from logging in as
      a guest on the login page, disable the guest login option. 1. In the app-config.yaml
      file, set the authentication environment to production: ```yaml auth: environment:
      production ``` 2. Restart the Developer Hub application to apply the changes.
      1. Go to the login page of your Developer Hub instance. 2. Verify that the option
      to log in as a guest is no longer available. ##'
    expected_response: For trial or non-production environments, you can enable guest
      access by setting the authentication environment to "development" in the app-config.yaml
      file and then restarting the Developer Hub application. To disable guest access
      for production environments, you must set the authentication environment to
      "production" in the app-config.yaml file and restart the application. After
      making the change, you should verify on the login page that the option to log
      in as a guest is either available (for enabled) or no longer available (for
      disabled).
    query: how to configure guest user authentication in Developer Hub
    response: "To configure guest user authentication in Developer Hub, you can follow\
      \ these steps:\n\n1.  Enable the Guest login: In the `app-config.yaml` file,\
      \ set the authentication environment to `development`:\n    ```yaml\nauth:\n\
      \  environment: development\n```\n2.  Restart the Developer Hub application\
      \ to apply the changes.\n3.  Go to the login page of your Developer Hub instance.\n\
      4.  Verify that the option to log in as a guest is available.\n5.  To disable\
      \ the Guest login, set the authentication environment to `production` in the\
      \ `app-config.yaml` file:\n    ```yaml\nauth:\n  environment: production\n```\n\
      6.  Restart the Developer Hub application to apply the changes.\n7.  Go to the\
      \ login page of your Developer Hub instance.\n8.  Verify that the option to\
      \ log in as a guest is no longer available.\n\nBy following these steps, you\
      \ can enable or disable guest user authentication in Developer Hub.\n\nTo enable\
      \ authentication with Azure, add the Microsoft authentication provider to your\
      \ `app-config.yaml` file content:\n```yaml\nauth:\n  environment: production\n\
      \  providers:\n    microsoft:\n      production:\n        clientId: ${MICROSOFT_CLIENT_ID}\n\
      \        clientSecret: ${MICROSOFT_CLIENT_SECRET}\n        tenantId: ${MICROSOFT_TENANT_ID}\n\
      signInPage: microsoft\n```\nTo enable authentication with RHBK, add the OIDC\
      \ provider section in your `app-config.yaml` file:\n```yaml\nauth:\n  environment:\
      \ production\n  providers:\n    oidc:\n      production:\n        metadataUrl:\
      \ ${KEYCLOAK_BASE_URL}\n        clientId: ${KEYCLOAK_CLIENT_ID}\n        clientSecret:\
      \ ${KEYCLOAK_CLIENT_SECRET}\n        prompt: auto\nsignInPage: oidc\n```\nWhen\
      \ configuring authentication and user provisioning, consider the following:\n\
      \n*   Securing your Developer Hub instance by ensuring only authenticated users\
      \ can gain access.\n*   Enabling authorization by allowing you to define access\
      \ controls based on user and group memberships synchronized from your IdP.\n\
      *   Provisioning user and group data to the catalog is necessary for various\
      \ catalog features that rely on understanding entity ownership and relationships\
      \ between users, groups, and software components.\n\nNote: These instructions\
      \ are based on the knowledge_search result that can be found here: \n"
