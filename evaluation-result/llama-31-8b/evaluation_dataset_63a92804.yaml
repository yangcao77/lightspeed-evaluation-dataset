      language model (LLM) requirements Developer Lightspeed for RHDH follows a Bring
      Your Own Model approach. This model means that to function, Developer Lightspeed
      for RHDH requires access to a large language model (LLM) which you must provide.
      An LLM is a type of generative AI that interprets natural language and generates
      human-like text or audio responses. When an LLM is used as a virtual assistant,
      the LLM can interpret questions and provide answers in a conversational manner.
      LLMs are usually provided by a service or server. Because Developer Lightspeed
      for RHDH does not provide an LLM for you, you must configure your preferred
      LLM provider during installation. You can configure the underlying Llama Stack
      server to integrate with a number of LLM providers that offer compatibility
      with the OpenAI API including the following inference providers: OpenAI (cloud
      based inference service) Red Hat OpenShift AI (enterprise model builder and
      inference server) Red Hat Enterprise Linux AI (enterprise inference server)
      Ollama (popular desktop inference server) vLLM (popular enterprise inference
      server) Gemini (available through Vertex AI) ### OpenAI OpenAI offers a range
      of generative AI models, such as GPT 5, which can be used to provide inference
      services for applications like Developer Lightspeed for RHDH. To use OpenAI
      with Developer Lightspeed for RHDH, you need access to the OpenAI API platform.
      For more information, see the OpenAI developer platform documentation. ### Ollama
      Ollama is a powerful and easy-to-use open-source project that simplifies the
      process of running large language models (LLMs) locally on your computer. It
      provides a simple command-line interface for downloading, managing, and running
      a wide variety of open-source models, such as Llama 3, Mistral, and many others,
      all without requiring a dedicated server or cloud service. By abstracting away
      the complex setup and dependencies, Ollama makes it accessible for developers,
      researchers, and enthusiasts to experiment with, build on, and integrate state-of-the-art
      LLMs into their applications directly from their personal machines. The open
      source Ollama server in container form provides a convenient local testbed for
      LLM models that is very accessible and easily controlled. Ollama Ollama server
      container ### vLLM vLLM is an open-source, high-throughput serving engine for
      large language models (LLMs) that significantly improves upon traditional serving
      systems. It achieves this by introducing several key optimizations to reduce
      memory usage and eliminate redundant computations. vLLM prominently increases
      the number of concurrent requests an LLM can handle, making it a powerful tool
      for deploying and scaling LLM-based applications. ## Appendix About user data
      security ### About data use Developer Lightspeed for RHDH is a virtual assistant
      you interact with using natural language. Using the Developer Lightspeed for
      RHDH interface, you send chat messages that Developer Lightspeed for RHDH transforms
      and sends to the large language model (LLM) provider you have configured for
      your environment. These messages could potentially contain information provided
